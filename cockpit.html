<!DOCTYPE html>
<html>
<head>
  <title>Master Data Cockpit</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://qnxiuojefowyzeanfhdz.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFueGl1b2plZm93eXplYW5maGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjY0NjEsImV4cCI6MjA5MTkwMjQ2MX0.JoSrVaT4KewYWoESPkjG5_W65nKdLYdcX7BZeaYK_FM";

    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let selectedPerson = null;

    // ------------------------
    // LOAD ALL PEOPLE
    // ------------------------
    async function loadPeople() {
      const { data, error } = await db
        .from('people')
        .select('*')
        .order('created_at', { ascending: false });

      const el = document.getElementById("people");

      if (error) {
        el.innerHTML = error.message;
        return;
      }

      el.innerHTML = data.map(p => `
        <div class="person" onclick="selectPerson('${p.id}')">
          ${p.name}
        </div>
      `).join('');
    }

    // ------------------------
    // SELECT PERSON
    // ------------------------
    window.selectPerson = async function(id) {
      const { data } = await db.from('people').select('*').eq('id', id).single();
      selectedPerson = data;

      document.getElementById("detail").innerHTML = `
  <h3>${data.name}</h3>

  <h4>Identity</h4>
  <label>Date of Birth</label>
  <input type="date" id="dob" value="${data.date_of_birth || ''}" />

  <label>Gender</label>
  <input id="gender" value="${data.gender || ''}" />

  <label>Marital Status</label>
  <input id="marital" value="${data.marital_status || ''}" />

  <h4>Contact</h4>
  <label>Phone</label>
  <input id="phone" value="${data.phone || ''}" />

  <label>Email</label>
  <input id="email" value="${data.email || ''}" />

  <label>Address</label>
  <textarea id="address">${data.address || ''}</textarea>

  <h4>Church Journey</h4>
  <label>Status</label>
  <input id="status" value="${data.engagement_status || ''}" />

  <label>Discipleship Stage</label>
  <input id="stage" value="${data.discipleship_stage || 1}" />

  <h4>Pastoral</h4>
  <label>Notes</label>
  <textarea id="notes">${data.notes || ''}</textarea>

  <label>Prayer Requests</label>
  <textarea id="prayer">${data.prayer_requests || ''}</textarea>

  <button onclick="savePerson()">Save</button>
`;
    }

    // ------------------------
    // SAVE PERSON
    // ------------------------
   window.savePerson = async function savePerson() {

  const payload = {
    date_of_birth: document.getElementById("dob")?.value || null,
    gender: document.getElementById("gender")?.value || null,
    marital_status: document.getElementById("marital")?.value || null,
    phone: document.getElementById("phone")?.value || null,
    email: document.getElementById("email")?.value || null,
    address: document.getElementById("address")?.value || null,
    engagement_status: document.getElementById("status")?.value || null,
    discipleship_stage: document.getElementById("stage")?.value || null,
    notes: document.getElementById("notes")?.value || null,
    prayer_requests: document.getElementById("prayer")?.value || null
  };

  console.log("FINAL PAYLOAD:", payload);

  const { data, error } = await db
    .from('people')
    .update(payload)
    .eq('id', selectedPerson.id)
    .select();

  console.log("UPDATE RESULT:", data, error);

  if (error) return alert(error.message);

  alert("Saved");
  await loadPeople();
};

    // ------------------------
    // ADD PERSON
    // ------------------------
    window.addPerson = async function() {
      const name = document.getElementById("newName").value;

      if (!name) return alert("Enter name");

      await db.from("people").insert([{ name }]);

      document.getElementById("newName").value = "";
      loadPeople();
    }

    window.onload = loadPeople;
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
    }

    .layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      height: calc(100vh - 50px);
    }

    .sidebar {
      background: #020617;
      padding: 10px;
      border-right: 1px solid #1f2937;
      overflow-y: auto;
    }

    .person {
      padding: 8px;
      margin-bottom: 5px;
      background: #111827;
      border-radius: 6px;
      cursor: pointer;
    }

    .person:hover {
      background: #1f2937;
    }

    .main {
      padding: 20px;
    }

    input, textarea {
      width: 100%;
      margin-top: 5px;
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #374151;
      background: #0b1220;
      color: white;
    }

    button {
      padding: 8px 12px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

<header>
  Master Data Cockpit
  <button style="float:right;" onclick="window.location.href='index.html'">
    Back to Dashboard
  </button>
</header>

<div class="layout">

  <!-- LEFT -->
  <div class="sidebar">
    <input id="newName" placeholder="New person..." />
    <button onclick="addPerson()">Add</button>

    <hr>

    <div id="people"></div>
  </div>

  <!-- RIGHT -->
  <div class="main">
    <div id="detail">Select a person</div>
  </div>

</div>

</body>
</html>
