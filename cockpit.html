<!DOCTYPE html>
<html>
<head>
  <title>Master Data Cockpit</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://qnxiuojefowyzeanfhdz.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_KEY";

    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let selectedPerson = null;

    // ------------------------
    // LOAD ALL PEOPLE
    // ------------------------
    async function loadPeople() {
      const { data, error } = await db
        .from('people')
        .select('*')
        .order('created_at', { ascending: false });

      const el = document.getElementById("people");

      if (error) {
        el.innerHTML = error.message;
        return;
      }

      el.innerHTML = data.map(p => `
        <div class="person" onclick="selectPerson('${p.id}')">
          ${p.name}
        </div>
      `).join('');
    }

    // ------------------------
    // SELECT PERSON
    // ------------------------
    window.selectPerson = async function(id) {
      const { data } = await db.from('people').select('*').eq('id', id).single();
      selectedPerson = data;

      document.getElementById("detail").innerHTML = `
        <h3>${data.name}</h3>

        <label>Status</label>
        <input id="status" value="${data.engagement_status || ''}" />

        <label>Stage</label>
        <input id="stage" value="${data.discipleship_stage || 1}" />

        <label>Notes</label>
        <textarea id="notes">${data.notes || ''}</textarea>

        <label>Prayer</label>
        <textarea id="prayer">${data.prayer_requests || ''}</textarea>

        <button onclick="savePerson()">Save</button>
      `;
    }

    // ------------------------
    // SAVE PERSON
    // ------------------------
    window.savePerson = async function() {
      await db.from('people').update({
        engagement_status: document.getElementById("status").value,
        discipleship_stage: document.getElementById("stage").value,
        notes: document.getElementById("notes").value,
        prayer_requests: document.getElementById("prayer").value
      }).eq('id', selectedPerson.id);

      alert("Saved");
      loadPeople();
    }

    // ------------------------
    // ADD PERSON
    // ------------------------
    window.addPerson = async function() {
      const name = document.getElementById("newName").value;

      if (!name) return alert("Enter name");

      await db.from("people").insert([{ name }]);

      document.getElementById("newName").value = "";
      loadPeople();
    }

    window.onload = loadPeople;
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
    }

    .layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      height: calc(100vh - 50px);
    }

    .sidebar {
      background: #020617;
      padding: 10px;
      border-right: 1px solid #1f2937;
      overflow-y: auto;
    }

    .person {
      padding: 8px;
      margin-bottom: 5px;
      background: #111827;
      border-radius: 6px;
      cursor: pointer;
    }

    .person:hover {
      background: #1f2937;
    }

    .main {
      padding: 20px;
    }

    input, textarea {
      width: 100%;
      margin-top: 5px;
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #374151;
      background: #0b1220;
      color: white;
    }

    button {
      padding: 8px 12px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

<header>
  Master Data Cockpit
  <button style="float:right;" onclick="window.location.href='index.html'">
    Back to Dashboard
  </button>
</header>

<div class="layout">

  <!-- LEFT -->
  <div class="sidebar">
    <input id="newName" placeholder="New person..." />
    <button onclick="addPerson()">Add</button>

    <hr>

    <div id="people"></div>
  </div>

  <!-- RIGHT -->
  <div class="main">
    <div id="detail">Select a person</div>
  </div>

</div>

</body>
</html>
