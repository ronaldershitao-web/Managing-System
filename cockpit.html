<!DOCTYPE html>
<html>
<head>
  <title>Master Data Cockpit v2</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://qnxiuojefowyzeanfhdz.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFueGl1b2plZm93eXplYW5maGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjY0NjEsImV4cCI6MjA5MTkwMjQ2MX0.JoSrVaT4KewYWoESPkjG5_W65nKdLYdcX7BZeaYK_FM";

    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let selectedPerson = null;

    // ------------------------
    // LOAD PEOPLE (PRIORITY ORDER)
    // ------------------------
    async function loadPeople() {
      const { data, error } = await db
        .from('people')
        .select('id,name,priority_score,last_contact_date,relationship_stage,engagement_status')
        .order('priority_score', { ascending: false });

      const el = document.getElementById("people");

      if (error) {
        el.innerHTML = `<div style="color:red">${error.message}</div>`;
        return;
      }

      el.innerHTML = (data || []).map(p => `
        <div class="person" onclick="selectPerson('${p.id}')">
          <b>${p.name}</b><br>
          <small>
            Score: ${p.priority_score ?? 0} |
            Last: ${p.last_contact_date ?? 'Never'}
          </small>
        </div>
      `).join('');
    }

    // ------------------------
    // SELECT PERSON
    // ------------------------
    window.selectPerson = async function(id) {

      const { data, error } = await db
        .from('people')
        .select('*')
        .eq('id', id)
        .single();

      if (error) {
        alert(error.message);
        return;
      }

      selectedPerson = data;

      document.getElementById("detail").innerHTML = `
        <h3>${data.name}</h3>

        <h4>Priority Engine</h4>
        <p>Score: <b>${data.priority_score ?? 0}</b></p>
        <p>Last Contact: ${data.last_contact_date ?? 'Never'}</p>

        <button onclick="logInteraction()">+ Log Interaction</button>

        <hr>

        <label>Date of Birth</label>
        <input type="date" id="dob" value="${data.date_of_birth || ''}" />

        <label>Gender</label>
        <input id="gender" value="${data.gender || ''}" />

        <label>Marital Status</label>
        <input id="marital" value="${data.marital_status || ''}" />

        <label>Phone</label>
        <input id="phone" value="${data.phone || ''}" />

        <label>Email</label>
        <input id="email" value="${data.email || ''}" />

        <label>Address</label>
        <textarea id="address">${data.address || ''}</textarea>

        <label>Status</label>
        <input id="status" value="${data.engagement_status || ''}" />

        <label>Stage</label>
        <input id="stage" value="${data.discipleship_stage || 1}" />

        <label>Notes</label>
        <textarea id="notes">${data.notes || ''}</textarea>

        <button onclick="savePerson()">Save</button>
      `;
    }

    // ------------------------
    // SAVE PERSON (SAFE + CLEAN)
    // ------------------------
    window.savePerson = async function() {

      if (!selectedPerson) return alert("Select a person first");

      const payload = {
        date_of_birth: document.getElementById("dob")?.value || null,
        gender: document.getElementById("gender")?.value || null,
        marital_status: document.getElementById("marital")?.value || null,
        phone: document.getElementById("phone")?.value || null,
        email: document.getElementById("email")?.value || null,
        address: document.getElementById("address")?.value || null,
        engagement_status: document.getElementById("status")?.value || null,
        discipleship_stage: Number(document.getElementById("stage")?.value || 1),
        notes: document.getElementById("notes")?.value || null
      };

      const { error } = await db
        .from('people')
        .update(payload)
        .eq('id', selectedPerson.id);

      if (error) {
        alert(error.message);
        return;
      }

      alert("Saved");

      await loadPeople();
      await selectPerson(selectedPerson.id);
    }

    // ------------------------
    // LOG INTERACTION (🔥 CORE ENGINE HOOK)
    // ------------------------
    window.logInteraction = async function() {

      if (!selectedPerson) return alert("Select person first");

      const { error } = await db.from('interactions').insert([
        {
          person_id: selectedPerson.id,
          interaction_type: "manual_visit",
          interaction_date: new Date().toISOString(),
          notes: "Logged from cockpit"
        }
      ]);

      if (error) {
        alert(error.message);
        return;
      }

      alert("Interaction logged → priority auto-updated");

      await loadPeople();
      await selectPerson(selectedPerson.id);
    }

    // ------------------------
    // INIT
    // ------------------------
    window.onload = loadPeople;
  </script>

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }

    .layout { display:grid; grid-template-columns:260px 1fr; height:100vh; }

    .sidebar { background:#020617; padding:10px; overflow:auto; }

    .person { padding:8px; margin-bottom:6px; background:#111827; cursor:pointer; border-radius:6px; }

    .person:hover { background:#1f2937; }

    .main { padding:20px; }

    input,textarea {
      width:100%; padding:8px; margin:5px 0 10px;
      background:#0b1220; color:white; border:1px solid #374151;
      border-radius:6px;
    }

    button {
      background:#2563eb; border:none; color:white;
      padding:8px 12px; border-radius:6px; cursor:pointer;
    }
  </style>
</head>

<body>

<div class="layout">

  <div class="sidebar">
    <h3>People</h3>
    <div id="people"></div>
  </div>

  <div class="main">
    <div id="detail">Select a person</div>
  </div>

</div>

</body>
</html>
