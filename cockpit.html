<!DOCTYPE html>
<html>
<head>
  <title>Master Data Cockpit</title>

 <script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://qnxiuojefowyzeanfhdz.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";

const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selectedPerson = null;

// ------------------------
// LOAD PEOPLE (WITH SCORE)
// ------------------------
async function loadPeople() {
  const { data, error } = await db
    .from('people')
    .select('id, name, priority_score, last_contact_date')
    .order('priority_score', { ascending: false });

  const el = document.getElementById("people");

  if (error) {
    el.innerHTML = error.message;
    return;
  }

  el.innerHTML = data.map(p => `
    <div class="person" onclick="selectPerson('${p.id}')">
      <b>${p.name}</b><br>
      <small>
        Score: ${p.priority_score ?? 0} |
        Last: ${p.last_contact_date ?? 'Never'}
      </small>
    </div>
  `).join('');
}

// ------------------------
// SELECT PERSON
// ------------------------
window.selectPerson = async function(id) {

  const { data, error } = await db
    .from('people')
    .select('*')
    .eq('id', id)
    .single();

  if (error) {
    alert(error.message);
    return;
  }

  selectedPerson = data;

  document.getElementById("detail").innerHTML = `
    <h3>${data.name}</h3>

    <h4>Priority Engine</h4>
    <p>Score: <b>${data.priority_score ?? 0}</b></p>
    <p>Last Contact: ${data.last_contact_date ?? 'Never'}</p>

    <h4>Identity</h4>

    <label>Date of Birth</label>
    <input type="date" id="dob" value="${data.date_of_birth || ''}" />

    <label>Gender</label>
    <input id="gender" value="${data.gender || ''}" />

    <label>Marital Status</label>
    <input id="marital" value="${data.marital_status || ''}" />

    <h4>Contact</h4>
    <label>Phone</label>
    <input id="phone" value="${data.phone || ''}" />

    <label>Email</label>
    <input id="email" value="${data.email || ''}" />

    <label>Address</label>
    <textarea id="address">${data.address || ''}</textarea>

    <h4>Church Journey</h4>
    <label>Status</label>
    <input id="status" value="${data.engagement_status || ''}" />

    <label>Discipleship Stage</label>
    <input id="stage" value="${data.discipleship_stage || 1}" />

    <h4>Pastoral</h4>
    <label>Notes</label>
    <textarea id="notes">${data.notes || ''}</textarea>

    <label>Prayer Requests</label>
    <textarea id="prayer">${data.prayer_requests || ''}</textarea>

    <button onclick="savePerson()">Save</button>
  `;
}

// ------------------------
// SAVE PERSON (FIXED + SAFE UPDATE)
// ------------------------
window.savePerson = async function() {

  if (!selectedPerson) {
    alert("No person selected");
    return;
  }

  const payload = {
    date_of_birth: document.getElementById("dob")?.value || null,
    gender: document.getElementById("gender")?.value || null,
    marital_status: document.getElementById("marital")?.value || null,
    phone: document.getElementById("phone")?.value || null,
    email: document.getElementById("email")?.value || null,
    address: document.getElementById("address")?.value || null,
    engagement_status: document.getElementById("status")?.value || null,
    discipleship_stage: Number(document.getElementById("stage")?.value || 1),
    notes: document.getElementById("notes")?.value || null,
    prayer_requests: document.getElementById("prayer")?.value || null
  };

  console.log("SAVE PAYLOAD:", payload);

  const { data, error } = await db
    .from('people')
    .update(payload)
    .eq('id', selectedPerson.id)
    .select('*')
    .single();

  if (error) {
    alert(error.message);
    return;
  }

  console.log("UPDATED PERSON:", data);

  // 🔥 refresh local state immediately
  selectedPerson = data;

  alert("Saved");

  await loadPeople();
  await selectPerson(selectedPerson.id);
}

// ------------------------
// ADD PERSON
// ------------------------
window.addPerson = async function() {
  const name = document.getElementById("newName").value;

  if (!name) return alert("Enter name");

  const { error } = await db.from("people").insert([{ name }]);

  if (error) {
    alert(error.message);
    return;
  }

  document.getElementById("newName").value = "";
  loadPeople();
}

window.onload = loadPeople;
</script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
    }

    .layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      height: calc(100vh - 50px);
    }

    .sidebar {
      background: #020617;
      padding: 10px;
      border-right: 1px solid #1f2937;
      overflow-y: auto;
    }

    .person {
      padding: 8px;
      margin-bottom: 5px;
      background: #111827;
      border-radius: 6px;
      cursor: pointer;
    }

    .person:hover {
      background: #1f2937;
    }

    .main {
      padding: 20px;
    }

    input, textarea {
      width: 100%;
      margin-top: 5px;
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #374151;
      background: #0b1220;
      color: white;
    }

    button {
      padding: 8px 12px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

<header>
  Master Data Cockpit
  <button style="float:right;" onclick="window.location.href='index.html'">
    Back to Dashboard
  </button>
</header>

<div class="layout">

  <!-- LEFT -->
  <div class="sidebar">
    <input id="newName" placeholder="New person..." />
    <button onclick="addPerson()">Add</button>

    <hr>

    <div id="people"></div>
  </div>

  <!-- RIGHT -->
  <div class="main">
    <div id="detail">Select a person</div>
  </div>

</div>

</body>
</html>
