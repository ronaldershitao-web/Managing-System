<!DOCTYPE html>
<html>
<head>
  <title>Hospitality Duty Import</title>

  <style>
    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    .card{
      background:#111827;
      border-radius:10px;
      padding:20px;
      max-width:900px;
      margin:auto;
      border:1px solid #1f2937;
    }

    h2{ margin-top:0; }

    input, button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:6px;
      box-sizing:border-box;
    }

    button{
      cursor:pointer;
      font-weight:bold;
    }

    .previewBtn{ background:#3b82f6; color:white; }
    .importBtn{ background:#22c55e; color:white; }

    .preview{
      margin-top:20px;
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      max-height:500px;
      overflow:auto;
      font-size:12px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      border:1px solid #334155;
      padding:6px;
      text-align:left;
    }

    th{ background:#1e293b; }

    .good{ color:#22c55e; font-weight:bold; }
    .bad{ color:#ef4444; font-weight:bold; }

    .summary{
      margin-top:10px;
      font-size:12px;
      color:#94a3b8;
    }

    .keyBox{
      background:#0f172a;
      border:1px solid #334155;
      color:white;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>🏠 Hospitality Duty Import</h2>

  <input id="anonKey" class="keyBox" placeholder="Paste Supabase ANON KEY" />
  <input id="sheetUrl" placeholder="Paste Google Sheet URL" />

  <button class="previewBtn" onclick="previewSheet()">Preview Sheet</button>
  <button class="importBtn" onclick="importHospitality()">Import / Sync</button>

  <div class="summary" id="summary"></div>
  <div class="preview" id="preview"></div>

</div>

<script>

const EDGE_URL =
  "https://qnxiuojefowyzeanfhdz.supabase.co/functions/v1/import-hospitality";

/* =========================
   SAFE INPUT
========================= */

function getSheetUrl(){
  const el = document.getElementById("sheetUrl");
  return el ? el.value.trim() : "";
}

function getKey(){
  const el = document.getElementById("anonKey");
  return el ? el.value.trim() : "";
}

/* =========================
   GOOGLE SHEET → CSV
========================= */

function toCsvUrl(sheetUrl){

  if(!sheetUrl || typeof sheetUrl !== "string"){
    throw new Error("Sheet URL is missing");
  }

  const match = sheetUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);

  if(!match){
    throw new Error("Invalid Google Sheet URL format");
  }

  const sheetId = match[1];

  const gidMatch = sheetUrl.match(/gid=([0-9]+)/);
  const gid = gidMatch ? gidMatch[1] : "0";

  return `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
}

/* =========================
   PREVIEW
========================= */

window.previewSheet = async function () {

  const sheetUrl = document.getElementById("sheetUrl").value;
  const anonKey = document.getElementById("anonKey").value;

  if (!sheetUrl) return alert("Paste sheet URL");
  if (!anonKey) return alert("Paste Supabase anon key");

  const res = await fetch(EDGE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${anonKey}`
    },
    body: JSON.stringify({
      sheetUrl,   // ✅ MUST exist
      mode: "preview"
    })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.error || "Preview failed");
    return;
  }

  renderPreview(data);
};

/* =========================
   IMPORT
========================= */

window.importHospitality = async function () {

  const sheetUrl = document.getElementById("sheetUrl").value;
  const anonKey = document.getElementById("anonKey").value;

  if (!sheetUrl) return alert("Paste sheet URL");
  if (!anonKey) return alert("Paste Supabase anon key");

  const res = await fetch(EDGE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${anonKey}`
    },
    body: JSON.stringify({
      sheetUrl,   // ✅ THIS WAS MISSING BEFORE
      mode: "import"
    })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.error || "Import failed");
    return;
  }

  alert(`Imported ${data.rows.length} rows`);
};

/* =========================
   CSV PARSER
========================= */

function parseCSV(text){

  const lines = text.split("\n").filter(l => l.trim());

  return lines.slice(1).map(line => {

    const cols = line.split(",");

    return {
      date: cols[0]?.trim() || "",
      report_time: cols[1]?.trim() || "",
      pastor: cols[2]?.trim() || "",
      leader: cols[3]?.trim() || ""
    };

  });
}

/* =========================
   RENDER
========================= */

function render(data){

  document.getElementById("summary").innerHTML = `
    ✅ Matched: ${data.matched} |
    ❌ Unmatched: ${data.unmatched} |
    📄 Total: ${data.rows.length}
  `;

  document.getElementById("preview").innerHTML = `
    <table>
      <tr>
        <th>Date</th>
        <th>Report Time</th>
        <th>Pastor</th>
        <th>Leader</th>
        <th>Status</th>
      </tr>

      ${data.rows.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${r.report_time}</td>
          <td>${r.pastor}</td>
          <td>${r.leader}</td>
          <td class="${r.service_id ? 'good':'bad'}">
            ${r.service_id ? 'Matched' : 'No Match'}
          </td>
        </tr>
      `).join("")}
    </table>
  `;
}

</script>

</body>
</html>
