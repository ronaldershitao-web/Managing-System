<!DOCTYPE html>
<html>
<head>
  <title>Hospitality Duty Import</title>

  <style>
    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    .card{
      background:#111827;
      border-radius:10px;
      padding:20px;
      max-width:900px;
      margin:auto;
      border:1px solid #1f2937;
    }

    h2{ margin-top:0; }

    input, button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:6px;
      box-sizing:border-box;
    }

    button{
      cursor:pointer;
      font-weight:bold;
    }

    .previewBtn{ background:#3b82f6; color:white; }
    .importBtn{ background:#22c55e; color:white; }

    .preview{
      margin-top:20px;
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      max-height:500px;
      overflow:auto;
      font-size:12px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      border:1px solid #334155;
      padding:6px;
      text-align:left;
    }

    th{ background:#1e293b; }

    .good{ color:#22c55e; font-weight:bold; }
    .bad{ color:#ef4444; font-weight:bold; }

    .summary{
      margin-top:10px;
      font-size:12px;
      color:#94a3b8;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>🏠 Hospitality Duty Import</h2>

  <input id="anonKey" placeholder="Paste Supabase ANON KEY" />
  <input id="sheetUrl" placeholder="Paste Google Sheet URL" />

  <button class="previewBtn" onclick="previewSheet()">Preview Sheet</button>
  <button class="importBtn" onclick="importHospitality()">Import</button>

  <div class="summary" id="summary"></div>
  <div class="preview" id="preview"></div>

</div>

<script>

const EDGE_URL =
  "https://qnxiuojefowyzeanfhdz.supabase.co/functions/v1/import-hospitality";

/* =========================
   DATE NORMALISER (CRITICAL FIX)
========================= */

function normalizeDate(input){

  if(!input) return null;

  const months = {
    jan:"01", feb:"02", mar:"03", apr:"04",
    may:"05", jun:"06", jul:"07", aug:"08",
    sep:"09", oct:"10", nov:"11", dec:"12"
  };

  const s = input.toLowerCase().trim();

  // 4-apr-26 or 04/apr/2026
  const m = s.match(/(\d{1,2})[-\/]([a-z]{3})[-\/](\d{2,4})/);

  if(m){

    let year = m[3];
    if(year.length === 2) year = "20" + year;

    return `${year}-${months[m[2]]}-${m[1].padStart(2,"0")}`;
  }

  // fallback ISO
  const d = new Date(input);
  if(!isNaN(d.getTime())){
    return d.toISOString().split("T")[0];
  }

  return null;
}

/* =========================
   TIME NORMALISER
========================= */

function toMinutes(t){

  if(!t) return null;

  const s = t.toLowerCase().trim();

  const m = s.match(/(\d{1,2}):(\d{2})\s*(am|pm)?/);

  if(!m) return null;

  let h = parseInt(m[1]);
  const min = parseInt(m[2]);
  const ap = m[3];

  if(ap === "pm" && h !== 12) h += 12;
  if(ap === "am" && h === 12) h = 0;

  return h * 60 + min;
}

/* =========================
   FIND MATCH (CORE ENGINE)
========================= */

async function findServiceId(date, reportTime){

  const cleanDate = normalizeDate(date);
  const rt = toMinutes(reportTime);

  if(!cleanDate || rt === null) return null;

  const { data: services } = await db
    .from("services")
    .select(`
      id,
      service_date,
      service_slots(
        start_time,
        end_time
      )
    `)
    .eq("service_date", cleanDate);

  if(!services || services.length === 0){
    return null;
  }

  for(const s of services){

    const slot = s.service_slots;
    if(!slot) continue;

    const start = toMinutes(slot.start_time);
    const end = toMinutes(slot.end_time);

    if(rt >= start && rt <= end){
      return s.id;
    }
  }

  return null;
}

/* =========================
   PREVIEW SHEET
========================= */

window.previewSheet = async function(){

  const sheetUrl = document.getElementById("sheetUrl").value;
  const anonKey = document.getElementById("anonKey").value;

  const res = await fetch(EDGE_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":`Bearer ${anonKey}`
    },
    body:JSON.stringify({
      sheetUrl,
      mode:"preview"
    })
  });

  const data = await res.json();

  if(!res.ok){
    alert(data.error || "Preview failed");
    return;
  }

  document.getElementById("summary").innerHTML = `
    ✅ Matched: ${data.matched} |
    ❌ Unmatched: ${data.unmatched} |
    📄 Total: ${data.rows.length}
  `;

  document.getElementById("preview").innerHTML = `
    <table>
      <tr>
        <th>Date</th>
        <th>Report Time</th>
        <th>Pastor</th>
        <th>Leader</th>
        <th>Status</th>
      </tr>

      ${data.rows.map(r => `
        <tr>
          <td>${r.duty_date}</td>
          <td>${r.report_time}</td>
          <td>${r.pastor || ""}</td>
          <td>${r.leader || ""}</td>
          <td class="${r.service_id ? 'good' : 'bad'}">
            ${r.service_id ? "Matched" : "No Match"}
          </td>
        </tr>
      `).join("")}
    </table>
  `;
};

/* =========================
   IMPORT
========================= */

window.importHospitality = async function(){

  const sheetUrl = document.getElementById("sheetUrl").value;
  const anonKey = document.getElementById("anonKey").value;

  const res = await fetch(EDGE_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":`Bearer ${anonKey}`
    },
    body:JSON.stringify({
      sheetUrl,
      mode:"import"
    })
  });

  const data = await res.json();

  if(!res.ok){
    alert(data.error || "Import failed");
    return;
  }

  alert(`Imported ${data.rows.length} rows`);
};

</script>

</body>
</html>
