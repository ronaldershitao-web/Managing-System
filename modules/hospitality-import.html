<!DOCTYPE html>
<html>
<head>
  <title>Hospitality Duty Import</title>

  <style>
    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    .card{
      background:#111827;
      border-radius:10px;
      padding:20px;
      max-width:900px;
      margin:auto;
      border:1px solid #1f2937;
    }

    h2{ margin-top:0; }

    input, button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:6px;
      box-sizing:border-box;
    }

    button{
      cursor:pointer;
      font-weight:bold;
    }

    .previewBtn{ background:#3b82f6; color:white; }
    .importBtn{ background:#22c55e; color:white; }

    .preview{
      margin-top:20px;
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      max-height:500px;
      overflow:auto;
      font-size:12px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      border:1px solid #334155;
      padding:6px;
      text-align:left;
    }

    th{ background:#1e293b; }

    .good{ color:#22c55e; font-weight:bold; }
    .bad{ color:#ef4444; font-weight:bold; }

    .summary{
      margin-top:10px;
      font-size:12px;
      color:#94a3b8;
    }

    .keyBox{
      background:#0f172a;
      border:1px solid #334155;
      color:white;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>🏠 Hospitality Duty Import</h2>

  <input id="anonKey" class="keyBox" placeholder="Paste Supabase ANON KEY" />
  <input id="sheetUrl" placeholder="Paste Google Sheet URL" />

  <button class="previewBtn" onclick="previewSheet()">Preview Sheet</button>
  <button class="importBtn" onclick="importHospitality()">Import / Sync Hospitality</button>

  <div class="summary" id="summary"></div>
  <div class="preview" id="preview"></div>

</div>

<script>

const EDGE_URL =
  "https://qnxiuojefowyzeanfhdz.supabase.co/functions/v1/import-hospitality";

function getKey(){
  return document.getElementById("anonKey").value.trim();
}

function toMinutes(t) {
  if (!t) return null;

  t = t.toString().trim();

  // 24h format (07:50 or 07:50:00)
  const m24 = t.match(/^(\d{1,2}):(\d{2})/);
  if (m24) {
    return parseInt(m24[1]) * 60 + parseInt(m24[2]);
  }

  // AM/PM format
  const m = t.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
  if (!m) return null;

  let h = parseInt(m[1]);
  const min = parseInt(m[2]);
  const p = m[3].toUpperCase();

  if (p === "PM" && h !== 12) h += 12;
  if (p === "AM" && h === 12) h = 0;

  return h * 60 + min;
}

async function findServiceId(date, reportTime){

  const { data: services } = await db
    .from("services")
    .select(`
      id,
      service_date,
      service_slots(
        id,
        start_time,
        end_time,
        label
      )
    `)
    .eq("service_date", date);

  if(!services) return null;

  const rt = toMinutes(reportTime);

  for(const s of services){

    const slot = s.service_slots;
    if(!slot) continue;

    const start = toMinutes(slot.start_time);
    const end = toMinutes(slot.end_time);

    if(rt >= start && rt <= end){
      return s.id;
    }
  }

  return null;
}

/* =========================
   PREVIEW
========================= */

window.previewSheet = async function(){

  const sheetUrl = document.getElementById("sheetUrl").value;
  const anonKey = getKey();

  if(!sheetUrl) return alert("Paste sheet URL");
  if(!anonKey) return alert("Paste Supabase key");

  const res = await fetch(EDGE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${anonKey}`
    },
    body: JSON.stringify({
      sheetUrl,
      mode: "preview"
    })
  });

  const data = await res.json();

  if(!res.ok){
    alert(data.error || "Preview failed");
    return;
  }

  document.getElementById("summary").innerHTML = `
    ✅ Matched: ${data.matched} |
    ❌ Unmatched: ${data.unmatched} |
    📄 Total: ${data.rows.length}
  `;

  document.getElementById("preview").innerHTML = `
    <table>
      <tr>
        <th>Date</th>
        <th>Report Time</th>
        <th>Pastor</th>
        <th>Leader</th>
        <th>Status</th>
      </tr>

      ${data.rows.map(r => `
        <tr>
          <td>${r.duty_date || ""}</td>
          <td>${r.report_time || ""}</td>
          <td>${r.pastor || ""}</td>
          <td>${r.leader || ""}</td>
          <td class="${r.service_id ? 'good' : 'bad'}">
            ${r.service_id ? 'Matched' : 'No Match'}
          </td>
        </tr>
      `).join("")}
    </table>
  `;
};

/* =========================
   IMPORT
========================= */

window.importHospitality = async function(){

  const sheetUrl = document.getElementById("sheetUrl").value;
  const anonKey = getKey();

  if(!sheetUrl) return alert("Paste sheet URL");
  if(!anonKey) return alert("Paste Supabase key");

  const res = await fetch(EDGE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${anonKey}`
    },
    body: JSON.stringify({
      sheetUrl,
      mode: "import"
    })
  });

  const data = await res.json();

  if(!res.ok){
    alert(data.error || "Import failed");
    return;
  }

  alert(`✅ Imported ${data.rows.length} rows`);
};

</script>

</body>
</html>
