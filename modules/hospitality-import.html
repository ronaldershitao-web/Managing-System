<!DOCTYPE html>
<html>
<head>
  <title>Hospitality Duty Import</title>

  <style>
    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    .card{
      background:#111827;
      border-radius:10px;
      padding:20px;
      max-width:1000px;
      margin:auto;
      border:1px solid #1f2937;
    }

    h2{ margin-top:0; }

    label{
      font-size:12px;
      color:#94a3b8;
    }

    input, button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:6px;
      box-sizing:border-box;
    }

    .keyBox{
      background:#0f172a;
      border:1px solid #334155;
      color:white;
    }

    button{
      cursor:pointer;
      font-weight:bold;
    }

    .previewBtn{ background:#3b82f6; color:white; }
    .importBtn{ background:#22c55e; color:white; }

    .preview{
      margin-top:20px;
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      max-height:500px;
      overflow:auto;
      font-size:12px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      border:1px solid #334155;
      padding:6px;
      text-align:left;
    }

    th{ background:#1e293b; }

    .good{ color:#22c55e; font-weight:bold; }
    .bad{ color:#ef4444; font-weight:bold; }

    .summary{
      margin-top:10px;
      font-size:12px;
      color:#94a3b8;
    }

  </style>
</head>

<body>

<div class="card">

  <h2>🏠 Hospitality Duty Import</h2>

  <!-- 🔑 ANON KEY -->
  <label>Supabase ANON Key</label>
  <input id="anonKey" class="keyBox" placeholder="Paste ANON KEY here" />

  <!-- 📄 SHEET -->
  <label>Google Sheet URL</label>
  <input id="sheetUrl" placeholder="Paste Google Sheet URL" />

  <button class="previewBtn" onclick="previewSheet()">
    Preview Sheet
  </button>

  <button class="importBtn" onclick="importHospitality()">
    Import
  </button>

  <div class="summary" id="summary"></div>
  <div class="preview" id="preview"></div>

</div>

<script>

let rows = [];
let services = [];

/* =========================
   GET KEY
========================= */

function getKey(){
  return document.getElementById("anonKey").value.trim();
}

/* =========================
   TIME CONVERTER
========================= */

function toMinutes(timeStr){

  if(!timeStr) return null;

  // already 24h format
  if(!timeStr.toLowerCase().includes("am") &&
     !timeStr.toLowerCase().includes("pm")){

    const [h,m] = timeStr.split(":").map(Number);
    return h*60 + m;
  }

  let isPM = timeStr.toLowerCase().includes("pm");

  let clean = timeStr
    .toLowerCase()
    .replace("am","")
    .replace("pm","")
    .trim();

  let [h,m] = clean.split(":").map(Number);

  if(isPM && h < 12) h += 12;
  if(!isPM && h === 12) h = 0;

  return h*60 + m;
}

/* =========================
   LOAD SERVICES
========================= */

async function loadServices(){

  const key = getKey();

  const res = await fetch(
    "https://qnxiuojefowyzeanfhdz.supabase.co/rest/v1/services?select=id,start_time,end_time",
    {
      headers:{
        apikey: key,
        Authorization: `Bearer ${key}`
      }
    }
  );

  services = await res.json();
}

/* =========================
   MATCH SERVICE (CORE LOGIC)
========================= */

function matchService(reportTime){

  const t = toMinutes(reportTime);

  for(const s of services){

    const start = toMinutes(s.start_time);
    const end = toMinutes(s.end_time);

    if(t >= start && t <= end){
      return s.id;
    }
  }

  return null;
}

/* =========================
   PREVIEW SHEET
========================= */

window.previewSheet = async function(){

  const sheetUrl = document.getElementById("sheetUrl").value;
  const key = getKey();

  if(!sheetUrl) return alert("Paste sheet URL");
  if(!key) return alert("Paste ANON key");

  await loadServices();

  const csvUrl = sheetUrl.replace(
    "/edit#gid=",
    "/export?format=csv&gid="
  );

  const res = await fetch(csvUrl);
  const text = await res.text();

  const lines = text.split("\n").map(r => r.split(","));

  rows = [];

  let matched = 0;
  let unmatched = 0;

  for(const r of lines.slice(1)){

    const reportTime = r[1];

    const serviceId = matchService(reportTime);

    if(serviceId) matched++;
    else unmatched++;

    rows.push({
      date: r[0],
      reportTime,
      pastor: r[3],
      leader: r[4],
      service_id: serviceId
    });
  }

  document.getElementById("summary").innerHTML =
    `✅ Matched: ${matched} | ❌ Unmatched: ${unmatched} | 📄 Total: ${rows.length}`;

  document.getElementById("preview").innerHTML = `
    <table>
      <tr>
        <th>Date</th>
        <th>Report Time</th>
        <th>Pastor</th>
        <th>Leader</th>
        <th>Status</th>
      </tr>

      ${rows.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${r.reportTime}</td>
          <td>${r.pastor || ""}</td>
          <td>${r.leader || ""}</td>
          <td class="${r.service_id ? 'good' : 'bad'}">
            ${r.service_id ? "Matched" : "No Match"}
          </td>
        </tr>
      `).join("")}
    </table>
  `;
};

/* =========================
   IMPORT (placeholder)
========================= */

window.importHospitality = async function(){
  alert("Connect Edge Function here");
};

</script>

</body>
</html>
