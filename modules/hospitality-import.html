<!DOCTYPE html>
<html>
<head>
  <title>Hospitality Duty Import</title>

  <style>
    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    .card{
      background:#111827;
      border-radius:10px;
      padding:20px;
      max-width:900px;
      margin:auto;
      border:1px solid #1f2937;
    }

    input, button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:6px;
    }

    button{ font-weight:bold; cursor:pointer; }

    .preview{
      margin-top:20px;
      font-size:12px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    td, th{
      border:1px solid #334155;
      padding:6px;
    }

    th{ background:#1e293b; }

    .good{ color:#22c55e; }
    .bad{ color:#ef4444; }
  </style>
</head>

<body>

<div class="card">

  <h2>Hospitality Duty Import</h2>

  <input id="sheetUrl" placeholder="Google Sheet URL" />

  <button onclick="previewSheet()">Preview</button>
  <button onclick="importData()">Import</button>

  <div id="summary"></div>
  <div id="preview"></div>

</div>

<script>

let rows = [];
let services = [];

/* =========================
   TIME CONVERTER
========================= */

function to24Hour(timeStr){

  if(!timeStr) return null;

  const [time, modifier] = timeStr.trim().split(" ");

  let [hours, minutes] = time.split(":").map(Number);

  if(modifier?.toLowerCase() === "pm" && hours !== 12){
    hours += 12;
  }

  if(modifier?.toLowerCase() === "am" && hours === 12){
    hours = 0;
  }

  return `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:00`;
}

/* =========================
   COMPARE TIME RANGE
========================= */

function isWithin(time, start, end){

  return time >= start && time <= end;
}

/* =========================
   FETCH SERVICES
========================= */

async function loadServices(){

  const res = await fetch(
    "https://qnxiuojefowyzeanfhdz.supabase.co/rest/v1/services?select=*",
    {
      headers:{
        apikey:"YOUR_ANON_KEY",
        Authorization:"Bearer YOUR_ANON_KEY"
      }
    }
  );

  services = await res.json();
}

/* =========================
   MATCH SERVICE
========================= */

function matchService(reportTime){

  const t = to24Hour(reportTime);

  for(const s of services){

    if(!s.start_time || !s.end_time) continue;

    if(isWithin(t, s.start_time, s.end_time)){
      return s;
    }
  }

  return null;
}

/* =========================
   PREVIEW
========================= */

window.previewSheet = async function(){

  await loadServices();

  const url = document.getElementById("sheetUrl").value;

  const csvUrl = url.replace("/edit#gid=", "/export?format=csv&gid=");

  const res = await fetch(csvUrl);
  const text = await res.text();

  const lines = text.split("\n").map(r => r.split(","));

  rows = [];

  for(const r of lines.slice(1)){

    const reportTime = r[1];

    const service = matchService(reportTime);

    rows.push({
      date: r[0],
      reportTime,
      pastor: r[3],
      leader: r[4],
      service_id: service?.id || null
    });
  }

  render();
};

/* =========================
   RENDER
========================= */

function render(){

  const matched = rows.filter(r => r.service_id).length;

  document.getElementById("summary").innerHTML =
    `Matched: ${matched} | Unmatched: ${rows.length - matched}`;

  document.getElementById("preview").innerHTML = `
    <table>
      <tr>
        <th>Date</th>
        <th>Time</th>
        <th>Pastor</th>
        <th>Leader</th>
        <th>Status</th>
      </tr>

      ${rows.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${r.reportTime}</td>
          <td>${r.pastor || ""}</td>
          <td>${r.leader || ""}</td>
          <td class="${r.service_id ? 'good':'bad'}">
            ${r.service_id ? "Matched" : "No Match"}
          </td>
        </tr>
      `).join("")}
    </table>
  `;
}

/* =========================
   IMPORT (optional)
========================= */

window.importData = async function(){

  alert("Connect to Edge Function here");
};

</script>

</body>
</html>
