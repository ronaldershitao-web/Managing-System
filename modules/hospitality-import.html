<!DOCTYPE html>
<html>
<head>
  <title>Hospitality Duty Import</title>

  <style>
    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    .card{
      background:#111827;
      border-radius:10px;
      padding:20px;
      max-width:900px;
      margin:auto;
      border:1px solid #1f2937;
    }

    h2{ margin-top:0; }

    input, button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:6px;
      box-sizing:border-box;
    }

    button{
      cursor:pointer;
      font-weight:bold;
    }

    .previewBtn{
      background:#3b82f6;
      color:white;
    }

    .importBtn{
      background:#22c55e;
      color:white;
    }

    .preview{
      margin-top:20px;
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      max-height:500px;
      overflow:auto;
      font-size:12px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      border:1px solid #334155;
      padding:6px;
      text-align:left;
    }

    th{
      background:#1e293b;
    }

    .good{ color:#22c55e; font-weight:bold; }
    .bad{ color:#ef4444; font-weight:bold; }

    .summary{
      margin-top:10px;
      font-size:12px;
      color:#94a3b8;
    }

  </style>
</head>

<body>

<div class="card">

  <h2>🏠 Hospitality Duty Import</h2>

  <input id="sheetUrl" placeholder="Paste Google Sheet URL" />

  <button class="previewBtn" onclick="previewSheet()">
    Preview Sheet
  </button>

  <button class="importBtn" onclick="importHospitality()">
    Import / Sync Hospitality
  </button>

  <div class="summary" id="summary"></div>

  <div class="preview" id="preview"></div>

</div>

<script>

let previewData = [];

/* =========================
   EDGE FUNCTION URL
========================= */

const EDGE_URL =
  "https://qnxiuojefowyzeanfhdz.supabase.co/functions/v1/import-hospitality";

/* =========================
   PREVIEW
========================= */

window.previewSheet = async function () {

  const sheetUrl = document.getElementById("sheetUrl").value;

  if (!sheetUrl) {
    alert("Please paste sheet URL");
    return;
  }

  const res = await fetch(EDGE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      sheetUrl,
      mode: "preview"
    })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.error || "Preview failed");
    return;
  }

  previewData = data.rows || [];

  renderPreview(data);
};

/* =========================
   IMPORT
========================= */

window.importHospitality = async function () {

  const sheetUrl = document.getElementById("sheetUrl").value;

  if (!sheetUrl) {
    alert("Please paste sheet URL");
    return;
  }

  const res = await fetch(EDGE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      sheetUrl,
      mode: "import"
    })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.error || "Import failed");
    return;
  }

  alert(`✅ Imported ${data.rows.length} rows`);
};

/* =========================
   RENDER PREVIEW
========================= */

function renderPreview(data){

  document.getElementById("summary").innerHTML = `
    ✅ Matched: ${data.matched} |
    ❌ Unmatched: ${data.unmatched} |
    📄 Total: ${data.rows.length}
  `;

  document.getElementById("preview").innerHTML = `

    <table>

      <tr>
        <th>Date</th>
        <th>Report Time</th>
        <th>Pastor</th>
        <th>Leader</th>
        <th>Status</th>
      </tr>

      ${data.rows.map(r => `

        <tr>

          <td>${r.duty_date || ""}</td>
          <td>${r.report_time || ""}</td>
          <td>${r.pastor || ""}</td>
          <td>${r.leader || ""}</td>

          <td class="${r.service_id ? 'good' : 'bad'}">
            ${r.service_id ? 'Matched' : 'No Match'}
          </td>

        </tr>

      `).join("")}

    </table>

  `;
}

</script>

</body>
</html>
