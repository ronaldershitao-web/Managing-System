<!DOCTYPE html>
<html>
<head>
  <title>Service Command Center</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      height:85vh;
      overflow:auto;
    }

    .title{
      color:#fbbf24;
      font-weight:bold;
      margin-bottom:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .date{
      font-size:11px;
      color:#94a3b8;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:6px 0;
      gap:8px;
    }

    .role{flex:1}

    .staff{
      min-width:110px;
      text-align:right;
      font-weight:bold;
      color:#22c55e;
    }

    .unassigned{
      color:#ef4444;
    }

    .pool{
      margin-top:8px;
      border-top:1px solid #1f2937;
      padding-top:6px;
    }

    .pool-title{
      font-size:11px;
      color:#94a3b8;
      margin-bottom:4px;
    }
  </style>
</head>

<body>

<header>
  Service Command Center
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staff = [];
let templateRoles = [];
let serviceRoles = [];
let templateStaff = [];

let staffMap = {};
let roleMap = {};
let poolMap = {};

/* ================= LOAD ================= */
async function load(){

  const [
    sRes,
    stRes,
    trRes,
    srRes,
    tsRes
  ] = await Promise.all([

    db.from("services")
      .select("*, service_slots(label,time,location)")
      .order("service_date",{ascending:true}),

    db.from("staff").select("*"),

    db.from("service_template_roles").select("*"),

    db.from("service_roles").select("*"),

    db.from("service_template_staff").select("*")
  ]);

  services = sRes.data || [];
  staff = stRes.data || [];
  templateRoles = trRes.data || [];
  serviceRoles = srRes.data || [];
  templateStaff = tsRes.data || [];

  /* ================= STAFF MAP ================= */
  staffMap = Object.fromEntries(
    staff.map(s => [String(s.id), s.name])
  );

  /* ================= ROLE MAP ================= */
  roleMap = {};

  serviceRoles.forEach(r => {

    const key =
      `${r.service_id}_${String(r.role || "").toLowerCase()}`;

    roleMap[key] = r;
  });

  /* ================= TEMPLATE STAFF POOL ================= */
  poolMap = {};

  templateStaff.forEach(t => {

    const tid = String(t.template_id);

    if(!poolMap[tid]) poolMap[tid] = [];

    poolMap[tid].push({
      staff_id: t.staff_id,
      name: staffMap[t.staff_id] || "UNKNOWN"
    });
  });

  render();
}

/* ================= BUILD ROLES ================= */
function buildRoles(service){

  const roles = templateRoles.filter(r =>
    String(r.template_id) === String(service.service_template_id)
  );

  const filtered = service.is_communion_service
    ? roles
    : roles.filter(r =>
        !r.role.toLowerCase().includes("communion")
      );

  return filtered.map(r => {

    const key =
      `${service.id}_${r.role.toLowerCase()}`;

    const assigned = roleMap[key];

    return {
      role: r.role,
      staff: assigned ? staffMap[assigned.staff_id] : null
    };
  });
}

/* ================= STAFF POOL ================= */
function buildPool(service){

  const pool = poolMap[String(service.service_template_id)] || [];

  if(pool.length === 0){
    return `<div style="color:#ef4444;font-size:12px">No Pool Assigned</div>`;
  }

  return pool.map(p => `
    <div class="row">
      <div class="role">Pool</div>
      <div class="staff">${p.name}</div>
    </div>
  `).join("");
}

/* ================= CARD ================= */
function card(service){

  const roles = buildRoles(service);

  return `
    <div class="card">

      <div style="font-weight:bold">
        ${service.service_slots?.label}
      </div>

      <div class="date">
        ${service.service_date}
      </div>

      ${roles.map(r => `
        <div class="row">
          <div class="role">${r.role}</div>
          <div class="staff ${!r.staff ? "unassigned" : ""}">
            ${r.staff || "UNASSIGNED"}
          </div>
        </div>
      `).join("")}

      <div class="pool">
        <div class="pool-title">Staff Pool (Template Level)</div>
        ${buildPool(service)}
      </div>

    </div>
  `;
}

/* ================= RENDER ================= */
function render(){

  const sat=[], s830=[], s1045=[], jurong=[];

  services.forEach(s => {

    const label = (s.service_slots?.label || "").toLowerCase();
    const loc = (s.service_slots?.location || "").toLowerCase();

    if(loc.includes("jurong")) jurong.push(s);
    else if(label.includes("sat")) sat.push(s);
    else if(label.includes("8.30")) s830.push(s);
    else if(label.includes("10.45")) s1045.push(s);
  });

  document.getElementById("grid").innerHTML = `
    <div class="col">
      <div class="title">Saturday Service</div>
      ${sat.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday 8.30am</div>
      ${s830.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday 10.45am</div>
      ${s1045.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday Jurong</div>
      ${jurong.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">System View</div>
      <div style="font-size:11px;color:#94a3b8">
        Stable architecture (no relational dependency)
      </div>
    </div>
  `;
}

/* ================= INIT ================= */
window.load = load;
load();

</script>

</body>
</html>
