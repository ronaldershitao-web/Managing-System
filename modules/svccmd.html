<!DOCTYPE html>
<html>
<head>
  <title>Command Post (FINAL ROSTER LOGIC)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .title{ color:#60a5fa; font-weight:bold; }
    .tag{ font-size:12px; color:#94a3b8; }

    .section{
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
    }

    .good{ color:#22c55e; }
    .bad{ color:#ef4444; }

    button.small{
      font-size:10px;
      padding:2px 6px;
      margin-left:4px;
      border-radius:4px;
      border:none;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#111827;
      padding:20px;
      border-radius:10px;
      width:360px;
      max-height:80vh;
      overflow:auto;
    }

    .staff-row{
      display:flex;
      justify-content:space-between;
      padding:6px;
      border-bottom:1px solid #1f2937;
      font-size:12px;
    }

    select, button{
      width:100%;
      padding:8px;
      margin-top:10px;
      border-radius:6px;
      border:none;
    }

    .save{ background:#22c55e; color:white; }
    .danger{ background:#ef4444; color:white; }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (FINAL ROSTER LOGIC)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- AVAILABILITY MODAL -->
<div class="modal" id="availModal">
  <div class="modal-content">
    <h3>Manage Availability</h3>
    <div id="availList"></div>
    <button class="save" onclick="closeAvail()">Done</button>
  </div>
</div>

<!-- ASSIGN MODAL -->
<div class="modal" id="assignModal">
  <div class="modal-content">
    <h3 id="assignTitle">Assign</h3>
    <select id="staffSelect"></select>
    <button class="save" onclick="saveAssign()">Assign</button>
  </div>
</div>

<script type="module">
import { db } from "../assets/app.js";

let staffList = [];
let currentService = null;
let currentRole = null;
let assignedStaff = [];
let unavailableSet = new Set();

/* ================= LOAD ================= */
async function load(){

  const [servicesRes, templateRes, availabilityRes, staffRes, rolesRes] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location)`),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("staff").select("*"),
    db.from("service_roles").select("*")
  ]);

  const services = servicesRes.data || [];
  const templates = templateRes.data || [];
  const availability = availabilityRes.data || [];
  staffList = staffRes.data || [];
  const roles = rolesRes.data || [];

  const staffMap = new Map(staffList.map(s=>[String(s.id),s.name]));

  const templateMap = new Map();
  templates.forEach(t=>{
    const key = String(t.service_id);
    if(!templateMap.has(key)) templateMap.set(key,[]);
    templateMap.get(key).push(t.staff_id);
  });

  const availMap = new Map();
  availability.forEach(a=>{
    const key = `${a.service_id}-${a.staff_id}`;
    availMap.set(key,true);
  });

  const roleMap = new Map();
  roles.forEach(r=>{
    const key = String(r.service_id);
    if(!roleMap.has(key)) roleMap.set(key,[]);
    roleMap.get(key).push(r);
  });

  const grid = document.getElementById("grid");
  grid.innerHTML="";

  const cols=[[],[],[],[]];

  services.forEach(s=>{
    const t=(s.service_slots?.time||"").replace(":","");
    let i=-1;
    if(t.includes("1430")) i=0;
    else if(t.includes("0830")) i=1;
    else if(t.includes("1045")) i=2;
    else i=3;

    if(i>=0) cols[i].push(s);
  });

  cols.forEach(col=>{
    grid.innerHTML += `
      <div class="col">

        ${col.map(s=>{

          const assigned = templateMap.get(String(s.id)) || [];

          const unavailable = assigned.filter(id =>
            availMap.has(`${s.id}-${id}`)
          );

          const available = assigned.filter(id =>
            !availMap.has(`${s.id}-${id}`)
          );

          const serviceRoles = roleMap.get(String(s.id)) || [];

          const KEY = ["Service Pastor","Anchor","Welcome IC","Hospitality Cell"];

          const appointments = KEY.map(role=>{

            const found = serviceRoles.find(r =>
              (r.role||"").toLowerCase() === role.toLowerCase()
            );

            return {
              role,
              staffId: found?.staff_id,
              name: found?.staff_id ? staffMap.get(String(found.staff_id)) : "-"
            };
          });

          return `
            <div class="card">

              <div class="title">${s.service_slots?.label}</div>
              <div class="tag">${s.service_date}</div>

              <!-- ================= STATS ================= -->
              <div class="section">
                <b>Staff Summary</b>

                <div class="row">
                  <span>Total Assigned</span>
                  <span>${assigned.length}</span>
                </div>

                <div class="row">
                  <span>Unavailable</span>
                  <span class="bad">${unavailable.length}</span>
                </div>

                <div class="row">
                  <span>Available</span>
                  <span class="good">${available.length}</span>
                </div>

                <button class="small" onclick="openAvailability('${s.id}','${JSON.stringify(assigned)}')">
                  Manage Availability
                </button>
              </div>

              <!-- ================= KEY ROLES ================= -->
              <div class="section">
                <b>Key Appointments</b>

                ${appointments.map(a=>`
                  <div class="row">
                    <span>${a.role}</span>
                    <span>
                      ${a.name}

                      <button class="small"
                        onclick="openAssign('${s.id}','${a.role}')">
                        Assign
                      </button>
                    </span>
                  </div>
                `).join("")}

              </div>

            </div>
          `;
        }).join("")}

      </div>
    `;
  });
}

/* ================= AVAILABILITY ================= */
window.openAvailability = function(serviceId, assignedJson){

  currentService = serviceId;
  assignedStaff = JSON.parse(assignedJson);

  const box = document.getElementById("availList");

  box.innerHTML = assignedStaff.map(id=>{
    const name = staffList.find(s=>s.id===id)?.name;

    const isUnavailable = false; // simplify view here

    return `
      <div class="staff-row">
        <span>${name}</span>

        <button onclick="toggleAvail('${serviceId}','${id}')">
          Toggle
        </button>
      </div>
    `;
  }).join("");

  document.getElementById("availModal").style.display="flex";
};

window.toggleAvail = async function(serviceId, staffId){

  const { data } = await db
    .from("staff_availability")
    .select("*")
    .eq("service_id", serviceId)
    .eq("staff_id", staffId);

  if(data.length){
    await db.from("staff_availability")
      .delete()
      .eq("service_id", serviceId)
      .eq("staff_id", staffId);
  } else {
    await db.from("staff_availability").insert({
      service_id: serviceId,
      staff_id: staffId,
      status:"unavailable"
    });
  }

  load();
};

window.closeAvail = function(){
  document.getElementById("availModal").style.display="none";
};

/* ================= ASSIGN ================= */
window.openAssign = function(serviceId, role){
  currentService = serviceId;
  currentRole = role;

  const availableStaff = staffList; // later filter by availability

  document.getElementById("staffSelect").innerHTML =
    availableStaff.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");

  document.getElementById("assignModal").style.display="flex";
};

window.saveAssign = async function(){

  const staffId = document.getElementById("staffSelect").value;

  await db.from("service_roles").upsert({
    service_id: currentService,
    role: currentRole,
    staff_id: staffId
  },{
    onConflict:"service_id,role"
  });

  document.getElementById("assignModal").style.display="none";
  load();
};

window.load = load;
load();

</script>

</body>
</html>
