<!DOCTYPE html>
<html>
<head>
  <title>Command Post Grid</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      background:#111827;
      padding:12px;
      border-radius:10px;
      border:1px solid #1f2937;
      min-height:200px;
    }

    .title {
      font-size:16px;
      font-weight:bold;
    }

    .tag {
      font-size:12px;
      color:#94a3b8;
    }

    .section {
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row {
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:2px 0;
    }

    .good { color:#22c55e; }
    .bad { color:#ef4444; }
    .warn { color:#f59e0b; }
  </style>
</head>

<body>

<header>
  ⛪ Command Post Grid
  <button onclick="load()" style="background:#3b82f6;border:none;color:white;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* =========================
   HELPERS
========================= */

function isWeekend(dateStr) {
  const d = new Date(dateStr);
  return d.getDay() === 0 || d.getDay() === 6;
}

/* =========================
   LOAD COMMAND POST
========================= */

async function load() {

  const [
    servicesRes,
    rolesRes,
    staffRes,
    attendanceRes,
    availabilityRes
  ] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location,id)`),
    db.from("service_roles").select(`*, staff(name)`),
    db.from("staff").select("*"),
    db.from("service_attendance").select("*"),
    db.from("staff_availability").select("*").eq("status","unavailable")
  ]);

  let services = servicesRes.data || [];
  const roles = rolesRes.data || [];
  const staff = staffRes.data || [];
  const attendance = attendanceRes.data || [];
  const unavailable = availabilityRes.data || [];

  /* =========================
     FILTER: WEEKEND ONLY + LIMIT 2 WEEKENDS
  ========================= */

  services = services.filter(s => isWeekend(s.service_date));

  const weekendMap = {};
  const filtered = [];

  for (const s of services) {
    const weekKey = new Date(s.service_date).getWeek?.() || s.service_date;

    if (!weekendMap[weekKey]) weekendMap[weekKey] = [];
    weekendMap[weekKey].push(s);
  }

  Object.values(weekendMap)
    .slice(0, 2)
    .forEach(group => filtered.push(...group));

  /* =========================
     RENDER
  ========================= */

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (const s of filtered) {

    const slot = s.service_slots || {};

    const serviceRoles = roles.filter(r => r.service_id === s.id);

    const assigned = new Set(serviceRoles.map(r => r.staff_id).filter(Boolean));

    const unavailableIds = new Set(
      unavailable
        .filter(a =>
          a.service_date === s.service_date &&
          a.service_slot_id === s.service_slot_id
        )
        .map(a => a.staff_id)
    );

    const availableStaff = staff.filter(st => !unavailableIds.has(st.id));

    const floating = availableStaff.length - assigned.size;

    const attendanceRow = attendance.find(a => a.service_id === s.id) || {};

    const totalAttendance =
      (attendanceRow.onsite || 0) +
      (attendanceRow.online || 0) +
      (attendanceRow.communicants || 0);

    /* =========================
       CARD
    ========================= */

    grid.innerHTML += `
      <div class="card">

        <div class="title">
          ${slot.label || "Service"}
        </div>

        <div class="tag">
          ${s.service_date} | ${slot.time || ""}
        </div>

        <div class="tag">
          📍 ${slot.location || ""}
        </div>

        <div class="section">
          <b>Staff Summary</b>

          <div class="row">
            <span>Total Available</span>
            <b>${availableStaff.length}</b>
          </div>

          <div class="row">
            <span>Unassigned Roles</span>
            <b>${serviceRoles.filter(r => !r.staff_id).length}</b>
          </div>

          <div class="row">
            <span>Floating</span>
            <b class="${floating < 0 ? 'bad' : 'good'}">
              ${floating}
            </b>
          </div>
        </div>

        <div class="section">
          <b>Key Appointments</b>

          ${serviceRoles
            .filter(r => ["Service Pastor","Anchor","Welcome IC","Hospitality Cell"].includes(r.role))
            .map(r => `
              <div class="row">
                <span>${r.role}</span>
                <b>${r.staff?.name || "-"}</b>
              </div>
            `).join("")}
        </div>

        <div class="section">
          <b>Welcome Team</b>

          ${serviceRoles
            .filter(r => ["Welcome 1","Welcome 2","Plaza 1","Plaza 2"].includes(r.role))
            .map(r => `
              <div class="row">
                <span>${r.role}</span>
                <span>${r.staff?.name || "-"}</span>
              </div>
            `).join("")}
        </div>

        ${s.is_communion_service ? `
        <div class="section">
          <b>Holy Communion</b>

          ${serviceRoles
            .filter(r => r.role.includes("Station") || r.role === "Standby" || r.role === "Min Deaf")
            .map(r => `
              <div class="row">
                <span>${r.role}</span>
                <span>${r.staff?.name || "-"}</span>
              </div>
            `).join("")}
        </div>
        ` : ""}

        <div class="section">
          <b>Attendance</b>

          <div class="row">
            <span>Total</span>
            <b>${totalAttendance}</b>
          </div>
        </div>

      </div>
    `;
  }
}

load();

/* OPTIONAL WEEK FUNCTION */
Date.prototype.getWeek = function () {
  const d = new Date(Date.UTC(this.getFullYear(), this.getMonth(), this.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
};

</script>

</body>
</html>
