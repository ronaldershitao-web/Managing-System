<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Fixed Weekend Filter)</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      background:#111827;
      padding:12px;
      border-radius:10px;
      border:1px solid #1f2937;
      min-height:200px;
    }

    .title {
      font-size:16px;
      font-weight:bold;
    }

    .tag {
      font-size:12px;
      color:#94a3b8;
    }

    .section {
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row {
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:3px 0;
    }

    .good { color:#22c55e; }
    .bad { color:#ef4444; }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Weekend Only)
  <button onclick="load()" style="background:#3b82f6;border:none;color:white;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* =========================
   WEEKEND CHECK
========================= */

function isWeekend(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay();
  return day === 0 || day === 6;
}

/* =========================
   WEEK NUMBER GROUPING
========================= */

function getWeekKey(dateStr) {
  const d = new Date(dateStr);
  const year = d.getFullYear();

  const start = new Date(year, 0, 1);
  const diff = Math.floor((d - start) / (1000 * 60 * 60 * 24));

  const week = Math.ceil((diff + start.getDay() + 1) / 7);

  return `${year}-W${week}`;
}

/* =========================
   LOAD COMMAND POST
========================= */

async function load() {

  const [
    servicesRes,
    rolesRes,
    staffRes,
    attendanceRes,
    availabilityRes
  ] = await Promise.all([
    db.from("services").select(`
      *,
      service_slots(label,time,location,id)
    `),

    db.from("service_roles").select(`*, staff(name)`),

    db.from("staff").select("*"),

    db.from("service_attendance").select("*"),

    db.from("staff_availability").select("*").eq("status","unavailable")
  ]);

  let services = servicesRes.data || [];
  const roles = rolesRes.data || [];
  const staff = staffRes.data || [];
  const attendanceList = attendanceRes.data || [];
  const unavailableList = availabilityRes.data || [];

  /* =========================
     FILTER 1: WEEKEND ONLY
  ========================= */

  services = services.filter(s => isWeekend(s.service_date));

  /* =========================
     FILTER 2: ONLY 2 WEEKENDS
  ========================= */

  const grouped = {};

  services.forEach(s => {
    const key = getWeekKey(s.service_date);
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(s);
  });

  services = Object.values(grouped)
    .slice(0, 2)
    .flat();

  /* =========================
     RENDER
  ========================= */

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (const s of services) {

    const slot = s.service_slots || {};

    const serviceRoles = roles.filter(r => r.service_id === s.id);

    const assigned = new Set(
      serviceRoles.map(r => r.staff_id).filter(Boolean)
    );

    const unavailableIds = new Set(
      unavailableList
        .filter(a =>
          a.service_date === s.service_date &&
          a.service_slot_id === s.service_slot_id
        )
        .map(a => a.staff_id)
    );

    const availableStaff = staff.filter(st => !unavailableIds.has(st.id));

    const floating = availableStaff.length - assigned.size;

    const attendance = attendanceList.find(a => a.service_id === s.id) || {};

    const totalAttendance =
      (attendance.onsite || 0) +
      (attendance.online || 0) +
      (attendance.communicants || 0);

    grid.innerHTML += `
      <div class="card">

        <div class="title">
          ${slot.label || "Service"}
        </div>

        <div class="tag">
          ${s.service_date} | ${slot.time || ""}
        </div>

        <div class="tag">
          📍 ${slot.location || ""}
        </div>

        <div class="section">
          <b>Staff Summary</b>

          <div class="row">
            <span>Available</span>
            <b>${availableStaff.length}</b>
          </div>

          <div class="row">
            <span>Assigned</span>
            <b>${assigned.size}</b>
          </div>

          <div class="row">
            <span>Floating</span>
            <b class="${floating < 0 ? 'bad' : 'good'}">${floating}</b>
          </div>
        </div>

        <div class="section">
          <b>Key Appointments</b>

          ${serviceRoles
            .filter(r => ["Service Pastor","Anchor","Welcome IC","Hospitality Cell"].includes(r.role))
            .map(r => `
              <div class="row">
                <span>${r.role}</span>
                <b>${r.staff?.name || "-"}</b>
              </div>
            `).join("")}
        </div>

        <div class="section">
          <b>Welcome Team</b>

          ${serviceRoles
            .filter(r => ["Welcome 1","Welcome 2","Plaza 1","Plaza 2"].includes(r.role))
            .map(r => `
              <div class="row">
                <span>${r.role}</span>
                <span>${r.staff?.name || "-"}</span>
              </div>
            `).join("")}
        </div>

        ${s.is_communion_service ? `
        <div class="section">
          <b>Holy Communion</b>

          ${serviceRoles
            .filter(r =>
              r.role.includes("Station") ||
              r.role === "Standby" ||
              r.role === "Min Deaf"
            )
            .map(r => `
              <div class="row">
                <span>${r.role}</span>
                <span>${r.staff?.name || "-"}</span>
              </div>
            `).join("")}
        </div>
        ` : ""}

        <div class="section">
          <b>Attendance</b>

          <div class="row">
            <span>Total</span>
            <b>${totalAttendance}</b>
          </div>
        </div>

      </div>
    `;
  }
}

load();

</script>

</body>
</html>
