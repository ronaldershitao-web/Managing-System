<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Stable + Fixed Staff Names)</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      padding:10px;
    }

    .col {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:200px;
    }

    .card {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:10px;
    }

    .title {
      font-weight:bold;
      color:#60a5fa;
      margin-bottom:5px;
    }

    .tag {
      font-size:12px;
      color:#94a3b8;
    }

    .section {
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row {
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
    }

    .good {
      color:#22c55e;
    }

    .bad {
      color:#ef4444;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Stable + Fixed Staff Names)

  <button
    onclick="load()"
    style="
      background:#3b82f6;
      color:white;
      border:none;
      padding:6px 10px;
      border-radius:6px;
      cursor:pointer;
    "
  >
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">

import { db } from "../assets/app.js";

/* =========================
   SAFE DATE
========================= */
function parseDate(d) {

  if (!d) return new Date(0);

  const [y,m,day] = d.split("-");

  return new Date(
    Number(y),
    Number(m)-1,
    Number(day)
  );
}

/* =========================
   WINDOW FILTER
========================= */
function inWindow(dateStr) {

  const today = new Date();

  const min = new Date(today);
  min.setDate(today.getDate() - 7);

  const max = new Date(today);
  max.setDate(today.getDate() + 7);

  const d = parseDate(dateStr);

  return d >= min && d <= max;
}

/* =========================
   SLOT ORDER
========================= */
function getSlotIndex(s) {

  const time =
    (s.service_slots?.time || "").toLowerCase();

  const label =
    (s.service_slots?.label || "").toLowerCase();

  const loc =
    (s.service_slots?.location || "").toLowerCase();

  const text = `${label} ${time} ${loc}`;

  // Saturday
  if (
    text.includes("14:30") ||
    text.includes("2:30") ||
    text.includes("sat")
  ) {
    return 0;
  }

  // Sunday 8.30
  if (
    text.includes("08:30") ||
    text.includes("8:30") ||
    text.includes("830")
  ) {
    return 1;
  }

  // Sunday 10.45 Main
  if (
    text.includes("10:45") &&
    !text.includes("jurong")
  ) {
    return 2;
  }

  // Jurong
  if (
    text.includes("jurong")
  ) {
    return 3;
  }

  return 0;
}

/* =========================
   FIND ROLE
========================= */
function findRole(serviceRoles, roleName) {

  return serviceRoles.find(r =>

    String(r.role || "")
      .trim()
      .toLowerCase()

    ===

    String(roleName || "")
      .trim()
      .toLowerCase()
  );
}

/* =========================
   LOAD
========================= */
async function load() {

  const [
    servicesRes,
    templateStaffRes,
    rolesRes,
    availabilityRes,
    staffRes
  ] = await Promise.all([

    db
      .from("services")
      .select(`
        *,
        service_slots(
          label,
          time,
          location
        )
      `),

    db
      .from("staff_service_templates")
      .select("*"),

    db
      .from("service_roles")
      .select("*"),

    db
      .from("staff_availability")
      .select("*"),

    db
      .from("staff")
      .select("*")
  ]);

  let services =
    servicesRes.data || [];

  const templateStaff =
    templateStaffRes.data || [];

  const roles =
    rolesRes.data || [];

  const availability =
    availabilityRes.data || [];

  const staff =
    staffRes.data || [];

  /* =========================
     FILTER DATE WINDOW
  ========================= */
  services = services.filter(s =>
    inWindow(s.service_date)
  );

  /* =========================
     SORT ASCENDING
  ========================= */
  services.sort((a,b) =>
    parseDate(a.service_date) -
    parseDate(b.service_date)
  );

  /* =========================
     CREATE 4 COLUMNS
  ========================= */
  const cols = [[],[],[],[]];

  services.forEach(s => {

    const idx = getSlotIndex(s);

    cols[idx].push(s);
  });

  /* =========================
     RENDER
  ========================= */
  const grid =
    document.getElementById("grid");

  grid.innerHTML = "";

  cols.forEach(col => {

    grid.innerHTML += `
      <div class="col">

        ${col.map(s => {

          /* =========================
             TEMPLATE STAFF
          ========================= */
          const assigned =
            templateStaff.filter(t =>

              String(t.template_id)
              ===
              String(s.service_template_id)
            );

          const assignedIds =
            new Set(
              assigned.map(a => a.staff_id)
            );

          /* =========================
             UNAVAILABLE
          ========================= */
          const unavailableIds =
            new Set(

              availability
                .filter(a =>

                  String(a.service_date)
                  ===
                  String(s.service_date)

                  &&

                  String(a.service_slot_id)
                  ===
                  String(s.service_slot_id)

                  &&

                  String(a.status)
                    .toLowerCase()
                  ===
                  "unavailable"
                )
                .map(a => a.staff_id)
            );

          /* =========================
             AVAILABLE
          ========================= */
          const availableIds =
            [...assignedIds]
              .filter(id =>
                !unavailableIds.has(id)
              );

          /* =========================
             ROLES
          ========================= */
          const serviceRoles =
            roles.filter(r =>

              String(r.service_id)
              ===
              String(s.id)
            );

          /* =========================
             KEY APPOINTMENTS
          ========================= */
          const KEY_ROLES = [
            "Service Pastor",
            "Anchor",
            "Welcome IC",
            "Hospitality Cell"
          ];

          const keyAppointments =
            KEY_ROLES.map(role => {

              const found =
                findRole(serviceRoles, role);

              let name = "-";

              if (found?.staff_id) {

                const matchedStaff =
                  staff.find(st =>

                    String(st.id).trim()
                    ===
                    String(found.staff_id).trim()
                  );

                if (matchedStaff) {
                  name = matchedStaff.name;
                }
              }

              return {
                role,
                name
              };
            });

          /* =========================
             DATE DISPLAY
          ========================= */
          const d =
            parseDate(s.service_date);

          const day =
            d.toLocaleDateString(
              "en-SG",
              { weekday:"long" }
            );

          const date =
            d.toLocaleDateString(
              "en-SG",
              {
                day:"2-digit",
                month:"short"
              }
            );

          return `
            <div class="card">

              <div class="title">
                ${s.service_slots?.label || "Service"}
              </div>

              <div class="tag">
                ${day} | ${date}
              </div>

              <div class="tag">
                ⏰ ${s.service_slots?.time || ""}
              </div>

              <div class="section">

                <b>Staff Summary</b>

                <div class="row">
                  <span>Assigned</span>
                  <b>
                    ${assignedIds.size}
                  </b>
                </div>

                <div class="row">
                  <span>Unavailable</span>
                  <b class="bad">
                    ${unavailableIds.size}
                  </b>
                </div>

                <div class="row">
                  <span>Available</span>
                  <b class="good">
                    ${availableIds.length}
                  </b>
                </div>

              </div>

              <div class="section">

                <b>Key Appointments</b>

                ${keyAppointments.map(k => `
                  <div class="row">

                    <span>
                      ${k.role}
                    </span>

                    <b>
                      ${k.name}
                    </b>

                  </div>
                `).join("")}

              </div>

            </div>
          `;

        }).join("")}

      </div>
    `;
  });
}

window.load = load;

load();

</script>

</body>
</html>
