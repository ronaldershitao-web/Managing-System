<!DOCTYPE html>
<html>
<head>
  <title>Command Post FIXED</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:10px;
    }

    .dateHeader{
      color:#60a5fa;
      font-weight:bold;
      margin-top:12px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
    }

    .good{color:#22c55e;}
    .bad{color:#ef4444;}

    button.small{
      font-size:10px;
      padding:2px 6px;
      background:#3b82f6;
      color:white;
      border:none;
      border-radius:4px;
    }

    select,input{
      width:100%;
      margin-top:6px;
      padding:6px;
    }
  </style>
</head>

<body>

<header>
  <div>⛪ SVCCMD FIXED</div>
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staff = [];
let templates = [];
let roles = [];
let templateRoles = [];
let availability = [];

let staffMap = new Map();
let roleMap = new Map();
let templateRoleMap = new Map();

/* ================= HELPERS ================= */

function formatDate(d){
  const dt = new Date(d);
  return dt.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
}

function isWeekend(d){
  const dt = new Date(d);
  const day = dt.getDay();
  return day === 0 || day === 6; // Sun or Sat
}

/* ================= LOAD ================= */

async function load(){

  const [
    s,t,a,st,r,tr
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("staff").select("*"),
    db.from("service_roles").select("*"),
    db.from("service_template_roles").select("*")
  ]);

  services = (s.data||[]).filter(x=>isWeekend(x.service_date));
  templates = t.data||[];
  availability = a.data||[];
  staff = st.data||[];
  roles = r.data||[];
  templateRoles = tr.data||[];

  staffMap = new Map(staff.map(s=>[String(s.id),s.name]));

  roleMap = new Map();
  roles.forEach(r=>{
    const key = String(r.service_id);
    if(!roleMap.has(key)) roleMap.set(key,[]);
    roleMap.get(key).push(r);
  });

  templateRoleMap = new Map();
  templateRoles.forEach(r=>{
    const key = String(r.template_id);
    if(!templateRoleMap.has(key)) templateRoleMap.set(key,[]);
    templateRoleMap.get(key).push(r);
  });

  render();
}

/* ================= RENDER ================= */

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

/* ================= GROUP BY DATE ================= */
  const grouped = {};

  services.forEach(s=>{
    const dateKey = s.service_date;
    if(!grouped[dateKey]) grouped[dateKey] = [];
    grouped[dateKey].push(s);
  });

/* ================= 4 SERVICE COLS ================= */
  const cols = [[],[],[],[]];

  Object.entries(grouped).forEach(([date, list], idx)=>{

    const block = `
      <div class="dateHeader">
        ${formatDate(date)}
      </div>
    `;

    const servicesHtml = list.map(s=>{

      const templateStaff =
        templates.filter(t=>String(t.template_id)===String(s.service_template_id));

      const roleDefs =
        templateRoleMap.get(String(s.service_template_id)) || [];

      const appointments = roleDefs.map(r=>{

        const role = r.role || "";

        const assigned =
          templateStaff.find(t=>t.role===role);

        const staffId = assigned?.staff_id;

        return {
          role,
          staffId,
          name: staffMap.get(String(staffId)) || "-"
        };
      });

      return `
        <div class="card">
          <b>${s.service_slots?.label || ""}</b>

          ${appointments.map(a=>`
            <div class="row">
              <span>${a.role}</span>
              <span>
                ${a.name}
                <button class="small"
                  onclick="alert('assign ${a.role}')">
                  Assign
                </button>
              </span>
            </div>
          `).join("")}

        </div>
      `;
    }).join("");

    const colIndex = idx % 4;
    cols[colIndex].push(block + servicesHtml);
  });

/* ================= RENDER 4 COLS ================= */
  cols.forEach(c=>{
    grid.innerHTML += `<div class="col">${c.join("")}</div>`;
  });

/* ================= 5TH COLUMN ================= */
  const today = new Date();
  const dates = [];

  for(let i=0;i<60;i++){
    const d = new Date();
    d.setDate(today.getDate()+i);
    if(d.getDay()===0 || d.getDay()===6){
      dates.push(d.toISOString().split("T")[0]);
    }
  }

  grid.innerHTML += `
    <div class="col">
      <b>Staff Availability</b>

      <select id="dateSel">
        ${dates.map(d=>`<option>${d}</option>`).join("")}
      </select>

      <button onclick="alert('filter service here')">
        Load Services
      </button>
    </div>
  `;
}

window.load = load;
load();

</script>

</body>
</html>
