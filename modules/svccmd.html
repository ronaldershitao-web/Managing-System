<!DOCTYPE html>
<html>
<head>
  <title>Command Post (FIXED FINAL)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .title{
      color:#60a5fa;
      font-weight:bold;
      margin-bottom:4px;
    }

    .tag{
      font-size:12px;
      color:#94a3b8;
      margin-bottom:2px;
    }

    .section{
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:12px;
      margin:4px 0;
    }

    .good{ color:#22c55e; }
    .bad{ color:#ef4444; }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (FIXED)
  <button onclick="load()" style="background:#3b82f6;color:white;border:none;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= DATE ================= */
function parseDate(d){
  if(!d) return new Date(0);
  const [y,m,day]=d.split("-");
  return new Date(Number(y),Number(m)-1,Number(day));
}

/* ================= WINDOW ================= */
function inWindow(d){
  const now = new Date();
  const min = new Date(now); min.setDate(now.getDate()-7);
  const max = new Date(now); max.setDate(now.getDate()+7);
  const dt = parseDate(d);
  return dt>=min && dt<=max;
}

/* ================= SLOT ================= */
function slotIndex(s){
  const time = (s.service_slots?.time || "").toLowerCase();
  const location = (s.service_slots?.location || "").toLowerCase();
  const t = time.replace(":","");

  if(t.includes("1430")) return 0;
  if(t.includes("0830")) return 1;
  if(t.includes("1045") && !location.includes("jurong")) return 2;
  if(location.includes("jurong")) return 3;

  return -1;
}

/* ================= LOAD ================= */
async function load(){

  const [
    servicesRes,
    rolesRes,
    templateRes,
    availabilityRes,
    staffRes
  ] = await Promise.all([

    db.from("services").select(`
      *,
      service_slots(label,time,location)
    `),

    db.from("service_roles").select("id, role, service_id, staff_id"),

    db.from("staff_service_templates").select("*"),

    db.from("staff_availability").select("*"),

    db.from("staff").select("*")
  ]);

  let services = servicesRes.data || [];
  const roles = rolesRes.data || [];
  const templates = templateRes.data || [];
  const availability = availabilityRes.data || [];
  const staff = staffRes.data || [];

  /* ================= DEBUG MAPS ================= */
  console.log("SERVICES:", services);
  console.log("ROLES:", roles);
  console.log("STAFF:", staff);

  /* ================= LOOKUP MAPS ================= */
  const staffMap = {};
  staff.forEach(s => staffMap[s.id] = s.name);

  const roleMap = {};
  roles.forEach(r => {
    if(!roleMap[r.service_id]) roleMap[r.service_id] = [];
    roleMap[r.service_id].push(r);
  });

  /* ================= FILTER ================= */
  services = services.filter(s => inWindow(s.service_date));

  /* ================= SORT ================= */
  services.sort((a,b) =>
    parseDate(a.service_date) - parseDate(b.service_date)
  );

  const cols=[[],[],[],[]];

  services.forEach(s=>{
    const i = slotIndex(s);
    if(i>=0) cols[i].push(s);
  });

  const grid=document.getElementById("grid");
  grid.innerHTML="";

  cols.forEach(col=>{
    grid.innerHTML += `
      <div class="col">

        ${col.map(s=>{

          /* ================= FIX: USE MAP (NOT FILTER) ================= */
          const serviceRoles = roleMap[s.id] || [];

          console.log("SERVICE:", s.id);
          console.log("SERVICE ROLES:", serviceRoles);

          const assigned = templates.filter(
            t => t.template_id === s.service_template_id
          );

          const assignedIds = new Set(assigned.map(a => a.staff_id));

          const unavailableIds = new Set(
            availability
              .filter(a =>
                a.service_date === s.service_date &&
                a.service_slot_id === s.service_slot_id &&
                a.status === "unavailable"
              )
              .map(a => a.staff_id)
          );

          const availableCount =
            [...assignedIds].filter(id => !unavailableIds.has(id)).length;

          const KEY = [
            "Service Pastor",
            "Anchor",
            "Welcome IC",
            "Hospitality Cell"
          ];

          const appointments = KEY.map(role => {

            if(
              role === "Service Pastor" ||
              role === "Anchor" ||
              role === "Welcome IC"
            ){

              const found = serviceRoles.find(r =>
                (r.role || "").trim().toLowerCase() ===
                role.trim().toLowerCase()
              );

              return {
                role,
                name: found ? (staffMap[found.staff_id] || "-") : "-"
              };
            }

            if(role === "Hospitality Cell"){

              const found = serviceRoles.filter(r =>
                r.role.includes("Welcome Member") ||
                r.role.includes("Plaza")
              );

              const names = found
                .map(r => staffMap[r.staff_id])
                .filter(Boolean);

              return {
                role,
                name: names.length ? names.join(", ") : "-"
              };
            }

            return { role, name: "-" };
          });

          const d=parseDate(s.service_date);

          return `
            <div class="card">

              <div class="title">
                ${s.service_slots?.label || "Service"}
              </div>

              <div class="tag">
                ${d.toLocaleDateString("en-SG",{weekday:"long"})}
                |
                ${d.toLocaleDateString("en-SG",{day:"2-digit",month:"short"})}
              </div>

              <div class="tag">
                ⏰ ${s.service_slots?.time || ""}
              </div>

              <div class="section">
                <b>Staff Summary</b>

                <div class="row">
                  <span>Assigned</span>
                  <span>${assignedIds.size}</span>
                </div>

                <div class="row">
                  <span>Unavailable</span>
                  <span class="bad">${unavailableIds.size}</span>
                </div>

                <div class="row">
                  <span>Available</span>
                  <span class="good">${availableCount}</span>
                </div>
              </div>

              <div class="section">
                <b>Key Appointments</b>

                ${appointments.map(a => `
                  <div class="row">
                    <span>${a.role}</span>
                    <span>${a.name}</span>
                  </div>
                `).join("")}

              </div>

            </div>
          `;

        }).join("")}

      </div>
    `;
  });
}

window.load = load;
load();

</script>

</body>
</html>
