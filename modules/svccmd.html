<!DOCTYPE html>
<html>
<head>
  <title>Service Command Center (Clean Architecture)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .title{
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:6px 0;
    }

    .role{ flex:1; }
    .staff{ color:#22c55e; font-weight:bold; }

    select{
      width:100%;
      padding:6px;
      margin-bottom:8px;
      background:#0f172a;
      color:white;
      border:1px solid #334155;
      border-radius:6px;
    }

    .poolBox{
      font-size:12px;
    }
  </style>
</head>

<body>

<header>
  Service Command Center
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">

import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staffList = [];
let templateRoles = [];
let serviceRoles = [];
let staffTemplates = [];
  let availability = [];

let staffMap = {};
let roleMap = {};
let poolMap = {};

/* ================= LOAD ================= */
async function load(){

 const [s, st, tr, sr, tpl, av] = await Promise.all([
  db.from("services").select("* , service_slots(label,time,location)")
    .order("service_date",{ascending:true}),
  db.from("staff").select("*"),
  db.from("service_template_roles").select("*"),
  db.from("service_roles").select("*"),
  db.from("staff_service_templates").select("*"),
  db.from("staff_availability").select("*")   // ✅ ADD THIS
]);

availability = av.data || [];
  services = s.data || [];
  staffList = st.data || [];
  templateRoles = tr.data || [];
  serviceRoles = sr.data || [];
  staffTemplates = tpl.data || [];

  staffMap = Object.fromEntries(
    staffList.map(s => [String(s.id), s.name])
  );

  /* latest assignment only */
  roleMap = {};
  serviceRoles.forEach(r => {

    const key = `${r.service_id}_${r.role?.toLowerCase()}`;

    if(!roleMap[key] ||
      new Date(r.created_at) > new Date(roleMap[key].created_at)
    ){
      roleMap[key] = r;
    }
  });

  /* template pool */
  poolMap = {};

  staffTemplates.forEach(t => {
    if(!poolMap[t.template_id]) poolMap[t.template_id] = [];
    poolMap[t.template_id].push({
      id: t.staff_id,
      name: staffMap[t.staff_id] || "Unknown"
    });
  });

  render();
}

/* ================= ROLE RULE ENGINE ================= */
function getRoles(service){

  let roles = templateRoles.filter(r =>
    String(r.template_id) === String(service.service_template_id)
  );

  /* CLEAN RULE: ONLY REMOVE IF FLAGGED IN DB (NOT STRING MATCH) */
  if(service.is_communion_service === false){

    roles = roles.filter(r =>
      r.is_communion_role !== true
    );
  }

  return roles;
}

/* ================= ASSIGNMENT ================= */
function getAssigned(serviceId, role){

  const key = `${serviceId}_${role?.toLowerCase()}`;
  const match = roleMap[key];

  return match ? staffMap[match.staff_id] : "-";
}

function getAvailableStaff(service){

  const templateId = String(service.service_template_id);

  const pool = poolMap[templateId] || [];

  const unavailable = new Set(
    availability
      .filter(a =>
        String(a.service_date) === String(service.service_date) &&
        String(a.service_slot_id) === String(service.service_slot_id) &&
        a.status === "unavailable"
      )
      .map(a => String(a.staff_id))
  );

  const available = pool.filter(p =>
    !unavailable.has(String(p.id))
  );

  return { pool, unavailable, available };
}
  
/* ================= CARD ================= */
function card(service){

  const roles = getRoles(service);

  return `
    <div class="card">

      <b>${service.service_slots?.label}</b>
      <div style="font-size:11px;color:#94a3b8">
        ${service.service_date}
      </div>

      ${roles.map(r => `
        <div class="row">
          <div class="role">${r.role}</div>
          <div class="staff">${getAssigned(service.id, r.role)}</div>
        </div>
      `).join("")}

    </div>
  `;
}

/* ================= INSPECTOR (5TH COLUMN) ================= */
function inspector(){

  const dates = [...new Set(services.map(s => s.service_date))];

  return `
    <div class="title">Service Inspector</div>

    <select id="dateSel" onchange="onDate()">
      <option value="">Select Date</option>
      ${dates.map(d => `<option value="${d}">${d}</option>`).join("")}
    </select>

    <select id="serviceSel" onchange="onService()"></select>

    <div id="poolView" class="card poolBox">
      Select service
    </div>
  `;
}

window.onDate = function(){

  const date = dateSel.value;

  const filtered = services.filter(s => s.service_date === date);

  serviceSel.innerHTML = `
    <option value="">Select</option>
    ${filtered.map(s => `
      <option value="${s.id}">
        ${s.service_slots?.label}
      </option>
    `).join("")}
  `;
};

window.onService = function(){

  const id = serviceSel.value;

  const service = services.find(s => String(s.id) === String(id));
  if(!service) return;

  const roles = getRoles(service);

  const { pool, unavailable, available } = getAvailableStaff(service);

  poolView.innerHTML = `
    <b>${service.service_slots?.label}</b>
    <div style="font-size:11px;color:#94a3b8">
      ${service.service_date} • ${service.start_time || ""}
    </div>

    <div style="margin-top:10px">
      <b>Roles Required</b>
      ${roles.map(r => `<div>${r.role}</div>`).join("")}
    </div>

    <div style="margin-top:10px">
      <b>Available Staff</b>
      ${
        available.length === 0
          ? `<div style="color:#ef4444">No available staff</div>`
          : available.map(s => `
              <div style="color:#22c55e">${s.name}</div>
            `).join("")
      }
    </div>

    <div style="margin-top:10px">
      <b>Unavailable Staff</b>
      ${
        unavailable.size === 0
          ? `<div style="color:#94a3b8">None</div>`
          : [...unavailable].map(id => `
              <div style="color:#ef4444">${staffMap[id] || "Unknown"}</div>
            `).join("")
      }
    </div>
  `;
};
/* ================= RENDER ================= */
function render(){

  const cols = { sat:[], s1:[], s2:[], jurong:[] };

  services.forEach(s => {

    const t = (s.service_slots?.time||"").toLowerCase();
    const l = (s.service_slots?.location||"").toLowerCase();

    if(l.includes("jurong")) cols.jurong.push(s);
    else if(t.includes("14")) cols.sat.push(s);
    else if(t.includes("08")) cols.s1.push(s);
    else cols.s2.push(s);
  });

  grid.innerHTML = `
    <div class="col">
      <div class="title">Sat</div>
      ${cols.sat.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">8.30</div>
      ${cols.s1.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">10.45</div>
      ${cols.s2.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Jurong</div>
      ${cols.jurong.map(card).join("")}
    </div>

    <div class="col">
      ${inspector()}
    </div>
  `;
}

window.load = load;
load();

</script>

</body>
</html>
