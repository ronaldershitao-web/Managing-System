<!DOCTYPE html>
<html>
<head>
  <title>SVCCMD - RESTORED STRUCTURE</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .panel-title{
      color:#fbbf24;
      font-weight:bold;
      margin-bottom:8px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
      gap:8px;
    }

    .good{ color:#22c55e; }
    .bad{ color:#ef4444; }

    button.small{
      font-size:10px;
      padding:2px 6px;
      background:#3b82f6;
      color:white;
      border:none;
      border-radius:4px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<header>
  ⛪ SVCCMD RESTORED (STRUCTURE LOCKED)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= SAFE HELPERS ================= */
const safe = (v) => String(v ?? "").trim();
const lower = (v) => safe(v).toLowerCase();

/* ================= STATE ================= */

let services = [];
let templates = [];
let staff = [];
let roles = [];
let availability = [];

let staffMap = new Map();

/* ================= LOAD ================= */

async function load(){

  const [
    s,
    t,
    st,
    r,
    a
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("staff_service_templates").select("*"),
    db.from("staff").select("*"),
    db.from("service_roles").select("*"),
    db.from("staff_availability").select("*")
  ]);

  services = s.data || [];
  templates = t.data || [];
  staff = st.data || [];
  roles = r.data || [];
  availability = a.data || [];

  staffMap = new Map(
    staff.map(x => [String(x.id), x.name])
  );

  render();
}

/* ================= FILTER LOGIC (YOUR ORIGINAL SYSTEM) ================= */

function getColumnIndex(service){

  const time = service.service_slots?.time || "";
  const loc = lower(service.service_slots?.location);

  // 🔵 Saturday 2.30pm
  if(time.includes("14") || time.includes("1430")) return 0;

  // 🟢 Sunday 8.30am
  if(time.includes("08") || time.includes("0830")) return 1;

  // 🟡 Sunday 10.45am (exclude Jurong)
  if(time.includes("10") && !loc.includes("jurong")) return 2;

  // 🔴 Jurong + others
  return 3;
}

/* ================= RENDER ================= */

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const cols = [[],[],[],[]];

  /* ===== SERVICE DISTRIBUTION ===== */
  services.forEach(s => {
    const i = getColumnIndex(s);
    cols[i].push(s);
  });

  /* ===== RENDER 4 SERVICE COLUMNS ===== */
  cols.forEach(col => {

    const div = document.createElement("div");
    div.className = "col";

    col.forEach(service => {

      const serviceTemplates =
        templates.filter(t =>
          String(t.service_id) === String(service.id)
        );

      const serviceRoles =
        roles.filter(r =>
          String(r.service_id) === String(service.id)
        );

      div.innerHTML += `
        <div class="card">

          <div class="panel-title">
            ${service.service_slots?.label || "Service"}
          </div>

          ${serviceTemplates.map(t => {

            const role = safe(t.role).toLowerCase();

            const assigned =
              serviceRoles.find(r =>
                lower(r.role) === role
              );

            const staffName =
              staffMap.get(String(assigned?.staff_id)) || "—";

            return `
              <div class="row">
                <span>${t.role}</span>

                <span>
                  ${staffName}
                  <button class="small"
                    onclick="assign('${service.id}','${t.role}')">
                    Assign
                  </button>
                </span>
              </div>
            `;
          }).join("")}

        </div>
      `;
    });

    grid.appendChild(div);
  });

  /* ===== 5TH COLUMN: STAFF AVAILABILITY ===== */
  const availCol = document.createElement("div");
  availCol.className = "col";

  availCol.innerHTML = `
    <div class="panel-title">Staff Availability</div>

    ${staff.map(s => `
      <div class="row">
        <span>${s.name}</span>

        <button class="small"
          onclick="toggleAvail('${s.id}')">
          Mark
        </button>
      </div>
    `).join("")}
  `;

  grid.appendChild(availCol);
}

/* ================= ASSIGN ================= */

window.assign = async function(serviceId, role){

  const staffId = prompt("Enter Staff ID");

  if(!staffId) return;

  await db.from("service_roles").upsert({
    service_id: serviceId,
    role: role,
    staff_id: staffId
  }, {
    onConflict: "service_id,role"
  });

  load();
};

/* ================= AVAILABILITY ================= */

window.toggleAvail = function(id){
  alert("Toggle unavailable: " + id);
};

/* ================= INIT ================= */

window.load = load;
load();

</script>

</body>
</html>
