<!DOCTYPE html>
<html>
<head>
  <title>Command Post (FIXED ROLE RENDERING)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .title{
      color:#60a5fa;
      font-weight:bold;
    }

    .tag{
      font-size:12px;
      color:#94a3b8;
    }

    .section{
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
    }

    .good{ color:#22c55e; }
    .bad{ color:#ef4444; }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (FIXED)
  <button onclick="load()" style="background:#3b82f6;color:white;border:none;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= DATE ================= */
function parseDate(d){
  if(!d) return new Date(0);
  const [y,m,day]=d.split("-");
  return new Date(Number(y),Number(m)-1,Number(day));
}

/* ================= WINDOW ================= */
function inWindow(d){
  const now = new Date();
  const min = new Date(now); min.setDate(now.getDate()-7);
  const max = new Date(now); max.setDate(now.getDate()+7);
  const dt = parseDate(d);
  return dt>=min && dt<=max;
}

/* ================= SLOT ORDER ================= */
function slotIndex(s){
  const time = (s.service_slots?.time || "").toLowerCase();
  const location = (s.service_slots?.location || "").toLowerCase();
  const t = time.replace(":", "");

  if(t.includes("1430")) return 0;
  if(t.includes("0830")) return 1;
  if(t.includes("1045") && !location.includes("jurong")) return 2;
  if(location.includes("jurong")) return 3;

  return -1;
}

/* ================= ROLE GROUPING FIXED ================= */
function getAppointment(serviceRoles, roleType){

  if(roleType === "Service Pastor"){
    return serviceRoles.find(r => r.role === "Service Pastor");
  }

  if(roleType === "Anchor"){
    return serviceRoles.find(r => r.role === "Anchor");
  }

  if(roleType === "Welcome IC"){
    return serviceRoles.find(r => r.role === "Welcome IC");
  }

  if(roleType === "Hospitality Cell"){
    // FIX: return MULTIPLE instead of first match
    return serviceRoles.filter(r =>
      r.role.includes("Welcome Member") ||
      r.role.includes("Plaza")
    );
  }

  return null;
}

/* ================= LOAD ================= */
async function load(){

  const [
    servicesRes,
    rolesRes,
    templateRes,
    availabilityRes,
    staffRes
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("service_roles").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("staff").select("*")
  ]);

  let services = servicesRes.data||[];
  const roles = rolesRes.data||[];
  const templates = templateRes.data||[];
  const availability = availabilityRes.data||[];
  const staff = staffRes.data||[];

  /* ================= STAFF MAP ================= */
  const staffMap = {};
  staff.forEach(s=>{
    staffMap[s.id] = s.name;
  });

  services = services.filter(s=>inWindow(s.service_date));
  services.sort((a,b)=>parseDate(a.service_date)-parseDate(b.service_date));

  const cols=[[],[],[],[]];

  services.forEach(s=>{
    const i=slotIndex(s);
    if(i>=0) cols[i].push(s);
  });

  const grid=document.getElementById("grid");
  grid.innerHTML="";

  cols.forEach(col=>{
    grid.innerHTML+=`
      <div class="col">

        ${col.map(s=>{

          const serviceRoles = roles.filter(r=>r.service_id===s.id);

          const KEY = [
            "Service Pastor",
            "Anchor",
            "Welcome IC",
            "Hospitality Cell"
          ];

          const appointments = KEY.map(role=>{

            const found = getAppointment(serviceRoles, role);

            // FIX: handle multi-role (Hospitality Cell)
            if(role === "Hospitality Cell"){

              if(!found || found.length === 0){
                return { role, name: "-" };
              }

              const names = found
                .map(f => staffMap[f.staff_id])
                .filter(Boolean);

              return {
                role,
                name: names.length ? names.join(", ") : "⚠ Missing Staff"
              };
            }

            return {
              role,
              name: found?.staff_id
                ? (staffMap[found.staff_id] || "⚠ Missing Staff")
                : "-"
            };
          });

          const d=parseDate(s.service_date);
          const day=d.toLocaleDateString("en-SG",{weekday:"long"});
          const date=d.toLocaleDateString("en-SG",{day:"2-digit",month:"short"});

          return `
            <div class="card">

              <div class="title">
                ${s.service_slots?.label || "Service"}
              </div>

              <div class="tag">${day} | ${date}</div>
              <div class="tag">⏰ ${s.service_slots?.time||""}</div>

              <div class="section">
                <b>Key Appointments</b>

                ${appointments.map(a=>`
                  <div class="row">
                    <span>${a.role}</span>
                    <b>${a.name}</b>
                  </div>
                `).join("")}

              </div>

            </div>
          `;
        }).join("")}

      </div>
    `;
  });
}

window.load=load;
load();

</script>

</body>
</html>
