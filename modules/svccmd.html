<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Full Ops + Availability Control)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .column-title{
      font-size:18px;
      font-weight:bold;
      margin-bottom:12px;
      color:#fbbf24;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:12px;
    }

    .service-title{
      font-weight:bold;
      color:#60a5fa;
      font-size:15px;
    }

    .service-date{
      font-size:12px;
      color:#94a3b8;
      margin-top:4px;
      margin-bottom:10px;
    }

    .section-title{
      font-size:12px;
      font-weight:bold;
      color:#fbbf24;
      margin-top:12px;
      margin-bottom:8px;
      border-top:1px solid #1f2937;
      padding-top:8px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin:5px 0;
      font-size:12px;
    }

    .role-name{
      flex:1;
    }

    .staff-name{
      color:#22c55e;
      font-weight:bold;
      font-size:11px;
      text-align:right;
    }

    .unavailable{
      color:#ef4444;
    }

    .good{
      color:#22c55e;
      font-weight:bold;
    }

    .bad{
      color:#ef4444;
      font-weight:bold;
    }

    button{
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .small{
      padding:4px 8px;
      font-size:10px;
      background:#3b82f6;
      color:white;
      width:auto;
    }

    .save{
      background:#22c55e;
      color:white;
      padding:8px;
      width:100%;
      margin-top:10px;
    }

    .danger{
      background:#ef4444;
      color:white;
      padding:8px;
      width:100%;
      margin-top:10px;
    }

    .secondary{
      background:#334155;
      color:white;
      padding:8px;
      width:100%;
      margin-top:10px;
    }

    select,input{
      width:100%;
      padding:8px;
      border:none;
      border-radius:6px;
      margin-top:6px;
      box-sizing:border-box;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .modal-content{
      width:360px;
      background:#111827;
      border:1px solid #334155;
      border-radius:10px;
      padding:20px;
      max-height:80vh;
      overflow:auto;
    }

    .top-panel{
      margin-top:10px;
      background:#111827;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
    }

    .panel-title{
      color:#fbbf24;
      font-size:12px;
      font-weight:bold;
      margin-bottom:8px;
    }

    .staff-item{
      border:1px solid #334155;
      border-radius:8px;
      padding:8px;
      margin-top:8px;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Full Ops + Availability Control)
  <button class="small" onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- ASSIGN MODAL -->
<div class="modal" id="assignModal">
  <div class="modal-content">

    <h3 id="modalTitle">Assign</h3>

    <select id="staffSelect"></select>

    <button class="save" onclick="saveAssign()">
      Assign / Reassign
    </button>

    <button class="secondary" onclick="closeAssignModal()">
      Close
    </button>

  </div>
</div>

<!-- UNAVAILABLE MODAL -->
<div class="modal" id="unavailableModal">
  <div class="modal-content">

    <h3>Unavailable Staff</h3>

    <div id="unavailableList"></div>

    <button class="secondary" onclick="closeUnavailableModal()">
      Close
    </button>

  </div>
</div>

<script type="module">

import { db } from "../assets/app.js";

let services = [];
let staffList = [];
let templates = [];
let availability = [];
let templateRoles = [];
let assignedRoles = [];

let currentService = null;
let currentRole = null;

function parseDate(d){
  const [y,m,day] = d.split("-");
  return new Date(y,m-1,day);
}

function formatDate(dateStr){

  if(!dateStr) return "-";

  const d = parseDate(dateStr);

  return d.toLocaleDateString("en-GB",{
    day:"2-digit",
    month:"short",
    year:"numeric"
  });
}

function in8Days(dateStr){

  const d = parseDate(dateStr);

  const now = new Date();

  const min = new Date();
  min.setDate(now.getDate()-8);

  const max = new Date();
  max.setDate(now.getDate()+8);

  return d >= min && d <= max;
}

function in60Days(dateStr){

  const d = parseDate(dateStr);

  const now = new Date();

  const max = new Date();
  max.setDate(now.getDate()+60);

  return d >= now && d <= max;
}

async function load(){

  const [
    servicesRes,
    staffRes,
    templatesRes,
    availRes,
    templateRolesRes,
    assignedRolesRes
  ] = await Promise.all([

    db.from("services")
      .select(`
        *,
        service_slots(label,time,location)
      `),

    db.from("staff").select("*"),

    db.from("staff_service_templates").select("*"),

    db.from("staff_availability").select("*"),

    db.from("service_template_roles").select("*"),

    db.from("service_roles").select("*")
  ]);

  services = servicesRes.data || [];
  staffList = staffRes.data || [];
  templates = templatesRes.data || [];
  availability = availRes.data || [];
  templateRoles = templateRolesRes.data || [];
  assignedRoles = assignedRolesRes.data || [];

  render();
}

function getAssignedName(serviceId, role){

  const found = assignedRoles.find(r =>

    String(r.service_id) === String(serviceId) &&
    String(r.role || "").trim().toLowerCase() ===
    String(role || "").trim().toLowerCase()
  );

  if(!found) return "-";

  const staff = staffList.find(s =>
    String(s.id) === String(found.staff_id)
  );

  return staff?.name || "-";
}

function render(){

  const grid = document.getElementById("grid");

  const saturday = [];
  const sunday830 = [];
  const sunday1045 = [];
  const jurong = [];

  services
    .filter(s => in8Days(s.service_date))
    .sort((a,b)=>
      parseDate(a.service_date) -
      parseDate(b.service_date)
    )
    .forEach(s=>{

      const label =
        s.service_slots?.label || "";

      const location =
        s.service_slots?.location || "";

      if(label.includes("2.30")){
        saturday.push(s);
      }
      else if(label.includes("8.30")){
        sunday830.push(s);
      }
      else if(
        location.toLowerCase().includes("jurong")
      ){
        jurong.push(s);
      }
      else if(label.includes("10.45")){
        sunday1045.push(s);
      }
    });

  grid.innerHTML = `

    <div class="col">
      <div class="column-title">
        Saturday 2.30pm
      </div>

      ${saturday.map(renderCard).join("")}
    </div>

    <div class="col">
      <div class="column-title">
        Sunday 8.30am
      </div>

      ${sunday830.map(renderCard).join("")}
    </div>

    <div class="col">
      <div class="column-title">
        Sunday 10.45am
      </div>

      ${sunday1045.map(renderCard).join("")}
    </div>

    <div class="col">
      <div class="column-title">
        Sunday Jurong
      </div>

      ${jurong.map(renderCard).join("")}
    </div>

    <div class="col">
      ${renderAvailabilityPanel()}
    </div>
  `;

  refreshServiceOptions();
}

function renderCard(s){

  const isCommunion =
    s.is_communion_service === true;

  let roles =
    templateRoles.filter(r =>
      String(r.template_id) ===
      String(s.service_template_id)
    );

  // FIX 1:
  // remove communion roles for non-communion services
  if(!isCommunion){

    roles = roles.filter(r => {

      const roleName =
        String(r.role || "").toLowerCase();

      return !roleName.includes("communion");
    });
  }

  return `
    <div class="card">

      <div class="service-title">
        ${s.service_slots?.label || "-"}
      </div>

      <div class="service-date">
        ${formatDate(s.service_date)}
      </div>

      <div class="section-title">
        Appointments
      </div>

      ${roles.map(r => {

        const assignedName =
          getAssignedName(s.id, r.role);

        return `
          <div class="row">

            <div class="role-name">
              ${r.role}
            </div>

            <div class="staff-name">
              ${assignedName}
            </div>

            <button
              class="small"
              onclick="openAssign(
                '${s.id}',
                '${s.service_date}',
                '${s.service_slot_id}',
                '${r.role}'
              )">

              Assign

            </button>

          </div>
        `;
      }).join("")}

    </div>
  `;
}

function renderAvailabilityPanel(){

  const futureDates =
    [...new Set(
      services
        .filter(s => in60Days(s.service_date))
        .map(s => s.service_date)
    )]
    .sort();

  return `
    <div class="column-title">
      Availability (60 Days)
    </div>

    <div class="card">

      <div>Select Date</div>

      <select
        id="manageDate"
        onchange="refreshServiceOptions()">

        ${futureDates.map(d => `
          <option value="${d}">
            ${formatDate(d)}
          </option>
        `).join("")}

      </select>

      <div style="margin-top:12px;">
        Select Service
      </div>

      <select
        id="manageService"
        onchange="refreshStaffOptions()">
      </select>

      <div style="margin-top:12px;">
        Select Staff
      </div>

      <select id="manageStaff"></select>

      <button
        class="danger"
        onclick="markUnavailable()">

        Mark Unavailable

      </button>

    </div>
  `;
}

window.refreshServiceOptions = function(){

  const date =
    document.getElementById("manageDate")?.value;

  const dropdown =
    document.getElementById("manageService");

  if(!dropdown) return;

  const filtered =
    services.filter(s =>
      s.service_date === date
    );

  dropdown.innerHTML =
    filtered.map(s => `
      <option value="${s.id}">
        ${s.service_slots?.label || "-"}
      </option>
    `).join("");

  refreshStaffOptions();
};

window.refreshStaffOptions = function(){

  const serviceId =
    document.getElementById("manageService")?.value;

  const service =
    services.find(s =>
      String(s.id) === String(serviceId)
    );

  if(!service) return;

  const templateStaff =
    templates.filter(t =>
      String(t.template_id) ===
      String(service.service_template_id)
    );

  const allowedIds =
    new Set(
      templateStaff.map(t =>
        String(t.staff_id)
      )
    );

  const eligible =
    staffList.filter(s =>
      allowedIds.has(String(s.id))
    );

  document.getElementById("manageStaff").innerHTML =
    eligible.map(s => `
      <option value="${s.id}">
        ${s.name}
      </option>
    `).join("");
};

window.openAssign = function(
  serviceId,
  serviceDate,
  slotId,
  role
){

  currentService = {
    id: serviceId,
    date: serviceDate,
    slotId
  };

  currentRole = role;

  const unavailableIds =
    new Set(

      availability
        .filter(a =>
          a.service_date === serviceDate &&
          a.service_slot_id === slotId &&
          a.status === "unavailable"
        )
        .map(a => String(a.staff_id))
    );

  const isCommunion =
    String(role || "")
      .toLowerCase()
      .includes("communion");

  const eligible =
    staffList.filter(s => {

      if(
        unavailableIds.has(String(s.id))
      ){
        return false;
      }

      if(isCommunion){
        return s.communion_eligible === true;
      }

      return true;
    });

  document.getElementById("staffSelect").innerHTML =
    eligible.map(s => `
      <option value="${s.id}">
        ${s.name}
      </option>
    `).join("");

  document.getElementById("modalTitle").innerText =
    "Assign " + role;

  document.getElementById("assignModal").style.display =
    "flex";
};

window.closeAssignModal = function(){

  document.getElementById("assignModal").style.display =
    "none";
};

window.saveAssign = async function(){

  const staffId =
    document.getElementById("staffSelect").value;

  await db
    .from("service_roles")
    .upsert({
      service_id: currentService.id,
      role: currentRole,
      staff_id: staffId
    },{
      onConflict:"service_id,role"
    });

  // FIX 2:
  // reload latest assignments so names appear immediately
  const assignedRolesRes =
    await db.from("service_roles").select("*");

  assignedRoles =
    assignedRolesRes.data || [];

  closeAssignModal();

  render();
};

window.markUnavailable = async function(){

  const serviceId =
    document.getElementById("manageService").value;

  const staffId =
    document.getElementById("manageStaff").value;

  const service =
    services.find(s =>
      String(s.id) === String(serviceId)
    );

  if(!service) return;

  await db
    .from("staff_availability")
    .upsert({
      staff_id: staffId,
      service_date: service.service_date,
      service_slot_id: service.service_slot_id,
      status:"unavailable"
    },{
      onConflict:
        "staff_id,service_date,service_slot_id"
    });

  load();
};

window.showUnavailable = function(
  serviceDate,
  slotId
){

  const list =
    availability.filter(a =>
      a.service_date === serviceDate &&
      a.service_slot_id === slotId &&
      a.status === "unavailable"
    );

  document.getElementById("unavailableList").innerHTML =

    list.map(a => {

      const staff =
        staffList.find(s =>
          String(s.id) === String(a.staff_id)
        );

      return `
        <div class="staff-item">

          <div class="row">

            <span>
              ${staff?.name || "-"}
            </span>

          </div>

        </div>
      `;
    }).join("");

  document.getElementById("unavailableModal").style.display =
    "flex";
};

window.closeUnavailableModal = function(){

  document.getElementById("unavailableModal").style.display =
    "none";
};

window.load = load;

load();

</script>

</body>
</html>
