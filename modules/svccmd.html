<!DOCTYPE html>
<html>
<head>
  <title>Service Command Center (Separated Inspector)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .title{
      color:#fbbf24;
      font-weight:bold;
      margin-bottom:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:6px 0;
    }

    select{
      width:100%;
      padding:6px;
      margin-bottom:8px;
      border-radius:6px;
      background:#0f172a;
      color:white;
      border:1px solid #334155;
    }

    .assigned{ color:#60a5fa; }
    .available{ color:#22c55e; }
    .unavailable{ color:#ef4444; }
  </style>
</head>

<body>

<header>
  Service Command Center
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staffList = [];
let templateRoles = [];
let serviceRoles = [];
let staffTemplates = [];
let availability = [];

let staffMap = {};
let roleMap = {};
let availabilityMap = {};

/* ================= LOAD ================= */
async function load(){

  const [
    s,
    st,
    tr,
    sr,
    tpl,
    av
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)").order("service_date",{ascending:true}),
    db.from("staff").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("service_roles").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*")
  ]);

  services = s.data || [];
  staffList = st.data || [];
  templateRoles = tr.data || [];
  serviceRoles = sr.data || [];
  staffTemplates = tpl.data || [];
  availability = av.data || [];

  staffMap = Object.fromEntries(staffList.map(s=>[String(s.id), s.name]));

  roleMap = {};
  serviceRoles.forEach(r=>{
    roleMap[`${r.service_id}_${r.role.toLowerCase()}`] = r;
  });

  availabilityMap = {};
  availability.forEach(a=>{
    availabilityMap[`${a.service_date}_${a.staff_id}`] = a.status;
  });

  render();
}

/* ================= SERVICE CARD (NO STAFF INSIDE) ================= */

function serviceCard(service){

  const roles = templateRoles.filter(r =>
    String(r.template_id) === String(service.service_template_id)
  );

  return `
    <div class="card">

      <b>${service.service_slots?.label}</b>

      <div style="font-size:11px;color:#94a3b8">
        ${service.service_date}
      </div>

      <div style="margin-top:8px">
        <b>Roles Required</b>

        ${roles.map(r=>`
          <div class="row">
            <div>${r.role}</div>
          </div>
        `).join("")}

      </div>

      <button onclick="selectService('${service.id}')">
        Inspect
      </button>

    </div>
  `;
}

/* ================= INSPECTOR ================= */

window.selectedService = null;

window.selectService = function(id){
  window.selectedService = services.find(s=>String(s.id)===String(id));
  render();
};

function inspector(){

  if(!window.selectedService){
    return `<div class="title">Inspector</div>Select a service`;
  }

  const service = window.selectedService;

  const pool = staffTemplates
    .filter(t => String(t.template_id) === String(service.service_template_id))
    .map(t => t.staff_id);

  const roles = templateRoles.filter(r =>
    String(r.template_id) === String(service.service_template_id)
  );

  let html = `
    <div class="title">Inspector</div>

    <div class="card">
      <b>${service.service_slots?.label}</b><br>
      <span style="font-size:11px;color:#94a3b8">
        ${service.service_date}
      </span>
    </div>
  `;

  roles.forEach(role=>{

    html += `
      <div class="card">
        <b>${role.role}</b>
    `;

    pool.forEach(pid=>{

      const key = `${service.service_date}_${pid}`;
      const status = availabilityMap[key];

      const assigned = roleMap[`${service.id}_${role.role.toLowerCase()}`];

      let state = "available";

      if(assigned?.staff_id === pid) state = "assigned";
      else if(status === "unavailable") state = "unavailable";

      html += `
        <div class="row">
          <div>${staffMap[pid] || "Unknown"}</div>
          <div class="${state}">${state}</div>
        </div>
      `;
    });

    html += `</div>`;
  });

  return html;
}

/* ================= RENDER ================= */

function render(){

  const cols = {a:[],b:[],c:[],d:[]};

  services.forEach(s=>{

    const t = (s.service_slots?.time||"").toLowerCase();
    const loc = (s.service_slots?.location||"").toLowerCase();

    if(loc.includes("jurong")) cols.d.push(s);
    else if(t.includes("14")) cols.a.push(s);
    else if(t.includes("08")) cols.b.push(s);
    else cols.c.push(s);
  });

  document.getElementById("grid").innerHTML = `
    <div class="col">
      <div class="title">Saturday</div>
      ${cols.a.map(serviceCard).join("")}
    </div>

    <div class="col">
      <div class="title">8.30am</div>
      ${cols.b.map(serviceCard).join("")}
    </div>

    <div class="col">
      <div class="title">10.45am</div>
      ${cols.c.map(serviceCard).join("")}
    </div>

    <div class="col">
      <div class="title">Jurong</div>
      ${cols.d.map(serviceCard).join("")}
    </div>

    <div class="col">
      ${inspector()}
    </div>
  `;
}

window.load = load;
load();

</script>

</body>
</html>
