<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Full Stable + Stats)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      font-weight:bold;
      align-items:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:200px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .title{
      color:#60a5fa;
      font-weight:bold;
    }

    .tag{
      font-size:12px;
      color:#94a3b8;
    }

    .section{
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:3px 0;
    }

    .good{ color:#22c55e; }
    .bad{ color:#ef4444; }
    .warn{ color:#fbbf24; }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Full System + Stats)
  <button onclick="load()"
    style="background:#3b82f6;border:none;color:white;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= DATE ================= */
function parseDate(d){
  if(!d) return new Date(0);
  const [y,m,day] = d.split("-");
  return new Date(+y,+m-1,+day);
}

/* ================= WINDOW ================= */
function inWindow(d){
  const today = new Date();

  const min = new Date(today);
  min.setDate(today.getDate()-7);

  const max = new Date(today);
  max.setDate(today.getDate()+7);

  const date = parseDate(d);
  return date >= min && date <= max;
}

/* ================= SLOT ORDER ================= */
function slotIndex(s){
  const t = (s.service_slots?.time || "").toLowerCase();
  const l = (s.service_slots?.location || "").toLowerCase();

  const txt = `${t} ${l}`;

  if(txt.includes("sat") || txt.includes("14:30")) return 0;
  if(txt.includes("8.30") || txt.includes("08:30")) return 1;
  if(txt.includes("10.45") || txt.includes("10:45")) return 2;
  if(txt.includes("jurong")) return 3;

  return -1;
}

/* ================= LOAD ================= */
async function load(){

  const [
    servicesRes,
    templateRes,
    rolesRes,
    availabilityRes,
    staffRes
  ] = await Promise.all([

    db.from("services")
      .select(`*, service_slots(label,time,location, id)`),

    db.from("staff_service_templates")
      .select("staff_id, template_id"),

    db.from("service_roles")
      .select(`
        id,
        role,
        service_id,
        staff_id,
        staff:staff_id (
          id,
          name
        )
      `),

    db.from("staff_availability")
      .select("*"),

    db.from("staff")
      .select("*")
  ]);

  let services = servicesRes.data || [];
  const templates = templateRes.data || [];
  const roles = rolesRes.data || [];
  const availability = availabilityRes.data || [];
  const staff = staffRes.data || [];

  /* FILTER WINDOW */
  services = services.filter(s => inWindow(s.service_date));

  /* SORT */
  services.sort((a,b)=>
    parseDate(a.service_date) - parseDate(b.service_date)
  );

  /* 4 COLUMNS */
  const cols = [[],[],[],[]];

  services.forEach(s=>{
    const i = slotIndex(s);
    if(i>=0) cols[i].push(s);
  });

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  /* ================= STAFF ASSIGNED MAP ================= */
  const staffMap = {};
  staff.forEach(s => staffMap[s.id] = s.name);

  /* ================= RENDER ================= */
  cols.forEach(col=>{

    grid.innerHTML += `
      <div class="col">

        ${col.map(service=>{

          /* ASSIGNED STAFF */
          const assigned = templates.filter(
            t => t.template_id === service.service_template_id
          );

          const assignedIds = new Set(assigned.map(a => a.staff_id));

          /* UNAVAILABLE */
          const unavailableIds = new Set(
            availability
              .filter(a =>
                a.service_date === service.service_date &&
                a.service_slot_id === service.service_slot_id &&
                a.status === "unavailable"
              )
              .map(a => a.staff_id)
          );

          /* AVAILABLE */
          const availableCount =
            [...assignedIds].filter(id => !unavailableIds.has(id)).length;

          const d = parseDate(service.service_date);

          const day = d.toLocaleDateString("en-SG",{weekday:"long"});
          const date = d.toLocaleDateString("en-SG",{day:"2-digit",month:"short"});

          /* KEY ROLES */
          const keyRoles = ["Service Pastor","Anchor","Welcome IC","Hospitality Cell"];

          const serviceRoles = roles.filter(r => r.service_id === service.id);

          const appointments = keyRoles.map(role=>{
            const found = serviceRoles.find(r => r.role === role);

            return {
              role,
              name: found?.staff?.name || "-"
            };
          });

          return `
            <div class="card">

              <div class="title">
                ${service.service_slots?.label || "Service"}
              </div>

              <div class="tag">
                ${day} | ${date}
              </div>

              <div class="tag">
                ⏰ ${service.service_slots?.time || ""}
              </div>

              <!-- ================= STATS ================= -->
              <div class="section">
                <b>Staff Summary</b>

                <div class="row">
                  <span>Assigned</span>
                  <b>${assignedIds.size}</b>
                </div>

                <div class="row">
                  <span>Unavailable</span>
                  <b class="bad">${unavailableIds.size}</b>
                </div>

                <div class="row">
                  <span>Available</span>
                  <b class="good">${availableCount}</b>
                </div>

                <div class="row">
                  <span>Floating</span>
                  <b class="warn">${availableCount - keyRoles.length}</b>
                </div>
              </div>

              <!-- ================= KEY ROLES ================= -->
              <div class="section">
                <b>Key Appointments</b>

                ${appointments.map(a=>`
                  <div class="row">
                    <span>${a.role}</span>
                    <b>${a.name}</b>
                  </div>
                `).join("")}
              </div>

            </div>
          `;
        }).join("")}

      </div>
    `;
  });
}

window.load = load;
load();

</script>

</body>
</html>
