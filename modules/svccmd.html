<!DOCTYPE html>
<html>
<head>
  <title>Command Post (5 Column Ops System)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr); /* ⭐ UPDATED */
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .title{ color:#60a5fa; font-weight:bold; }

    .tag{ font-size:12px; color:#94a3b8; }

    .section{
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
    }

    .good{ color:#22c55e; }
    .bad{ color:#ef4444; }

    button.small{
      font-size:10px;
      padding:2px 6px;
      border-radius:4px;
      border:none;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    select, button{
      width:100%;
      padding:8px;
      margin-top:8px;
      border-radius:6px;
      border:none;
    }

    .save{ background:#22c55e; color:white; }
    .danger{ background:#ef4444; color:white; }

    .panel-title{
      font-weight:bold;
      margin-bottom:8px;
      color:#93c5fd;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (OPS + AVAILABILITY CONTROL)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

let staffList = [];
let templates = [];
let availability = [];

/* ================= LOAD ================= */
async function load(){

  const [servicesRes, templateRes, availRes, staffRes] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location)`),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("staff").select("*")
  ]);

  const services = servicesRes.data || [];
  templates = templateRes.data || [];
  availability = availRes.data || [];
  staffList = staffRes.data || [];

  const staffMap = new Map(staffList.map(s => [String(s.id), s.name]));

  const templateMap = new Map();
  templates.forEach(t=>{
    const key = String(t.template_id);
    if(!templateMap.has(key)) templateMap.set(key, []);
    templateMap.get(key).push(t);
  });

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const cols = [[],[],[],[],[]]; // ⭐ 5 columns

  services.forEach(s=>{
    const t = (s.service_slots?.time||"").replace(":","");
    const loc = (s.service_slots?.location||"").toLowerCase();

    let i=-1;
    if(t.includes("1430")) i=0;
    else if(t.includes("0830")) i=1;
    else if(t.includes("1045") && !loc.includes("jurong")) i=2;
    else i=3;

    if(i>=0) cols[i].push(s);
  });

  /* ================= ROSTER COLUMNS ================= */
  cols.slice(0,4).forEach(col=>{
    grid.innerHTML += `
      <div class="col">
        ${col.map(s=>{

          const templateStaff =
            templateMap.get(String(s.service_template_id)) || [];

          const assignedIds = new Set(templateStaff.map(t=>String(t.staff_id)));

          const unavailable = availability.filter(a =>
            a.service_date === s.service_date &&
            a.service_slot_id === s.service_slot_id &&
            a.status === "unavailable"
          );

          const unavailableIds = new Set(unavailable.map(a=>String(a.staff_id)));

          const availableIds =
            [...assignedIds].filter(id=>!unavailableIds.has(id));

          return `
            <div class="card">

              <div class="title">${s.service_slots?.label}</div>
              <div class="tag">${s.service_date}</div>

              <div class="section">
                <div class="row">
                  <span>Total Assigned</span>
                  <span>${assignedIds.size}</span>
                </div>

                <div class="row">
                  <span>Unavailable</span>
                  <span class="bad">${unavailableIds.size}</span>
                </div>

                <div class="row">
                  <span>Available</span>
                  <span class="good">${availableIds.length}</span>
                </div>
              </div>

            </div>
          `;
        }).join("")}
      </div>
    `;
  });

  /* ================= 5TH COLUMN (AVAILABILITY CONTROL) ================= */
  const staffOptions = staffList.map(s =>
    `<option value="${s.id}">${s.name}</option>`
  ).join("");

  const serviceOptions = services.map(s =>
    `<option value="${s.service_date}|${s.service_slot_id}">
      ${s.service_date} - ${s.service_slots?.label}
    </option>`
  ).join("");

  cols[4].push({}); // single panel

  grid.innerHTML += `
    <div class="col">

      <div class="panel-title">Staff Availability Control</div>

      <label>Date + Service</label>
      <select id="serviceSelect">${serviceOptions}</select>

      <label>Staff</label>
      <select id="staffSelect">${staffOptions}</select>

      <button class="danger" onclick="mark('unavailable')">
        Mark Unavailable
      </button>

      <button class="save" onclick="mark('available')">
        Return Available
      </button>

    </div>
  `;
}

/* ================= AVAILABILITY CONTROL ================= */
window.mark = async function(status){

  const service = document.getElementById("serviceSelect").value.split("|");
  const staffId = document.getElementById("staffSelect").value;

  const service_date = service[0];
  const service_slot_id = service[1];

  if(status === "unavailable"){

    await db.from("staff_availability").upsert({
      staff_id: staffId,
      service_date,
      service_slot_id,
      status: "unavailable"
    },{
      onConflict:"staff_id,service_date,service_slot_id"
    });

  } else {

    await db.from("staff_availability")
      .delete()
      .eq("staff_id", staffId)
      .eq("service_date", service_date)
      .eq("service_slot_id", service_slot_id);
  }

  load();
};

window.load = load;
load();

</script>

</body>
</html>
