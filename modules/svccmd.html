<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Final Restored Stable)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .panel{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .title{
      font-weight:bold;
      color:#60a5fa;
      margin-bottom:6px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
      align-items:center;
    }

    .good{ color:#22c55e; font-weight:bold; }
    .bad{ color:#ef4444; font-weight:bold; }

    select,input,button{
      width:100%;
      padding:6px;
      margin-top:6px;
      border-radius:6px;
      border:none;
      box-sizing:border-box;
    }

    button{
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Final Restore)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staffList = [];
let templates = [];
let availability = [];

let staffMap = new Map();

/* ================= WINDOWS ================= */

function inServiceWindow(dateStr){
  const dt = new Date(dateStr);
  const now = new Date();

  const past = new Date();
  past.setDate(now.getDate() - 8);

  const future = new Date();
  future.setDate(now.getDate() + 8);

  return dt >= past && dt <= future;
}

function inAvailabilityWindow(dateStr){
  const dt = new Date(dateStr);
  const now = new Date();

  const future = new Date();
  future.setDate(now.getDate() + 60);

  return dt >= now && dt <= future;
}

/* ================= LOAD ================= */
async function load(){

  const [servicesRes, staffRes, templateRes, availRes] =
    await Promise.all([
      db.from("services").select("*, service_slots(label,time,location)"),
      db.from("staff").select("*"),
      db.from("staff_service_templates").select("*"),
      db.from("staff_availability").select("*")
    ]);

  services = (servicesRes.data || [])
    .filter(s => inServiceWindow(s.service_date));

  staffList = staffRes.data || [];
  templates = templateRes.data || [];
  availability = availRes.data || [];

  staffMap = new Map(staffList.map(s => [String(s.id), s.name]));

  render();
}

/* ================= COLUMN SORT ================= */
function sortByDate(a,b){
  return new Date(a.service_date) - new Date(b.service_date);
}

/* ================= RENDER ================= */
function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const cols = [[],[],[],[]];

  services.forEach(s => {

    const label = (s.service_slots?.label || "").toLowerCase();
    const time = (s.service_slots?.time || "").replace(":","");

    const isSat = label.includes("saturday") || time.includes("1430");
    const isSun830 = label.includes("8.30") || time.includes("0830");
    const isSun1045 = label.includes("10.45") || time.includes("1045");
    const isJurong = label.includes("jurong");

    if(isSat) cols[0].push(s);
    else if(isSun830) cols[1].push(s);
    else if(isSun1045 && !isJurong) cols[2].push(s);
    else if(isJurong) cols[3].push(s);
  });

  cols.forEach(c => c.sort(sortByDate));

  cols.forEach(col => {

    grid.innerHTML += `
      <div class="col">
        ${col.map(renderService).join("")}
      </div>
    `;
  });

  renderAvailabilityPanel();
}

/* ================= SERVICE CARD ================= */
function renderService(s){

  const assigned = templates.filter(t =>
    String(t.template_id) === String(s.service_template_id)
  );

  return `
    <div class="panel">
      <div class="title">
        ${s.service_slots?.label} (${s.service_date})
      </div>

      ${assigned.map(a => `
        <div class="row">
          <span>${a.role}</span>
          <span>${staffMap.get(String(a.staff_id)) || "-"}</span>
        </div>
      `).join("")}

    </div>
  `;
}

/* ================= 5TH COLUMN ================= */
function renderAvailabilityPanel(){

  const grid = document.getElementById("grid");

  const dates = [...new Set(
    services.map(s => s.service_date)
  )];

  grid.innerHTML += `
    <div class="col">

      <div class="panel">
        <div class="title">Staff Availability</div>

        <select id="dateSel" onchange="refreshServices()">
          ${dates.map(d => `<option value="${d}">${d}</option>`).join("")}
        </select>

        <select id="serviceSel" onchange="refreshStaff()"></select>

        <select id="staffSel"></select>

        <button onclick="markUnavailable()">Mark Unavailable</button>
      </div>

    </div>
  `;

  refreshServices();
}

/* ================= SERVICE FILTER ================= */
window.refreshServices = function(){

  const date = document.getElementById("dateSel").value;

  const filtered = services.filter(s =>
    s.service_date === date
  );

  document.getElementById("serviceSel").innerHTML =
    filtered.map(s => `
      <option value="${s.id}">
        ${s.service_slots?.label}
      </option>
    `).join("");

  refreshStaff();
};

/* ================= STAFF FILTER ================= */
window.refreshStaff = function(){

  const id = document.getElementById("serviceSel").value;
  const service = services.find(s => String(s.id) === String(id));

  if(!service) return;

  const allowed = templates
    .filter(t =>
      String(t.template_id) === String(service.service_template_id)
    )
    .map(t => String(t.staff_id));

  const eligible = staffList.filter(s =>
    allowed.includes(String(s.id))
  );

  document.getElementById("staffSel").innerHTML =
    eligible.map(s => `<option value="${s.id}">${s.name}</option>`).join("");
};

/* ================= MARK UNAVAILABLE ================= */
window.markUnavailable = async function(){

  const staffId = document.getElementById("staffSel").value;
  const serviceId = document.getElementById("serviceSel").value;

  const service = services.find(s => String(s.id) === String(serviceId));

  await db.from("staff_availability").upsert({
    staff_id: staffId,
    service_date: service.service_date,
    service_slot_id: service.service_slot_id,
    status: "unavailable"
  });

  load();
};

window.load = load;
load();

</script>

</body>
</html>
