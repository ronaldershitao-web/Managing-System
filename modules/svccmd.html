<!DOCTYPE html>
<html>
<head>
  <title>Service Command Center (Clean)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .title{
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:12px;
      margin:6px 0;
      gap:10px;
    }

    .role{ flex:1; }
    .staff{ color:#22c55e; font-weight:bold; }

    .pool{
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    button{
      font-size:10px;
      padding:3px 6px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<header>
  Service Command Center
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">

import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staffList = [];
let templateRoles = [];
let serviceRoles = [];
let staffTemplates = [];

let staffMap = {};
let roleMap = {};
let templatePoolMap = {};

/* ================= LOAD ================= */
async function load(){

  const [
    s,
    st,
    tr,
    sr,
    tpl
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)").order("service_date",{ascending:true}),
    db.from("staff").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("service_roles").select("*"),
    db.from("staff_service_templates").select("*")
  ]);

  services = s.data || [];
  staffList = st.data || [];
  templateRoles = tr.data || [];
  serviceRoles = sr.data || [];
  staffTemplates = tpl.data || [];

  /* ================= STAFF MAP ================= */
  staffMap = Object.fromEntries(
    staffList.map(s => [String(s.id), s.name])
  );

  /* ================= ROLE MAP (latest assignment only) ================= */
  roleMap = {};

  serviceRoles.forEach(r => {

    const key =
      `${r.service_id}_${String(r.role || "").trim().toLowerCase()}`;

    const existing = roleMap[key];

    if(
      !existing ||
      new Date(r.created_at || 0) > new Date(existing.created_at || 0)
    ){
      roleMap[key] = r;
    }
  });

  /* ================= TEMPLATE POOL MAP (FIXED CORE) ================= */
  templatePoolMap = {};

  staffTemplates.forEach(t => {

    const templateId = String(t.template_id);
    const staffId = String(t.staff_id);

    if (!templatePoolMap[templateId]) {
      templatePoolMap[templateId] = [];
    }

    templatePoolMap[templateId].push({
      id: staffId,
      name: staffMap[staffId] || "Unknown"
    });
  });

  render();
}

/* ================= GET ASSIGNED STAFF ================= */
function getAssigned(serviceId, role){

  const key =
    `${serviceId}_${String(role || "").trim().toLowerCase()}`;

  const match = roleMap[key];

  if(!match) return "-";

  return staffMap[match.staff_id] || "-";
}

/* ================= SERVICE CARD ================= */
function card(service){

  const roles = templateRoles.filter(r =>
    String(r.template_id) === String(service.service_template_id)
  );

  const filteredRoles = service.is_communion_service
    ? roles
    : roles.filter(r => !(r.role || "").toLowerCase().includes("communion"));

  const pool = templatePoolMap[String(service.service_template_id)] || [];

  return `
    <div class="card">

      <b>${service.service_slots?.label}</b>
      <div style="font-size:11px;color:#94a3b8">
        ${service.service_date}
      </div>

      <div style="margin-top:8px">
        <b>Roles</b>
        ${filteredRoles.map(r => `
          <div class="row">
            <div class="role">${r.role}</div>
            <div class="staff">${getAssigned(service.id, r.role)}</div>
          </div>
        `).join("")}
      </div>

      <div class="pool">
        <b style="font-size:12px;color:#fbbf24">Staff Pool (Template)</b>

        ${pool.length === 0 ? `
          <div style="font-size:11px;color:#94a3b8">No pool assigned</div>
        ` : pool.map(p => `
          <div class="row">
            <div class="role">${p.name}</div>
          </div>
        `).join("")}
      </div>

    </div>
  `;
}

/* ================= RENDER ================= */
function render(){

  const sat=[], s830=[], s1045=[], jurong=[];

  services.forEach(s => {

    const t = (s.service_slots?.time || "").toLowerCase();
    const loc = (s.service_slots?.location || "").toLowerCase();

    if(loc.includes("jurong")) jurong.push(s);
    else if(t.includes("14") || t.includes("2:30")) sat.push(s);
    else if(t.includes("08")) s830.push(s);
    else if(t.includes("10:45")) s1045.push(s);
  });

  document.getElementById("grid").innerHTML = `
    <div class="col">
      <div class="title">Saturday 2.30pm</div>
      ${sat.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday 8.30am</div>
      ${s830.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday 10.45am</div>
      ${s1045.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday Jurong</div>
      ${jurong.map(card).join("")}
    </div>
  `;
}

window.load = load;
load();

</script>

</body>
</html>
