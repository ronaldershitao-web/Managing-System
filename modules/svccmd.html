<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Restored)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .panel{
      background:#111827;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .panel-title{
      color:#fbbf24;
      font-weight:bold;
      margin-bottom:8px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
    }

    .good{color:#22c55e;font-weight:bold;}
    .bad{color:#ef4444;font-weight:bold;}

    .group-title{
      color:#fbbf24;
      font-weight:bold;
      margin-top:10px;
    }

    button{
      font-size:11px;
      padding:4px 6px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:4px;
      cursor:pointer;
    }

    select, input{
      width:100%;
      padding:6px;
      margin-top:5px;
      border-radius:6px;
      border:none;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Restored)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staffList = [];
let templates = [];
let roles = [];
let availability = [];

let staffMap = new Map();
let roleMap = new Map();

/* ================= DATE HELPERS ================= */

function parseDate(d){
  const [y,m,day] = d.split("-");
  return new Date(y,m-1,day);
}

function formatDate(d){
  const dt = parseDate(d);
  return dt.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
}

function inServiceWindow(d){
  const dt = parseDate(d);
  const now = new Date();
  const min = new Date(); min.setDate(now.getDate()-8);
  const max = new Date(); max.setDate(now.getDate()+8);
  return dt >= min && dt <= max;
}

function inAvailabilityWindow(d){
  const dt = parseDate(d);
  const now = new Date();
  const max = new Date(); max.setDate(now.getDate()+60);
  return dt >= now && dt <= max;
}

/* ================= LOAD ================= */

async function load(){

  const [
    sRes,
    staffRes,
    tRes,
    rRes,
    aRes
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("staff").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("service_roles").select("*"),
    db.from("staff_availability").select("*")
  ]);

  services = sRes.data || [];
  staffList = staffRes.data || [];
  templates = tRes.data || [];
  roles = rRes.data || [];
  availability = aRes.data || [];

  staffMap = new Map(staffList.map(s => [String(s.id), s.name]));

  roleMap.clear();
  roles.forEach(r=>{
    const key = String(r.service_id);
    if(!roleMap.has(key)) roleMap.set(key,[]);
    roleMap.get(key).push(r);
  });

  render();
}

/* ================= RENDER ================= */

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const filtered = services
    .filter(s => inServiceWindow(s.service_date))
    .sort((a,b)=>parseDate(a.service_date)-parseDate(b.service_date));

  const columns = [[],[],[],[]];

  filtered.forEach(s=>{
    const t = (s.service_slots?.time || "").replace(":","");
    const loc = (s.service_slots?.location || "").toLowerCase();

    if(t.includes("1430")) columns[0].push(s);
    else if(t.includes("0830")) columns[1].push(s);
    else if(t.includes("1045") && !loc.includes("jurong")) columns[2].push(s);
    else columns[3].push(s);
  });

  const labels = [
    "Saturday 2:30pm",
    "Sunday 8:30am",
    "Sunday 10:45am",
    "Sunday Jurong"
  ];

  columns.forEach((col,i)=>{

    grid.innerHTML += `
      <div class="col">
        <h3>${labels[i]}</h3>

        ${col.map(serviceCard).join("")}
      </div>
    `;
  });

  renderAvailability();
}

/* ================= SERVICE CARD ================= */

function serviceCard(s){

  const assigned = roleMap.get(String(s.id)) || [];

  return `
    <div class="panel">
      <div class="panel-title">${formatDate(s.service_date)}</div>

      ${assigned.map(r=>`
        <div class="row">
          <span>${r.role}</span>
          <span>${staffMap.get(String(r.staff_id)) || "-"}</span>
        </div>
      `).join("")}

      <button onclick="openAssign('${s.id}')">Assign</button>
    </div>
  `;
}

/* ================= AVAILABILITY PANEL ================= */

function renderAvailability(){

  const col = document.createElement("div");
  col.className = "col";

  const today = new Date();

  const list = services
    .filter(s => inAvailabilityWindow(s.service_date))
    .sort((a,b)=>parseDate(a.service_date)-parseDate(b.service_date));

  col.innerHTML = `
    <h3>Staff Availability (60 Days)</h3>

    <select id="dateSelect">
      ${[...new Set(list.map(s=>s.service_date))].map(d=>`
        <option value="${d}">${formatDate(d)}</option>
      `).join("")}
    </select>

    <select id="serviceSelect"></select>
    <select id="staffSelect"></select>

    <button onclick="markUnavailable()">Mark Unavailable</button>
  `;

  document.getElementById("grid").appendChild(col);

  window.refreshServices = function(){

    const d = document.getElementById("dateSelect").value;

    const filtered = list.filter(s=>s.service_date===d);

    document.getElementById("serviceSelect").innerHTML =
      filtered.map(s=>`
        <option value="${s.id}">
          ${s.service_slots?.label}
        </option>
      `).join("");

    refreshStaff();
  };

  window.refreshStaff = function(){

    const serviceId = document.getElementById("serviceSelect").value;
    const service = list.find(s=>String(s.id)===String(serviceId));
    if(!service) return;

    const eligible = staffList;

    document.getElementById("staffSelect").innerHTML =
      eligible.map(s=>`
        <option value="${s.id}">${s.name}</option>
      `).join("");
  };

  window.markUnavailable = async function(){

    const staff_id = document.getElementById("staffSelect").value;
    const serviceId = document.getElementById("serviceSelect").value;

    const service = services.find(s=>String(s.id)===String(serviceId));

    await db.from("staff_availability").upsert({
      staff_id,
      service_date: service.service_date,
      service_slot_id: service.service_slot_id,
      status:"unavailable"
    });

    load();
  };

  setTimeout(()=>{
    refreshServices();
    document.getElementById("dateSelect").onchange = refreshServices;
    document.getElementById("serviceSelect").onchange = refreshStaff;
  },100);
}

/* ================= GLOBAL ================= */

window.load = load;
window.openAssign = async function(serviceId){

  const staff = staffList;

  const html = staff.map(s=>`
    <option value="${s.id}">${s.name}</option>
  `).join("");

  const id = prompt("Enter staff id:");
  const role = prompt("Enter role:");

  await db.from("service_roles").upsert({
    service_id: serviceId,
    staff_id: id,
    role
  });

  load();
};

load();

</script>

</body>
</html>
