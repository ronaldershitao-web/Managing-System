<!DOCTYPE html>
<html>
<head>
  <title>SVCCMD RESTORED</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
      align-items:center;
    }

    .good{color:#22c55e;font-weight:bold;}
    .bad{color:#ef4444;font-weight:bold;}

    button.small{
      font-size:10px;
      padding:2px 6px;
      background:#3b82f6;
      color:white;
      border:none;
      border-radius:4px;
    }

    .dateHeader{
      color:#60a5fa;
      font-weight:bold;
      margin:10px 0;
    }

    select{
      width:100%;
      padding:6px;
      margin-top:6px;
    }
  </style>
</head>

<body>

<header>
  <div>⛪ SVCCMD FULL RESTORE</div>
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staffList = [];
let templates = [];
let templateRoles = [];

let staffMap = new Map();
let roleMap = new Map();
let templateRoleMap = new Map();

/* ================= HELPERS ================= */

function formatDate(d){
  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString("en-GB", {
    day:"2-digit",
    month:"short",
    year:"numeric"
  });
}

function isWeekend(d){
  const dt = new Date(d);
  return dt.getDay() === 0 || dt.getDay() === 6;
}

/* ================= LOAD ================= */

async function load(){

  const [
    sRes,
    stRes,
    tRes,
    trRes
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("staff").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("service_template_roles").select("*")
  ]);

  services = (sRes.data || []).filter(isWeekend);
  staffList = stRes.data || [];
  templates = tRes.data || [];
  templateRoles = trRes.data || [];

  staffMap = new Map(staffList.map(s => [String(s.id), s.name]));

  templateRoleMap = new Map();
  templateRoles.forEach(r=>{
    const k = String(r.template_id);
    if(!templateRoleMap.has(k)) templateRoleMap.set(k,[]);
    templateRoleMap.get(k).push(r);
  });

  render();
}

/* ================= SERVICE TYPE ================= */

function getType(s){
  const label = (s.service_slots?.label || "").toLowerCase();

  if(label.includes("2.30")) return "SAT";
  if(label.includes("8.30")) return "SUN1";
  if(label.includes("10.45")) return "SUN2";
  if(label.includes("jurong")) return "SUN3";

  return "OTHER";
}

/* ================= RENDER CARD ================= */

function buildCard(s){

  const templateStaff =
    templates.filter(t =>
      String(t.template_id) === String(s.service_template_id)
    );

  const roleDefs =
    templateRoleMap.get(String(s.service_template_id)) || [];

  const appointments = roleDefs.map(r=>{

    const role = r.role || "";

    const assigned =
      templateStaff.find(t => t.role === role);

    const staffId = assigned?.staff_id;

    return {
      role,
      name: staffMap.get(String(staffId)) || "-"
    };
  });

  return `
    <div class="card">

      <div class="dateHeader">
        ${formatDate(s.service_date)}
      </div>

      <div style="font-weight:bold;">
        ${s.service_slots?.label || ""}
      </div>

      ${appointments.map(a=>`
        <div class="row">
          <span>${a.role}</span>
          <span>
            ${a.name}
            <button class="small">Assign</button>
          </span>
        </div>
      `).join("")}

    </div>
  `;
}

/* ================= RENDER ================= */

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const cols = [[],[],[],[]];

  services.forEach(s=>{

    const type = getType(s);
    const card = buildCard(s);

    if(type==="SAT") cols[0].push(card);
    else if(type==="SUN1") cols[1].push(card);
    else if(type==="SUN2") cols[2].push(card);
    else cols[3].push(card);
  });

  cols.forEach(c=>{
    grid.innerHTML += `<div class="col">${c.join("")}</div>`;
  });

  /* ================= 5TH COLUMN ================= */

  const today = new Date();
  const dates = [];

  for(let i=0;i<60;i++){
    const d = new Date();
    d.setDate(today.getDate()+i);
    if(d.getDay()===0 || d.getDay()===6){
      dates.push(d.toISOString().split("T")[0]);
    }
  }

  grid.innerHTML += `
    <div class="col">

      <b>Staff Availability</b>

      <select>
        ${dates.map(d=>`
          <option>${formatDate(d)}</option>
        `).join("")}
      </select>

      <select>
        <option>Service List</option>
      </select>

      <select>
        <option>Staff List</option>
      </select>

      <button style="background:#ef4444;color:white;">
        Mark Unavailable
      </button>

    </div>
  `;
}

window.load = load;
load();

</script>

</body>
</html>
