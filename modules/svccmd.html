<body>

<header>
  ⛪ Command Post (Full Ops + Availability Control)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- ASSIGN MODAL -->
<div class="modal" id="assignModal">

    <div id="unavailableList"></div>

      Close
    </button>

  </div>
</div>

<script type="module">
import { db } from "../assets/app.js";

let staffList = [];
let templates = [];
let availability = [];
let availabilityServices = [];

let currentService = null;
let currentRole = null;
  let hospitalityMap = new Map();
  let people = [];
  let serviceMap = new Map();
  let attendanceMetricsMap = new Map();

/* ================= DATE ================= */

function parseDate(d){
  const [y,m,day] = d.split("-");
  return new Date(y,m-1,day);
}

function formatDate(dateStr){

  if(!dateStr) return "-";

  const date = parseDate(dateStr);

  return date.toLocaleDateString("en-GB",{
    day:"2-digit",
    month:"short",
    year:"numeric"
  });
}

function inWindow(d){

  const dt = parseDate(d);

  const now = new Date();

  const min = new Date();
  min.setDate(now.getDate()-7);

  const max = new Date();
  max.setDate(now.getDate()+7);

  return dt >= min && dt <= max;
}

function in60Days(d){

  const dt = parseDate(d);

  const now = new Date();

  const max = new Date();
  max.setDate(now.getDate()+60);

  return dt >= now && dt <= max;
}

/* ================= LOAD ================= */

async function load(){

  const [
    servicesRes,
    templateRes,
    availRes,
    staffRes,
    rolesRes,
    templateRolesRes,
    hospitalityRes,
    peopleRes,
      attendanceRes
  ] = await Promise.all([

    db.from("services")
      .select(`*, service_slots(label,time,location)`),

    db.from("staff_service_templates")
      .select("*"),

    db.from("staff_availability")
      .select("*"),

    db.from("staff")
      .select("*"),

    db.from("service_roles")
      .select("*"),

    db.from("service_template_roles")
      .select("*"),
    db.from("hospitality_duty").select("*") ,
    db.from("people").select("*"),
    db.from("service_attendance_metrics").select("*")
  ]);

  const allServices = servicesRes.data || [];
  serviceMap = new Map(
  allServices.map(s => [String(s.id), s])
);
  people = peopleRes.data || [];
  attendanceMetricsMap = new Map(
  (attendanceRes.data || []).map(a => [
    String(a.service_id),
    a
  ])
);

  let displayServices =
    allServices.filter(s => inWindow(s.service_date));

  availabilityServices =
    allServices.filter(s => in60Days(s.service_date));

  templates = templateRes.data || [];
  availability = availRes.data || [];
  staffList = staffRes.data || [];

  const roles = rolesRes.data || [];
  const templateRoles = templateRolesRes.data || [];

  const staffMap =
    new Map(staffList.map(s => [String(s.id), s.name]));
hospitalityMap = new Map(
  (hospitalityRes.data || []).map(d => [
    String(d.service_id),
    d
  ])
);

  
  const templateMap = new Map();

  templates.forEach(t => {

    const key = String(t.template_id);

    if(!templateMap.has(key)){
      templateMap.set(key, []);
    }

    templateMap.get(key).push(t);
  });

  const roleMap = new Map();

  roles.forEach(r => {

    const key = String(r.service_id);

    if(!roleMap.has(key)){
      roleMap.set(key, []);
    }

    roleMap.get(key).push(r);
  });

  const templateRoleMap = new Map();

  templateRoles.forEach(r => {

    const key = String(r.template_id);

    if(!templateRoleMap.has(key)){
      templateRoleMap.set(key, []);
    }

    templateRoleMap.get(key).push(r);
  });

  displayServices.sort((a,b)=>
    parseDate(a.service_date) -
    parseDate(b.service_date)
  );

  availabilityServices.sort((a,b)=>
    parseDate(a.service_date) -
    parseDate(b.service_date)
  );

  const cols = [[],[],[],[]];

  displayServices.forEach(s=>{

    const t =
      (s.service_slots?.time || "")
      .replace(":","");

    const loc =
      (s.service_slots?.location || "")
      .toLowerCase();

    let i = -1;

    if(t.includes("1430")) i=0;
    else if(t.includes("0830")) i=1;
    else if(t.includes("1045") && !loc.includes("jurong")) i=2;
    else i=3;

    if(i>=0) cols[i].push(s);
  });

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cols.forEach(col=>{

    grid.innerHTML += `
      <div class="col">

        ${col.map(s=>{

          const templateStaff =
            templateMap.get(String(s.service_template_id)) || [];

          const assignedIds =
            new Set(
              templateStaff.map(t => String(t.staff_id))
            );

          const unavailableRecords =
            availability.filter(a =>
              a.service_date === s.service_date &&
              a.service_slot_id === s.service_slot_id &&
              a.status === "unavailable"
            );

          const unavailableIds =
            new Set(
              unavailableRecords.map(a => String(a.staff_id))
            );

          const availableIds =
            [...assignedIds]
              .filter(id => !unavailableIds.has(id));

          const templateDefinedRoles =
            templateRoleMap.get(
              String(s.service_template_id)
            ) || [];

          const appointments =
  templateDefinedRoles.map(roleRow => {

    const normalize = value =>

      String(value || "")
        .trim()
        .toLowerCase();

    const role =
      roleRow.role || "";

    /* =========================
       FIND ASSIGNED ROLE
    ========================= */

    const assignedRole =

      (roleMap.get(String(s.id)) || [])

        .find(r =>

          normalize(r.role) ===
          normalize(role)
        );

    /* =========================
       FALLBACK TEMPLATE STAFF
    ========================= */

    const templateMatch =

      templateStaff.find(t =>

        normalize(t.role) ===
        normalize(role)
      );

    /* =========================
       PRIORITY:
       1. SERVICE ASSIGNMENT
       2. TEMPLATE DEFAULT
    ========================= */

    const rawStaffId =

      assignedRole?.staff_id ||

      templateMatch?.staff_id ||

      null;

    const staffId =

      rawStaffId
        ? String(rawStaffId).trim()
        : null;

    /* =========================
       RESOLVE STAFF NAME
    ========================= */

    const resolvedName =

      staffId &&
      staffMap.has(staffId)

        ? staffMap.get(staffId)

        : "-";

    const unavailable =
      unavailableIds.has(staffId);

    return {

      role,

      group_name:
        roleRow.group_name,

      staffId,

      unavailable,

      name: resolvedName
    };
  });

          const groupedAppointments = {};

          appointments
            .filter(a => {

              if (!s.is_communion_service) {

                const roleLower = (a.role || "").toLowerCase();

                const isCommunionRole =
                  roleLower.includes("communion") ||
                  roleLower.includes("mindef");

                return !isCommunionRole;
              }

              return true;
            })
            .forEach(a => {

              const group =
                a.group_name || "General";

              if(!groupedAppointments[group]){
                groupedAppointments[group] = [];
              }

              groupedAppointments[group].push(a);
            });

          return `
            <div class="card">

              <div class="title">
                ${s.service_slots?.label || ""}
              </div>

              <div class="tag">
                ${formatDate(s.service_date)}
              </div>

              <div class="tag">
                ⏰ ${s.service_slots?.time || ""}
              </div>

              

             
${(() => {

  const hosp =
    hospitalityMap.get(String(s.id));

  return `

    <div class="top-grid">
${(() => {

  const attendance =
    attendanceMetricsMap.get(String(s.id)) || {};

  const onsite =
    attendance.onsite_count || 0;

  const online =
    attendance.online_count || 0;

  const communicants =
    attendance.communicants_count || 0;

  const total =
    onsite + online;

  const allowOnline =
    (s.service_slots?.label || "")
      .includes("10.45");

  const allowCommunion =
    s.is_communion_service === true;

  const participation =
    onsite > 0
      ? ((communicants / onsite) * 100).toFixed(1)
      : 0;

  return `

    <div class="panel" style="margin-top:12px;">

      <div class="panel-title">
        📊 Attendance
      </div>

      <div class="row">
        <span>On-site</span>

        <input
          type="number"
          value="${onsite}"
          min="0"
          style="width:90px;"
          onchange="
            updateAttendance(
              '${s.id}',
              'onsite_count',
              this.value
            )
          ">
      </div>

      ${
        allowOnline
        ? `
          <div class="row">
            <span>Online</span>

            <input
              type="number"
              value="${online}"
              min="0"
              style="width:90px;"
              onchange="
                updateAttendance(
                  '${s.id}',
                  'online_count',
                  this.value
                )
              ">
          </div>
        `
        : ""
      }

      ${
        allowCommunion
        ? `
          <div class="row">
            <span>Communicants</span>

            <input
              type="number"
              value="${communicants}"
              min="0"
              style="width:90px;"
              onchange="
                updateAttendance(
                  '${s.id}',
                  'communicants_count',
                  this.value
                )
              ">
          </div>

          <div class="row">
            <span>Participation</span>

            <span class="good">
              ${participation}%
            </span>
          </div>
        `
        : ""
      }

      <div class="row"
        style="
          margin-top:10px;
          padding-top:10px;
          border-top:1px solid #334155;
          font-weight:bold;
        ">

        <span>Total</span>

        <span class="good">
          ${total}
        </span>

      </div>

    </div>

  `;
})()}
      <!-- HOSPITALITY PANEL -->
      <div class="panel">

        <div class="panel-title">
          🏠 Hospitality
        </div>

        <div class="row">

          <span>
            Cell Leader
          </span>

          <span class="${
            hosp?.leader ? 'good' : 'bad'
          }">

            ${
              hosp?.leader || 'Not Assigned'
            }

          </span>

        </div>

        <div class="row">

          <span>
            Cell Pastor
          </span>

          <span class="${
            hosp?.pastor ? 'good' : 'bad'
          }">

            ${
              hosp?.pastor || 'Not Assigned'
            }

          </span>

        </div>

        <button
          class="small save"
          style="margin-top:10px;width:100%;"
          onclick="notifyHospitality('${s.id}')">

          Notify Hospitality

        </button>

      </div>

      <!-- STAFF SUMMARY PANEL -->
      <div class="panel">

        <div class="panel-title">
          👥 Staff Summary
        </div>

        <div class="row">
          <span>Total Assigned</span>
          <span>${assignedIds.size}</span>
        </div>

        <div class="row">
          <span>Unavailable</span>

          <span class="bad"
            onclick="showUnavailable(
              '${s.service_date}',
              '${s.service_slot_id}'
            )">

            ${unavailableIds.size}

          </span>
        </div>

        <div class="row">
          <span>Available</span>

          <span class="good">
            ${availableIds.length}
          </span>
        </div>

      </div>

    </div>

  `;
})()}
              

              <div class="appointment-panel">

                <b>Appointments</b>

                ${Object.entries(groupedAppointments)
                  .map(([group, items]) => `

                    ${
                      group !== "General"
                      ? `
                        <div class="group-title">
                          ${group}
                        </div>
                      `
                      : ""
                    }

                    ${items.map(a => `

                      <div class="row">

                        <span>
                          ${a.role}
                        </span>

                        <span style="
                          display:flex;
                          align-items:center;
                          gap:6px;
                        ">

                          <span class="${a.unavailable ? 'bad' : ''}">

                            ${a.name}

                            ${a.unavailable ? ' (Unavailable)' : ''}

                          </span>

                          <button class="small"
                            onclick="openAssign(
                              '${s.id}',
                              '${s.service_template_id}',
                              '${s.service_date}',
                              '${s.service_slot_id}',
                              '${a.role}'
                            )">

                            Assign

                          </button>

                        </span>

                      </div>

                    `).join("")}

                  `).join("")
                }

              </div>

            </div>
          `;
        }).join("")}

      </div>
    `;
  });

  const uniqueDates =
    [...new Set(
      availabilityServices.map(s => s.service_date)
    )];

  grid.innerHTML += `

    <div class="col">

      <h3>Staff Availability</h3>

      <div class="card">

        <div class="tag">Select Date</div>

        <select id="manageDate" onchange="refreshServiceOptions()">
          ${
            uniqueDates.map(d => `
              <option value="${d}">
                ${formatDate(d)}
              </option>
            `).join("")
          }
        </select>

        <div class="tag" style="margin-top:10px;">
          Select Service
        </div>

        <select
          id="manageService"
          onchange="refreshStaffOptions()">
        </select>

        <div class="tag" style="margin-top:10px;">
          Select Staff
        </div>

        <select id="manageStaff"></select>

        <button class="danger"
          onclick="markUnavailable()">

          Mark Unavailable

        </button>

      </div>

    </div>
  `;

  refreshServiceOptions();
}

/* ================= SERVICE FILTER ================= */

window.refreshServiceOptions = function(){

  const selectedDate =
    document.getElementById("manageDate").value;

  const serviceDropdown =
    document.getElementById("manageService");

  const filteredServices =
    availabilityServices.filter(s =>
      s.service_date === selectedDate
    );

  serviceDropdown.innerHTML =
    filteredServices.map(s => `

      <option
        value="${s.id}">

        ${s.service_slots?.label}
        (${s.service_slots?.time})

      </option>

    `).join("");

  refreshStaffOptions();
};

/* ================= STAFF FILTER ================= */

window.refreshStaffOptions = function(){

  const selectedServiceId =
    document.getElementById("manageService").value;

  const service =
    availabilityServices.find(s =>
      String(s.id) === String(selectedServiceId)
    );

  if(!service) return;

  const templateStaff =
    templates.filter(t =>
      String(t.template_id) ===
      String(service.service_template_id)
    );

  const eligibleIds =
    new Set(
      templateStaff.map(t => String(t.staff_id))
    );

  const staffDropdown =
    document.getElementById("manageStaff");

  const eligibleStaff =
    staffList.filter(s =>
      eligibleIds.has(String(s.id))
    );

  staffDropdown.innerHTML =
    eligibleStaff.map(s => `
      <option value="${s.id}">
        ${s.name}
      </option>
    `).join("");
};
function extractNames(raw) {
  if (!raw) return [];

  return raw
    .replace(/\r/g, " ")              // FIX CR
    .replace(/\n/g, " ")              // FIX LF
    .replace(/\s+/g, " ")             // normalize spaces
    .split(/\/|,| and |&/i)           // better separators
    .flatMap(part => {

      return part
        .split(" ")                  // handle multi-name chains
        .reduce((acc, word) => {

          // rebuild chunks until next capitalised name
          if (!word) return acc;

          const last = acc[acc.length - 1] || "";

          if (
            word.match(/^[A-Z]/) &&
            last &&
            !last.endsWith(")")
          ) {
            acc.push(word);
          } else {
            acc[acc.length - 1] =
              (acc[acc.length - 1] || "") + " " + word;
          }

          return acc;
        }, [])
        .map(n =>
          n
            .replace(/\(.*?\)/g, "")
            .trim()
        );
    })
    .filter(Boolean);
}

function findPerson(name, people) {
  const target = name.toLowerCase().trim();

  return people.find(p => {

    const dbName = (p.name || "")
      .toLowerCase()
      .trim();

    return (
      dbName === target ||
      dbName.includes(target) ||
      target.includes(dbName)
    );
  });
}
function resolveLeader(raw, people) {
  const names = extractNames(raw);

  for (const name of names) {
    const match = findPerson(name, people);
    if (match) return match;
  }

  return null;
}

function sendWhatsApp(phone, message) {
  const url =
    `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
}
  
/* ================= ASSIGN ================= */

window.openAssign = function(
  serviceId,
  templateId,
  serviceDate,
  serviceSlotId,
  role
){

  currentService = {
    id: serviceId,
    date: serviceDate,
    slotId: serviceSlotId
  };

  currentRole = role;

  // =========================
  // GET UNAVAILABLE STAFF
  // =========================
  const unavailableIds = new Set(

    availability
      .filter(a =>
        a.service_date === serviceDate &&
        a.service_slot_id === serviceSlotId &&
        a.status === "unavailable"
      )
      .map(a => String(a.staff_id))
  );

  const roleLower =
    (role || "").toLowerCase();

  const isCommunionRole =
    roleLower.includes("communion");

  // =========================
  // BUILD ELIGIBLE STAFF LIST
  // =========================
  const eligibleStaff = staffList.filter(s => {

    const staffId = String(s.id);

    // 1. Remove unavailable staff
    if(unavailableIds.has(staffId)){
      return false;
    }

    // 2. Communion restriction
    if(isCommunionRole){

      return s.communion_eligible === true;
    }

    // 3. All other roles → full available pool
    return true;
  });

  // =========================
  // SORT A–Z
  // =========================
  eligibleStaff.sort((a,b)=>
    (a.name || "").localeCompare(b.name || "")
  );

  // =========================
  // RENDER DROPDOWN
  // =========================
  document.getElementById("staffSelect").innerHTML =

    eligibleStaff.map(s => `

      <option value="${s.id}">

        ${s.name}
        ${s.communion_eligible ? '🕊️' : ''}

      </option>

    `).join("");

  // =========================
  // MODAL TITLE
  // =========================
  document.getElementById("modalTitle").innerText =
    "Assign " + role;

  document.getElementById("assignModal").style.display = "flex";
};

window.closeAssignModal = function(){
  document.getElementById("assignModal").style.display = "none";
};

window.saveAssign = async function(){

  const staffId =
    document.getElementById("staffSelect").value;

  await db.from("service_roles").upsert({

    service_id: currentService.id,
    role: currentRole,
    staff_id: staffId

  },{
    onConflict:"service_id,role"
  });

  closeAssignModal();
  load();
};

/* ================= UNAVAILABLE LIST ================= */

window.showUnavailable = function(date, slotId){

  const staffMap =
    new Map(staffList.map(s => [String(s.id), s.name]));

  const list = availability.filter(a =>
    a.service_date === date &&
    a.service_slot_id === slotId &&
    a.status === "unavailable"
  );

  document.getElementById("unavailableList").innerHTML =

    list.length === 0

    ? `

      <div class="tag">
        No unavailable staff
      </div>

    `

    : list.map(a => `

        <div class="staff-item">

          <div class="row">

            <span>
              ${staffMap.get(String(a.staff_id)) || a.staff_id}
            </span>

            <button
              class="small save"
              onclick="returnAvailableDirect(
                '${a.staff_id}',
                '${a.service_date}',
                '${a.service_slot_id}'
              )">

              Return

            </button>

          </div>

        </div>

      `).join("");

  document.getElementById("unavailableModal").style.display =
    "flex";
};

window.closeUnavailableModal = function(){

  document.getElementById("unavailableModal").style.display =
    "none";
};

/* ================= REALTIME RETURN AVAILABLE ================= */

window.returnAvailableDirect = async function(
  staffId,
  serviceDate,
  slotId
){

  await db.from("staff_availability")
    .delete()
    .eq("staff_id", staffId)
    .eq("service_date", serviceDate)
    .eq("service_slot_id", slotId);

  const availRes =
    await db.from("staff_availability").select("*");

  availability = availRes.data || [];

  showUnavailable(serviceDate, slotId);

  load();
};

/* ================= MANAGE AVAILABILITY ================= */

window.markUnavailable = async function(){

  const staffId =
    document.getElementById("manageStaff").value;

  const serviceDate =
    document.getElementById("manageDate").value;

  const serviceId =
    document.getElementById("manageService").value;

  const service =
    availabilityServices.find(s =>
      String(s.id) === String(serviceId)
    );

  const slotId = service.service_slot_id;

  await db.from("staff_availability").upsert({

    staff_id: staffId,
    service_date: serviceDate,
    service_slot_id: slotId,
    status: "unavailable"

  },{
    onConflict:"staff_id,service_date,service_slot_id"
  });

  load();
};

  window.updateAttendance = async function(
  serviceId,
  field,
  value
){

  const existing =
    attendanceMetricsMap.get(String(serviceId)) || {};

  const payload = {

    service_id: serviceId,

    onsite_count:
      existing.onsite_count || 0,

    online_count:
      existing.online_count || 0,

    communicants_count:
      existing.communicants_count || 0
  };

  payload[field] = Number(value) || 0;

  await db
    .from("service_attendance_metrics")
    .upsert(payload, {
      onConflict: "service_id"
    });

  load();
};
