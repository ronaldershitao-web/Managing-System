<!DOCTYPE html>
<html>
<head>
  <title>Service Command Center</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
    }

    .kpi{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      padding:10px;
    }

    .kpi-card{
      background:#111827;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      font-size:12px;
    }

    .main{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:10px;
      padding:10px;
    }

    .panel{
      background:#111827;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      height:85vh;
      overflow:auto;
    }

    .service-card{
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .red{ border-left:4px solid #ef4444; }
    .yellow{ border-left:4px solid #fbbf24; }
    .green{ border-left:4px solid #22c55e; }

    .role-row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:5px 0;
    }

    .missing{
      color:#ef4444;
      font-weight:bold;
    }

    .staff-panel{
      font-size:12px;
    }

    .tag{
      padding:3px 6px;
      border-radius:6px;
      font-size:11px;
    }

    .avail{ background:#16a34a; }
    .unavail{ background:#ef4444; }
  </style>
</head>

<body>

<header>
  📟 Service Command Center
  <button onclick="load()">Refresh</button>
</header>

<!-- KPI -->
<div class="kpi">
  <div class="kpi-card" id="kpiServices">Services: 0</div>
  <div class="kpi-card" id="kpiCritical">Critical: 0</div>
  <div class="kpi-card" id="kpiMissing">Missing Roles: 0</div>
  <div class="kpi-card" id="kpiAvail">Available Staff: 0</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SERVICE OPS -->
  <div class="panel" id="servicePanel"></div>

  <!-- STAFF PANEL -->
  <div class="panel staff-panel" id="staffPanel"></div>

</div>

<script type="module">
import { db } from "../assets/app.js";

let services = [];
let roles = [];
let staff = [];
let availability = [];

let staffMap = {};

async function load(){

  const res = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("service_roles").select("role, service_id, staff_id"),
    db.from("staff").select("*"),
    db.from("staff_availability").select("*")
  ]);

  services = res[0].data || [];
  roles = res[1].data || [];
  staff = res[2].data || [];
  availability = res[3].data || [];

  staffMap = Object.fromEntries(
    staff.map(s => [String(s.id), s.name])
  );

  render();
}

/* =======================
   BUILD ROLE MAP
======================= */
function buildRoleMap(){

  const map = {};

  roles.forEach(r => {

    const key =
      `${r.service_id}_${(r.role||"").toLowerCase()}`;

    map[key] = r;
  });

  return map;
}

/* =======================
   SERVICE HEALTH SCORE
======================= */
function getHealth(missingCount){

  if(missingCount >= 2) return "red";
  if(missingCount === 1) return "yellow";
  return "green";
}

/* =======================
   RENDER
======================= */
function render(){

  const roleMap = buildRoleMap();

  let totalMissing = 0;
  let totalCritical = 0;

  const serviceHtml = services.map(s => {

    const serviceRoles = roles.filter(r => r.service_id === s.id);

    const expectedRoles = 6; // adjust if needed

    const missing = Math.max(0, expectedRoles - serviceRoles.length);

    totalMissing += missing;

    if(missing >= 2) totalCritical++;

    const health = getHealth(missing);

    const roleHtml = serviceRoles.map(r => {

      const staffName =
        staffMap[r.staff_id] || "Unknown";

      return `
        <div class="role-row">
          <div>${r.role}</div>
          <div>${staffName}</div>
        </div>
      `;
    }).join("");

    return `
      <div class="service-card ${health}">
        <b>${s.service_slots?.label}</b><br>
        <small>${s.service_date}</small>

        <div style="margin-top:8px">
          ${roleHtml}
        </div>

        ${missing > 0 ? `
          <div class="missing">
            ⚠ Missing Roles: ${missing}
          </div>
        ` : `<div style="color:#22c55e">✔ Fully Staffed</div>`}
      </div>
    `;
  }).join("");

  document.getElementById("servicePanel").innerHTML = serviceHtml;

  /* =======================
     STAFF PANEL
  ======================= */

  const availabilityMap = {};

  availability.forEach(a => {
    availabilityMap[a.staff_id] = a.status;
  });

  const staffHtml = staff.map(s => {

    const status =
      availabilityMap[s.id] || "available";

    return `
      <div class="service-card">
        <div style="display:flex;justify-content:space-between">
          <b>${s.name}</b>

          <span class="tag ${status === "available" ? "avail" : "unavail"}">
            ${status}
          </span>
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("staffPanel").innerHTML = staffHtml;

  /* =======================
     KPI
  ======================= */

  document.getElementById("kpiServices").innerText =
    `Services: ${services.length}`;

  document.getElementById("kpiCritical").innerText =
    `Critical: ${totalCritical}`;

  document.getElementById("kpiMissing").innerText =
    `Missing Roles: ${totalMissing}`;

  document.getElementById("kpiAvail").innerText =
    `Staff: ${staff.length}`;
}

window.load = load;
load();

</script>

</body>
</html>
