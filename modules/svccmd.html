<!DOCTYPE html>
<html>
<head>
  <title>Service Command Post</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:12px;
      padding:12px;
    }

    .card {
      background:#111827;
      padding:14px;
      border-radius:12px;
      border:1px solid #1f2937;
    }

    .title { font-size:18px; font-weight:bold; }
    .tag { font-size:12px; color:#94a3b8; }

    .section {
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row {
      display:flex;
      justify-content:space-between;
      font-size:13px;
      margin:3px 0;
    }

    .good { color:#22c55e; }
    .bad { color:#ef4444; }
  </style>
</head>

<body>

<header>
  ⛪ Service Command Post
  <button onclick="load()" style="background:#3b82f6;border:none;color:white;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* =========================
   SAFE DATE (CRITICAL FIX)
========================= */
function d(dateStr){
  return new Date(`${dateStr}T00:00:00`);
}

/* =========================
   WEEKEND FILTER (SGT SAFE)
========================= */
function isWeekend(dateStr){
  const day = d(dateStr).getDay();
  return day === 0 || day === 6;
}

/* =========================
   ONLY 2 WEEKENDS WINDOW
   (RUNNING + NEXT WEEKEND)
========================= */
function getWeekKey(dateStr){
  const date = d(dateStr);
  const yearStart = new Date(date.getFullYear(),0,1);
  const diff = Math.floor((date - yearStart)/(1000*60*60*24));
  return Math.floor(diff/7);
}

/* =========================
   LOAD
========================= */
async function load(){

  const [servicesRes, rolesRes, staffRes] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location,id)`),
    db.from("service_roles").select(`*, staff(name)`),
    db.from("staff").select("*")
  ]);

  let services = servicesRes.data || [];
  const roles = rolesRes.data || [];
  const staff = staffRes.data || [];

  /* FILTER: weekend only */
  services = services.filter(s => isWeekend(s.service_date));

  /* RUNNING WINDOW (CURRENT + NEXT WEEKEND ONLY) */
  const grouped = {};
  services.forEach(s=>{
    const k = getWeekKey(s.service_date);
    if(!grouped[k]) grouped[k]=[];
    grouped[k].push(s);
  });

  services = Object.values(grouped)
    .sort((a,b)=>d(a[0].service_date)-d(b[0].service_date))
    .slice(0,2)
    .flat();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for(const s of services){

    const slot = s.service_slots || {};
    const rolesForService = roles.filter(r=>r.service_id===s.id);

    const day = d(s.service_date).toLocaleDateString("en-SG",{weekday:"long"});
    const datePretty = d(s.service_date).toLocaleDateString("en-SG",{day:"2-digit",month:"short",year:"2-digit"});

    grid.innerHTML += `
      <div class="card">

        <div class="title">${slot.label || "Service"}</div>

        <div class="tag">${day} | ${datePretty}</div>

        <div class="tag">⏰ ${slot.time || ""}</div>
        <div class="tag">📍 ${slot.location || ""}</div>

        <div class="section">
          <b>Key Appointments</b>

          ${["Service Pastor","Anchor","Welcome IC"].map(role=>{
            const found = rolesForService.find(r=>r.role===role);
            return `
              <div class="row">
                <span>${role}</span>
                <b>${found?.staff?.name || "-"}</b>
              </div>
            `;
          }).join("")}
        </div>

        <div class="section">
          <b>Welcome Team</b>

          ${rolesForService
            .filter(r=>["Welcome 1","Welcome 2","Plaza 1","Plaza 2"].includes(r.role))
            .map(r=>`
              <div class="row">
                <span>${r.role}</span>
                <span>${r.staff?.name || "-"}</span>
              </div>
            `).join("")}
        </div>

      </div>
    `;
  }
}

window.load = load;
load();
</script>

</body>
</html>
