<!DOCTYPE html>
<html>
<head>
  <title>Service Command Center (Stable Architecture)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
      display:flex;
      justify-content:space-between;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .title{
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:12px;
      margin:6px 0;
      gap:10px;
    }

    .role{ flex:1; }
    .staff{ color:#22c55e; font-weight:bold; }

    button{
      font-size:11px;
      padding:5px 8px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    .chip{
      padding:6px;
      border:1px solid #334155;
      border-radius:6px;
      margin:4px 0;
      cursor:pointer;
      font-size:12px;
    }

    .selected{ background:#1d4ed8; border-color:#60a5fa; }

    /* MODAL */
    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      display:none;
      align-items:center;
      justify-content:center;
    }

    .modalBox{
      width:360px;
      max-height:70vh;
      background:#111827;
      border:1px solid #334155;
      border-radius:10px;
      padding:12px;
      display:flex;
      flex-direction:column;
    }

    .staffList{
      overflow:auto;
      flex:1;
      border:1px solid #1f2937;
      border-radius:8px;
      padding:6px;
    }

    .danger{
      background:#ef4444;
      margin-top:8px;
      width:100%;
    }

    select{
      width:100%;
      padding:6px;
      margin-bottom:6px;
      background:#0f172a;
      color:white;
      border:1px solid #334155;
      border-radius:6px;
    }

  </style>
</head>

<body>

<header>
  Service Command Center
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modalBox">

    <div id="modalTitle" style="font-weight:bold"></div>

    <div id="modalInfo" style="font-size:11px;color:#93c5fd"></div>

    <div id="staffList" class="staffList"></div>

    <button onclick="saveAssignment()">Save Assignment</button>
    <button class="danger" onclick="closeModal()">Close</button>

  </div>
</div>

<script type="module">

import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services=[], staffList=[], templateRoles=[], serviceRoles=[], staffTemplates=[], availability=[];

let staffMap={}, roleMap={}, poolMap={};

let modal = { serviceId:null, role:null, staffId:null };

/* ================= LOAD ================= */
async function load(){

  const [s,st,tr,sr,tpl,av] = await Promise.all([
    db.from("services").select("* , service_slots(label,time,location)")
      .order("service_date",{ascending:true}),
    db.from("staff").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("service_roles").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*")
  ]);

  services=s.data||[];
  staffList=st.data||[];
  templateRoles=tr.data||[];
  serviceRoles=sr.data||[];
  staffTemplates=tpl.data||[];
  availability=av.data||[];

  staffMap=Object.fromEntries(staffList.map(s=>[String(s.id),s.name]));

  roleMap={};
  serviceRoles.forEach(r=>{
    const k=`${r.service_id}_${r.role?.toLowerCase()}`;
    if(!roleMap[k] || new Date(r.created_at)>new Date(roleMap[k].created_at)){
      roleMap[k]=r;
    }
  });

  poolMap={};
  staffTemplates.forEach(t=>{
    if(!poolMap[t.template_id]) poolMap[t.template_id]=[];
    poolMap[t.template_id].push({
      id:t.staff_id,
      name:staffMap[t.staff_id]||"Unknown"
    });
  });

  render();
}

/* ================= ROLE ================= */
function getAssigned(serviceId,role){
  const k=`${serviceId}_${role?.toLowerCase()}`;
  return roleMap[k]?staffMap[roleMap[k].staff_id]:"-";
}

/* ================= CARD ================= */
function card(svc){

  const roles=templateRoles.filter(r=>
    String(r.template_id)===String(svc.service_template_id)
  );

  return `
    <div class="card">
      <b>${svc.service_slots?.label}</b>
      <div style="font-size:11px;color:#94a3b8">
        ${svc.service_date}
      </div>

      ${roles.map(r=>`
        <div class="row">
          <div class="role">${r.role}</div>
          <div class="staff">${getAssigned(svc.id,r.role)}</div>
          <button onclick="openModal('${svc.id}','${r.role}')">Assign</button>
        </div>
      `).join("")}
    </div>
  `;
}

/* ================= INSPECTOR (RESTORED FULL CONTEXT) ================= */
function inspector(){

  const dates=[...new Set(services.map(s=>s.service_date))];

  return `
    <div class="title">Inspector (Availability)</div>

    <select id="dateSel" onchange="onDate()">
      <option value="">Select Date</option>
      ${dates.map(d=>`<option value="${d}">${d}</option>`).join("")}
    </select>

    <select id="serviceSel" onchange="onService()"></select>

    <div id="inspectView" class="card">Select service</div>
  `;
}

window.onDate=function(){

  const d=dateSel.value;

  const list=services.filter(s=>s.service_date===d);

  serviceSel.innerHTML=`
    <option value="">Select</option>
    ${list.map(s=>`
      <option value="${s.id}">
        ${s.service_slots?.label}
      </option>
    `).join("")}
  `;
};

window.onService=function(){

  const id=serviceSel.value;
  const svc=services.find(s=>String(s.id)===String(id));
  if(!svc) return;

  const pool=poolMap[svc.service_template_id]||[];

  const unavailable=new Set(
    availability
      .filter(a=>
        a.service_date===svc.service_date &&
        a.service_slot_id===svc.service_slot_id &&
        a.status==="unavailable"
      )
      .map(a=>String(a.staff_id))
  );

  const available=pool.filter(p=>!unavailable.has(String(p.id)));

  document.getElementById("inspectView").innerHTML=`
    <b>${svc.service_slots?.label}</b>

    <div style="margin-top:10px">
      <b>Available</b>
      ${available.map(a=>`<div>${a.name}</div>`).join("")}
    </div>

    <div style="margin-top:10px">
      <b>Unavailable</b>
      ${[...unavailable].map(id=>`<div>${staffMap[id]}</div>`).join("")}
    </div>
  `;
};

/* ================= MODAL ================= */
window.openModal=function(sid,role){

  modal.serviceId=sid;
  modal.role=role;
  modal.staffId=null;

  const svc=services.find(s=>s.id===sid);
  const pool=poolMap[svc.service_template_id]||[];

  document.getElementById("modalTitle").innerText=`Assign ${role}`;
  document.getElementById("modalInfo").innerText=
    `${svc.service_slots?.label} • ${svc.service_date}`;

  document.getElementById("staffList").innerHTML=
    pool.map(p=>`
      <div class="chip ${modal.staffId===p.id?"selected":""}"
        onclick="selectStaff('${p.id}')">
        ${p.name}
      </div>
    `).join("");

  modal.style="flex";
  document.getElementById("modal").style.display="flex";
};

window.selectStaff=function(id){
  modal.staffId=id;
  openModal(modal.serviceId,modal.role);
};

window.closeModal=function(){
  document.getElementById("modal").style.display="none";
};

/* ================= SAVE ================= */
window.saveAssignment=async function(){

  if(!modal.serviceId||!modal.role||!modal.staffId) return;

  const svc=services.find(s=>s.id===modal.serviceId);

  await db.from("service_roles").upsert({
    service_id:modal.serviceId,
    role:modal.role,
    staff_id:modal.staffId,
    service_date:svc.service_date
  });

  await load();
  closeModal();
};

/* ================= RENDER ================= */
function render(){

  const cols={sat:[],s1:[],s2:[],jur:[]};

  services.forEach(s=>{
    const t=(s.service_slots?.time||"").toLowerCase();
    const l=(s.service_slots?.location||"").toLowerCase();

    if(l.includes("jurong")) cols.jur.push(s);
    else if(t.includes("14")) cols.sat.push(s);
    else if(t.includes("08")) cols.s1.push(s);
    else cols.s2.push(s);
  });

  grid.innerHTML=`
    <div class="col"><div class="title">Sat</div>${cols.sat.map(card).join("")}</div>
    <div class="col"><div class="title">8.30</div>${cols.s1.map(card).join("")}</div>
    <div class="col"><div class="title">10.45</div>${cols.s2.map(card).join("")}</div>
    <div class="col"><div class="title">Jurong</div>${cols.jur.map(card).join("")}</div>
    <div class="col">${inspector()}</div>
  `;
}

window.load=load;
load();

</script>

</body>
</html>
