<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Roster System FINAL UX FIX)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .title{
      color:#60a5fa;
      font-weight:bold;
    }

    .tag{
      font-size:12px;
      color:#94a3b8;
    }

    .section{
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
    }

    .good{ color:#22c55e; }
    .bad{ color:#ef4444; }

    .clickable{
      cursor:pointer;
      text-decoration:underline;
    }

    button.small{
      font-size:10px;
      padding:2px 6px;
      margin-left:4px;
      border-radius:4px;
      border:none;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#111827;
      padding:20px;
      border-radius:10px;
      width:360px;
      max-height:70vh;
      overflow:auto;
    }

    select, button{
      width:100%;
      padding:8px;
      margin-top:10px;
      border-radius:6px;
      border:none;
    }

    .save{ background:#22c55e; color:white; }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (FINAL FIXED)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- ASSIGN MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div id="modalTitle">Assign</div>
    <select id="staffSelect"></select>
    <button class="save" onclick="saveAssign()">Assign</button>
  </div>
</div>

<!-- UNAVAILABLE MODAL -->
<div class="modal" id="unavailableModal">
  <div class="modal-content">
    <div style="font-weight:bold;margin-bottom:10px;">
      Unavailable Staff
    </div>

    <div id="unavailableList"></div>

    <button class="save" onclick="closeUnavailable()">
      Close
    </button>
  </div>
</div>

<script type="module">
import { db } from "../assets/app.js";

let staffList = [];
let templates = [];
let availability = [];

let currentService = null;
let currentRole = null;

/* ================= DATE ================= */
function parseDate(d){
  const [y,m,day] = d.split("-");
  return new Date(y,m-1,day);
}

/* ================= WINDOW ================= */
function inWindow(d){
  const dt = parseDate(d);
  const now = new Date();
  const min = new Date(); min.setDate(now.getDate()-7);
  const max = new Date(); max.setDate(now.getDate()+7);
  return dt >= min && dt <= max;
}

/* ================= LOAD ================= */
async function load(){

  const [servicesRes, templateRes, availRes, staffRes] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location)`),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("staff").select("*")
  ]);

  let services = (servicesRes.data || []).filter(s => inWindow(s.service_date));

  templates = templateRes.data || [];
  availability = availRes.data || [];
  staffList = staffRes.data || [];

  const staffMap = new Map(staffList.map(s => [String(s.id), s.name]));

  const templateMap = new Map();
  templates.forEach(t=>{
    const key = String(t.template_id);
    if(!templateMap.has(key)) templateMap.set(key, []);
    templateMap.get(key).push(t);
  });

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const cols = [[],[],[],[]];

  services.forEach(s=>{
    const t = (s.service_slots?.time||"").replace(":","");
    const loc = (s.service_slots?.location||"").toLowerCase();

    let i=-1;
    if(t.includes("1430")) i=0;
    else if(t.includes("0830")) i=1;
    else if(t.includes("1045") && !loc.includes("jurong")) i=2;
    else i=3;

    if(i>=0) cols[i].push(s);
  });

  cols.forEach(col=>{
    grid.innerHTML += `
      <div class="col">

        ${col.map(s=>{

          const templateStaff =
            templateMap.get(String(s.service_template_id)) || [];

          const assignedIds = new Set(templateStaff.map(t=>String(t.staff_id)));

          const unavailable = availability.filter(a =>
            a.service_date === s.service_date &&
            a.service_slot_id === s.service_slot_id &&
            a.status === "unavailable"
          );

          const unavailableIds = new Set(unavailable.map(a=>String(a.staff_id)));

          const availableIds =
            [...assignedIds].filter(id=>!unavailableIds.has(id));

          const KEY = [
            "Service Pastor",
            "Anchor",
            "Welcome IC",
            "Hospitality Cell"
          ];

          const appointments = KEY.map(role=>{

            const match = templateStaff.find(t =>
              (t.role||"").toLowerCase() === role.toLowerCase()
            );

            const staffId = match?.staff_id;

            return {
              role,
              staffId,
              name: staffId ? staffMap.get(String(staffId)) : "-"
            };
          });

          return `
            <div class="card">

              <div class="title">${s.service_slots?.label}</div>
              <div class="tag">${s.service_date}</div>

              <div class="section">
                <b>Staff Summary</b>

                <div class="row">
                  <span>Total Assigned</span>
                  <span>${assignedIds.size}</span>
                </div>

                <div class="row">
                  <span>Unavailable</span>
                  <span class="bad clickable"
                    onclick="openUnavailableModal('${s.service_date}','${s.service_slot_id}')">
                    ${unavailableIds.size}
                  </span>
                </div>

                <div class="row">
                  <span>Total Available</span>
                  <span class="good">${availableIds.length}</span>
                </div>
              </div>

              <div class="section">
                <b>Key Appointments</b>

                ${appointments.map(a=>`
                  <div class="row">
                    <span>${a.role}</span>
                    <span>
                      ${a.name}

                      <button class="small"
                        onclick="openAssign('${s.service_template_id}','${a.role}','${s.service_date}','${s.service_slot_id}')">
                        Assign
                      </button>
                    </span>
                  </div>
                `).join("")}

              </div>

            </div>
          `;
        }).join("")}

      </div>
    `;
  });
}

/* ================= UNAVAILABLE MODAL ================= */
window.openUnavailableModal = async function(date, slotId){

  const { data } = await db
    .from("staff_availability")
    .select("staff_id")
    .eq("service_date", date)
    .eq("service_slot_id", slotId)
    .eq("status", "unavailable");

  const ids = (data || []).map(d=>d.staff_id);

  const html = ids.length
    ? ids.map(id=>`
        <div style="padding:6px;border-bottom:1px solid #1f2937;">
          ${staffList.find(s=>String(s.id)===String(id))?.name || "Unknown"}
        </div>
      `).join("")
    : `<div style="color:#94a3b8;">No unavailable staff</div>`;

  document.getElementById("unavailableList").innerHTML = html;
  document.getElementById("unavailableModal").style.display = "flex";
};

window.closeUnavailable = function(){
  document.getElementById("unavailableModal").style.display = "none";
};

/* ================= ASSIGN ================= */
window.openAssign = function(templateId, role, date, slotId){

  currentRole = role;

  const eligible = staffList.filter(s =>
    templates.some(t =>
      String(t.template_id) === String(templateId) &&
      String(t.staff_id) === String(s.id)
    )
  );

  document.getElementById("staffSelect").innerHTML =
    eligible.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");

  currentService = { templateId, role };

  document.getElementById("modal").style.display = "flex";
};

/* ================= SAVE ================= */
window.saveAssign = async function(){

  const staffId = document.getElementById("staffSelect").value;

  await db.from("service_roles").upsert({
    service_id: currentService.templateId,
    role: currentRole,
    staff_id: staffId
  },{
    onConflict:"service_id,role"
  });

  document.getElementById("modal").style.display = "none";
  load();
};

window.load = load;
load();

</script>

</body>
</html>
