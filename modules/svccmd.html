<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Full Ops + Availability Control)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .title{
      color:#60a5fa;
      font-weight:bold;
      margin-bottom:4px;
    }

    .tag{
      font-size:12px;
      color:#94a3b8;
    }

    .section{
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
      gap:8px;
      align-items:center;
    }

    .good{
      color:#22c55e;
      font-weight:bold;
    }

    .bad{
      color:#ef4444;
      cursor:pointer;
      font-weight:bold;
    }

    button.small{
      font-size:10px;
      padding:2px 6px;
      margin-left:4px;
      border-radius:4px;
      border:none;
      background:#3b82f6;
      color:white;
      cursor:pointer;
      width:auto;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .modal-content{
      background:#111827;
      padding:20px;
      border-radius:10px;
      width:360px;
      max-height:80vh;
      overflow:auto;
      border:1px solid #334155;
    }

    select, button, input{
      width:100%;
      padding:8px;
      margin-top:10px;
      border-radius:6px;
      border:none;
      box-sizing:border-box;
    }

    .save{
      background:#22c55e;
      color:white;
    }

    .danger{
      background:#ef4444;
      color:white;
    }

    .secondary{
      background:#334155;
      color:white;
    }

    .staff-item{
      padding:8px;
      border:1px solid #334155;
      border-radius:6px;
      margin-top:6px;
      font-size:12px;
    }

    .group-title{
      color:#fbbf24;
      font-weight:bold;
      margin-top:12px;
      margin-bottom:6px;
      padding-top:8px;
      border-top:1px solid #334155;
    }

    h3{
      margin-top:0;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Full Ops + Availability Control)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- ASSIGN MODAL -->
<div class="modal" id="assignModal">
  <div class="modal-content">

    <div id="modalTitle">Assign</div>

    <select id="staffSelect"></select>

    <button class="save" onclick="saveAssign()">
      Assign / Reassign
    </button>

    <button class="secondary" onclick="closeAssignModal()">
      Close
    </button>

  </div>
</div>

<!-- UNAVAILABLE MODAL -->
<div class="modal" id="unavailableModal">
  <div class="modal-content">

    <h3>Unavailable Staff</h3>

    <div id="unavailableList"></div>

    <button class="secondary" onclick="closeUnavailableModal()">
      Close
    </button>

  </div>
</div>

<script type="module">
import { db } from "../assets/app.js";

let staffList = [];
let templates = [];
let availability = [];
let availabilityServices = [];

let currentService = null;
let currentRole = null;

/* ================= DATE ================= */

function parseDate(d){
  const [y,m,day] = d.split("-");
  return new Date(y,m-1,day);
}

function formatDate(dateStr){

  if(!dateStr) return "-";

  const date = parseDate(dateStr);

  return date.toLocaleDateString("en-GB",{
    day:"2-digit",
    month:"short",
    year:"numeric"
  });
}

function inWindow(d){

  const dt = parseDate(d);

  const now = new Date();

  const min = new Date();
  min.setDate(now.getDate()-7);

  const max = new Date();
  max.setDate(now.getDate()+7);

  return dt >= min && dt <= max;
}

function in60Days(d){

  const dt = parseDate(d);

  const now = new Date();

  const max = new Date();
  max.setDate(now.getDate()+60);

  return dt >= now && dt <= max;
}

/* ================= LOAD ================= */

async function load(){

  const [
    servicesRes,
    templateRes,
    availRes,
    staffRes,
    rolesRes,
    templateRolesRes,
    hospitalityRes
  ] = await Promise.all([

    db.from("services")
      .select(`*, service_slots(label,time,location)`),

    db.from("staff_service_templates")
      .select("*"),

    db.from("staff_availability")
      .select("*"),

    db.from("staff")
      .select("*"),

    db.from("service_roles")
      .select("*"),

    db.from("service_template_roles")
      .select("*"),
    db.from("hospitality_duty").select("*") 
  ]);

  const allServices = servicesRes.data || [];

  let displayServices =
    allServices.filter(s => inWindow(s.service_date));

  availabilityServices =
    allServices.filter(s => in60Days(s.service_date));

  templates = templateRes.data || [];
  availability = availRes.data || [];
  staffList = staffRes.data || [];

  const roles = rolesRes.data || [];
  const templateRoles = templateRolesRes.data || [];

  const staffMap =
    new Map(staffList.map(s => [String(s.id), s.name]));
const hospitalityMap = new Map(
  (hospitalityRes.data || []).map(d => [
    `${d.service_date}_${d.service_slot_id}`,
    d
  ])
);

  
  const templateMap = new Map();

  templates.forEach(t => {

    const key = String(t.template_id);

    if(!templateMap.has(key)){
      templateMap.set(key, []);
    }

    templateMap.get(key).push(t);
  });

  const roleMap = new Map();

  roles.forEach(r => {

    const key = String(r.service_id);

    if(!roleMap.has(key)){
      roleMap.set(key, []);
    }

    roleMap.get(key).push(r);
  });

  const templateRoleMap = new Map();

  templateRoles.forEach(r => {

    const key = String(r.template_id);

    if(!templateRoleMap.has(key)){
      templateRoleMap.set(key, []);
    }

    templateRoleMap.get(key).push(r);
  });

  displayServices.sort((a,b)=>
    parseDate(a.service_date) -
    parseDate(b.service_date)
  );

  availabilityServices.sort((a,b)=>
    parseDate(a.service_date) -
    parseDate(b.service_date)
  );

  const cols = [[],[],[],[]];

  displayServices.forEach(s=>{

    const t =
      (s.service_slots?.time || "")
      .replace(":","");

    const loc =
      (s.service_slots?.location || "")
      .toLowerCase();

    let i = -1;

    if(t.includes("1430")) i=0;
    else if(t.includes("0830")) i=1;
    else if(t.includes("1045") && !loc.includes("jurong")) i=2;
    else i=3;

    if(i>=0) cols[i].push(s);
  });

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cols.forEach(col=>{

    grid.innerHTML += `
      <div class="col">

        ${col.map(s=>{

          const templateStaff =
            templateMap.get(String(s.service_template_id)) || [];

          const assignedIds =
            new Set(
              templateStaff.map(t => String(t.staff_id))
            );

          const unavailableRecords =
            availability.filter(a =>
              a.service_date === s.service_date &&
              a.service_slot_id === s.service_slot_id &&
              a.status === "unavailable"
            );

          const unavailableIds =
            new Set(
              unavailableRecords.map(a => String(a.staff_id))
            );

          const availableIds =
            [...assignedIds]
              .filter(id => !unavailableIds.has(id));

          const templateDefinedRoles =
            templateRoleMap.get(
              String(s.service_template_id)
            ) || [];

          const appointments =
            templateDefinedRoles.map(roleRow=>{

              const role = roleRow.role;

              const assignedRole =
                (roleMap.get(String(s.id)) || [])
                .find(r =>
                  (r.role || "").toLowerCase() ===
                  role.toLowerCase()
                );

              const templateMatch =
                templateStaff.find(t =>
                  (t.role || "").toLowerCase() ===
                  role.toLowerCase()
                );

              const staffId =
                assignedRole?.staff_id ||
                templateMatch?.staff_id;

              const unavailable =
                unavailableIds.has(String(staffId));

              return {
                role,
                group_name: roleRow.group_name,
                staffId,
                unavailable,
                name: staffId
                  ? staffMap.get(String(staffId))
                  : "-"
              };
            });

          const groupedAppointments = {};

          appointments
            .filter(a => {

              if (!s.is_communion_service) {

                const roleLower = (a.role || "").toLowerCase();

                const isCommunionRole =
                  roleLower.includes("communion") ||
                  roleLower.includes("mindef");

                return !isCommunionRole;
              }

              return true;
            })
            .forEach(a => {

              const group =
                a.group_name || "General";

              if(!groupedAppointments[group]){
                groupedAppointments[group] = [];
              }

              groupedAppointments[group].push(a);
            });

          return `
            <div class="card">

              <div class="title">
                ${s.service_slots?.label || ""}
              </div>

              <div class="tag">
                ${formatDate(s.service_date)}
              </div>

              <div class="tag">
                ⏰ ${s.service_slots?.time || ""}
              </div>

              

             
<b>🏠 Home Cell Serving Hospitality</b>

${(() => {

  const key = `${s.service_date}_${s.service_slots?.id || s.service_slot_id}`;
  const hosp = hospitalityMap.get(key);

  return `
    <div class="row">
      <span>Hospitality Cell Leader</span>

      <span class="${hosp?.leader ? 'good' : 'bad'}">
        ${hosp?.leader
          ? (staffMap.get(String(hosp.leader)) || hosp.leader)
          : 'Not Assigned'}
      </span>

      <button class="small save"
        onclick="notifyLeader('${s.id}')">
        Notify
      </button>
    </div>
  `;
})()}

  <div class="row">
    <span>Cell Pastor</span>

    <button class="small save"
      onclick="notifyPastor('${s.id}')">
      Notify
    </button>
  </div>


                <b>Staff Summary</b>

                <div class="row">
                  <span>Total Assigned</span>
                  <span>${assignedIds.size}</span>
                </div>

                <div class="row">
                  <span>Unavailable</span>

                  <span class="bad"
                    onclick="showUnavailable(
                      '${s.service_date}',
                      '${s.service_slot_id}'
                    )">

                    ${unavailableIds.size}

                  </span>
                </div>

                <div class="row">
                  <span>Available</span>
                  <span class="good">
                    ${availableIds.length}
                  </span>
                </div>

              </div>

              <div class="section">

                <b>Appointments</b>

                ${Object.entries(groupedAppointments)
                  .map(([group, items]) => `

                    ${
                      group !== "General"
                      ? `
                        <div class="group-title">
                          ${group}
                        </div>
                      `
                      : ""
                    }

                    ${items.map(a => `

                      <div class="row">

                        <span>
                          ${a.role}
                        </span>

                        <span style="
                          display:flex;
                          align-items:center;
                          gap:6px;
                        ">

                          <span class="${a.unavailable ? 'bad' : ''}">

                            ${a.name}

                            ${a.unavailable ? ' (Unavailable)' : ''}

                          </span>

                          <button class="small"
                            onclick="openAssign(
                              '${s.id}',
                              '${s.service_template_id}',
                              '${s.service_date}',
                              '${s.service_slot_id}',
                              '${a.role}'
                            )">

                            Assign

                          </button>

                        </span>

                      </div>

                    `).join("")}

                  `).join("")
                }

              </div>

            </div>
          `;
        }).join("")}

      </div>
    `;
  });

  const uniqueDates =
    [...new Set(
      availabilityServices.map(s => s.service_date)
    )];

  grid.innerHTML += `

    <div class="col">

      <h3>Staff Availability</h3>

      <div class="card">

        <div class="tag">Select Date</div>

        <select id="manageDate" onchange="refreshServiceOptions()">
          ${
            uniqueDates.map(d => `
              <option value="${d}">
                ${formatDate(d)}
              </option>
            `).join("")
          }
        </select>

        <div class="tag" style="margin-top:10px;">
          Select Service
        </div>

        <select
          id="manageService"
          onchange="refreshStaffOptions()">
        </select>

        <div class="tag" style="margin-top:10px;">
          Select Staff
        </div>

        <select id="manageStaff"></select>

        <button class="danger"
          onclick="markUnavailable()">

          Mark Unavailable

        </button>

      </div>

    </div>
  `;

  refreshServiceOptions();
}

/* ================= SERVICE FILTER ================= */

window.refreshServiceOptions = function(){

  const selectedDate =
    document.getElementById("manageDate").value;

  const serviceDropdown =
    document.getElementById("manageService");

  const filteredServices =
    availabilityServices.filter(s =>
      s.service_date === selectedDate
    );

  serviceDropdown.innerHTML =
    filteredServices.map(s => `

      <option
        value="${s.id}">

        ${s.service_slots?.label}
        (${s.service_slots?.time})

      </option>

    `).join("");

  refreshStaffOptions();
};

/* ================= STAFF FILTER ================= */

window.refreshStaffOptions = function(){

  const selectedServiceId =
    document.getElementById("manageService").value;

  const service =
    availabilityServices.find(s =>
      String(s.id) === String(selectedServiceId)
    );

  if(!service) return;

  const templateStaff =
    templates.filter(t =>
      String(t.template_id) ===
      String(service.service_template_id)
    );

  const eligibleIds =
    new Set(
      templateStaff.map(t => String(t.staff_id))
    );

  const staffDropdown =
    document.getElementById("manageStaff");

  const eligibleStaff =
    staffList.filter(s =>
      eligibleIds.has(String(s.id))
    );

  staffDropdown.innerHTML =
    eligibleStaff.map(s => `
      <option value="${s.id}">
        ${s.name}
      </option>
    `).join("");
};

/* ================= ASSIGN ================= */

window.openAssign = function(
  serviceId,
  templateId,
  serviceDate,
  serviceSlotId,
  role
){

  currentService = {
    id: serviceId,
    date: serviceDate,
    slotId: serviceSlotId
  };

  currentRole = role;

  // =========================
  // GET UNAVAILABLE STAFF
  // =========================
  const unavailableIds = new Set(

    availability
      .filter(a =>
        a.service_date === serviceDate &&
        a.service_slot_id === serviceSlotId &&
        a.status === "unavailable"
      )
      .map(a => String(a.staff_id))
  );

  const roleLower =
    (role || "").toLowerCase();

  const isCommunionRole =
    roleLower.includes("communion");

  // =========================
  // BUILD ELIGIBLE STAFF LIST
  // =========================
  const eligibleStaff = staffList.filter(s => {

    const staffId = String(s.id);

    // 1. Remove unavailable staff
    if(unavailableIds.has(staffId)){
      return false;
    }

    // 2. Communion restriction
    if(isCommunionRole){

      return s.communion_eligible === true;
    }

    // 3. All other roles → full available pool
    return true;
  });

  // =========================
  // SORT A–Z
  // =========================
  eligibleStaff.sort((a,b)=>
    (a.name || "").localeCompare(b.name || "")
  );

  // =========================
  // RENDER DROPDOWN
  // =========================
  document.getElementById("staffSelect").innerHTML =

    eligibleStaff.map(s => `

      <option value="${s.id}">

        ${s.name}
        ${s.communion_eligible ? '🕊️' : ''}

      </option>

    `).join("");

  // =========================
  // MODAL TITLE
  // =========================
  document.getElementById("modalTitle").innerText =
    "Assign " + role;

  document.getElementById("assignModal").style.display = "flex";
};

window.closeAssignModal = function(){
  document.getElementById("assignModal").style.display = "none";
};

window.saveAssign = async function(){

  const staffId =
    document.getElementById("staffSelect").value;

  await db.from("service_roles").upsert({

    service_id: currentService.id,
    role: currentRole,
    staff_id: staffId

  },{
    onConflict:"service_id,role"
  });

  closeAssignModal();
  load();
};

/* ================= UNAVAILABLE LIST ================= */

window.showUnavailable = function(date, slotId){

  const staffMap =
    new Map(staffList.map(s => [String(s.id), s.name]));

  const list = availability.filter(a =>
    a.service_date === date &&
    a.service_slot_id === slotId &&
    a.status === "unavailable"
  );

  document.getElementById("unavailableList").innerHTML =

    list.length === 0

    ? `

      <div class="tag">
        No unavailable staff
      </div>

    `

    : list.map(a => `

        <div class="staff-item">

          <div class="row">

            <span>
              ${staffMap.get(String(a.staff_id)) || a.staff_id}
            </span>

            <button
              class="small save"
              onclick="returnAvailableDirect(
                '${a.staff_id}',
                '${a.service_date}',
                '${a.service_slot_id}'
              )">

              Return

            </button>

          </div>

        </div>

      `).join("");

  document.getElementById("unavailableModal").style.display =
    "flex";
};

window.closeUnavailableModal = function(){

  document.getElementById("unavailableModal").style.display =
    "none";
};

/* ================= REALTIME RETURN AVAILABLE ================= */

window.returnAvailableDirect = async function(
  staffId,
  serviceDate,
  slotId
){

  await db.from("staff_availability")
    .delete()
    .eq("staff_id", staffId)
    .eq("service_date", serviceDate)
    .eq("service_slot_id", slotId);

  const availRes =
    await db.from("staff_availability").select("*");

  availability = availRes.data || [];

  showUnavailable(serviceDate, slotId);

  load();
};

/* ================= MANAGE AVAILABILITY ================= */

window.markUnavailable = async function(){

  const staffId =
    document.getElementById("manageStaff").value;

  const serviceDate =
    document.getElementById("manageDate").value;

  const serviceId =
    document.getElementById("manageService").value;

  const service =
    availabilityServices.find(s =>
      String(s.id) === String(serviceId)
    );

  const slotId = service.service_slot_id;

  await db.from("staff_availability").upsert({

    staff_id: staffId,
    service_date: serviceDate,
    service_slot_id: slotId,
    status: "unavailable"

  },{
    onConflict:"staff_id,service_date,service_slot_id"
  });

  load();
};

window.load = load;

load();

  window.notifyLeader = async function(serviceId){

  // later connect to whatsapp / email / supabase logs
  console.log("Notify Leader for service:", serviceId);

  alert("Leader notified (stub)");
};

window.notifyPastor = async function(serviceId){

  console.log("Notify Pastor for service:", serviceId);

  alert("Pastor notified (stub)");
};

</script>


</body>
</html>
