<!DOCTYPE html>
<html>
<head>
  <title>Service Command Post (Stable v5)</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      background:#111827;
      padding:12px;
      border-radius:10px;
      border:1px solid #1f2937;
      min-height:220px;
    }

    .title {
      font-size:16px;
      font-weight:bold;
    }

    .tag {
      font-size:12px;
      color:#94a3b8;
    }

    .section {
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row {
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:3px 0;
    }

    .good { color:#22c55e; }
    .bad { color:#ef4444; }
    .warn { color:#f59e0b; }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Weekend View - Stable)
  <button onclick="load()" style="background:#3b82f6;border:none;color:white;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* =========================
   SAFE DATE PARSING (CRITICAL FIX)
========================= */
function safeDate(d) {
  return new Date(`${d}T00:00:00`);
}

/* =========================
   WEEKEND FILTER
========================= */
function isWeekend(dateStr) {
  const d = safeDate(dateStr);
  const day = d.getDay();
  return day === 0 || day === 6;
}

/* =========================
   WEEK GROUP (2 WEEKENDS ONLY)
========================= */
function getWeekStart(dateStr) {
  const d = safeDate(dateStr);
  const day = d.getDay();

  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(d.setDate(diff));

  return monday.toISOString().split("T")[0];
}

/* =========================
   LOAD COMMAND POST
========================= */
async function load() {

  const [
    servicesRes,
    rolesRes,
    staffRes,
    attendanceRes,
    availabilityRes
  ] = await Promise.all([
    db.from("services").select(`
      *,
      service_slots(label,time,location,id)
    `),

    db.from("service_roles").select(`*, staff(name)`),

    db.from("staff").select("*"),

    db.from("service_attendance").select("*"),

    db.from("staff_availability").select("*").eq("status","unavailable")
  ]);

  let services = servicesRes.data || [];
  const roles = rolesRes.data || [];
  const staff = staffRes.data || [];
  const attendanceList = attendanceRes.data || [];
  const unavailableList = availabilityRes.data || [];

  /* =========================
     FIX 1: ONLY CURRENT + FUTURE WINDOW (PREVENT 2027 BUG)
  ========================= */
  const today = new Date();
  const min = new Date(today);
  const max = new Date(today);
  max.setDate(today.getDate() + 60);

  services = services.filter(s => {
    const d = safeDate(s.service_date);
    return d >= min && d <= max;
  });

  /* =========================
     FIX 2: WEEKEND ONLY
  ========================= */
  services = services.filter(s => isWeekend(s.service_date));

  /* =========================
     FIX 3: ONLY 2 WEEKENDS
  ========================= */
  const grouped = {};

  services.forEach(s => {
    const key = getWeekStart(s.service_date);
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(s);
  });

  services = Object.values(grouped).slice(0, 2).flat();

  /* =========================
     RENDER
  ========================= */
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (const s of services) {

    const slot = s.service_slots || {};

    const serviceRoles = roles.filter(r => r.service_id === s.id);

    const assignedIds = new Set(
      serviceRoles.map(r => r.staff_id).filter(Boolean)
    );

    const unavailableIds = new Set(
      unavailableList
        .filter(a =>
          a.service_date === s.service_date &&
          a.service_slot_id === s.service_slot_id
        )
        .map(a => a.staff_id)
    );

    const availableStaff = staff.filter(st => !unavailableIds.has(st.id));

    const floating = availableStaff.length - assignedIds.size;

    const attendance =
      attendanceList.find(a => a.service_id === s.id) || {};

    const total =
      (attendance.onsite || 0) +
      (attendance.online || 0) +
      (attendance.communicants || 0);

    const d = safeDate(s.service_date);

    const day = d.toLocaleDateString("en-SG", { weekday:"long" });

    const datePretty = d.toLocaleDateString("en-SG", {
      day:"2-digit",
      month:"short",
      year:"numeric"
    });

    grid.innerHTML += `
      <div class="card">

        <div class="title">
          ${slot.label || "Service"}
        </div>

        <div class="tag">
          ${day} | ${datePretty}
        </div>

        <div class="tag">
          ⏰ ${slot.time || ""}
        </div>

        <div class="tag">
          📍 ${slot.location || ""}
        </div>

        <div class="section">
          <b>Staff Summary</b>

          <div class="row">
            <span>Available</span>
            <b>${availableStaff.length}</b>
          </div>

          <div class="row">
            <span>Assigned</span>
            <b>${assignedIds.size}</b>
          </div>

          <div class="row">
            <span>Floating</span>
            <b class="${floating < 0 ? 'bad' : 'good'}">${floating}</b>
          </div>
        </div>

        <div class="section">
          <b>Key Appointments</b>

          ${serviceRoles
            .filter(r => ["Service Pastor","Anchor","Welcome IC","Hospitality Cell"].includes(r.role))
            .map(r => `
              <div class="row">
                <span>${r.role}</span>
                <b>${r.staff?.name || "-"}</b>
              </div>
            `).join("")}
        </div>

        <div class="section">
          <b>Welcome Team</b>

          ${serviceRoles
            .filter(r => ["Welcome 1","Welcome 2","Plaza 1","Plaza 2"].includes(r.role))
            .map(r => `
              <div class="row">
                <span>${r.role}</span>
                <span>${r.staff?.name || "-"}</span>
              </div>
            `).join("")}
        </div>

        ${s.is_communion_service ? `
        <div class="section">
          <b>Holy Communion</b>

          ${serviceRoles
            .filter(r =>
              r.role.includes("Station") ||
              r.role === "Standby" ||
              r.role === "Min Deaf"
            )
            .map(r => `
              <div class="row">
                <span>${r.role}</span>
                <span>${r.staff?.name || "-"}</span>
              </div>
            `).join("")}
        </div>
        ` : ""}

        <div class="section">
          <b>Attendance</b>

          <div class="row">
            <span>Total</span>
            <b>${total}</b>
          </div>
        </div>

      </div>
    `;
  }
}

/* IMPORTANT FIX */
window.load = load;

load();

</script>

</body>
</html>
