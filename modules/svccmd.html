<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Restored Stable)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .title{
      color:#fbbf24;
      font-weight:bold;
      margin-bottom:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:6px 0;
      gap:6px;
    }

    .role{ flex:1; }

    .staff{
      min-width:90px;
      text-align:right;
      font-weight:bold;
      color:#22c55e;
    }

    button{
      font-size:10px;
      padding:3px 6px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }

    select{
      width:100%;
      margin-top:8px;
      padding:6px;
      border-radius:6px;
    }

    .panel{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
    }

    .danger{
      background:#ef4444;
      width:100%;
      margin-top:10px;
      padding:6px;
      color:white;
      border:none;
      border-radius:6px;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#111827;
      padding:20px;
      border-radius:10px;
      width:360px;
    }
  </style>
</head>

<body>

<header>
  Command Post
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- ASSIGN -->
<div class="modal" id="assignModal">
  <div class="modal-content">

    <div id="assignTitle">Assign</div>

    <select id="staffSelect"></select>

    <button onclick="saveAssign()">Save</button>
  </div>
</div>

<script type="module">

import { db } from "../assets/app.js";

/* ================= DATA ================= */
let services = [];
let staff = [];
let templateRoles = [];
let serviceRoles = [];
let availability = [];

let currentServiceId = null;
let currentRole = null;

/* ================= LOAD ================= */
async function load(){

  const [s, st, tr, sr, av] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("staff").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("service_roles").select("*"),
    db.from("staff_availability").select("*")
  ]);

  services = s.data || [];
  staff = st.data || [];
  templateRoles = tr.data || [];
  serviceRoles = sr.data || [];
  availability = av.data || [];

  render();
}

/* ================= STAFF JOIN (FIXED CORE ISSUE) ================= */
function getStaffName(serviceId, role){

  const matches = serviceRoles
    .filter(r =>
      String(r.service_id) === String(serviceId) &&
      (r.role || "").toLowerCase() === (role || "").toLowerCase()
    )
    .sort((a,b)=>
      new Date(b.created_at || 0) - new Date(a.created_at || 0)
    );

  const latest = matches[0];

  if(!latest) return "-";

  const s = staff.find(x =>
    String(x.id) === String(latest.staff_id)
  );

  return s?.name || "-";
}

/* ================= FILTER ================= */
function inRange(dateStr){

  const d = new Date(dateStr);
  const now = new Date();

  const min = new Date(now);
  min.setDate(now.getDate()-8);

  const max = new Date(now);
  max.setDate(now.getDate()+8);

  return d >= min && d <= max;
}

/* ================= RENDER ================= */
function render(){

  const sat=[], s830=[], s1045=[], jurong=[];

  services
    .filter(s => inRange(s.service_date))
    .forEach(s => {

      const t = (s.service_slots?.time || "").toLowerCase();
      const loc = (s.service_slots?.location || "").toLowerCase();

      // IMPORTANT: Jurong FIRST (fix bug you had)
      if(loc.includes("jurong")){
        jurong.push(s);
      }
      else if(t.includes("14") || t.includes("2:30")){
        sat.push(s);
      }
      else if(t.includes("08")){
        s830.push(s);
      }
      else if(t.includes("10:45")){
        s1045.push(s);
      }
    });

  document.getElementById("grid").innerHTML = `
    <div class="col">
      <div class="title">Saturday 2.30pm</div>
      ${sat.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday 8.30am</div>
      ${s830.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday 10.45am</div>
      ${s1045.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday Jurong</div>
      ${jurong.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Availability (60 Days)</div>
      ${availabilityPanel()}
    </div>
  `;
}

/* ================= CARD ================= */
function card(s){

  const roles = templateRoles.filter(r =>
    String(r.template_id) === String(s.service_template_id)
  );

  const isComm = s.is_communion_service === true;

  const filtered = isComm
    ? roles
    : roles.filter(r =>
        !(r.role || "").toLowerCase().includes("communion")
      );

  return `
    <div class="card">

      <div><b>${s.service_slots?.label}</b></div>
      <div style="font-size:11px;color:#94a3b8">${s.service_date}</div>

      ${filtered.map(r => `
        <div class="row">

          <div class="role">${r.role}</div>

          <div class="staff">
            ${getStaffName(s.id, r.role)}
          </div>

          <button onclick="openAssign('${s.id}','${r.role}')">
            Assign
          </button>

        </div>
      `).join("")}

    </div>
  `;
}

/* ================= 5th COLUMN ================= */
function availabilityPanel(){

  const dates = [...new Set(
    services.map(s => s.service_date)
  )].sort();

  return `
    <div class="panel">

      <select id="dateSel" onchange="loadServices()">
        ${dates.map(d=>`<option value="${d}">${d}</option>`).join("")}
      </select>

      <select id="serviceSel" onchange="loadStaff()"></select>

      <select id="staffSel"></select>

      <button class="danger" onclick="markUnavailable()">
        Mark Unavailable
      </button>

    </div>
  `;
}

/* ================= ASSIGN ================= */
window.openAssign = function(serviceId, role){

  currentServiceId = serviceId;
  currentRole = role;

  const eligible = staff;

  document.getElementById("staffSelect").innerHTML =
    eligible.map(s =>
      `<option value="${s.id}">${s.name}</option>`
    ).join("");

  document.getElementById("assignModal").style.display="flex";
};

window.saveAssign = async function(){

  const staffId = document.getElementById("staffSelect").value;

  await db.from("service_roles").upsert({
    service_id: currentServiceId,
    role: currentRole,
    staff_id: staffId
  },{
    onConflict:"service_id,role"
  });

  await load();
  document.getElementById("assignModal").style.display="none";
};

/* ================= INIT ================= */
window.load = load;
load();

</script>

</body>
</html>
