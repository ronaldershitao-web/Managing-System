<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Full Ops + Availability Control)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
      height:520px;
      display:flex;
      flex-direction:column;
    }

    .panel{
      background:#111827;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .panel-title{
      font-size:13px;
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:8px;
    }

    .appointment-panel{
      margin-top:12px;
      background:#111827;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
      gap:8px;
      align-items:center;
    }

    .good{color:#22c55e;font-weight:bold;}
    .bad{color:#ef4444;font-weight:bold;}

    .group-title{
      color:#fbbf24;
      font-weight:bold;
      margin-top:10px;
      border-top:1px solid #334155;
      padding-top:6px;
    }

    button.small{
      font-size:10px;
      padding:2px 6px;
      border:none;
      border-radius:4px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .modal-content{
      background:#111827;
      padding:20px;
      border-radius:10px;
      width:360px;
      border:1px solid #334155;
    }

    select, input, button{
      width:100%;
      padding:8px;
      margin-top:10px;
      border-radius:6px;
      border:none;
    }

    .save{background:#22c55e;color:white;}
    .danger{background:#ef4444;color:white;}
    .secondary{background:#334155;color:white;}
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Full Ops + Availability Control)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- MODALS -->
<div class="modal" id="assignModal">
  <div class="modal-content">
    <div id="modalTitle">Assign</div>
    <select id="staffSelect"></select>
    <button class="save" onclick="saveAssign()">Assign</button>
    <button class="secondary" onclick="closeAssignModal()">Close</button>
  </div>
</div>

<script type="module">
import { db } from "../assets/app.js";

let staffList=[], templates=[], availability=[];
let serviceMap=new Map(), staffMap=new Map();
let roleMap=new Map(), hospitalityMap=new Map();
let attendanceMap=new Map();

let currentService=null, currentRole=null;

/* ================= LOAD ================= */

async function load(){

  const [servicesRes, templatesRes, availRes, staffRes, rolesRes, templateRolesRes, hospRes, peopleRes, attRes] =
  await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("staff").select("*"),
    db.from("service_roles").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("hospitality_duty").select("*"),
    db.from("people").select("*"),
    db.from("service_attendance_metrics").select("*")
  ]);

  const services = servicesRes.data || [];
  staffList = staffRes.data || [];
  templates = templatesRes.data || [];
  availability = availRes.data || [];

  serviceMap = new Map(services.map(s => [String(s.id), s]));
  staffMap = new Map(staffList.map(s => [String(s.id), s.name]));
  hospitalityMap = new Map((hospRes.data||[]).map(h=>[String(h.service_id),h]));
  attendanceMap = new Map((attRes.data||[]).map(a=>[String(a.service_id),a]));

  roleMap.clear();
  (rolesRes.data||[]).forEach(r=>{
    const k=String(r.service_id);
    if(!roleMap.has(k)) roleMap.set(k,[]);
    roleMap.get(k).push(r);
  });

  const grid=document.getElementById("grid");
  grid.innerHTML="";

  services.forEach(s=>{

    const roles = roleMap.get(String(s.id))||[];

    const appointments = roles.map(r=>({
      role:r.role,
      staffId:r.staff_id,
      name:staffMap.get(String(r.staff_id))||"-"
    }));

    const hosp = hospitalityMap.get(String(s.id));
    const att = attendanceMap.get(String(s.id))||{};

    const html = `
    <div class="col">

      <div class="panel">
        <div class="panel-title">Service</div>
        <div>${s.service_slots?.label||""}</div>
      </div>

      <div class="panel">
        <div class="panel-title">Attendance</div>
        <div class="row">Onsite <span>${att.onsite_count||0}</span></div>
        <div class="row">Online <span>${att.online_count||0}</span></div>
      </div>

      <div class="panel">
        <div class="panel-title">Hospitality</div>
        <div>${hosp?.leader||"Not Assigned"}</div>
      </div>

      <div class="appointment-panel">
        <b>Appointments</b>
        ${appointments.map(a=>`
          <div class="row">
            <span>${a.role}</span>
            <span>
              ${a.name}
              <button class="small"
                onclick="openAssign('${s.id}','${a.role}')">
                Assign
              </button>
            </span>
          </div>
        `).join("")}
      </div>

    </div>`;

    grid.innerHTML += html;
  });
}

/* ================= ASSIGN ================= */

window.openAssign=function(serviceId,role){
  currentService=serviceId;
  currentRole=role;

  document.getElementById("staffSelect").innerHTML=
    staffList.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");

  document.getElementById("assignModal").style.display="flex";
};

window.saveAssign=async function(){
  const staffId=document.getElementById("staffSelect").value;

  await db.from("service_roles").upsert({
    service_id:currentService,
    role:currentRole,
    staff_id:staffId
  },{onConflict:"service_id,role"});

  closeAssignModal();
  load();
};

window.closeAssignModal=function(){
  document.getElementById("assignModal").style.display="none";
};

window.load=load;
load();

</script>

</body>
</html>
