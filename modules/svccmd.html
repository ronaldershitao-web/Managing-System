<!DOCTYPE html>
<html>
<head>
  <title>Command Post (4 Column + Template System)</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      padding:10px;
    }

    .col {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:200px;
    }

    .card {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:10px;
    }

    .title {
      font-weight:bold;
      color:#60a5fa;
    }

    .tag {
      font-size:12px;
      color:#94a3b8;
    }

    .section {
      margin-top:8px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row {
      display:flex;
      justify-content:space-between;
      font-size:12px;
    }

    .good { color:#22c55e; }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Template 4-Column View)
  <button onclick="load()" style="background:#3b82f6;color:white;border:none;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* =========================
   DATE SAFE
========================= */
function parseDate(d) {
  const [y,m,day] = d.split("-");
  return new Date(Number(y), Number(m)-1, Number(day));
}

/* =========================
   WINDOW FILTER
========================= */
function inWindow(dateStr) {
  const today = new Date();

  const min = new Date(today);
  min.setDate(today.getDate() - 7);

  const max = new Date(today);
  max.setDate(today.getDate() + 7);

  const d = parseDate(dateStr);

  return d >= min && d <= max;
}

/* =========================
   SLOT INDEX
========================= */
function getSlotIndex(s) {
  const t = (s.service_slots?.time || "").toLowerCase();
  const l = (s.service_slots?.location || "").toLowerCase();

  const text = `${t} ${l}`;

  if (text.includes("sat") || text.includes("14:30")) return 0;
  if (text.includes("8.30") || text.includes("0830")) return 1;
  if (text.includes("10.45") || text.includes("1045")) return 2;
  if (text.includes("jurong")) return 3;

  return -1;
}

/* =========================
   LOAD
========================= */
async function load() {

  const [
    servicesRes,
    templateStaffRes
  ] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location)`),
    db.from("staff_service_templates").select("staff_id, template_id")
  ]);

  let services = servicesRes.data || [];
  const templateStaff = templateStaffRes.data || [];

  /* FILTER WINDOW */
  services = services.filter(s => inWindow(s.service_date));

  /* SPLIT INTO 4 COLUMNS */
  const cols = [[],[],[],[]];

  for (const s of services) {
    const idx = getSlotIndex(s);
    if (idx >= 0) cols[idx].push(s);
  }

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  /* RENDER COLUMNS */
  cols.forEach(col => {

    grid.innerHTML += `
      <div class="col">
        ${col.map(s => {

          const assigned = templateStaff.filter(
            t => t.template_id === s.service_template_id
          );

          const totalAssigned = new Set(
            assigned.map(a => a.staff_id)
          ).size;

          const d = parseDate(s.service_date);

          const day = d.toLocaleDateString("en-SG",{weekday:"long"});
          const date = d.toLocaleDateString("en-SG",{day:"2-digit", month:"short"});

          return `
            <div class="card">

              <div class="title">
                ${s.service_slots?.label || "Service"}
              </div>

              <div class="tag">
                ${day} | ${date}
              </div>

              <div class="tag">
                ⏰ ${s.service_slots?.time || ""}
              </div>

              <div class="section">
                <b>Total Staff Assigned</b>

                <div class="row">
                  <span>Assigned</span>
                  <b class="good">${totalAssigned}</b>
                </div>
              </div>

            </div>
          `;
        }).join("")}
      </div>
    `;
  });
}

window.load = load;
load();

</script>

</body>
</html>
