<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Full Ops + Availability Control)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
      height:520px;
      display:flex;
      flex-direction:column;
    }

    .panel{
      background:#111827;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .panel-title{
      font-size:13px;
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:8px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
      gap:8px;
      align-items:center;
    }

    .good{ color:#22c55e; font-weight:bold; }
    .bad{ color:#ef4444; font-weight:bold; cursor:pointer; }

    .group-title{
      color:#fbbf24;
      font-weight:bold;
      margin-top:12px;
      border-top:1px solid #334155;
      padding-top:6px;
    }

    button.small{
      font-size:10px;
      padding:2px 6px;
      border-radius:4px;
      border:none;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    .appointment-panel{
      margin-top:10px;
      background:#111827;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
    }

    select, input, button{
      width:100%;
      padding:8px;
      margin-top:8px;
      border-radius:6px;
      border:none;
    }

    .danger{ background:#ef4444; color:white; }
    .save{ background:#22c55e; color:white; }

    /* FIX: make staff summary stack properly */
    .stack{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Full Ops + Availability Control)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- MODALS -->
<div class="modal" id="assignModal" style="display:none">
  <div class="modal-content">
    <div id="modalTitle"></div>
    <select id="staffSelect"></select>
    <button class="save" onclick="saveAssign()">Assign</button>
    <button onclick="closeAssignModal()">Close</button>
  </div>
</div>

<div class="modal" id="unavailableModal" style="display:none">
  <div class="modal-content">
    <h3>Unavailable</h3>
    <div id="unavailableList"></div>
  </div>
</div>

<script type="module">
import { db } from "../assets/app.js";

let staffList = [];
let templates = [];
let availability = [];
let availabilityServices = [];
let people = [];

let roleMap = new Map();
let templateMap = new Map();
let staffMap = new Map();
let hospitalityMap = new Map();
let attendanceMap = new Map();

let currentService = null;
let currentRole = null;

/* ================= LOAD ================= */
async function load(){

  const [
    servicesRes,
    templateRes,
    availRes,
    staffRes,
    rolesRes,
    templateRolesRes,
    hospitalityRes,
    peopleRes,
    attendanceRes
  ] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location)`),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("staff").select("*"),
    db.from("service_roles").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("hospitality_duty").select("*"),
    db.from("people").select("*"),
    db.from("service_attendance_metrics").select("*")
  ]);

  const services = servicesRes.data || [];
  staffList = staffRes.data || [];
  templates = templateRes.data || [];
  availability = availRes.data || [];
  people = peopleRes.data || [];

  staffMap = new Map(staffList.map(s => [String(s.id), s.name]));
  hospitalityMap = new Map((hospitalityRes.data || []).map(h => [String(h.service_id), h]));
  attendanceMap = new Map((attendanceRes.data || []).map(a => [String(a.service_id), a]));

  /* role map */
  roleMap.clear();
  (rolesRes.data || []).forEach(r=>{
    const k = String(r.service_id);
    if(!roleMap.has(k)) roleMap.set(k,[]);
    roleMap.get(k).push(r);
  });

  /* template map */
  templateMap.clear();
  templates.forEach(t=>{
    const k = String(t.template_id);
    if(!templateMap.has(k)) templateMap.set(k,[]);
    templateMap.get(k).push(t);
  });

  render(services);
}

/* ================= RENDER ================= */
function render(services){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const cols = [[],[],[],[],[]];

  services.forEach(s=>{
    const t = (s.service_slots?.time||"").replace(":","");
    const loc = (s.service_slots?.location||"").toLowerCase();

    let i = -1;
    if(t.includes("1430")) i=0;
    else if(t.includes("0830")) i=1;
    else if(t.includes("1045") && !loc.includes("jurong")) i=2;
    else i=3;

    if(i>=0) cols[i].push(s);
  });

  /* 5th column */
  cols[4] = services.filter(s => s);

  cols.forEach(col=>{
    const div = document.createElement("div");
    div.className="col";

    div.innerHTML = col.map(renderServiceCard).join("");
    grid.appendChild(div);
  });
}

/* ================= SERVICE CARD ================= */
function renderServiceCard(s){

  const roles = roleMap.get(String(s.id)) || [];
  const template = templateMap.get(String(s.service_template_id)) || [];

  const appointments = template.map(t=>{

    const role = t.role;
    const match = roles.find(r => r.role === role);

    const staffId = match?.staff_id || t.staff_id || "";
    const name = staffMap.get(String(staffId)) || "-";

    return `
      <div class="row">
        <span>${role}</span>
        <span>
          ${name}
          <button class="small" onclick="openAssign('${s.id}','${role}')">Assign</button>
        </span>
      </div>
    `;
  }).join("");

  const hosp = hospitalityMap.get(String(s.id));
  const att = attendanceMap.get(String(s.id)) || {};

  return `
    <div class="card">

      <div class="panel-title">${s.service_slots?.label}</div>

      <div class="panel">
        ${appointments}
      </div>

      <div class="panel stack">
        <div class="panel-title">Staff Summary</div>
        <div>Total Assigned: ${roles.length}</div>
      </div>

      <div class="panel">
        <div class="panel-title">Hospitality</div>
        <div>${hosp?.leader || "Not Assigned"}</div>
      </div>

    </div>
  `;
}

/* ================= ASSIGN ================= */
window.openAssign = function(serviceId, role){

  currentService = serviceId;
  currentRole = role;

  document.getElementById("assignModal").style.display="block";
  document.getElementById("modalTitle").innerText="Assign "+role;

  document.getElementById("staffSelect").innerHTML =
    staffList.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");
};

window.saveAssign = async function(){

  await db.from("service_roles").upsert({
    service_id: currentService,
    role: currentRole,
    staff_id: document.getElementById("staffSelect").value
  },{ onConflict:"service_id,role" });

  load();
};

window.closeAssignModal = ()=> {
  document.getElementById("assignModal").style.display="none";
};

window.load = load;
load();

</script>

</body>
</html>
