<!DOCTYPE html>
<html>
<head>
  <title>Service Command Center (Clean + Modal Assignment)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .title{
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:6px 0;
      align-items:center;
    }

    .role{ flex:1; }
    .staff{ color:#22c55e; font-weight:bold; }

    button{
      font-size:11px;
      padding:6px 8px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
      width:100%;
      margin-top:8px;
    }

    .danger{ background:#ef4444; }

    /* ================= MODAL ================= */
    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      display:none;
      align-items:center;
      justify-content:center;
    }

    .modalBox{
      width:420px;
      max-height:80vh;
      background:#111827;
      border:1px solid #334155;
      border-radius:10px;
      padding:12px;
      overflow:auto;
    }

    .chip{
      padding:6px;
      margin:4px 0;
      border:1px solid #334155;
      border-radius:6px;
      cursor:pointer;
      font-size:12px;
    }

    .chip:hover{
      background:#1e293b;
    }

    .selectedRole{
      background:#1d4ed8;
    }
  </style>
</head>

<body>

<header>
  Service Command Center
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- ================= MODAL ================= -->
<div id="modal" class="modal">
  <div class="modalBox">
    <div id="modalContent"></div>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services=[], staffList=[], templateRoles=[], serviceRoles=[], staffTemplates=[];
let staffMap={}, roleMap={}, poolMap={};

let activeService=null;

/* ================= LOAD ================= */
async function load(){

  const [s, st, tr, sr, tpl] = await Promise.all([
    db.from("services").select("* , service_slots(label,time,location)").order("service_date",{ascending:true}),
    db.from("staff").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("service_roles").select("*"),
    db.from("staff_service_templates").select("*")
  ]);

  services=s.data||[];
  staffList=st.data||[];
  templateRoles=tr.data||[];
  serviceRoles=sr.data||[];
  staffTemplates=tpl.data||[];

  staffMap=Object.fromEntries(staffList.map(s=>[String(s.id),s.name]));

  roleMap={};
  serviceRoles.forEach(r=>{
    const key=`${r.service_id}_${r.role?.toLowerCase()}`;
    if(!roleMap[key] || new Date(r.created_at)>new Date(roleMap[key].created_at)){
      roleMap[key]=r;
    }
  });

  poolMap={};
  staffTemplates.forEach(t=>{
    if(!poolMap[t.template_id]) poolMap[t.template_id]=[];
    poolMap[t.template_id].push({
      id:t.staff_id,
      name:staffMap[t.staff_id]||"Unknown"
    });
  });

  render();
}

/* ================= ROLES ================= */
function getRoles(service){
  let roles=templateRoles.filter(r=>
    String(r.template_id)===String(service.service_template_id)
  );

  if(service.is_communion_service===false){
    roles=roles.filter(r=>r.is_communion_role!==true);
  }

  return roles;
}

/* ================= ASSIGNED ================= */
function getAssigned(serviceId,role){
  const key=`${serviceId}_${role?.toLowerCase()}`;
  return roleMap[key]?staffMap[roleMap[key].staff_id]:"-";
}

/* ================= OPEN MODAL ================= */
window.openAssign=function(serviceId){

  activeService=services.find(s=>String(s.id)===String(serviceId));
  if(!activeService)return;

  const roles=getRoles(activeService);
  const pool=poolMap[activeService.service_template_id]||[];

  document.getElementById("modal").style.display="flex";

  document.getElementById("modalContent").innerHTML=`
    <h3>${activeService.service_slots?.label}</h3>

    <div style="font-size:12px;color:#94a3b8;margin-bottom:10px">
      ${activeService.service_date}
    </div>

    <b>Assign Roles</b>

    ${roles.map(r=>`
      <div class="chip" onclick="assign('${activeService.id}','${r.role}')">
        Assign ${r.role}
      </div>
    `).join("")}

    <hr>

    <b>Staff Pool</b>
    ${pool.map(p=>`
      <div class="chip">
        ${p.name}
      </div>
    `).join("")}
  `;
};

window.closeModal=function(){
  document.getElementById("modal").style.display="none";
};

/* ================= ASSIGN ================= */
window.assign=async function(serviceId,role){

  const staffId=prompt("Enter staff ID (demo selection)");

  if(!staffId)return;

  await db.from("service_roles").insert({
    service_id:serviceId,
    role:role,
    staff_id:staffId
  });

  await load();
  openAssign(serviceId);
};

/* ================= CARD ================= */
function card(service){

  const roles=getRoles(service);

  return `
    <div class="card">

      <b>${service.service_slots?.label}</b>

      <div style="font-size:11px;color:#94a3b8">
        ${service.service_date}
      </div>

      ${roles.map(r=>`
        <div class="row">
          <div class="role">${r.role}</div>
          <div class="staff">${getAssigned(service.id,r.role)}</div>
        </div>
      `).join("")}

      <button onclick="openAssign('${service.id}')">
        Assign Staff
      </button>

    </div>
  `;
}

/* ================= RENDER ================= */
function render(){

  const cols={sat:[],s1:[],s2:[],jurong:[]};

  services.forEach(s=>{

    const t=(s.service_slots?.time||"").toLowerCase();
    const l=(s.service_slots?.location||"").toLowerCase();

    if(l.includes("jurong")) cols.jurong.push(s);
    else if(t.includes("14")) cols.sat.push(s);
    else if(t.includes("08")) cols.s1.push(s);
    else cols.s2.push(s);
  });

  grid.innerHTML=`
    <div class="col"><div class="title">Sat</div>${cols.sat.map(card).join("")}</div>
    <div class="col"><div class="title">8.30</div>${cols.s1.map(card).join("")}</div>
    <div class="col"><div class="title">10.45</div>${cols.s2.map(card).join("")}</div>
    <div class="col"><div class="title">Jurong</div>${cols.jurong.map(card).join("")}</div>
    <div class="col"><div class="title">Inspector stays separate (not removed)</div></div>
  `;
}

window.load=load;
load();

</script>

</body>
</html>
