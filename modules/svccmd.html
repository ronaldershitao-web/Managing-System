<!DOCTYPE html>
<html>
<head>
  <title>SVCCMD Full Restore</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      font-weight:bold;
      align-items:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .panel{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .title{
      color:#fbbf24;
      font-weight:bold;
      margin-bottom:6px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
    }

    button{
      font-size:11px;
      padding:4px 6px;
      background:#3b82f6;
      color:white;
      border:none;
      border-radius:4px;
      cursor:pointer;
    }

    .good{color:#22c55e;font-weight:bold;}
    .bad{color:#ef4444;font-weight:bold;}
  </style>
</head>

<body>

<header>
  ⛪ SVCCMD Full Restore System
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staffList = [];
let templates = [];
let roles = [];

let staffMap = new Map();
let roleMap = new Map();

/* ================= HELPERS ================= */

function parseDate(d){
  const [y,m,day] = d.split("-");
  return new Date(y,m-1,day);
}

function formatDate(d){
  return parseDate(d)
    .toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
}

function inServiceWindow(d){
  const dt = parseDate(d);
  const now = new Date();
  const min = new Date(); min.setDate(now.getDate()-8);
  const max = new Date(); max.setDate(now.getDate()+8);
  return dt >= min && dt <= max;
}

/* ================= LOAD ================= */

async function load(){

  const [sRes, staffRes, tRes, rRes] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("staff").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("service_roles").select("*")
  ]);

  services = sRes.data || [];
  staffList = staffRes.data || [];
  templates = tRes.data || [];
  roles = rRes.data || [];

  staffMap = new Map(staffList.map(s => [String(s.id), s.name]));

  roleMap.clear();
  roles.forEach(r=>{
    const key = String(r.service_id);
    if(!roleMap.has(key)) roleMap.set(key,[]);
    roleMap.get(key).push(r);
  });

  render();
}

/* ================= MAIN RENDER ================= */

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const filtered = services
    .filter(s => inServiceWindow(s.service_date))
    .sort((a,b)=>parseDate(a.service_date)-parseDate(b.service_date));

  const cols = [[],[],[],[]];

  filtered.forEach(s=>{
    const t = (s.service_slots?.time || "").replace(":","");
    const loc = (s.service_slots?.location || "").toLowerCase();

    if(t.includes("1430")) cols[0].push(s);
    else if(t.includes("0830")) cols[1].push(s);
    else if(t.includes("1045") && !loc.includes("jurong")) cols[2].push(s);
    else cols[3].push(s);
  });

  const labels = [
    "Saturday 2:30pm",
    "Sunday 8:30am",
    "Sunday 10:45am",
    "Sunday Jurong"
  ];

  cols.forEach((col,i)=>{

    grid.innerHTML += `
      <div class="col">
        <h3>${labels[i]}</h3>
        ${col.map(renderService).join("")}
      </div>
    `;
  });

  renderAvailability();
}

/* ================= SERVICE (FIXED APPOINTMENTS) ================= */

function renderService(s){

  const serviceId = String(s.id);

  // TEMPLATE (STRUCTURE)
  const templateRoles =
    templates.filter(t =>
      String(t.template_id) === String(s.service_template_id)
    );

  // ASSIGNED (DATA)
  const assigned =
    roleMap.get(serviceId) || [];

  const assignedMap = new Map(
    assigned.map(a => [String(a.role||"").toLowerCase(), a])
  );

  // MERGE (CRITICAL FIX)
  const merged = templateRoles.map(t => {

    const role = t.role || "";

    const match = assignedMap.get(role.toLowerCase());

    return {
      role,
      staffId: match?.staff_id || null
    };
  });

  return `
    <div class="panel">

      <div class="title">
        ${formatDate(s.service_date)}
      </div>

      ${merged.map(r=>`
        <div class="row">
          <span>${r.role}</span>
          <span>${staffMap.get(String(r.staffId)) || "-"}</span>
        </div>
      `).join("")}

      <button onclick="openAssign('${s.id}')">
        Assign
      </button>

    </div>
  `;
}

/* ================= AVAILABILITY ================= */

function renderAvailability(){

  const col = document.createElement("div");
  col.className = "col";

  const now = new Date();
  const max = new Date();
  max.setDate(now.getDate()+60);

  const list = services.filter(s=>{
    const dt = parseDate(s.service_date);
    return dt >= now && dt <= max;
  });

  col.innerHTML = `
    <h3>Availability (60 Days)</h3>

    <select id="serviceSelect"></select>
    <select id="staffSelect"></select>

    <button onclick="markUnavailable()">Mark Unavailable</button>
  `;

  document.getElementById("grid").appendChild(col);

  setTimeout(()=>{

    const sel = document.getElementById("serviceSelect");

    sel.innerHTML = list.map(s=>`
      <option value="${s.id}">
        ${s.service_slots?.label}
      </option>
    `).join("");

    window.refreshStaff = function(){

      document.getElementById("staffSelect").innerHTML =
        staffList.map(s=>`
          <option value="${s.id}">${s.name}</option>
        `).join("");
    };

    sel.onchange = refreshStaff;
    refreshStaff();

  },100);
}

/* ================= GLOBAL ================= */

window.load = load;

window.openAssign = async function(serviceId){

  const role = prompt("Role?");
  const staffId = prompt("Staff ID?");

  await db.from("service_roles").upsert({
    service_id: serviceId,
    role,
    staff_id: staffId
  });

  load();
};

window.markUnavailable = async function(){

  const staffId = document.getElementById("staffSelect").value;
  const serviceId = document.getElementById("serviceSelect").value;

  const service = services.find(s=>String(s.id)===String(serviceId));

  await db.from("staff_availability").upsert({
    staff_id: staffId,
    service_date: service.service_date,
    service_slot_id: service.service_slot_id,
    status:"unavailable"
  });

  load();
};

load();

</script>

</body>
</html>
