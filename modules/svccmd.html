<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Fixed Staff Names)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      font-weight:bold;
      align-items:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:10px;
    }

    .title{
      color:#60a5fa;
      font-weight:bold;
    }

    .tag{
      font-size:12px;
      color:#94a3b8;
    }

    .section{
      margin-top:8px;
      border-top:1px solid #1f2937;
      padding-top:8px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:3px 0;
    }

    .good{ color:#22c55e; }
    .bad{ color:#ef4444; }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Staff Fix Final)
  <button onclick="load()" style="background:#3b82f6;border:none;color:white;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= DATE ================= */
function parseDate(d){
  if(!d) return new Date(0);
  const [y,m,day] = d.split("-");
  return new Date(+y, +m-1, +day);
}

/* ================= WINDOW ================= */
function inWindow(d){
  const today = new Date();
  const min = new Date(today);
  const max = new Date(today);

  min.setDate(today.getDate()-7);
  max.setDate(today.getDate()+7);

  const date = parseDate(d);
  return date >= min && date <= max;
}

/* ================= SLOT ORDER ================= */
function slotIndex(s){
  const t = (s.service_slots?.time || "").toLowerCase();
  const l = (s.service_slots?.location || "").toLowerCase();

  const txt = `${t} ${l}`;

  if(txt.includes("sat") || txt.includes("14:30")) return 0;
  if(txt.includes("8.30") || txt.includes("08:30")) return 1;
  if(txt.includes("10.45") || txt.includes("10:45")) return 2;
  if(txt.includes("jurong")) return 3;

  return -1;
}

/* ================= LOAD ================= */
async function load(){

  const { data: services } = await db
    .from("services")
    .select(`*, service_slots(label,time,location)`);

  const { data: roles } = await db
    .from("service_roles")
    .select(`
      id,
      role,
      service_id,
      staff_id,
      staff:staff_id (
        id,
        name
      )
    `);

  let list = services || [];
  const roleData = roles || [];

  list = list.filter(s => inWindow(s.service_date));

  list.sort((a,b) =>
    parseDate(a.service_date) - parseDate(b.service_date)
  );

  const cols = [[],[],[],[]];

  list.forEach(s=>{
    const i = slotIndex(s);
    if(i>=0) cols[i].push(s);
  });

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cols.forEach(col=>{

    grid.innerHTML += `
      <div class="col">

        ${col.map(s=>{

          const serviceRoles =
            roleData.filter(r => r.service_id === s.id);

          const d = parseDate(s.service_date);

          const day = d.toLocaleDateString("en-SG",{weekday:"long"});
          const date = d.toLocaleDateString("en-SG",{day:"2-digit",month:"short"});

          return `
            <div class="card">

              <div class="title">
                ${s.service_slots?.label || "Service"}
              </div>

              <div class="tag">
                ${day} | ${date}
              </div>

              <div class="tag">
                ⏰ ${s.service_slots?.time || ""}
              </div>

              <div class="section">
                <b>Key Appointments</b>

                ${["Service Pastor","Anchor","Welcome IC","Hospitality Cell"].map(role=>{

                  const found = serviceRoles.find(r => r.role === role);

                  return `
                    <div class="row">
                      <span>${role}</span>
                      <b>${found?.staff?.name || "-"}</b>
                    </div>
                  `;
                }).join("")}

              </div>

            </div>
          `;
        }).join("")}

      </div>
    `;
  });
}

window.load = load;
load();

</script>

</body>
</html>
