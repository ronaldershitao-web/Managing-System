<!DOCTYPE html>
<html>
<head>
  <title>Service Ops Board</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:14px;
      background:#111827;
      font-size:18px;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .title{
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .date{
      font-size:11px;
      color:#94a3b8;
      margin-bottom:8px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:11px;
      padding:4px 0;
      border-bottom:1px solid #1f2937;
      gap:10px;
    }

    .role{
      flex:1;
    }

    .staff{
      font-weight:bold;
      min-width:90px;
      text-align:right;
    }

    .assigned{
      color:#22c55e;
    }

    .missing{
      color:#ef4444;
    }
  </style>
</head>

<body>

<header>
  Service Ops Board
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

let services = [];
let templateRoles = [];
let serviceRoles = [];
let staffMap = {};

/* ================= LOAD ================= */
async function load(){

  const [
    s,
    tr,
    sr,
    st
  ] = await Promise.all([

    db.from("services")
      .select("* , service_slots(label,time,location)")
      .order("service_date", { ascending: true }),

    db.from("service_template_roles").select("*"),

    db.from("service_roles").select("*"),

    db.from("staff").select("*")
  ]);

  services = s.data || [];
  templateRoles = tr.data || [];
  serviceRoles = sr.data || [];

  staffMap = Object.fromEntries(
    (st.data || []).map(s => [s.id, s.name])
  );

  render();
}

/* ================= CORE ENGINE ================= */
function buildRoles(service){

  let roles = templateRoles.filter(r =>
    String(r.template_id) === String(service.service_template_id)
  );

  // communion rule
  if(!service.is_communion_service){
    roles = roles.filter(r =>
      !(r.role || "").toLowerCase().includes("communion")
    );
  }

  return roles.map(r => {

    const match = serviceRoles.find(a =>
      a.service_id === service.id &&
      (a.role || "").trim().toLowerCase() === (r.role || "").trim().toLowerCase()
    );

    return {
      role: r.role,
      staff: match ? (staffMap[match.staff_id] || "Unknown") : null
    };
  });
}

/* ================= GROUPING ================= */
function render(){

  const sat = [];
  const s830 = [];
  const s1045 = [];
  const jurong = [];

  services.forEach(s => {

    const label = (s.service_slots?.label || "").toLowerCase();
    const loc = (s.service_slots?.location || "").toLowerCase();

    if(loc.includes("jurong")) jurong.push(s);
    else if(label.includes("saturday")) sat.push(s);
    else if(label.includes("8.30")) s830.push(s);
    else if(label.includes("10.45")) s1045.push(s);
  });

  document.getElementById("grid").innerHTML = `

    <div class="col">
      <div class="title">Saturday Service</div>
      ${sat.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday 8.30am</div>
      ${s830.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday 10.45am</div>
      ${s1045.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday Jurong</div>
      ${jurong.map(card).join("")}
    </div>

  `;
}

/* ================= CARD ================= */
function card(service){

  const roles = buildRoles(service);

  return `
    <div class="card">

      <div><b>${service.service_slots?.label}</b></div>

      <div class="date">${service.service_date}</div>

      ${roles.map(r => `
        <div class="row">

          <div class="role">${r.role}</div>

          <div class="staff ${r.staff ? 'assigned' : 'missing'}">
            ${r.staff || "Unassigned"}
          </div>

        </div>
      `).join("")}

    </div>
  `;
}

load();
window.load = load;

</script>

</body>
</html>
