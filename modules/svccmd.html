<!DOCTYPE html>
<html>
<head>
  <title>Service Command Center (Fixed Modal Assignment)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
      display:flex;
      justify-content:space-between;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .title{
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:12px;
      margin:6px 0;
      gap:10px;
    }

    .role{ flex:1; }
    .staff{ color:#22c55e; font-weight:bold; }

    button{
      font-size:11px;
      padding:5px 8px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    /* ================= MODAL FIX ================= */
    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      display:none;
      align-items:center;
      justify-content:center;
    }

    .modalBox{
      width:360px;
      max-height:70vh;
      background:#111827;
      border:1px solid #334155;
      border-radius:10px;
      padding:12px;
      display:flex;
      flex-direction:column;
    }

    .modalHeader{
      font-weight:bold;
      margin-bottom:8px;
    }

    .staffList{
      overflow-y:auto;
      flex:1;
      border:1px solid #1f2937;
      border-radius:8px;
      padding:6px;
      margin-top:8px;
    }

    .chip{
      padding:6px;
      border-radius:6px;
      border:1px solid #334155;
      margin:4px 0;
      cursor:pointer;
      font-size:12px;
    }

    .chip:hover{
      background:#1e293b;
    }

    .selected{
      background:#1d4ed8;
      border-color:#60a5fa;
    }

    .danger{
      background:#ef4444;
      margin-top:8px;
      width:100%;
    }

    .assignInfo{
      font-size:12px;
      color:#93c5fd;
      margin-bottom:6px;
    }
  </style>
</head>

<body>

<header>
  Service Command Center
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- ================= MODAL ================= -->
<div class="modal" id="modal">
  <div class="modalBox">

    <div class="modalHeader" id="modalTitle">
      Assign Role
    </div>

    <div class="assignInfo" id="modalInfo"></div>

    <div class="staffList" id="staffList"></div>

    <button onclick="saveAssignment()">
      Save Assignment
    </button>

    <button class="danger" onclick="closeModal()">
      Close
    </button>

  </div>
</div>

<script type="module">

import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staffList = [];
let templateRoles = [];
let serviceRoles = [];
let staffTemplates = [];

let staffMap = {};
let roleMap = {};
let poolMap = {};

let modalState = {
  serviceId: null,
  role: null,
  selectedStaffId: null
};

/* ================= LOAD ================= */
async function load(){

  const [s, st, tr, sr, tpl] = await Promise.all([
    db.from("services").select("* , service_slots(label,time,location)")
      .order("service_date",{ascending:true}),
    db.from("staff").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("service_roles").select("*"),
    db.from("staff_service_templates").select("*")
  ]);

  services = s.data || [];
  staffList = st.data || [];
  templateRoles = tr.data || [];
  serviceRoles = sr.data || [];
  staffTemplates = tpl.data || [];

  staffMap = Object.fromEntries(
    staffList.map(s => [String(s.id), s.name])
  );

  rebuildRoleMap();
  rebuildPoolMap();

  render();
}

/* ================= ROLE MAP ================= */
function rebuildRoleMap(){

  roleMap = {};

  serviceRoles.forEach(r => {
    const key = `${r.service_id}_${r.role?.toLowerCase()}`;

    if(!roleMap[key] ||
      new Date(r.created_at) > new Date(roleMap[key].created_at)
    ){
      roleMap[key] = r;
    }
  });
}

/* ================= POOL ================= */
function rebuildPoolMap(){

  poolMap = {};

  staffTemplates.forEach(t => {

    if(!poolMap[t.template_id]) poolMap[t.template_id] = [];

    poolMap[t.template_id].push({
      id: t.staff_id,
      name: staffMap[t.staff_id] || "Unknown"
    });
  });
}

/* ================= ASSIGNED ================= */
function getAssigned(serviceId, role){

  const key = `${serviceId}_${role?.toLowerCase()}`;
  const match = roleMap[key];

  return match ? staffMap[match.staff_id] : "-";
}

/* ================= CARD ================= */
function card(service){

  const roles = templateRoles.filter(r =>
    String(r.template_id) === String(service.service_template_id)
  );

  return `
    <div class="card">
      <b>${service.service_slots?.label}</b>

      <div style="font-size:11px;color:#94a3b8">
        ${service.service_date}
      </div>

      ${roles.map(r => `
        <div class="row">
          <div class="role">${r.role}</div>

          <div class="staff">
            ${getAssigned(service.id, r.role)}
          </div>

          <button onclick="openModal('${service.id}','${r.role}')">
            Assign
          </button>
        </div>
      `).join("")}

    </div>
  `;
}

/* ================= MODAL OPEN ================= */
window.openModal = function(serviceId, role){

  modalState.serviceId = serviceId;
  modalState.role = role;
  modalState.selectedStaffId = null;

  const service = services.find(s => s.id === serviceId);

  document.getElementById("modalTitle").innerText =
    `Assign: ${role}`;

  document.getElementById("modalInfo").innerText =
    `${service.service_slots?.label} • ${service.service_date}`;

  const pool = poolMap[service.service_template_id] || [];

  renderStaffList(pool);

  document.getElementById("modal").style.display = "flex";
};

/* ================= STAFF LIST ================= */
function renderStaffList(pool){

  document.getElementById("staffList").innerHTML =
    pool.map(p => `
      <div class="chip ${modalState.selectedStaffId === p.id ? "selected" : ""}"
        onclick="selectStaff('${p.id}')">
        ${p.name}
      </div>
    `).join("");
}

/* ================= SELECT STAFF ================= */
window.selectStaff = function(id){

  modalState.selectedStaffId = id;

  const service = services.find(s => s.id === modalState.serviceId);
  const pool = poolMap[service.service_template_id] || [];

  renderStaffList(pool);
};

/* ================= CLOSE ================= */
window.closeModal = function(){
  document.getElementById("modal").style.display = "none";
};

/* ================= SAVE ASSIGNMENT ================= */
window.saveAssignment = async function(){

  const { serviceId, role, selectedStaffId } = modalState;

  if(!serviceId || !role || !selectedStaffId) return;

  const service = services.find(s => s.id === serviceId);

  await db.from("service_roles").upsert({
    service_id: serviceId,
    role,
    staff_id: selectedStaffId,
    service_date: service.service_date,
    created_at: new Date()
  });

  modalState.selectedStaffId = null;

  await load();
  closeModal();
};

/* ================= RENDER ================= */
function render(){

  const cols = { sat:[], s1:[], s2:[], jurong:[] };

  services.forEach(s => {

    const t = (s.service_slots?.time||"").toLowerCase();
    const l = (s.service_slots?.location||"").toLowerCase();

    if(l.includes("jurong")) cols.jurong.push(s);
    else if(t.includes("14")) cols.sat.push(s);
    else if(t.includes("08")) cols.s1.push(s);
    else cols.s2.push(s);
  });

  grid.innerHTML = `
    <div class="col"><div class="title">Sat</div>${cols.sat.map(card).join("")}</div>
    <div class="col"><div class="title">8.30</div>${cols.s1.map(card).join("")}</div>
    <div class="col"><div class="title">10.45</div>${cols.s2.map(card).join("")}</div>
    <div class="col"><div class="title">Jurong</div>${cols.jurong.map(card).join("")}</div>
    <div class="col"><div class="title">Inspector (unchanged)</div></div>
  `;
}

window.load = load;
load();

</script>

</body>
</html>
