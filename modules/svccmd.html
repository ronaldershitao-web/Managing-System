<!DOCTYPE html>
<html>
<head>
  <title>SVCCMD RESTORED FULL OPS</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .panel-title{
      color:#fbbf24;
      font-weight:bold;
      margin-bottom:8px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
      gap:8px;
    }

    .good{ color:#22c55e; }
    .bad{ color:#ef4444; }

    button.small{
      font-size:10px;
      padding:2px 6px;
      background:#3b82f6;
      color:white;
      border:none;
      border-radius:4px;
      cursor:pointer;
    }

    .group-title{
      margin-top:10px;
      font-weight:bold;
      color:#fbbf24;
    }
  </style>
</head>

<body>

<header>
  ⛪ SVCCMD FULL RESTORE
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= SAFE UTIL ================= */
const safe = (v) => String(v ?? "").trim();
const safeLower = (v) => safe(v).toLowerCase();

/* ================= STATE ================= */

let services = [];
let templates = [];
let staffList = [];
let availability = [];
let roles = [];

let staffMap = new Map();
let roleMap = new Map();

/* ================= LOAD ================= */

async function load(){

  const [
    s,
    t,
    st,
    a,
    r
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("staff_service_templates").select("*"),
    db.from("staff").select("*"),
    db.from("staff_availability").select("*"),
    db.from("service_roles").select("*")
  ]);

  services = s.data || [];
  templates = t.data || [];
  staffList = st.data || [];
  availability = a.data || [];
  roles = r.data || [];

  /* ================= FIX STAFF MAP ================= */
  staffMap = new Map(
    staffList.map(x => [String(x.id), x.name])
  );

  /* ================= NORMALIZE ROLES ================= */
  roleMap = new Map();

  roles.forEach(r => {

    const sid = String(r.service_id);

    const item = {
      ...r,
      role: safe(r.role),
      staff_id: String(r.staff_id || "")
    };

    if(!roleMap.has(sid)) roleMap.set(sid, []);
    roleMap.get(sid).push(item);
  });

  render();
}

/* ================= RENDER ================= */

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const cols = [[],[],[],[]];

  services.forEach(s => {

    const time = s.service_slots?.time || "";

    let i = -1;

    if(time.includes("14")) i = 0;        // Sat 2.30
    else if(time.includes("08")) i = 1;   // Sun 8.30
    else if(time.includes("10")) i = 2;   // Sun 10.45
    else i = 3;                           // Jurong / others

    if(i >= 0) cols[i].push(s);
  });

  cols.forEach(col => {

    const div = document.createElement("div");
    div.className = "col";

    col.forEach(s => {

      const serviceRoles =
        templates.filter(t =>
          String(t.service_id) === String(s.id)
        );

      const assigned =
        roleMap.get(String(s.id)) || [];

      const html = serviceRoles.map(r => {

        const roleName = safe(r.role).toLowerCase();

        const match = assigned.find(x =>
          safe(x.role).toLowerCase() === roleName
        );

        const staffName =
          staffMap.get(String(match?.staff_id)) || "—";

        return `
          <div class="row">
            <span>${r.role}</span>
            <span>
              ${staffName}
              <button class="small"
                onclick="assign('${s.id}','${r.role}')">
                Assign
              </button>
            </span>
          </div>
        `;
      }).join("");

      div.innerHTML += `
        <div class="card">
          <div class="panel-title">
            ${s.service_slots?.label || "Service"}
          </div>

          ${html || "<div>No roles</div>"}
        </div>
      `;
    });

    grid.appendChild(div);
  });

  /* ================= 5TH COLUMN ================= */

  const avail = document.createElement("div");
  avail.className = "col";

  avail.innerHTML = `
    <div class="panel-title">Staff Availability</div>

    ${staffList.map(s => `
      <div class="row">
        <span>${s.name}</span>
        <button class="small" onclick="toggle('${s.id}')">
          Mark
        </button>
      </div>
    `).join("")}
  `;

  grid.appendChild(avail);
}

/* ================= ASSIGN ================= */

window.assign = async function(serviceId, role){

  const staffId = prompt("Staff ID:");

  if(!staffId) return;

  await db.from("service_roles").upsert({
    service_id: serviceId,
    role,
    staff_id: staffId
  }, {
    onConflict: "service_id,role"
  });

  load();
};

/* ================= AVAILABILITY ================= */

window.toggle = function(id){
  alert("Toggle unavailable: " + id);
};

/* ================= INIT ================= */

window.load = load;
load();

</script>

</body>
</html>
