<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Restored)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .panel{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .title{
      color:#60a5fa;
      font-weight:bold;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
      align-items:center;
    }

    .good{ color:#22c55e; font-weight:bold; }
    .bad{ color:#ef4444; font-weight:bold; }

    .small{
      font-size:10px;
      padding:2px 6px;
      border:none;
      background:#3b82f6;
      color:white;
      cursor:pointer;
      border-radius:4px;
    }

    .group-title{
      color:#fbbf24;
      font-weight:bold;
      margin-top:8px;
    }

    select,input{
      width:100%;
      padding:6px;
      margin-top:6px;
      border-radius:6px;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Restored)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let staffList = [];
let templates = [];
let availability = [];
let services = [];
let roleMap = new Map();
let staffMap = new Map();

/* ================= HELPERS ================= */

function parseDate(d){
  const [y,m,day] = d.split("-");
  return new Date(y,m-1,day);
}

function formatDate(d){
  const dt = parseDate(d);
  return dt.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
}

/* ================= LOAD ================= */

async function load(){

  const [
    servicesRes,
    staffRes,
    templateRes,
    availRes,
    rolesRes
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("staff").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("service_roles").select("*")
  ]);

  services = servicesRes.data || [];
  staffList = staffRes.data || [];
  templates = templateRes.data || [];
  availability = availRes.data || [];

  staffMap = new Map(staffList.map(s => [String(s.id), s.name]));

  roleMap = new Map();
  (rolesRes.data || []).forEach(r=>{
    const key = String(r.service_id);
    if(!roleMap.has(key)) roleMap.set(key,[]);
    roleMap.get(key).push(r);
  });

  render();
}

/* ================= RENDER ================= */

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const cols = [[],[],[],[]];

  services.forEach(s=>{
    const t = (s.service_slots?.time || "").replace(":","");
    const loc = (s.service_slots?.location || "").toLowerCase();

    if(t.includes("1430")) cols[0].push(s);       // Sat 2.30
    else if(t.includes("0830")) cols[1].push(s);  // Sun 8.30
    else if(t.includes("1045")) cols[2].push(s);  // Sun 10.45
    else cols[3].push(s);                         // Jurong
  });

  cols.forEach(col=>{

    grid.innerHTML += `
      <div class="col">
        ${col.map(s=>renderService(s)).join("")}
      </div>
    `;
  });

  renderAvailabilityPanel();
}

/* ================= SERVICE CARD ================= */

function renderService(s){

  const roles = roleMap.get(String(s.id)) || [];

  return `
    <div class="panel">
      <div class="title">${formatDate(s.service_date)} - ${s.service_slots?.label}</div>

      ${roles.map(r=>`
        <div class="row">
          <span>${r.role}</span>
          <span>${staffMap.get(String(r.staff_id)) || "-"}</span>
        </div>
      `).join("")}

    </div>
  `;
}

/* ================= 5TH COLUMN ================= */

function renderAvailabilityPanel(){

  const grid = document.getElementById("grid");

  const dates = [...new Set(services.map(s=>s.service_date))];

  grid.innerHTML += `
    <div class="col">
      <div class="panel">
        <div class="title">Staff Availability</div>

        <select id="dateSel" onchange="refreshServices()">
          ${dates.map(d=>`<option value="${d}">${formatDate(d)}</option>`).join("")}
        </select>

        <select id="serviceSel" onchange="refreshStaff()"></select>

        <select id="staffSel"></select>

        <button class="small" onclick="markUnavailable()">Mark Unavailable</button>
      </div>
    </div>
  `;

  refreshServices();
}

/* ================= FILTER ================= */

window.refreshServices = function(){

  const date = document.getElementById("dateSel").value;

  const filtered = services.filter(s=>s.service_date===date);

  document.getElementById("serviceSel").innerHTML =
    filtered.map(s=>
      `<option value="${s.id}">
        ${s.service_slots?.label}
      </option>`
    ).join("");

  refreshStaff();
};

/* ================= STAFF FILTER ================= */

window.refreshStaff = function(){

  const serviceId = document.getElementById("serviceSel").value;
  const service = services.find(s=>String(s.id)===String(serviceId));

  if(!service) return;

  const template = templates.filter(t =>
    String(t.template_id) === String(service.service_template_id)
  );

  const allowed = new Set(template.map(t=>String(t.staff_id)));

  const eligible = staffList.filter(s=>allowed.has(String(s.id)));

  document.getElementById("staffSel").innerHTML =
    eligible.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");
};

/* ================= ACTION ================= */

window.markUnavailable = async function(){

  const staffId = document.getElementById("staffSel").value;
  const serviceId = document.getElementById("serviceSel").value;

  const service = services.find(s=>String(s.id)===String(serviceId));

  await db.from("staff_availability").upsert({
    staff_id: staffId,
    service_date: service.service_date,
    service_slot_id: service.service_slot_id,
    status: "unavailable"
  });

  load();
};

window.load = load;
load();

</script>

</body>
</html>
