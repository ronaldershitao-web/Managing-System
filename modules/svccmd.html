<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Full Ops + Availability Control)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .panel{
      background:#111827;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-top:10px;
    }

    .panel-title{
      font-size:13px;
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:8px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
      align-items:center;
    }

    .good{ color:#22c55e; font-weight:bold; }
    .bad{ color:#ef4444; font-weight:bold; cursor:pointer; }

    button.small{
      font-size:10px;
      padding:2px 6px;
      border:none;
      border-radius:4px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
      margin-left:6px;
    }

    .group-title{
      color:#fbbf24;
      font-weight:bold;
      margin-top:10px;
      padding-top:6px;
      border-top:1px solid #334155;
    }

    select, input, button{
      width:100%;
      padding:8px;
      margin-top:6px;
      border-radius:6px;
      border:none;
    }

    .save{ background:#22c55e; color:white; }
    .danger{ background:#ef4444; color:white; }

    .stack{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- ASSIGN MODAL -->
<div id="assignModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);">
  <div style="background:#111827;width:320px;margin:10% auto;padding:20px;border-radius:10px;">
    <h3 id="modalTitle"></h3>
    <select id="staffSelect"></select>
    <button class="save" onclick="saveAssign()">Assign</button>
    <button onclick="closeAssignModal()">Close</button>
  </div>
</div>

<script type="module">
import { db } from "../assets/app.js";

let staffList = [];
let templates = [];
let roles = [];

let roleMap = new Map();
let templateMap = new Map();
let staffMap = new Map();

let currentService = null;
let currentRole = null;

/* ================= LOAD ================= */
async function load(){

  const [
    servicesRes,
    templateRes,
    roleRes,
    staffRes
  ] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location)`),
    db.from("staff_service_templates").select("*"),
    db.from("service_roles").select("*"),
    db.from("staff").select("*")
  ]);

  const services = servicesRes.data || [];
  templates = templateRes.data || [];
  roles = roleRes.data || [];
  staffList = staffRes.data || [];

  staffMap = new Map(staffList.map(s => [String(s.id), s.name]));

  /* ================= SAFE ROLE MAP ================= */
  roleMap = new Map();

  roles.forEach(r => {

    const serviceId = String(r.service_id || "").trim();
    const role = String(r.role || "").trim();
    const staff_id = String(r.staff_id || "").trim();

    // 🚨 HARD GUARD (prevents crash)
    if (!serviceId || !role) return;

    if (!roleMap.has(serviceId)) roleMap.set(serviceId, []);

    roleMap.get(serviceId).push({
      ...r,
      role,
      staff_id
    });
  });

  /* template map */
  templateMap = new Map();

  templates.forEach(t=>{
    const k = String(t.template_id);
    if(!templateMap.has(k)) templateMap.set(k,[]);
    templateMap.get(k).push(t);
  });

  render(services);
}

/* ================= RENDER ================= */
function render(services){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const cols = [[],[],[],[],[]];

  services.forEach(s=>{
    const t = (s.service_slots?.time||"").replace(":","");

    let i = -1;
    if(t.includes("1430")) i=0;
    else if(t.includes("0830")) i=1;
    else if(t.includes("1045")) i=2;
    else i=3;

    if(i>=0) cols[i].push(s);
  });

  cols.forEach(col=>{
    const div = document.createElement("div");
    div.className="col";
    div.innerHTML = col.map(renderCard).join("");
    grid.appendChild(div);
  });
}

/* ================= CARD ================= */
function renderCard(s){

  const template = templateMap.get(String(s.service_template_id)) || [];
  const assigned = roleMap.get(String(s.id)) || [];

  const appointments = template.map(t => {

    const role = String(t.role || "").trim().toLowerCase();

    const match = assigned.find(r =>
      String(r.role || "").trim().toLowerCase() === role
    );

    const staffId =
      match?.staff_id ||
      t.staff_id ||
      "";

    const name = staffMap.get(String(staffId)) || "-";

    return `
      <div class="row">
        <span>${t.role}</span>
        <span>
          ${name}
          <button class="small" onclick="openAssign('${s.id}','${t.role}')">Assign</button>
        </span>
      </div>
    `;
  }).join("");

  return `
    <div class="card">

      <div class="panel-title">
        ${s.service_slots?.label || ""}
      </div>

      <div class="panel">
        ${appointments}
      </div>

      <div class="panel stack">
        <div class="panel-title">Staff Summary</div>
        <div>Total Assigned: ${assigned.length}</div>
      </div>

    </div>
  `;
}

/* ================= ASSIGN ================= */
window.openAssign = function(serviceId, role){

  currentService = serviceId;
  currentRole = role;

  document.getElementById("assignModal").style.display="block";
  document.getElementById("modalTitle").innerText="Assign " + role;

  document.getElementById("staffSelect").innerHTML =
    staffList.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");
};

window.saveAssign = async function(){

  await db.from("service_roles").upsert({
    service_id: currentService,
    role: currentRole,
    staff_id: document.getElementById("staffSelect").value
  },{
    onConflict:"service_id,role"
  });

  load();
};

window.closeAssignModal = function(){
  document.getElementById("assignModal").style.display="none";
};

window.load = load;
load();

</script>

</body>
</html>
