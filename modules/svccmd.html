<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Full Ops + Availability Control)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .panel{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .panel-title{
      font-size:13px;
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:8px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
      align-items:center;
    }

    .good{color:#22c55e;font-weight:bold;}
    .bad{color:#ef4444;font-weight:bold;}

    .appointment-panel{
      margin-top:10px;
      background:#111827;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
    }

    .group-title{
      color:#fbbf24;
      font-weight:bold;
      margin-top:10px;
      border-top:1px solid #334155;
      padding-top:6px;
    }

    button.small{
      font-size:10px;
      padding:2px 6px;
      margin-left:6px;
      border-radius:4px;
      border:none;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .modal-content{
      background:#111827;
      padding:20px;
      border-radius:10px;
      width:360px;
      border:1px solid #334155;
    }

    select,button,input{
      width:100%;
      padding:8px;
      margin-top:10px;
      border-radius:6px;
      border:none;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="assignModal">
  <div class="modal-content">
    <div id="modalTitle"></div>
    <select id="staffSelect"></select>
    <button onclick="saveAssign()">Save</button>
    <button onclick="closeAssignModal()">Close</button>
  </div>
</div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let staffList = [];
let templates = [];
let availability = [];
let people = [];
let serviceMap = new Map();
let staffMap = new Map();
let roleMap = new Map();
let hospitalityMap = new Map();
let attendanceMap = new Map();

let currentService = null;
let currentRole = null;

/* ================= LOAD ================= */
async function load(){

  const [
    servicesRes,
    templateRes,
    availRes,
    staffRes,
    rolesRes,
    templateRolesRes,
    hospRes,
    peopleRes,
    attendanceRes
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("staff").select("*"),
    db.from("service_roles").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("hospitality_duty").select("*"),
    db.from("people").select("*"),
    db.from("service_attendance_metrics").select("*")
  ]);

  const services = servicesRes.data || [];
  staffList = staffRes.data || [];
  templates = templateRes.data || [];
  availability = availRes.data || [];
  people = peopleRes.data || [];

  serviceMap = new Map(services.map(s => [String(s.id), s]));
  staffMap = new Map(staffList.map(s => [String(s.id), s.name]));
  hospitalityMap = new Map((hospRes.data || []).map(h => [String(h.service_id), h]));
  attendanceMap = new Map((attendanceRes.data || []).map(a => [String(a.service_id), a]));

  /* roles */
  roleMap.clear();
  (rolesRes.data || []).forEach(r=>{
    const key = String(r.service_id);
    if(!roleMap.has(key)) roleMap.set(key, []);
    roleMap.get(key).push(r);
  });

  /* filter services */
  const display = services;

  const cols = [[],[],[],[]];

  display.forEach(s=>{
    const time = s.service_slots?.time || "";
    const loc = (s.service_slots?.location || "").toLowerCase();

    if(time.includes("1430")) cols[0].push(s);
    else if(time.includes("0830")) cols[1].push(s);
    else if(time.includes("1045") && !loc.includes("jurong")) cols[2].push(s);
    else cols[3].push(s);
  });

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cols.forEach(col=>{
    grid.innerHTML += `<div class="col">
      ${col.map(renderService).join("")}
    </div>`;
  });

  /* 5th column */
  grid.innerHTML += `
    <div class="col">
      <h3>Staff Availability</h3>
      <p>Select service + mark unavailable</p>
    </div>
  `;
}

function renderService(s){

  const roles = roleMap.get(String(s.id)) || [];
  const hosp = hospitalityMap.get(String(s.id));

  const appointments = roles.map(r=>`
    <div class="row">
      <span>${r.role}</span>
      <span>
        ${staffMap.get(r.staff_id) || "-"}
        <button class="small"
          onclick="openAssign('${s.id}','${r.role}')">Assign</button>
      </span>
    </div>
  `).join("");

  return `
    <div class="panel">
      <div class="panel-title">
        ${s.service_slots?.label || "Service"}
      </div>

      <div class="panel">
        <b>Hospitality</b><br/>
        ${hosp?.leader || "Not Assigned"}
      </div>

      <div class="panel">
        <b>Appointments</b>
        ${appointments}
      </div>
    </div>
  `;
}

/* ================= ASSIGN ================= */
window.openAssign = function(serviceId, role){
  currentService = serviceId;
  currentRole = role;

  document.getElementById("modalTitle").innerText = "Assign " + role;

  document.getElementById("staffSelect").innerHTML =
    staffList.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");

  document.getElementById("assignModal").style.display="flex";
};

window.saveAssign = async function(){

  await db.from("service_roles").upsert({
    service_id: currentService,
    role: currentRole,
    staff_id: document.getElementById("staffSelect").value
  },{onConflict:"service_id,role"});

  load();
};

window.closeAssignModal = ()=> {
  document.getElementById("assignModal").style.display="none";
};

window.load = load;
load();

</script>

</body>
</html>
