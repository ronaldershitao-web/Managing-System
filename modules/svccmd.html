<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Full Ops + Availability Control)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
      display:flex;
      flex-direction:column;
    }

    .title{
      color:#60a5fa;
      font-weight:bold;
      margin-bottom:4px;
    }

    .tag{
      font-size:12px;
      color:#94a3b8;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin:4px 0;
      font-size:12px;
    }

    .top-grid{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .full-width{
      grid-column:1 / -1;
    }

    .panel{
      background:#111827;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
    }

    .panel-title{
      color:#fbbf24;
      font-size:13px;
      font-weight:bold;
      margin-bottom:8px;
    }

    .appointment-panel{
      margin-top:12px;
      background:#111827;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
    }

    .group-title{
      color:#fbbf24;
      font-weight:bold;
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #334155;
    }

    .good{
      color:#22c55e;
      font-weight:bold;
    }

    .bad{
      color:#ef4444;
      font-weight:bold;
      cursor:pointer;
    }

    button.small{
      width:auto;
      padding:2px 6px;
      border:none;
      border-radius:4px;
      font-size:10px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    select, button, input{
      width:100%;
      padding:8px;
      border:none;
      border-radius:6px;
      margin-top:10px;
      box-sizing:border-box;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .modal-content{
      width:360px;
      background:#111827;
      padding:20px;
      border-radius:10px;
      border:1px solid #334155;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Full Ops + Availability Control)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">

import { db } from "../assets/app.js";

let staffList = [];
let templates = [];
let availability = [];
let availabilityServices = [];
let people = [];

let roleMap = new Map();
let templateRoleMap = new Map();
let staffMap = new Map();
let serviceMap = new Map();
let hospitalityMap = new Map();
let attendanceMetricsMap = new Map();

let currentService = null;
let currentRole = null;

/* ================= LOAD ================= */

async function load(){

  const [
    servicesRes,
    templateRes,
    availRes,
    staffRes,
    rolesRes,
    templateRolesRes,
    hospitalityRes,
    peopleRes,
    attendanceRes
  ] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location)`),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("staff").select("*"),
    db.from("service_roles").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("hospitality_duty").select("*"),
    db.from("people").select("*"),
    db.from("service_attendance_metrics").select("*")
  ]);

  const services = servicesRes.data || [];
  templates = templateRes.data || [];
  availability = availRes.data || [];
  staffList = staffRes.data || [];
  people = peopleRes.data || [];

  staffMap = new Map(staffList.map(s => [String(s.id).trim(), s.name]));
  serviceMap = new Map(services.map(s => [String(s.id), s]));
  hospitalityMap = new Map((hospitalityRes.data||[]).map(d => [String(d.service_id), d]));
  attendanceMetricsMap = new Map((attendanceRes.data||[]).map(a => [String(a.service_id), a]));

  const roles = (rolesRes.data||[]).map(r=>({
    ...r,
    service_id:String(r.service_id||"").trim(),
    role:String(r.role||"").trim(),
    staff_id:String(r.staff_id||"").trim()
  }));

  const templateRoles = templateRolesRes.data || [];

  roleMap = new Map();
  roles.forEach(r=>{
    if(!roleMap.has(r.service_id)) roleMap.set(r.service_id,[]);
    roleMap.get(r.service_id).push(r);
  });

  templateRoleMap = new Map();
  templateRoles.forEach(r=>{
    const k = String(r.template_id);
    if(!templateRoleMap.has(k)) templateRoleMap.set(k,[]);
    templateRoleMap.get(k).push(r);
  });

  const display = services.slice(0,20);

  const cols = [[],[],[],[]];

  display.forEach((s,i)=>{
    cols[i%4].push(s);
  });

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cols.forEach(col=>{

    grid.innerHTML += `
      <div class="col">

        ${col.map(s=>{

          const templateStaff =
            templates.filter(t =>
              String(t.template_id) === String(s.service_template_id)
            );

          const assignedIds =
            new Set(templateStaff.map(t=>String(t.staff_id)));

          const rolesForService =
            roleMap.get(String(s.id)) || [];

          const templateRoles =
            templateRoleMap.get(String(s.service_template_id)) || [];

          const appointments =
            templateRoles

            .filter(r=>{
              if(s.is_communion_service) return true;
              return !String(r.role).toLowerCase().includes("communion");
            })

            .map(roleRow=>{

              const role = String(roleRow.role||"").trim();
              const target = role.toLowerCase();

              const assignedRole =
                rolesForService
                  .filter(r=>String(r.role).toLowerCase()===target)
                  .sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];

              const templateMatch =
                templateStaff.find(t=>String(t.role||"").toLowerCase()===target);

              const staffId =
                String(assignedRole?.staff_id || templateMatch?.staff_id || "").trim();

              const staffName =
                staffList.find(x=>String(x.id).trim()===staffId)?.name
                || staffMap.get(staffId)
                || "-";

              return {
                role,
                name: staffName
              };
            });

          const grouped = {};
          appointments.forEach(a=>{
            const g="General";
            if(!grouped[g]) grouped[g]=[];
            grouped[g].push(a);
          });

          return `
            <div class="card">

              <div class="title">${s.service_slots?.label||""}</div>

              <div class="appointment-panel">
                <b>Appointments</b>

                ${appointments.map(a=>`
                  <div class="row">
                    <span>${a.role}</span>
                    <span>${a.name}</span>
                  </div>
                `).join("")}

              </div>

              <div class="top-grid">

                <div class="panel">
                  <div class="panel-title">Attendance</div>
                  <div class="row"><span>Total</span><span>0</span></div>
                </div>

                <div class="panel">
                  <div class="panel-title">Hospitality</div>
                  <div class="row"><span>Leader</span><span>-</span></div>
                </div>

                <div class="panel full-width">
                  <div class="panel-title">Staff Summary</div>
                  <div class="row"><span>Total Assigned</span><span>${assignedIds.size}</span></div>
                  <div class="row"><span>Available</span><span class="good">${assignedIds.size}</span></div>
                </div>

              </div>

            </div>
          `;
        }).join("")}

      </div>
    `;
  });

}

window.load = load;
load();

</script>

</body>
</html>
