<!DOCTYPE html>
<html>
<head>
<title>Command Post (RESTORED 5 COL OPS)</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  padding:12px;
  background:#111827;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  padding:10px;
}

.col{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:10px;
  min-height:85vh;
  overflow:auto;
}

.card{
  background:#0f172a;
  border:1px solid #334155;
  border-radius:8px;
  padding:10px;
  margin-bottom:10px;
}

.panel{
  background:#111827;
  border:1px solid #334155;
  border-radius:8px;
  padding:10px;
  margin-bottom:10px;
}

.panel-title{
  color:#fbbf24;
  font-weight:bold;
  margin-bottom:6px;
}

.row{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin:4px 0;
}

.good{ color:#22c55e; }
.bad{ color:#ef4444; }

button.small{
  font-size:11px;
  padding:2px 6px;
  border:none;
  background:#3b82f6;
  color:white;
  border-radius:4px;
  cursor:pointer;
}

.group-title{
  margin-top:10px;
  font-weight:bold;
  color:#fbbf24;
}
</style>
</head>

<body>

<header>
⛪ SVCCMD RESTORED
<button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= SAFE HELPERS ================= */

const safeLower = (v) => String(v || "").trim().toLowerCase();

/* ================= STATE ================= */

let staffList = [];
let templates = [];
let availability = [];
let services = [];

let staffMap = new Map();

/* ================= LOAD ================= */

async function load(){

  const [
    sRes,
    tRes,
    aRes,
    stRes,
    rRes
  ] = await Promise.all([
    db.from("services").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("staff").select("*"),
    db.from("service_roles").select("*")
  ]);

  services = sRes.data || [];
  templates = tRes.data || [];
  availability = aRes.data || [];
  staffList = stRes.data || [];

  staffMap = new Map(
    staffList.map(s => [String(s.id), s.name])
  );

  render();
}

/* ================= RENDER ================= */

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const cols = [[],[],[],[]];

  services.forEach(s => {

    const time = (s.service_slots?.time || "");

    let i = -1;

    if(time.includes("14")) i = 0;        // Sat 2.30
    else if(time.includes("08")) i = 1;   // Sun 8.30
    else if(time.includes("10") && !String(s.service_slots?.location).includes("Jurong")) i = 2;
    else i = 3;

    if(i >= 0) cols[i].push(s);
  });

  cols.forEach(col => {

    const colDiv = document.createElement("div");
    colDiv.className = "col";

    col.forEach(s => {

      const assignedRoles = templates.filter(t =>
        String(t.service_id) === String(s.id)
      );

      const html = assignedRoles.map(r => {

        const staffId = r.staff_id;
        const name = staffMap.get(String(staffId)) || "—";

        return `
          <div class="row">
            <span>${r.role}</span>
            <span>
              ${name}
              <button class="small"
                onclick="openAssign('${s.id}','${r.role}')">
                Assign
              </button>
            </span>
          </div>
        `;
      }).join("");

      colDiv.innerHTML += `
        <div class="card">
          <div class="panel-title">
            ${s.service_slots?.label || "Service"}
          </div>

          ${html || "<div>No roles</div>"}
        </div>
      `;
    });

    grid.appendChild(colDiv);
  });

  /* ================= 5th COLUMN ================= */

  const availCol = document.createElement("div");
  availCol.className = "col";

  availCol.innerHTML = `
    <div class="panel-title">Staff Availability</div>

    ${staffList.map(s => `
      <div class="row">
        <span>${s.name}</span>
        <button class="small" onclick="markUnavailable('${s.id}')">
          Toggle
        </button>
      </div>
    `).join("")}
  `;

  grid.appendChild(availCol);
}

/* ================= ASSIGN ================= */

window.openAssign = function(serviceId, role){

  const staffId = prompt("Enter staff ID");

  if(!staffId) return;

  db.from("staff_service_templates")
    .upsert({
      service_id: serviceId,
      role: role,
      staff_id: staffId
    }, { onConflict:"service_id,role" })
    .then(load);
};

/* ================= UNAVAILABLE ================= */

window.markUnavailable = function(staffId){

  alert("Toggle unavailable stub: " + staffId);
};

/* ================= INIT ================= */

window.load = load;
load();

</script>

</body>
</html>
