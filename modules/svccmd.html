<!DOCTYPE html>
<html>
<head>
  <title>Service Command Center (Inspector + HC Fix)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .title{
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:6px 0;
      align-items:center;
      gap:8px;
    }

    .role{ flex:1; }
    .staff{ color:#22c55e; font-weight:bold; }

    button{
      font-size:11px;
      padding:6px 8px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    .assignBtn{
      background:#2563eb;
      white-space:nowrap;
    }

    .danger{ background:#ef4444; }

    .chip{
      padding:6px 8px;
      border-radius:8px;
      font-size:12px;
      cursor:pointer;
      border:1px solid #334155;
      margin:4px 0;
      display:block;
    }

    .avail { color:#22c55e; }
    .unavail { color:#ef4444; }

    .selected {
      background:#1d4ed8;
      border:1px solid #60a5fa;
      color:white;
      font-weight:bold;
    }

    .assignBanner{
      padding:6px;
      font-size:12px;
      background:#0b1220;
      border:1px solid #1f2937;
      border-radius:6px;
      margin-bottom:8px;
      color:#93c5fd;
    }
  </style>
</head>

<body>

<header>
  Service Command Center
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staffList = [];
let templateRoles = [];
let serviceRoles = [];
let staffTemplates = [];
let availability = [];

let staffMap = {};
let roleMap = {};
let poolMap = {};

let selectedStaffId = null;
let selectedService = null;
let selectedRole = null;   // ✅ NEW

/* ================= LOAD ================= */
async function load(){

  const [s, st, tr, sr, tpl, av] = await Promise.all([
    db.from("services").select("* , service_slots(label,time,location)")
      .order("service_date",{ascending:true}),
    db.from("staff").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("service_roles").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*")
  ]);

  services = s.data || [];
  staffList = st.data || [];
  templateRoles = tr.data || [];
  serviceRoles = sr.data || [];
  console.log("SERVICE ROLES DATA:", serviceRoles);
console.log("STAFF DATA:", staffList);
  staffTemplates = tpl.data || [];
  availability = av.data || [];

  staffMap = Object.fromEntries(
    staffList.map(s => [String(s.id), s.name])
  );



  poolMap = {};
  staffTemplates.forEach(t => {
    if(!poolMap[t.template_id]) poolMap[t.template_id] = [];
    poolMap[t.template_id].push({
      id: t.staff_id,
      name: staffMap[t.staff_id] || "Unknown"
    });
  });

  render();
}

/* ================= ROLE RESOLVER ================= */
function resolveServiceRoles(service){

  let roles = templateRoles.filter(r =>
    String(r.template_id) === String(service.service_template_id)
  );

  if(service.is_communion_service === false){
    roles = roles.filter(r => r.is_communion_role !== true);
  }

  const hc = roles.filter(r => r.is_communion_role === true);
  const nonHC = roles.filter(r => !r.is_communion_role);

  const hcGrouped = {};

  hc.forEach(r => {
    const group = r.group_name || "Ungrouped";
    if(!hcGrouped[group]) hcGrouped[group] = [];
    hcGrouped[group].push(r);
  });

  return { hcGrouped, nonHC };
}
  
function norm(v){
  return (v || "").trim().toLowerCase();
}
function getAssigned(serviceId, role){

  console.log("CHECKING:", serviceId, role);

  const roles = serviceRoles.filter(r =>
    String(r.service_id).trim() === String(serviceId).trim() &&
    norm(r.role) === norm(role)
  );

  console.log("MATCHING ROLES:", roles);

  const match = roles.find(r => r.staff_id);

  console.log("SELECTED MATCH:", match);

  if(!match){
    return "-";
  }

  const staff = staffList.find(s =>
    String(s.id).trim() === String(match.staff_id).trim()
  );

  console.log("FOUND STAFF:", staff);

  return staff?.name || "-";
}

/* ================= CARD ================= */
function card(service){

  const { hcGrouped, nonHC } = resolveServiceRoles(service);

  return `
    <div class="card">

      <b>${service.service_slots?.label}</b>
      <div style="font-size:11px;color:#94a3b8">
        ${service.service_date}
      </div>

      <!-- NON HC -->
      ${nonHC.map(r => `
        <div class="row">
          <div class="role">${r.role}</div>

          <div style="display:flex; gap:6px; align-items:center;">
            <div class="staff">${getAssigned(service.id, r.role)}</div>
            <button class="assignBtn"
  onclick="openModal('${service.id}','${r.role}')">
  Assign
</button>
          </div>

        </div>
      `).join("")}

      <!-- HC -->
      ${service.is_communion_service ? `
        <div style="margin-top:10px;color:#fbbf24;font-weight:bold;">
          Holy Communion
        </div>

        ${Object.keys(hcGrouped).map(group => `
          <div style="margin-top:8px;padding:6px;border:1px solid #1f2937;border-radius:6px;">
            <div style="color:#60a5fa;font-size:12px;font-weight:bold;">
              ${group}
            </div>

            ${hcGrouped[group].map(r => `
              <div class="row">
                <div class="role">${r.role}</div>

                <div style="display:flex; gap:6px; align-items:center;">
                  <div class="staff">${getAssigned(service.id, r.role)}</div>
                 <button class="assignBtn"
  onclick="openModal('${service.id}','${r.role}')">
  Assign
</button>
                </div>

              </div>
            `).join("")}
          </div>
        `).join("")}
      ` : ""}

    </div>
  `;
}

/* ================= OPEN ASSIGN ================= */
window.openModal = function(serviceId, role){

  selectedService = services.find(s => String(s.id) === String(serviceId));
  selectedRole = role;

  const pool = poolMap[selectedService.service_template_id] || [];

  const dropdown = document.getElementById("staffDropdown");

  dropdown.innerHTML = `
    <option value="">Select staff</option>
    ${pool.map(p => `
      <option value="${p.id}">
        ${p.name}
      </option>
    `).join("")}
  `;

  document.getElementById("assignModal").style.display = "flex";
};

  window.closeModal = function(){
  document.getElementById("assignModal").style.display = "none";
  selectedService = null;
  selectedRole = null;
};

/* ================= INSPECTOR ================= */
function inspector(){

  const dates = [...new Set(services.map(s => s.service_date))];

  return `
    <div class="title">Service Inspector</div>

    <select id="dateSel" onchange="onDate()">
      <option value="">Select Date</option>
      ${dates.map(d => `<option value="${d}">${d}</option>`).join("")}
    </select>

    <select id="serviceSel" onchange="onServiceSelect()"></select>

    <div id="poolView" class="card">Select service</div>

    <button class="danger" onclick="markUnavailable()" ${!selectedStaffId ? "disabled" : ""}>
      Mark Unavailable
    </button>
  `;
}

/* ================= INSPECTOR RENDER ================= */
function renderInspector(service){

  if(!service) return;

  const pool = poolMap[service.service_template_id] || [];

  const unavailable = new Set(
    availability
      .filter(a =>
        a.service_date === service.service_date &&
        a.service_slot_id === service.service_slot_id &&
        a.status === "unavailable"
      )
      .map(a => String(a.staff_id))
  );

  const available = pool.filter(p => !unavailable.has(String(p.id)));

  document.getElementById("poolView").innerHTML = `
    <div class="assignBanner">
      ${selectedRole
        ? `Assigning Role: <b>${selectedRole}</b><br>`
        : ""}
      ${selectedStaffId
        ? `Selected: <b>${staffMap[selectedStaffId]}</b>`
        : "No staff selected"}
    </div>

    <b>${service.service_slots?.label}</b>
    <div style="font-size:11px;color:#94a3b8">
      ${service.service_date}
    </div>

    <div style="margin-top:10px">
      <b>Available Staff</b>
      ${available.map(p => `
        <div class="chip avail ${selectedStaffId === p.id ? "selected" : ""}"
          onclick="selectStaff('${p.id}')">
          ${p.name}
        </div>
      `).join("")}
    </div>

    <div style="margin-top:10px">
      <b>Unavailable</b>
      ${[...unavailable].map(id => `
        <div class="chip unavail">
          ${staffMap[id] || "Unknown"}
        </div>
      `).join("")}
    </div>
  `;
}

/* ================= EVENTS ================= */
window.selectStaff = function(id){
  selectedStaffId = id;
  renderInspector(selectedService);
};

window.onDate = function(){
  const date = dateSel.value;
  const filtered = services.filter(s => s.service_date === date);

  serviceSel.innerHTML = `
    <option value="">Select</option>
    ${filtered.map(s => `
      <option value="${s.id}">
        ${s.service_slots?.label}
      </option>
    `).join("")}
  `;
};

window.onServiceSelect = function(){
  const id = serviceSel.value;
  const service = services.find(s => String(s.id) === String(id));
  if(!service) return;

  selectedService = service;
  renderInspector(service);
};

window.markUnavailable = async function(){

  if(!selectedService || !selectedStaffId) return;

  await db.from("staff_availability").insert({
    staff_id: selectedStaffId,
    service_date: selectedService.service_date,
    service_slot_id: selectedService.service_slot_id,
    status: "unavailable"
  });

  selectedStaffId = null;
  selectedRole = null;

  await load();
  renderInspector(selectedService);
};

  window.assignRoleFromModal = async function(){

  const staffId = document.getElementById("staffDropdown").value;

  if(!selectedService || !selectedRole || !staffId) return;

  await db.from("service_roles").upsert({
    service_id: selectedService.id,
    role: selectedRole,
    staff_id: staffId
  }, {
    onConflict: "service_id,role"
  });

  selectedRole = null;

  await load();
  closeModal();
  render();
};

/* ================= GRID ================= */
function render(){

  const cols = { sat:[], s1:[], s2:[], jurong:[] };

  services.forEach(s => {

    const t = (s.service_slots?.time||"").toLowerCase();
    const l = (s.service_slots?.location||"").toLowerCase();

    if(l.includes("jurong")) cols.jurong.push(s);
    else if(t.includes("14")) cols.sat.push(s);
    else if(t.includes("08")) cols.s1.push(s);
    else cols.s2.push(s);
  });

  grid.innerHTML = `
    <div class="col">
      <div class="title">Sat</div>
      ${cols.sat.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">8.30</div>
      ${cols.s1.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">10.45</div>
      ${cols.s2.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Jurong</div>
      ${cols.jurong.map(card).join("")}
    </div>

    <div class="col">
      ${inspector()}
    </div>
  `;
}

window.load = load;
load();

  

</script>

<div id="assignModal" style="
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
">
  <div style="
    background:#111827;
    width:320px;
    padding:15px;
    border-radius:10px;
    max-height:80vh;
    overflow:auto;
  ">
    <h3 style="margin-top:0;">Assign Staff</h3>

    <select id="staffDropdown" style="
  width:100%;
  padding:8px;
  margin:10px 0;
  border-radius:6px;
  background:#0f172a;
  color:white;
  border:1px solid #334155;
"></select>

<button onclick="assignRoleFromModal()" style="
  width:100%;
  margin-top:10px;
  background:#22c55e;
">
  Assign Selected Staff
</button>

    <button onclick="closeModal()" style="margin-top:10px;background:#ef4444;">
      Close
    </button>
  </div>
</div>
  
</body>
</html>
