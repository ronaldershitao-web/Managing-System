<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Full Restore)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .title{
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:12px;
      margin:6px 0;
      gap:8px;
    }

    .role{ flex:1; }

    .staff{
      min-width:90px;
      text-align:right;
      font-weight:bold;
      color:#22c55e;
    }

    button{
      font-size:10px;
      padding:3px 6px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }

    select{
      width:100%;
      padding:6px;
      margin-top:8px;
      border-radius:6px;
    }

    .panel{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
    }

    .danger{
      background:#ef4444;
      width:100%;
      margin-top:10px;
      padding:6px;
      border:none;
      color:white;
      border-radius:6px;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#111827;
      padding:20px;
      border-radius:10px;
      width:360px;
    }
  </style>
</head>

<body>

<header>
  Command Post Full Ops
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- ASSIGN -->
<div class="modal" id="assignModal">
  <div class="modal-content">
    <div id="modalTitle"></div>
    <select id="staffSelect"></select>
    <button onclick="saveAssign()">Save</button>
  </div>
</div>

<script type="module">

import { db } from "../assets/app.js";

/* ================= DATA ================= */
let services = [];
let staff = [];
let templateRoles = [];
let serviceRoles = [];
let availability = [];

let currentService = null;
let currentRole = null;

/* ================= LOAD ================= */
async function load(){

  const [s, st, tr, sr, av] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("staff").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("service_roles").select("*"),
    db.from("staff_availability").select("*")
  ]);

  services = s.data || [];
  staff = st.data || [];
  templateRoles = tr.data || [];
  serviceRoles = sr.data || [];
  availability = av.data || [];

  render();
}

/* ================= DATE ================= */
function parseDate(d){
  const [y,m,day] = d.split("-");
  return new Date(y,m-1,day);
}

function in8Days(d){
  const dt = parseDate(d);
  const now = new Date();
  const min = new Date(now);
  min.setDate(now.getDate()-8);
  const max = new Date(now);
  max.setDate(now.getDate()+8);
  return dt >= min && dt <= max;
}

function in60Days(d){
  const dt = parseDate(d);
  const now = new Date();
  const max = new Date(now);
  max.setDate(now.getDate()+60);
  return dt >= now && dt <= max;
}

/* ================= STAFF JOIN FIX ================= */
function getStaffName(serviceId, role){

  const latest = serviceRoles
    .filter(r =>
      String(r.service_id) === String(serviceId) &&
      (r.role || "").toLowerCase() === (role || "").toLowerCase()
    )
    .sort((a,b)=>
      new Date(b.created_at || 0) - new Date(a.created_at || 0)
    )[0];

  if(!latest) return "-";

  return staff.find(s =>
    String(s.id) === String(latest.staff_id)
  )?.name || "-";
}

/* ================= RENDER ================= */
function render(){

  const sat=[], s830=[], s1045=[], jurong=[];

  services
    .filter(s => in8Days(s.service_date))
    .forEach(s => {

      const t = (s.service_slots?.time || "").toLowerCase();
      const loc = (s.service_slots?.location || "").toLowerCase();

      // FIXED PRIORITY ORDER (important)
      if(loc.includes("jurong")){
        jurong.push(s);
      }
      else if(t.includes("14") || t.includes("2:30")){
        sat.push(s);
      }
      else if(t.includes("08")){
        s830.push(s);
      }
      else if(t.includes("10:45")){
        s1045.push(s);
      }
    });

  document.getElementById("grid").innerHTML = `
    <div class="col">
      <div class="title">Saturday 2.30pm</div>
      ${sat.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday 8.30am</div>
      ${s830.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday 10.45am</div>
      ${s1045.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday Jurong</div>
      ${jurong.map(card).join("")}
    </div>

    <div class="col">
      ${availabilityPanel()}
    </div>
  `;
}

/* ================= CARD ================= */
function card(s){

  const roles = templateRoles.filter(r =>
    String(r.template_id) === String(s.service_template_id)
  );

  const isComm = s.is_communion_service === true;

  const filtered = isComm
    ? roles
    : roles.filter(r =>
        !(r.role || "").toLowerCase().includes("communion")
      );

  return `
    <div class="card">

      <b>${s.service_slots?.label}</b>
      <div style="font-size:11px;color:#94a3b8">${s.service_date}</div>

      ${filtered.map(r => `
        <div class="row">

          <div class="role">${r.role}</div>

          <div class="staff">
            ${getStaffName(s.id, r.role)}
          </div>

          <button onclick="openAssign('${s.id}','${r.role}')">
            Assign
          </button>

        </div>
      `).join("")}

    </div>
  `;
}

/* ================= 5TH COLUMN (FIXED PROPER FLOW) ================= */
function availabilityPanel(){

  const dates = [...new Set(
    services
      .filter(s => in60Days(s.service_date))
      .map(s => s.service_date)
  )].sort();

  return `
    <div class="panel">

      <div class="title">Availability (60 Days)</div>

      <select id="dateSel" onchange="onDateChange()">
        ${dates.map(d => `
          <option value="${d}">
            ${d}
          </option>
        `).join("")}
      </select>

      <select id="serviceSel" onchange="onServiceChange()"></select>

      <select id="staffSel"></select>

      <button class="danger" onclick="markUnavailable()">
        Mark Unavailable
      </button>

    </div>
  `;
}

/* ================= AVAILABILITY FLOW ================= */
window.onDateChange = function(){

  const date = document.getElementById("dateSel").value;

  const filtered = services.filter(s =>
    s.service_date === date
  );

  document.getElementById("serviceSel").innerHTML =
    filtered.map(s => `
      <option value="${s.id}">
        ${s.service_slots?.label}
      </option>
    `).join("");

  onServiceChange();
};

window.onServiceChange = function(){

  const id = document.getElementById("serviceSel").value;

  const service = services.find(s =>
    String(s.id) === String(id)
  );

  if(!service) return;

  const allowed = new Set(
    templateRoles
      .filter(t =>
        String(t.template_id) ===
        String(service.service_template_id)
      )
      .map(t => String(t.staff_id))
  );

  const unavailable = new Set(
    availability
      .filter(a =>
        a.service_date === service.service_date &&
        a.service_slot_id === service.service_slot_id &&
        a.status === "unavailable"
      )
      .map(a => String(a.staff_id))
  );

  const eligible = staff.filter(s =>
    allowed.has(String(s.id)) &&
    !unavailable.has(String(s.id))
  );

  document.getElementById("staffSel").innerHTML =
    eligible.map(s => `
      <option value="${s.id}">
        ${s.name}
      </option>
    `).join("");
};

/* ================= ASSIGN ================= */
window.openAssign = function(serviceId, role){

  currentService = serviceId;
  currentRole = role;

  document.getElementById("staffSelect").innerHTML =
    staff.map(s => `
      <option value="${s.id}">
        ${s.name}
      </option>
    `).join("");

  document.getElementById("assignModal").style.display = "flex";
};

window.saveAssign = async function(){

  const staffId = document.getElementById("staffSelect").value;

  await db.from("service_roles").upsert({
    service_id: currentService,
    role: currentRole,
    staff_id: staffId
  },{
    onConflict:"service_id,role"
  });

  await load();
  document.getElementById("assignModal").style.display = "none";
};

/* ================= INIT ================= */
window.load = load;
load();

</script>

</body>
</html>
