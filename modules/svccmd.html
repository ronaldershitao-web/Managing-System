<!DOCTYPE html>
<html>
<head>
  <title>Service Command Post</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      background:#111827;
      padding:12px;
      border-radius:10px;
      border:1px solid #1f2937;
    }

    .title { font-weight:bold; font-size:16px; }

    .tag { font-size:12px; color:#94a3b8; }

    .section {
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row {
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:3px 0;
    }

    .good { color:#22c55e; }
    .bad { color:#ef4444; }
  </style>
</head>

<body>

<header>
  ⛪ Service Command Post
  <button onclick="load()" style="background:#3b82f6;color:white;border:none;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "./assets/app.js";
import { getRunningServices, parseSG, formatDate } from "./assets/serviceEngine.js";

async function load() {

  const [
    servicesRes,
    rolesRes,
    staffRes,
    attendanceRes
  ] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location,id)`),
    db.from("service_roles").select(`*, staff(name)`),
    db.from("staff").select("*"),
    db.from("service_attendance").select("*")
  ]);

  let services = servicesRes.data || [];
  const roles = rolesRes.data || [];
  const staff = staffRes.data || [];
  const attendanceList = attendanceRes.data || [];

  // 🔥 FIXED LOGIC ENGINE
  services = getRunningServices(services);

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (const s of services) {

    const slot = s.service_slots || {};
    const d = parseSG(s.service_date);

    const serviceRoles = roles.filter(r => r.service_id === s.id);

    const assigned = new Set(
      serviceRoles.map(r => r.staff_id).filter(Boolean)
    );

    const attendance = attendanceList.find(a => a.service_id === s.id) || {};

    const total =
      (attendance.onsite || 0) +
      (attendance.online || 0) +
      (attendance.communicants || 0);

    grid.innerHTML += `
      <div class="card">

        <div class="title">${slot.label || "Service"}</div>

        <div class="tag">
          ${d.toLocaleDateString("en-SG",{weekday:"long"})} | ${formatDate(s.service_date)}
        </div>

        <div class="tag">⏰ ${slot.time || ""}</div>
        <div class="tag">📍 ${slot.location || ""}</div>

        <div class="section">
          <b>Key Appointments</b>

          ${serviceRoles
            .filter(r => ["Service Pastor","Anchor","Welcome IC"].includes(r.role))
            .map(r => `
              <div class="row">
                <span>${r.role}</span>
                <b>${r.staff?.name ?? "—"}</b>
              </div>
            `).join("")}
        </div>

        <div class="section">
          <b>Attendance</b>
          <div class="row">
            <span>Total</span>
            <b>${total}</b>
          </div>
        </div>

      </div>
    `;
  }
}

window.load = load;
load();

</script>

</body>
</html>
