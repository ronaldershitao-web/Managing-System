<!DOCTYPE html>
<html>
<head>
  <title>Service Command Center (Context-Aware)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #1f2937;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .title{
      color:#fbbf24;
      font-weight:bold;
      margin-bottom:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:6px 0;
      gap:10px;
    }

    .role{ flex:1; }
    .staff{ font-weight:bold; }

    .assigned{ color:#60a5fa; }
    .available{ color:#22c55e; }
    .unavailable{ color:#ef4444; }

    select{
      width:100%;
      padding:6px;
      margin-bottom:8px;
      border-radius:6px;
      background:#0f172a;
      color:white;
      border:1px solid #334155;
    }

    button{
      font-size:10px;
      padding:3px 6px;
      background:#3b82f6;
      border:none;
      border-radius:5px;
      color:white;
      cursor:pointer;
    }
  </style>
</head>

<body>

<header>
  Service Command Center (Context Aware)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">

import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staffList = [];
let templateRoles = [];
let serviceRoles = [];
let staffTemplates = [];
let availability = [];

let staffMap = {};
let roleMap = {};
let availabilityMap = {};

/* ================= LOAD ================= */
async function load(){

  const [
    s,
    st,
    tr,
    sr,
    tpl,
    av
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)").order("service_date",{ascending:true}),
    db.from("staff").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("service_roles").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*")
  ]);

  services = s.data || [];
  staffList = st.data || [];
  templateRoles = tr.data || [];
  serviceRoles = sr.data || [];
  staffTemplates = tpl.data || [];
  availability = av.data || [];

  staffMap = Object.fromEntries(staffList.map(s=>[String(s.id), s.name]));

  roleMap = {};
  serviceRoles.forEach(r=>{
    const key = `${r.service_id}_${String(r.role||"").toLowerCase()}`;
    roleMap[key] = r;
  });

  availabilityMap = {};
  availability.forEach(a=>{
    availabilityMap[`${a.service_date}_${a.staff_id}`] = a.status;
  });

  render();
}

/* ================= CORE LOGIC ================= */

function getPool(service){
  return staffTemplates
    .filter(t => String(t.template_id) === String(service.service_template_id))
    .map(t => t.staff_id);
}

function getAssigned(serviceId, role){
  const key = `${serviceId}_${role.toLowerCase()}`;
  const match = roleMap[key];
  return match ? staffMap[match.staff_id] : "-";
}

function getStatus(service, staffId, role){

  const key = `${service.service_date}_${staffId}`;
  const avail = availabilityMap[key];

  const assignedKey = `${service.id}_${role.toLowerCase()}`;
  const assigned = roleMap[assignedKey];

  if(assigned?.staff_id === staffId) return "assigned";
  if(avail === "unavailable") return "unavailable";
  return "available";
}

/* ================= CARD ================= */

function card(service){

  const roles = templateRoles.filter(r =>
    String(r.template_id) === String(service.service_template_id)
  );

  const pool = getPool(service);

  return `
    <div class="card">

      <b>${service.service_slots?.label}</b>
      <div style="font-size:11px;color:#94a3b8">
        ${service.service_date}
      </div>

      <div style="margin-top:8px">
        <b>Roles</b>

        ${roles.map(r=>`
          <div class="row">
            <div class="role">${r.role}</div>
            <div class="staff">
              ${pool.map(pid=>{
                const status = getStatus(service, pid, r.role);
                return `<div class="${status}">
                  ${staffMap[pid] || "Unknown"} (${status})
                </div>`;
              }).join("")}
            </div>
          </div>
        `).join("")}

      </div>

    </div>
  `;
}

/* ================= RENDER ================= */

function render(){

  const cols = {sat:[], s830:[], s1045:[], jurong:[]};

  services.forEach(s=>{
    const t = (s.service_slots?.time||"").toLowerCase();
    const loc = (s.service_slots?.location||"").toLowerCase();

    if(loc.includes("jurong")) cols.jurong.push(s);
    else if(t.includes("14")||t.includes("2:30")) cols.sat.push(s);
    else if(t.includes("08")) cols.s830.push(s);
    else if(t.includes("10:45")) cols.s1045.push(s);
  });

  document.getElementById("grid").innerHTML = `
    <div class="col">
      <div class="title">Saturday</div>
      ${cols.sat.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">8.30am</div>
      ${cols.s830.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">10.45am</div>
      ${cols.s1045.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Jurong</div>
      ${cols.jurong.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Inspector (Context View)</div>
      <div style="font-size:11px;color:#94a3b8">
        Use future upgrade: date/service selector
      </div>
    </div>
  `;
}

window.load = load;
load();

</script>

</body>
</html>
