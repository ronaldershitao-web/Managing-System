<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Stable Ordered System)</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      background:#111827;
      padding:12px;
      border-radius:10px;
      border:1px solid #1f2937;
      min-height:200px;
    }

    .title {
      font-weight:bold;
      color:#60a5fa;
      margin-bottom:6px;
    }

    .tag {
      font-size:12px;
      color:#94a3b8;
    }

    .section {
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row {
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:3px 0;
    }

    .good { color:#22c55e; }
    .bad { color:#ef4444; }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Stable Ordered View)
  <button onclick="load()" style="background:#3b82f6;color:white;border:none;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";



/* =========================
   SAFE DATE (CRITICAL FIX)
========================= */
function parseDate(dateStr) {
  if (!dateStr) return new Date(0);
  const [y, m, d] = dateStr.split("-");
  return new Date(Number(y), Number(m) - 1, Number(d));
}



/* =========================
   WINDOW FILTER (-7 / +7 DAYS)
========================= */
function inWindow(dateStr) {
  const today = new Date();

  const min = new Date(today);
  min.setDate(today.getDate() - 7);

  const max = new Date(today);
  max.setDate(today.getDate() + 7);

  const d = parseDate(dateStr);

  return d >= min && d <= max;
}



/* =========================
   FIXED SLOT ORDER (IMPORTANT)
========================= */
function getSlotIndex(s) {

  const label = (s.service_slots?.label || "").toLowerCase();
  const time = (s.service_slots?.time || "").toLowerCase();
  const location = (s.service_slots?.location || "").toLowerCase();

  const text = `${label} ${time} ${location}`;

  if (text.includes("saturday")) return 0;
  if (text.includes("8.30") || text.includes("0830")) return 1;
  if (text.includes("10.45") || text.includes("1045")) return 2;
  if (text.includes("jurong")) return 3;

  return -1;
}



/* =========================
   LOAD COMMAND POST
========================= */
async function load() {

  const [
    servicesRes,
    rolesRes,
    staffRes
  ] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location,id)`),
    db.from("service_roles").select(`*, staff(name)`),
    db.from("staff").select("*")
  ]);

  let services = servicesRes.data || [];
  const roles = rolesRes.data || [];
  const staff = staffRes.data || [];



  /* =========================
     FILTER WINDOW ONLY
  ========================= */
  services = services.filter(s => inWindow(s.service_date));



  /* =========================
     SORT ASCENDING
  ========================= */
  services.sort((a, b) =>
    parseDate(a.service_date) - parseDate(b.service_date)
  );



  /* =========================
     CREATE FIXED 4 COLUMNS
  ========================= */
  const slots = [[], [], [], []];

  services.forEach(s => {
    const idx = getSlotIndex(s);
    if (idx >= 0) slots[idx].push(s);
  });



  /* =========================
     SORT INSIDE EACH COLUMN
  ========================= */
  slots.forEach(col => {
    col.sort((a, b) =>
      parseDate(a.service_date) - parseDate(b.service_date)
    );
  });



  /* =========================
     RENDER
  ========================= */
  const grid = document.getElementById("grid");
  grid.innerHTML = "";



  slots.forEach(col => {

    grid.innerHTML += `
      <div class="card">

        ${
          col.map(s => {

            const rolesForService =
              roles.filter(r => r.service_id === s.id);

            const d = parseDate(s.service_date);

            const day = d.toLocaleDateString("en-SG", {
              weekday: "long"
            });

            const datePretty = d.toLocaleDateString("en-SG", {
              day:"2-digit",
              month:"short",
              year:"numeric"
            });

            return `
              <div style="margin-bottom:14px;">

                <div class="title">
                  ${s.service_slots?.label || "Service"}
                </div>

                <div class="tag">
                  ${day} | ${datePretty}
                </div>

                <div class="tag">
                  ⏰ ${s.service_slots?.time || ""}
                </div>

                <div class="section">
                  <b>Key Appointment</b>

                  ${rolesForService
                    .filter(r =>
                      ["Service Pastor","Anchor","Welcome IC"].includes(r.role)
                    )
                    .map(r => `
                      <div class="row">
                        <span>${r.role}</span>
                        <b>${r.staff?.name || "-"}</b>
                      </div>
                    `).join("")}
                </div>

                <div class="section">
                  <b>Roles</b>

                  ${rolesForService.map(r => `
                    <div class="row">
                      <span>${r.role}</span>
                      <span>${r.staff?.name || "-"}</span>
                    </div>
                  `).join("")}
                </div>

              </div>
            `;
          }).join("")
        }

      </div>
    `;
  });
}



/* INIT */
window.load = load;
load();

</script>

</body>
</html>
