<!DOCTYPE html>
<html>
<head>
  <title>Command Post (RESTORED)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .panel{
      background:#111827;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-top:10px;
    }

    .panel-title{
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:8px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:5px 0;
      align-items:center;
      gap:6px;
    }

    .good{color:#22c55e;font-weight:bold;}
    .bad{color:#ef4444;font-weight:bold;}

    button{
      cursor:pointer;
    }

    button.small{
      font-size:10px;
      padding:3px 6px;
      border:none;
      border-radius:4px;
      background:#3b82f6;
      color:white;
    }

    .group-title{
      margin-top:8px;
      font-weight:bold;
      color:#60a5fa;
    }

    select, input{
      width:100%;
      padding:6px;
      margin-top:6px;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post RESTORED
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let staffList = [];
let templates = [];
let availability = [];
let services = [];
let roles = [];
let templateRoles = [];

let staffMap = new Map();
let roleMap = new Map();
let templateRoleMap = new Map();
let availabilityMap = new Map();

/* ================= HELPERS ================= */

function safeLower(v){
  return (v || "").toString().toLowerCase();
}

/* ================= LOAD ================= */

async function load(){

  const [
    sRes,tRes,aRes,stRes,rRes,trRes
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("staff").select("*"),
    db.from("service_roles").select("*"),
    db.from("service_template_roles").select("*")
  ]);

  services = sRes.data || [];
  templates = tRes.data || [];
  availability = aRes.data || [];
  staffList = stRes.data || [];
  roles = rRes.data || [];
  templateRoles = trRes.data || [];

  staffMap = new Map(staffList.map(s => [String(s.id), s.name]));

  roleMap = new Map();
  roles.forEach(r=>{
    const sid = String(r.service_id);
    if(!roleMap.has(sid)) roleMap.set(sid,[]);
    roleMap.get(sid).push(r);
  });

  templateRoleMap = new Map();
  templateRoles.forEach(r=>{
    const tid = String(r.template_id);
    if(!templateRoleMap.has(tid)) templateRoleMap.set(tid,[]);
    templateRoleMap.get(tid).push(r);
  });

  render();
}

/* ================= RENDER ================= */

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const cols = [[],[],[],[],[]];

  services.forEach(s=>{

    const t = (s.service_slots?.time || "");

    if(t.includes("14")) cols[0].push(s);
    else if(t.includes("08")) cols[1].push(s);
    else if(t.includes("10")) cols[2].push(s);
    else cols[3].push(s);
  });

  /* ================= 4 SERVICE COLUMNS ================= */
  cols.slice(0,4).forEach(col=>{

    const html = col.map(s=>{

      const templateStaff =
        templates.filter(t=>String(t.template_id)===String(s.service_template_id));

      const assigned = new Map();
      templateStaff.forEach(t=>{
        assigned.set(t.role,t.staff_id);
      });

      const roleDefs =
        templateRoleMap.get(String(s.service_template_id)) || [];

      const appointments = roleDefs.map(r=>{

        const role = r.role || "";
        const sid = assigned.get(role);

        return {
          role,
          staffId: sid,
          name: staffMap.get(String(sid)) || "-"
        };
      });

      return `
        <div class="card">
          <b>${s.service_slots?.label || ""}</b>

          ${appointments.map(a=>`
            <div class="row">
              <span>${a.role}</span>
              <span>
                ${a.name}
                <button class="small"
                  onclick="openAssign('${s.id}','${a.role}')">
                  Assign
                </button>
              </span>
            </div>
          `).join("")}

        </div>
      `;
    }).join("");

    grid.innerHTML += `<div class="col">${html}</div>`;
  });

  /* ================= 5TH COLUMN ================= */
  const today = new Date();
  const dates = [];

  for(let i=0;i<60;i++){
    const d = new Date();
    d.setDate(today.getDate()+i);
    dates.push(d.toISOString().split("T")[0]);
  }

  grid.innerHTML += `
    <div class="col">
      <b>Staff Availability</b>

      <select id="dateSel" onchange="filterService()">
        ${dates.map(d=>`<option>${d}</option>`).join("")}
      </select>

      <select id="serviceSel" onchange="filterStaff()"></select>
      <select id="staffSel"></select>

      <button onclick="markUnavailable()" style="background:#ef4444;color:white;">
        Mark Unavailable
      </button>
    </div>
  `;
}

/* ================= ASSIGN ================= */

window.openAssign = function(serviceId, role){

  window.current = {serviceId, role};

  alert("Assign opened for " + role);
};

window.markUnavailable = async function(){

  const staff_id = document.getElementById("staffSel").value;
  const service_date = document.getElementById("dateSel").value;

  await db.from("staff_availability").insert({
    staff_id,
    service_date,
    status:"unavailable"
  });

  load();
};

window.load = load;
load();

</script>

</body>
</html>
