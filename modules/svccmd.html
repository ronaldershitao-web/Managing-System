<!DOCTYPE html>
<html>
<head>
  <title>Service Command Center (Clean Architecture)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .title{
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:6px 0;
      align-items:center;
    }

    .role{ flex:1; }
    .staff{ color:#22c55e; font-weight:bold; }

    select{
      width:100%;
      padding:6px;
      margin-bottom:8px;
      background:#0f172a;
      color:white;
      border:1px solid #334155;
      border-radius:6px;
    }

    button{
      font-size:11px;
      padding:5px 8px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    .danger{
      background:#ef4444;
    }

    .chip{
      padding:3px 6px;
      border-radius:6px;
      font-size:11px;
      cursor:pointer;
      border:1px solid #334155;
    }

    .avail { color:#22c55e; }
    .unavail { color:#ef4444; }
  </style>
</head>

<body>

<header>
  Service Command Center
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">

import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staffList = [];
let templateRoles = [];
let serviceRoles = [];
let staffTemplates = [];
let availability = [];

let staffMap = {};
let roleMap = {};
let poolMap = {};

let selectedStaffId = null;
let selectedService = null;

/* ================= LOAD ================= */
async function load(){

  const [s, st, tr, sr, tpl, av] = await Promise.all([
    db.from("services").select("* , service_slots(label,time,location)")
      .order("service_date",{ascending:true}),
    db.from("staff").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("service_roles").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*")
  ]);

  services = s.data || [];
  staffList = st.data || [];
  templateRoles = tr.data || [];
  serviceRoles = sr.data || [];
  staffTemplates = tpl.data || [];
  availability = av.data || [];

  staffMap = Object.fromEntries(
    staffList.map(s => [String(s.id), s.name])
  );

  /* latest assignment only */
  roleMap = {};
  serviceRoles.forEach(r => {

    const key = `${r.service_id}_${r.role?.toLowerCase()}`;

    if(!roleMap[key] ||
      new Date(r.created_at) > new Date(roleMap[key].created_at)
    ){
      roleMap[key] = r;
    }
  });

  /* template pool */
  poolMap = {};
  staffTemplates.forEach(t => {
    if(!poolMap[t.template_id]) poolMap[t.template_id] = [];
    poolMap[t.template_id].push({
      id: t.staff_id,
      name: staffMap[t.staff_id] || "Unknown"
    });
  });

  render();
}

/* ================= HELPERS ================= */
function getRoles(service){

  let roles = templateRoles.filter(r =>
    String(r.template_id) === String(service.service_template_id)
  );

  if(service.is_communion_service === false){
    roles = roles.filter(r => r.is_communion_role !== true);
  }

  return roles;
}

function getAssigned(serviceId, role){

  const key = `${serviceId}_${role?.toLowerCase()}`;
  const match = roleMap[key];

  return match ? staffMap[match.staff_id] : "-";
}

function getAvailable(service){

  const pool = poolMap[service.service_template_id] || [];

  const unavailable = new Set(
    availability
      .filter(a =>
        a.service_date === service.service_date &&
        a.service_slot_id === service.service_slot_id &&
        a.status === "unavailable"
      )
      .map(a => String(a.staff_id))
  );

  const available = pool.filter(p => !unavailable.has(String(p.id)));

  return { pool, unavailable, available };
}

/* ================= MARK UNAVAILABLE ================= */
window.markUnavailable = async function(){

  if(!selectedService || !selectedStaffId) return;

  await db.from("staff_availability").insert({
    staff_id: selectedStaffId,
    service_date: selectedService.service_date,
    service_slot_id: selectedService.service_slot_id,
    status: "unavailable"
  });

  selectedStaffId = null;
  await load();

  if(selectedService){
    onServiceSelect(selectedService.id);
  }
};

/* ================= CARD ================= */
function card(service){

  const roles = getRoles(service);

  return `
    <div class="card">
      <b>${service.service_slots?.label}</b>
      <div style="font-size:11px;color:#94a3b8">
        ${service.service_date}
      </div>

      ${roles.map(r => `
        <div class="row">
          <div class="role">${r.role}</div>
          <div class="staff">${getAssigned(service.id, r.role)}</div>
        </div>
      `).join("")}
    </div>
  `;
}

/* ================= INSPECTOR ================= */
function inspector(){

  const dates = [...new Set(services.map(s => s.service_date))];

  return `
    <div class="title">Service Inspector</div>

    <select id="dateSel" onchange="onDate()">
      <option value="">Select Date</option>
      ${dates.map(d => `<option value="${d}">${d}</option>`).join("")}
    </select>

    <select id="serviceSel" onchange="onServiceSelect()"></select>

    <div id="poolView" class="card">
      Select service
    </div>

    <button class="danger" onclick="markUnavailable()">
      Mark Unavailable
    </button>
  `;
}

/* ================= UI EVENTS ================= */
window.onDate = function(){

  const date = document.getElementById("dateSel").value;

  const filtered = services.filter(s => s.service_date === date);

  document.getElementById("serviceSel").innerHTML = `
    <option value="">Select</option>
    ${filtered.map(s => `
      <option value="${s.id}">
        ${s.service_slots?.label}
      </option>
    `).join("")}
  `;
};

window.onServiceSelect = function(serviceId){

  const id = serviceId || document.getElementById("serviceSel").value;

  const service = services.find(s => String(s.id) === String(id));
  if(!service) return;

  selectedService = service;

  const { pool, unavailable, available } = getAvailable(service);

  document.getElementById("poolView").innerHTML = `
    <b>${service.service_slots?.label}</b>
    <div style="font-size:11px;color:#94a3b8">
      ${service.service_date}
    </div>

    <div style="margin-top:10px">
      <b>Click staff to select</b>
      ${available.map(p => `
        <div class="chip avail"
          onclick="selectStaff('${p.id}')">
          ${p.name}
        </div>
      `).join(" ")}
    </div>

    <div style="margin-top:10px">
      <b>Unavailable</b>
      ${[...unavailable].map(id => `
        <div class="chip unavail">
          ${staffMap[id] || "Unknown"}
        </div>
      `).join(" ")}
    </div>
  `;
};

window.selectStaff = function(id){
  selectedStaffId = id;
};

/* ================= RENDER ================= */
function render(){

  const cols = { sat:[], s1:[], s2:[], jurong:[] };

  services.forEach(s => {

    const t = (s.service_slots?.time||"").toLowerCase();
    const l = (s.service_slots?.location||"").toLowerCase();

    if(l.includes("jurong")) cols.jurong.push(s);
    else if(t.includes("14")) cols.sat.push(s);
    else if(t.includes("08")) cols.s1.push(s);
    else cols.s2.push(s);
  });

  grid.innerHTML = `
    <div class="col">
      <div class="title">Sat</div>
      ${cols.sat.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">8.30</div>
      ${cols.s1.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">10.45</div>
      ${cols.s2.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Jurong</div>
      ${cols.jurong.map(card).join("")}
    </div>

    <div class="col">
      ${inspector()}
    </div>
  `;
}

window.load = load;
load();

</script>

</body>
</html>
