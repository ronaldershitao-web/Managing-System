<!DOCTYPE html>
<html>
<head>
  <title>Service Command Center</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:14px;
      background:#111827;
      font-size:18px;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
    }

    .container{
      padding:14px;
    }

    .service-card{
      background:#111827;
      border:1px solid #334155;
      border-radius:10px;
      margin-bottom:12px;
      padding:12px;
    }

    .service-title{
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:6px;
    }

    .meta{
      font-size:12px;
      color:#94a3b8;
      margin-bottom:10px;
    }

    .role-row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      padding:4px 0;
      border-bottom:1px solid #1f2937;
    }

    .role{
      flex:1;
    }

    .staff{
      font-weight:bold;
      color:#22c55e;
    }

    .missing{
      color:#ef4444;
    }

    .badge{
      font-size:10px;
      padding:2px 6px;
      border-radius:4px;
      margin-left:6px;
    }

    .ok{ background:#16a34a; }
    .warn{ background:#f59e0b; }
    .bad{ background:#ef4444; }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }
  </style>
</head>

<body>

<header>
  Service Command Center
  <button onclick="load()">Refresh</button>
</header>

<div class="container" id="container"></div>

<script type="module">
import { db } from "../assets/app.js";

let services = [];
let roles = [];
let staffMap = {};
let availability = [];

async function load(){

  const [
    s,
    r,
    st,
    av
  ] = await Promise.all([
    db.from("services").select(`
      *,
      service_slots(label,time,location)
    `).order("service_date",{ascending:true}),

    db.from("service_roles").select(`
      id,
      service_id,
      role,
      staff_id,
      created_at,
      staff:staff_id(id,name)
    `),

    db.from("staff").select("*"),

    db.from("staff_availability").select("*")
  ]);

  services = s.data || [];
  roles = r.data || [];
  availability = av.data || [];

  staffMap = Object.fromEntries(
    (st.data || []).map(s => [s.id, s.name])
  );

  render();
}

function getStaffName(r){
  return r.staff?.name || staffMap[r.staff_id] || "Unassigned";
}

function getServiceRoles(serviceId){

  return roles.filter(r =>
    r.service_id === serviceId
  );
}

function render(){

  const container = document.getElementById("container");
  container.innerHTML = "";

  services.forEach(service => {

    const serviceRoles = getServiceRoles(service.id);

    const htmlRoles = serviceRoles.map(r => {

      const name = getStaffName(r);

      return `
        <div class="role-row">
          <div class="role">${r.role}</div>

          <div class="staff">
            ${name}
          </div>
        </div>
      `;
    }).join("");

    container.innerHTML += `
      <div class="service-card">

        <div class="service-title">
          ${service.service_slots?.label || "Service"}
        </div>

        <div class="meta">
          ${service.service_date}
        </div>

        ${htmlRoles || `<div class="missing">No roles assigned</div>`}

      </div>
    `;
  });
}

window.load = load;
load();

</script>

</body>
</html>
