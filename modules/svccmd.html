<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Template-Based Count)</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      background:#111827;
      padding:12px;
      border-radius:10px;
      border:1px solid #1f2937;
      min-height:200px;
    }

    .title {
      font-weight:bold;
      color:#60a5fa;
    }

    .tag {
      font-size:12px;
      color:#94a3b8;
    }

    .section {
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row {
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:3px 0;
    }

    .good { color:#22c55e; }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Template-Based Staffing)
  <button onclick="load()" style="background:#3b82f6;color:white;border:none;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* =========================
   SAFE DATE
========================= */
function parseDate(dateStr) {
  const [y, m, d] = dateStr.split("-");
  return new Date(Number(y), Number(m)-1, Number(d));
}

/* =========================
   WINDOW FILTER
========================= */
function inWindow(dateStr) {
  const today = new Date();

  const min = new Date(today);
  min.setDate(today.getDate() - 7);

  const max = new Date(today);
  max.setDate(today.getDate() + 7);

  const d = parseDate(dateStr);

  return d >= min && d <= max;
}

/* =========================
   LOAD
========================= */
async function load() {

  const [
    servicesRes,
    templateStaffRes
  ] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location)`),
    db.from("staff_service_templates").select("staff_id, template_id")
  ]);

  let services = servicesRes.data || [];
  const templateStaff = templateStaffRes.data || [];

  /* =========================
     FILTER WINDOW
  ========================= */
  services = services.filter(s => inWindow(s.service_date));

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (const s of services) {

    const templateId = s.service_template_id;

    /* =========================
       FIXED: TOTAL STAFF ASSIGNED
    ========================= */
    const assignedStaff = templateStaff
      .filter(t => t.template_id === templateId);

    const totalAssigned = new Set(
      assignedStaff.map(a => a.staff_id)
    ).size;

    const d = parseDate(s.service_date);

    const day = d.toLocaleDateString("en-SG", { weekday:"long" });

    const datePretty = d.toLocaleDateString("en-SG", {
      day:"2-digit",
      month:"short"
    });

    grid.innerHTML += `
      <div class="card">

        <div class="title">
          ${s.service_slots?.label || "Service"}
        </div>

        <div class="tag">
          ${day} | ${datePretty}
        </div>

        <div class="tag">
          ⏰ ${s.service_slots?.time || ""}
        </div>

        <div class="section">
          <b>Total Staff Assigned (Template Based)</b>

          <div class="row">
            <span>Assigned Staff</span>
            <b class="good">${totalAssigned}</b>
          </div>
        </div>

      </div>
    `;
  }
}

window.load = load;
load();

</script>

</body>
</html>
