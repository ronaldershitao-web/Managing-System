<!DOCTYPE html>
<html>
<head>
  <title>Command Post (ROSTER SYSTEM v2)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .title{ color:#60a5fa; font-weight:bold; }
    .tag{ font-size:12px; color:#94a3b8; }

    .section{
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
    }

    .good{ color:#22c55e; }
    .bad{ color:#ef4444; }

    button.small{
      font-size:10px;
      padding:2px 6px;
      margin-left:6px;
      border:none;
      border-radius:4px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    /* MODAL */
    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#111827;
      padding:20px;
      border-radius:10px;
      width:350px;
    }

    select, button{
      width:100%;
      padding:8px;
      margin-top:10px;
      border-radius:6px;
      border:none;
    }

    .save-btn{ background:#22c55e; color:white; }
    .close-btn{ background:#ef4444; color:white; }

    .staff-card{
      background:#0f172a;
      border:1px solid #334155;
      padding:8px;
      margin-top:6px;
      border-radius:6px;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (ROSTER SYSTEM v2)
  <button onclick="load()" style="background:#3b82f6;color:white;border:none;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <div id="modalTitle">Assign</div>

    <select id="staffSelect"></select>

    <button class="save-btn" onclick="saveAssign()">Assign / Reassign</button>
    <button class="close-btn" onclick="closeModal()">Close</button>

  </div>
</div>

<script type="module">
import { db } from "../assets/app.js";

let currentServiceId = null;
let currentRole = null;
let staffList = [];
let selectedService = null;

/* ================= DATE ================= */
function parseDate(d){
  if(!d) return null;
  const [y,m,day] = d.split("-");
  return new Date(Number(y),Number(m)-1,Number(day));
}

/* ================= ±1 WEEK ================= */
function inWindow(d){
  const dt = parseDate(d);
  if(!dt) return false;

  const now = new Date();
  const min = new Date(now); min.setDate(now.getDate()-7);
  const max = new Date(now); max.setDate(now.getDate()+7);

  return dt >= min && dt <= max;
}

/* ================= LOAD ================= */
async function load(){

  const [
    servicesRes,
    rolesRes,
    availabilityRes,
    staffRes
  ] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location)`),
    db.from("service_roles").select("*"),
    db.from("staff_availability").select("*"),
    db.from("staff").select("*")
  ]);

  let services = (servicesRes.data || []).filter(s => inWindow(s.service_date));
  const roles = rolesRes.data || [];
  const availability = availabilityRes.data || [];
  staffList = staffRes.data || [];

  const staffMap = new Map(staffList.map(s => [String(s.id), s.name]));

  const roleMap = new Map();
  roles.forEach(r => {
    const key = String(r.service_id);
    if(!roleMap.has(key)) roleMap.set(key, []);
    roleMap.get(key).push(r);
  });

  services.sort((a,b)=>parseDate(a.service_date)-parseDate(b.service_date));

  const cols=[[],[],[],[]];

  services.forEach(s=>{
    const t=(s.service_slots?.time||"").toLowerCase();
    const loc=(s.service_slots?.location||"").toLowerCase();

    let i=-1;
    if(t.includes("1430")) i=0;
    else if(t.includes("0830")) i=1;
    else if(t.includes("1045")&&!loc.includes("jurong")) i=2;
    else if(loc.includes("jurong")) i=3;

    if(i>=0) cols[i].push(s);
  });

  const grid=document.getElementById("grid");
  grid.innerHTML="";

  cols.forEach(col=>{
    grid.innerHTML+=`
      <div class="col">

      ${col.map(s=>{

        const serviceRoles = roleMap.get(String(s.id))||[];

        const assignedCount = serviceRoles.filter(r=>r.staff_id).length;

        const unavailableCount = availability.filter(a=>
          a.service_date===s.service_date &&
          a.service_slot_id===s.service_slot_id &&
          a.status==="unavailable"
        ).length;

        const d=parseDate(s.service_date);

        const KEY=["Service Pastor","Anchor","Welcome IC","Hospitality Cell"];

        const appointments=KEY.map(role=>{
          const found=serviceRoles.find(r=>
            (r.role||"").toLowerCase()===role.toLowerCase()
          );

          return {
            role,
            name:found?.staff_id?staffMap.get(String(found.staff_id)):"-"
          };
        });

        return `
        <div class="card">

          <div class="title">${s.service_slots?.label||"Service"}</div>

          <div class="tag">
            ${d.toLocaleDateString("en-SG",{weekday:"long"})} |
            ${d.toLocaleDateString("en-SG",{day:"2-digit",month:"short"})}
          </div>

          <div class="tag">⏰ ${s.service_slots?.time||""}</div>

          <div class="section">
            <b>Stats</b>
            <div class="row"><span>Assigned</span><span>${assignedCount}</span></div>
            <div class="row"><span>Unavailable</span><span class="bad">${unavailableCount}</span></div>
          </div>

          <div class="section">
            <b>Appointments</b>

            ${appointments.map(a=>`
              <div class="row">
                <span>${a.role}</span>
                <span>
                  ${a.name}
                  <button class="small"
                    onclick="openAssign('${s.id}','${a.role}')">
                    Assign
                  </button>
                </span>
              </div>
            `).join("")}

          </div>

        </div>
        `;
      }).join("")}

      </div>
    `;
  });
}

/* ================= ASSIGN MODAL ================= */
window.openAssign=function(serviceId,role){
  currentServiceId=serviceId;
  currentRole=role;

  document.getElementById("modalTitle").innerText="Assign "+role;

  const select=document.getElementById("staffSelect");
  select.innerHTML=staffList.map(s=>
    `<option value="${s.id}">${s.name}</option>`
  ).join("");

  document.getElementById("modal").style.display="flex";
};

window.closeModal=()=>document.getElementById("modal").style.display="none";

/* UPSERT */
window.saveAssign=async function(){

  const staffId=document.getElementById("staffSelect").value;

  const {error}=await db.from("service_roles").upsert({
    service_id:currentServiceId,
    role:currentRole,
    staff_id:staffId
  },{onConflict:"service_id,role"});

  if(error){
    alert("Failed");
    console.log(error);
    return;
  }

  closeModal();
  load();
};

window.load=load;
load();

</script>

</body>
</html>
