<!DOCTYPE html>
<html>
<head>
  <title>SVCCMD - Restored Stable</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .panel{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-top:10px;
    }

    .panel-title{
      color:#fbbf24;
      font-weight:bold;
      margin-bottom:6px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
      align-items:center;
      gap:6px;
    }

    button{
      font-size:11px;
      border:none;
      border-radius:4px;
      padding:4px 6px;
      cursor:pointer;
    }

    .small{background:#3b82f6;color:white}
    .danger{background:#ef4444;color:white}
    .good{color:#22c55e}
    .bad{color:#ef4444}

    select{
      width:100%;
      padding:6px;
      margin-top:6px;
      border-radius:6px;
    }
  </style>
</head>

<body>

<header>
  ⛪ SVCCMD (Restored Full System)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staffList = [];
let templates = [];
let availability = [];
let roleMap = new Map();
let staffMap = new Map();

/* ================= DATE ================= */
function formatDate(d){
  const dt = new Date(d);
  return dt.toLocaleDateString("en-GB", {
    day:"2-digit",
    month:"short",
    year:"numeric"
  });
}

/* ================= LOAD ================= */
async function load(){

  const [s, st, t, a, r] = await Promise.all([
    db.from("services").select("*, service_slots(label,time)"),
    db.from("staff").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("service_roles").select("*")
  ]);

  services = s.data || [];
  staffList = st.data || [];
  templates = t.data || [];
  availability = a.data || [];

  staffMap = new Map(staffList.map(x => [String(x.id), x.name]));

  roleMap = new Map();
  (r.data || []).forEach(x=>{
    const k = String(x.service_id);
    if(!roleMap.has(k)) roleMap.set(k, []);
    roleMap.get(k).push(x);
  });

  render();
}

/* ================= GROUP SLOT ================= */
function groupService(s){

  const t = s.service_slots?.time || "";

  if(t.includes("14")) return "SAT_2.30";
  if(t.includes("08")) return "SUN_8.30";
  if(t.includes("10")) return "SUN_10.45";
  return "JURONG";
}

/* ================= RENDER ================= */
function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const cols = [[],[],[],[]];

  services.forEach(s=>{
    const g = groupService(s);

    if(g==="SAT_2.30") cols[0].push(s);
    if(g==="SUN_8.30") cols[1].push(s);
    if(g==="SUN_10.45") cols[2].push(s);
    if(g==="JURONG") cols[3].push(s);
  });

  cols.forEach(col=>{

    grid.innerHTML += `
      <div class="col">
        ${col.map(renderCard).join("")}
      </div>
    `;
  });

  renderAvailabilityColumn();
}

/* ================= SERVICE CARD ================= */
function renderCard(s){

  const assigned = roleMap.get(String(s.id)) || [];

  return `
    <div class="card">

      <b>${s.service_slots?.label}</b><br>
      ${formatDate(s.service_date)}

      <div class="panel">
        <div class="panel-title">Assignments</div>

        ${assigned.map(a=>`
          <div class="row">
            <span>${a.role}</span>
            <span>${staffMap.get(String(a.staff_id)) || "-"}</span>
          </div>
        `).join("")}
      </div>

      <button class="small"
        onclick="assign('${s.id}')">
        Assign
      </button>

    </div>
  `;
}

/* ================= COLUMN 5 ================= */
function renderAvailabilityColumn(){

  const dates = [...new Set(services.map(s=>s.service_date))];

  const html = `
    <div class="col">

      <b>Staff Availability</b>

      <select id="dateSel" onchange="loadServices()">
        ${dates.map(d=>`
          <option value="${d}">
            ${formatDate(d)}
          </option>
        `).join("")}
      </select>

      <select id="serviceSel" onchange="loadStaff()"></select>

      <select id="staffSel"></select>

      <button class="danger" onclick="markUnavailable()">
        Mark Unavailable
      </button>

    </div>
  `;

  document.getElementById("grid").innerHTML += html;

  loadServices();
}

/* ================= FILTER SERVICES ================= */
window.loadServices = function(){

  const date = document.getElementById("dateSel").value;

  const list = services.filter(s=>s.service_date===date);

  document.getElementById("serviceSel").innerHTML =
    list.map(s=>`
      <option value="${s.id}">
        ${s.service_slots?.label}
      </option>
    `).join("");

  loadStaff();
};

/* ================= FIXED STAFF FILTER (IMPORTANT) ================= */
window.loadStaff = function(){

  const id = document.getElementById("serviceSel").value;

  const service = services.find(s=>String(s.id)===String(id));
  if(!service) return;

  const templateStaff =
    templates.filter(t =>
      String(t.template_id) === String(service.service_template_id)
    );

  const allowed = new Set(templateStaff.map(t=>String(t.staff_id)));

  const unavailable = new Set(
    availability
      .filter(a =>
        a.service_date === service.service_date &&
        a.service_slot_id === service.service_slot_id &&
        a.status === "unavailable"
      )
      .map(a=>String(a.staff_id))
  );

  const eligible = staffList.filter(s=>{
    const id = String(s.id);
    return allowed.has(id) && !unavailable.has(id);
  });

  document.getElementById("staffSel").innerHTML =
    eligible.map(s=>`
      <option value="${s.id}">
        ${s.name}
      </option>
    `).join("");
};

/* ================= ACTIONS ================= */
window.assign = function(serviceId){
  const staffId = prompt("Staff ID");
  const role = prompt("Role");

  db.from("service_roles").upsert({
    service_id: serviceId,
    staff_id: staffId,
    role: role
  },{onConflict:"service_id,role"});

  load();
};

window.markUnavailable = async function(){

  const staffId = document.getElementById("staffSel").value;
  const serviceId = document.getElementById("serviceSel").value;

  const service = services.find(s=>String(s.id)===String(serviceId));

  await db.from("staff_availability").upsert({
    staff_id: staffId,
    service_date: service.service_date,
    service_slot_id: service.service_slot_id,
    status:"unavailable"
  },{onConflict:"staff_id,service_date,service_slot_id"});

  load();
};

window.load = load;
load();

</script>

</body>
</html>
