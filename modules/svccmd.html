<!DOCTYPE html>
<html>
<head>
  <title>Command Post (MODAL ASSIGN)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .title{
      color:#60a5fa;
      font-weight:bold;
      margin-bottom:4px;
    }

    .tag{
      font-size:12px;
      color:#94a3b8;
      margin-bottom:2px;
    }

    .section{
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:12px;
      margin:4px 0;
    }

    .good{ color:#22c55e; }
    .bad{ color:#ef4444; }

    button.small{
      margin-left:6px;
      font-size:10px;
      padding:2px 6px;
      border-radius:4px;
      background:#3b82f6;
      color:white;
      border:none;
      cursor:pointer;
    }

    /* ================= MODAL ================= */
    .modal{
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#111827;
      padding:20px;
      border-radius:10px;
      width:300px;
      border:1px solid #334155;
    }

    select, button{
      width:100%;
      padding:8px;
      margin-top:10px;
      border-radius:6px;
      border:none;
    }

    .close-btn{
      background:#ef4444;
      color:white;
    }

    .save-btn{
      background:#22c55e;
      color:white;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (MODAL)
  <button onclick="load()"
    style="background:#3b82f6;color:white;border:none;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<!-- ================= MODAL ================= -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div id="modalTitle">Assign</div>

    <select id="staffSelect"></select>

    <button class="save-btn" onclick="saveAssign()">Assign</button>
    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script type="module">
import { db } from "../assets/app.js";

let currentServiceId = null;
let currentRole = null;
let staffList = [];

/* ================= DATE ================= */
function parseDate(d){
  if(!d) return null;
  const [y,m,day] = d.split("-");
  return new Date(Number(y), Number(m)-1, Number(day));
}

/* ================= WINDOW ================= */
function inWindow(d){
  const dt = parseDate(d);
  if(!dt) return false;

  const now = new Date();
  const min = new Date(now); min.setDate(now.getDate() - 7);
  const max = new Date(now); max.setDate(now.getDate() + 7);

  return dt >= min && dt <= max;
}

/* ================= LOAD ================= */
async function load(){

  const [
    servicesRes,
    rolesRes,
    templateRes,
    availabilityRes,
    staffRes
  ] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location)`),
    db.from("service_roles").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("staff").select("*")
  ]);

  let services = (servicesRes.data || []).filter(s => inWindow(s.service_date));
  const roles = rolesRes.data || [];
  const templates = templateRes.data || [];
  const availability = availabilityRes.data || [];
  staffList = staffRes.data || [];

  const staffMap = new Map(staffList.map(s => [String(s.id), s.name]));

  const roleMap = new Map();
  roles.forEach(r => {
    const key = String(r.service_id);
    if (!roleMap.has(key)) roleMap.set(key, []);
    roleMap.get(key).push(r);
  });

  const templateMap = new Map();
  templates.forEach(t => {
    const key = String(t.template_id);
    if (!templateMap.has(key)) templateMap.set(key, []);
    templateMap.get(key).push(t);
  });

  services.sort((a,b) =>
    parseDate(a.service_date) - parseDate(b.service_date)
  );

  const cols = [[],[],[],[]];

  services.forEach(s => {
    const time = (s.service_slots?.time || "").toLowerCase();
    const location = (s.service_slots?.location || "").toLowerCase();
    const t = time.replace(":","");

    let i = -1;
    if(t.includes("1430")) i = 0;
    else if(t.includes("0830")) i = 1;
    else if(t.includes("1045") && !location.includes("jurong")) i = 2;
    else if(location.includes("jurong")) i = 3;

    if(i >= 0) cols[i].push(s);
  });

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cols.forEach(col => {

    grid.innerHTML += `
      <div class="col">

        ${col.map(s => {

          const serviceKey = String(s.service_id || s.id);
          const serviceRoles = roleMap.get(serviceKey) || [];

          const KEY = ["Service Pastor","Anchor","Welcome IC","Hospitality Cell"];

          const appointments = KEY.map(role => {

            const found = serviceRoles.find(r =>
              (r.role || "").trim().toLowerCase() === role.toLowerCase()
            );

            const name = found?.staff_id
              ? staffMap.get(String(found.staff_id))
              : "-";

            return { role, name };
          });

          const d = parseDate(s.service_date);

          return `
            <div class="card">

              <div class="title">${s.service_slots?.label || "Service"}</div>

              <div class="tag">
                ${d.toLocaleDateString("en-SG",{weekday:"long"})} |
                ${d.toLocaleDateString("en-SG",{day:"2-digit",month:"short"})}
              </div>

              <div class="tag">⏰ ${s.service_slots?.time || ""}</div>

              <div class="section">
                <b>Key Appointments</b>

                ${appointments.map(a => `
                  <div class="row">
                    <span>${a.role}</span>
                    <span>
                      ${a.name}

                      ${a.name === "-" ? `
                        <button class="small"
                          onclick="openAssign('${s.id}','${a.role}')">
                          Assign
                        </button>
                      ` : ""}
                    </span>
                  </div>
                `).join("")}

              </div>

            </div>
          `;
        }).join("")}

      </div>
    `;
  });
}

/* ================= MODAL ================= */
window.openAssign = function(serviceId, role){

  currentServiceId = serviceId;
  currentRole = role;

  document.getElementById("modalTitle").innerText =
    `Assign ${role}`;

  const select = document.getElementById("staffSelect");
  select.innerHTML = staffList.map(s =>
    `<option value="${s.id}">${s.name}</option>`
  ).join("");

  document.getElementById("modal").style.display = "flex";
};

window.closeModal = function(){
  document.getElementById("modal").style.display = "none";
};

window.saveAssign = async function(){

  const staffId = document.getElementById("staffSelect").value;

  const { error } = await db.from("service_roles").insert({
    service_id: currentServiceId,
    role: currentRole,
    staff_id: staffId
  });

  if(error){
    alert("Failed");
    console.log(error);
    return;
  }

  closeModal();
  load();
};

window.load = load;
load();

</script>

</body>
</html>
