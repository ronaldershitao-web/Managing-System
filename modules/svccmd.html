<!DOCTYPE html>
<html>
<head>
  <title>Service Board + Staff Pool</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:14px;
      background:#111827;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:90vh;
      overflow:auto;
    }

    .title{
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:10px;
      font-size:13px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
      font-size:12px;
    }

    .staff{
      color:#22c55e;
      font-size:11px;
      margin-top:4px;
    }
  </style>
</head>

<body>

<header>
  Service Ops Board (5 Columns)
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

let services = [];
let staffMap = {};
let templateStaff = [];

/* ================= LOAD ================= */
async function load(){

  const [
    s,
    st,
    ts
  ] = await Promise.all([

    db.from("services")
      .select("* , service_slots(label,time,location)")
      .order("service_date",{ascending:true}),

    db.from("staff").select("*"),

    db.from("staff_service_templates").select("*")
  ]);

  services = s.data || [];

  staffMap = Object.fromEntries(
    (st.data || []).map(s => [s.id, s.name])
  );

  templateStaff = ts.data || [];

  render();
}

/* ================= GET STAFF POOL ================= */
function getStaffPool(service){

  return templateStaff
    .filter(t =>
      String(t.template_id) === String(service.service_template_id)
    )
    .map(t => staffMap[t.staff_id])
    .filter(Boolean);
}

/* ================= RENDER ================= */
function render(){

  const sat=[], s830=[], s1045=[], jurong=[], pool=[];

  services.forEach(s => {

    const label = (s.service_slots?.label || "").toLowerCase();
    const loc = (s.service_slots?.location || "").toLowerCase();

    if(loc.includes("jurong")) jurong.push(s);
    else if(label.includes("saturday")) sat.push(s);
    else if(label.includes("8.30")) s830.push(s);
    else if(label.includes("10.45")) s1045.push(s);

    pool.push(s);
  });

  document.getElementById("grid").innerHTML = `

    <div class="col">
      <div class="title">Saturday</div>
      ${sat.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">8.30am</div>
      ${s830.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">10.45am</div>
      ${s1045.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Jurong</div>
      ${jurong.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Staff Pool (Template)</div>
      ${poolCard(pool)}
    </div>

  `;
}

/* ================= SERVICE CARD ================= */
function card(s){

  return `
    <div class="card">
      <div><b>${s.service_slots?.label}</b></div>
      <div>${s.service_date}</div>
    </div>
  `;
}

/* ================= STAFF POOL ================= */
function poolCard(services){

  return services.map(s => {

    const staff = getStaffPool(s);

    return `
      <div class="card">
        <div><b>${s.service_slots?.label}</b></div>

        <div class="staff">
          ${staff.length ? staff.join("<br>") : "No staff mapped"}
        </div>
      </div>
    `;
  }).join("");
}

load();
window.load = load;

</script>

</body>
</html>
