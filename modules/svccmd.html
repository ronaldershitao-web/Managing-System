<!DOCTYPE html>
<html>
<head>
<title>Command Post (RESTORED)</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  padding:12px;
  background:#111827;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  padding:10px;
}

.col{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:10px;
  min-height:85vh;
  overflow:auto;
}

.panel{
  background:#0f172a;
  border:1px solid #334155;
  border-radius:8px;
  padding:10px;
  margin-bottom:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin:4px 0;
}

.bad{color:#ef4444;}
.good{color:#22c55e;}

.group-title{
  color:#fbbf24;
  font-weight:bold;
  margin-top:8px;
}

button{
  font-size:11px;
  padding:4px 6px;
  border:none;
  border-radius:4px;
  cursor:pointer;
}
.small{background:#3b82f6;color:white;}
</style>
</head>

<body>

<header>
  Command Post RESTORED
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let staffList=[], templates=[], availability=[], services=[];
let staffMap=new Map();

/* ================= DATE ================= */
function parseDate(d){
  const [y,m,da]=d.split("-");
  return new Date(y,m-1,da);
}

function fmt(d){
  const dt=parseDate(d);
  return dt.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
}

function inWindow(d){
  const dt=parseDate(d);
  const now=new Date();
  const min=new Date();min.setDate(now.getDate()-8);
  const max=new Date();max.setDate(now.getDate()+8);
  return dt>=min && dt<=max;
}

function in60(d){
  const dt=parseDate(d);
  const now=new Date();
  const max=new Date();max.setDate(now.getDate()+60);
  return dt>=now && dt<=max;
}

/* ================= LOAD ================= */
async function load(){

  const [
    servicesRes,
    staffRes,
    templateRes,
    availRes,
    roleRes
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("staff").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("service_roles").select("*")
  ]);

  services = servicesRes.data || [];
  staffList = staffRes.data || [];
  templates = templateRes.data || [];
  availability = availRes.data || [];

  staffMap = new Map(staffList.map(s=>[String(s.id),s.name]));

  render();
}

/* ================= ROLE MAP ================= */
function buildRoleMap(){
  const map=new Map();

  for(const r of templates){
    const k=String(r.template_id);
    if(!map.has(k)) map.set(k,[]);
    map.get(k).push(r);
  }

  return map;
}

/* ================= RENDER ================= */
function render(){

  const roleMap = buildRoleMap();

  const display = services.filter(s=>inWindow(s.service_date));
  const avail60 = services.filter(s=>in60(s.service_date));

  const cols=[[],[],[],[]];

  for(const s of display){

    const t=(s.service_slots?.time||"");

    if(t.includes("1430")) cols[0].push(s);
    else if(t.includes("0830")) cols[1].push(s);
    else if(t.includes("1045")) cols[2].push(s);
    else cols[3].push(s);
  }

  const grid=document.getElementById("grid");
  grid.innerHTML="";

  /* ================= 4 SERVICE COLS ================= */
  for(const col of cols){

    grid.innerHTML+=`
      <div class="col">
        ${col.map(s=>{

          const templateRoles = roleMap.get(String(s.service_template_id)) || [];

          const assigned = templateRoles.map(r=>{

            const role = (r.role || "").trim();
            const sid = String(r.staff_id || "");

            return {
              role,
              staffId: sid,
              name: staffMap.get(sid) || "-",
              safeRole: role.toLowerCase()
            };
          });

          return `
          <div class="panel">
            <b>${s.service_slots?.label}</b><br>
            ${fmt(s.service_date)}

            ${assigned.map(a=>`
              <div class="row">
                <span>${a.role}</span>
                <span>${a.name}</span>
              </div>
            `).join("")}

          </div>
          `;
        }).join("")}
      </div>
    `;
  }

  /* ================= 5TH COLUMN ================= */
  grid.innerHTML+=`
    <div class="col">

      <h3>Availability (60 Days)</h3>

      <select id="dateSel" onchange="filterServices()">
        ${[...new Set(avail60.map(s=>s.service_date))].map(d=>
          `<option value="${d}">${fmt(d)}</option>`
        ).join("")}
      </select>

      <select id="serviceSel" onchange="filterStaff()"></select>
      <select id="staffSel"></select>

      <button onclick="markUnavailable()" class="small">
        Mark Unavailable
      </button>

    </div>
  `;

  window.avail60 = avail60;
  window.renderedServices = avail60;

  filterServices();
}

/* ================= FILTER SERVICE ================= */
window.filterServices=function(){

  const date=document.getElementById("dateSel").value;

  const list=avail60.filter(s=>s.service_date===date);

  document.getElementById("serviceSel").innerHTML=
    list.map(s=>
      `<option value="${s.id}">${s.service_slots?.label}</option>`
    ).join("");

  filterStaff();
};

/* ================= FILTER STAFF ================= */
window.filterStaff=function(){

  const sid=document.getElementById("serviceSel").value;
  const s=avail60.find(x=>String(x.id)===String(sid));

  const eligible = staffList.filter(st=>true);

  document.getElementById("staffSel").innerHTML=
    eligible.map(s=>
      `<option value="${s.id}">${s.name}</option>`
    ).join("");
};

/* ================= UNAVAILABLE ================= */
window.markUnavailable=async function(){

  const staffId=document.getElementById("staffSel").value;
  const serviceId=document.getElementById("serviceSel").value;

  const s=avail60.find(x=>String(x.id)===String(serviceId));

  await db.from("staff_availability").upsert({
    staff_id:staffId,
    service_date:s.service_date,
    service_slot_id:s.service_slot_id,
    status:"unavailable"
  });

  load();
};

window.load=load;
load();

</script>
</body>
</html>
