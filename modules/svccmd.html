<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Full Ops + Availability Control)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .title{
      color:#60a5fa;
      font-weight:bold;
      margin-bottom:4px;
    }

    .tag{
      font-size:12px;
      color:#94a3b8;
    }

    .section{
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
      gap:8px;
      align-items:center;
    }

    .good{
      color:#22c55e;
      font-weight:bold;
    }

    .bad{
      color:#ef4444;
      cursor:pointer;
      font-weight:bold;
    }

    button.small{
      font-size:10px;
      padding:2px 6px;
      margin-left:4px;
      border-radius:4px;
      border:none;
      background:#3b82f6;
      color:white;
      cursor:pointer;
      width:auto;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .modal-content{
      background:#111827;
      padding:20px;
      border-radius:10px;
      width:360px;
      max-height:80vh;
      overflow:auto;
      border:1px solid #334155;
    }

    select, button, input{
      width:100%;
      padding:8px;
      margin-top:10px;
      border-radius:6px;
      border:none;
      box-sizing:border-box;
    }

    .save{
      background:#22c55e;
      color:white;
    }

    .danger{
      background:#ef4444;
      color:white;
    }

    .secondary{
      background:#334155;
      color:white;
    }

    .staff-item{
      padding:8px;
      border:1px solid #334155;
      border-radius:6px;
      margin-top:6px;
      font-size:12px;
    }

    .group-title{
      color:#fbbf24;
      font-weight:bold;
      margin-top:12px;
      margin-bottom:6px;
      padding-top:8px;
      border-top:1px solid #334155;
    }

    h3{
      margin-top:0;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Full Ops + Availability Control)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- ASSIGN MODAL -->
<div class="modal" id="assignModal">
  <div class="modal-content">

    <div id="modalTitle">Assign</div>

    <select id="staffSelect"></select>

    <button class="save" onclick="saveAssign()">
      Assign / Reassign
    </button>

    <button class="secondary" onclick="closeAssignModal()">
      Close
    </button>

  </div>
</div>

<!-- UNAVAILABLE MODAL -->
<div class="modal" id="unavailableModal">
  <div class="modal-content">

    <h3>Unavailable Staff</h3>

    <div id="unavailableList"></div>

    <button class="secondary" onclick="closeUnavailableModal()">
      Close
    </button>

  </div>
</div>

<script type="module">
import { db } from "../assets/app.js";

let staffList = [];
let templates = [];
let availability = [];
let availabilityServices = [];
let hospitality = [];   // 🔥 NEW

let currentService = null;
let currentRole = null;

/* ================= LOAD ================= */

async function load(){

  const [
    servicesRes,
    templateRes,
    availRes,
    staffRes,
    rolesRes,
    templateRolesRes,
    hospitalityRes   // 🔥 NEW
  ] = await Promise.all([

    db.from("services")
      .select(`*, service_slots(label,time,location)`),

    db.from("staff_service_templates")
      .select("*"),

    db.from("staff_availability")
      .select("*"),

    db.from("staff")
      .select("*"),

    db.from("service_roles")
      .select("*"),

    db.from("service_template_roles")
      .select("*"),

    db.from("hospitality_duty")   // 🔥 NEW
      .select("*")
  ]);

  const allServices = servicesRes.data || [];

  let displayServices =
    allServices.filter(s => inWindow(s.service_date));

  availabilityServices =
    allServices.filter(s => in60Days(s.service_date));

  templates = templateRes.data || [];
  availability = availRes.data || [];
  staffList = staffRes.data || [];
  hospitality = hospitalityRes.data || [];   // 🔥 NEW

  const roles = rolesRes.data || [];
  const templateRoles = templateRolesRes.data || [];

  const staffMap =
    new Map(staffList.map(s => [String(s.id), s.name]));

  const roleMap = new Map();
  roles.forEach(r => {
    const key = String(r.service_id);
    if(!roleMap.has(key)) roleMap.set(key, []);
    roleMap.get(key).push(r);
  });

  const templateRoleMap = new Map();
  templateRoles.forEach(r => {
    const key = String(r.template_id);
    if(!templateRoleMap.has(key)) templateRoleMap.set(key, []);
    templateRoleMap.get(key).push(r);
  });

  displayServices.sort((a,b)=>
    parseDate(a.service_date) - parseDate(b.service_date)
  );

  const cols = [[],[],[],[]];

  displayServices.forEach(s=>{

    const t =
      (s.service_slots?.time || "")
      .replace(":","");

    const loc =
      (s.service_slots?.location || "")
      .toLowerCase();

    let i = -1;

    if(t.includes("1430")) i=0;
    else if(t.includes("0830")) i=1;
    else if(t.includes("1045") && !loc.includes("jurong")) i=2;
    else i=3;

    if(i>=0) cols[i].push(s);
  });

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cols.forEach(col=>{

    grid.innerHTML += `
      <div class="col">

        ${col.map(s=>{

          /* =========================
             🔥 HOSPITALITY MATCH
          ========================= */
          const hosp =
            hospitality.find(h =>
              String(h.service_id) === String(s.id)
            );

          const pastorNames =
            hosp?.pastor || "-";

          const leaderNames =
            hosp?.leader || "-";

          const templateStaff =
            templateMap.get(String(s.service_template_id)) || [];

          const assignedIds =
            new Set(templateStaff.map(t => String(t.staff_id)));

          const unavailableRecords =
            availability.filter(a =>
              a.service_date === s.service_date &&
              a.service_slot_id === s.service_slot_id &&
              a.status === "unavailable"
            );

          const unavailableIds =
            new Set(unavailableRecords.map(a => String(a.staff_id)));

          const availableIds =
            [...assignedIds].filter(id => !unavailableIds.has(id));

          const templateDefinedRoles =
            templateRoleMap.get(String(s.service_template_id)) || [];

          const appointments =
            templateDefinedRoles.map(roleRow=>{

              const role = roleRow.role;

              const assignedRole =
                (roleMap.get(String(s.id)) || [])
                .find(r =>
                  (r.role || "").toLowerCase() === role.toLowerCase()
                );

              const templateMatch =
                templateStaff.find(t =>
                  (t.role || "").toLowerCase() === role.toLowerCase()
                );

              const staffId =
                assignedRole?.staff_id ||
                templateMatch?.staff_id;

              const unavailable =
                unavailableIds.has(String(staffId));

              return {
                role,
                group_name: roleRow.group_name,
                staffId,
                unavailable,
                name: staffId ? staffMap.get(String(staffId)) : "-"
              };
            });

          const groupedAppointments = {};

          appointments.forEach(a => {

            const group = a.group_name || "General";

            if(!groupedAppointments[group]){
              groupedAppointments[group] = [];
            }

            groupedAppointments[group].push(a);
          });

          return `
            <div class="card">

              <div class="title">
                ${s.service_slots?.label || ""}
              </div>

              <div class="tag">
                ${formatDate(s.service_date)}
              </div>

              <div class="tag">
                ⏰ ${s.service_slots?.time || ""}
              </div>

              <!-- =========================
                   🔥 HOSPITALITY SECTION
              ========================== -->
              <div class="section">

                <b>🏠 Home Cell Serving Hospitality</b>

                <div class="row">
                  <span>Hospitality Cell</span>

                  <span style="display:flex; gap:6px; align-items:center;">
                    <span class="good">
                      ${leaderNames}
                    </span>

                    <button class="small"
                      onclick="notifyLeader('${s.id}')">
                      Notify
                    </button>
                  </span>
                </div>

                <div class="row">
                  <span>Cell Pastor</span>

                  <span style="display:flex; gap:6px; align-items:center;">
                    <span class="good">
                      ${pastorNames}
                    </span>

                    <button class="small"
                      onclick="notifyPastor('${s.id}')">
                      Notify
                    </button>
                  </span>
                </div>

              </div>

              <!-- ========================= -->
              <div class="section">

                <b>Appointments</b>

                ${Object.entries(groupedAppointments)
                  .map(([group, items]) => `
                    ${group !== "General" ? `
                      <div class="group-title">${group}</div>
                    ` : ""}

                    ${items.map(a => `
                      <div class="row">
                        <span>${a.role}</span>

                        <span style="display:flex; gap:6px;">
                          <span class="${a.unavailable ? 'bad' : ''}">
                            ${a.name}
                            ${a.unavailable ? ' (Unavailable)' : ''}
                          </span>

                          <button class="small"
                            onclick="openAssign(
                              '${s.id}',
                              '${s.service_template_id}',
                              '${s.service_date}',
                              '${s.service_slot_id}',
                              '${a.role}'
                            )">
                            Assign
                          </button>
                        </span>
                      </div>
                    `).join("")}
                  `).join("")}

              </div>

            </div>
          `;
        }).join("")}

      </div>
    `;
  });

}

/* =========================
   🔥 NOTIFY FUNCTIONS
========================= */

window.notifyLeader = function(serviceId){
  const h = hospitality.find(x => String(x.service_id) === String(serviceId));
  alert("Notify Leader: " + (h?.leader || "No leader"));
};

window.notifyPastor = function(serviceId){
  const h = hospitality.find(x => String(x.service_id) === String(serviceId));
  alert("Notify Pastor: " + (h?.pastor || "No pastor"));
};

window.load = load;
load();

</script>

</body>
</html>
