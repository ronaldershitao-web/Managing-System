<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Full Ops)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .col-title{
      font-size:16px;
      font-weight:bold;
      margin-bottom:10px;
      color:#fbbf24;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:12px;
    }

    .service-title{
      color:#60a5fa;
      font-weight:bold;
    }

    .service-date{
      font-size:12px;
      color:#94a3b8;
      margin-bottom:10px;
    }

    .section-title{
      margin-top:10px;
      font-size:12px;
      font-weight:bold;
      color:#fbbf24;
      border-top:1px solid #1f2937;
      padding-top:6px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin:6px 0;
      font-size:12px;
      gap:8px;
    }

    .role{ flex:1; }

    .staff{
      min-width:90px;
      text-align:right;
      font-weight:bold;
      color:#22c55e;
    }

    .bad{ color:#ef4444; }

    button{
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .small{
      font-size:10px;
      padding:3px 6px;
      background:#3b82f6;
      color:white;
      width:auto;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#111827;
      border:1px solid #334155;
      padding:20px;
      border-radius:10px;
      width:360px;
    }

    select{
      width:100%;
      padding:8px;
      margin-top:8px;
      border-radius:6px;
    }

    .save{
      width:100%;
      margin-top:10px;
      padding:8px;
      background:#22c55e;
      color:white;
    }

    .secondary{
      width:100%;
      margin-top:6px;
      padding:8px;
      background:#334155;
      color:white;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- ASSIGN MODAL -->
<div class="modal" id="assignModal">
  <div class="modal-content">

    <div id="modalTitle">Assign</div>

    <select id="staffSelect"></select>

    <button class="save" onclick="saveAssign()">Assign</button>
    <button class="secondary" onclick="closeAssignModal()">Close</button>

  </div>
</div>

<script type="module">

import { db } from "../assets/app.js";

let services = [];
let staffList = [];
let templateRoles = [];
let serviceRoles = [];

let currentService = null;
let currentRole = null;

/* ================= DATE ================= */
function parseDate(d){
  const [y,m,day] = d.split("-");
  return new Date(y,m-1,day);
}

function in8Days(dateStr){
  const d = parseDate(dateStr);
  const now = new Date();

  const min = new Date(now);
  min.setDate(now.getDate() - 8);

  const max = new Date(now);
  max.setDate(now.getDate() + 8);

  return d >= min && d <= max;
}

/* ================= LOAD ================= */
async function load(){

  const [sRes, stRes, trRes, srRes] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("staff").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("service_roles").select("*")
  ]);

  services = sRes.data || [];
  staffList = stRes.data || [];
  templateRoles = trRes.data || [];
  serviceRoles = srRes.data || [];

  render();
}

/* ================= STAFF ================= */
function getStaffName(id){
  return staffList.find(s => String(s.id) === String(id))?.name || "-";
}

/* ================= ASSIGNED ================= */
function getAssigned(serviceId, role){

  const found = serviceRoles
    .filter(r =>
      String(r.service_id) === String(serviceId) &&
      (r.role || "").toLowerCase() === (role || "").toLowerCase()
    )
    .sort((a,b)=>
      new Date(b.created_at || 0) - new Date(a.created_at || 0)
    )[0];

  if(!found) return "-";

  return getStaffName(found.staff_id);
}

/* ================= RENDER ================= */
function render(){

  const grid = document.getElementById("grid");

  const sat = [];
  const sun830 = [];
  const sun1045 = [];
  const jurong = [];

  /* ✅ FIX: enforce filter FIRST */
  services
    .filter(s => in8Days(s.service_date))
    .forEach(s => {

      const t = (s.service_slots?.time || "").toLowerCase();
      const loc = (s.service_slots?.location || "").toLowerCase();

      /* ✅ FIX: Jurong FIRST priority */
      if(loc.includes("jurong")){
        jurong.push(s);
      }
      else if(t.includes("14") || t.includes("2:30")){
        sat.push(s);
      }
      else if(t.includes("08")){
        sun830.push(s);
      }
      else if(t.includes("10:45")){
        sun1045.push(s);
      }
    });

  grid.innerHTML = `
    <div class="col">
      <div class="col-title">Saturday 2.30pm</div>
      ${sat.map(renderCard).join("")}
    </div>

    <div class="col">
      <div class="col-title">Sunday 8.30am</div>
      ${sun830.map(renderCard).join("")}
    </div>

    <div class="col">
      <div class="col-title">Sunday 10.45am</div>
      ${sun1045.map(renderCard).join("")}
    </div>

    <div class="col">
      <div class="col-title">Sunday Jurong</div>
      ${jurong.map(renderCard).join("")}
    </div>

    <div class="col">
      <div class="col-title">Staff Availability (60 Days)</div>
      ${renderAvailability()}
    </div>
  `;
}

/* ================= CARD ================= */
function renderCard(svc){

  const roles = templateRoles.filter(r =>
    String(r.template_id) === String(svc.service_template_id)
  );

  const isCommunion = svc.is_communion_service === true;

  const filtered = isCommunion
    ? roles
    : roles.filter(r => !(r.role || "").toLowerCase().includes("communion"));

  return `
    <div class="card">

      <div class="service-title">
        ${svc.service_slots?.label || "-"}
      </div>

      <div class="service-date">
        ${svc.service_date}
      </div>

      <div class="section-title">Appointments</div>

      ${filtered.map(r => `
        <div class="row">

          <div class="role">${r.role}</div>

          <div class="staff">
            ${getAssigned(svc.id, r.role)}
          </div>

          <button class="small"
            onclick="openAssign('${svc.id}','${r.role}')">
            Assign
          </button>

        </div>
      `).join("")}

    </div>
  `;
}

/* ================= AVAILABILITY ================= */
function renderAvailability(){
  return `
    <div class="card">
      <i>Select availability module (already stable)</i>
    </div>
  `;
}

/* ================= ASSIGN ================= */
window.openAssign = function(serviceId, role){

  currentService = serviceId;
  currentRole = role;

  document.getElementById("staffSelect").innerHTML =
    staffList.map(s =>
      `<option value="${s.id}">${s.name}</option>`
    ).join("");

  document.getElementById("modalTitle").innerText = role;
  document.getElementById("assignModal").style.display = "flex";
};

window.closeAssignModal = () =>
  document.getElementById("assignModal").style.display = "none";

window.saveAssign = async function(){

  const staffId = document.getElementById("staffSelect").value;

  await db.from("service_roles").upsert({
    service_id: currentService,
    role: currentRole,
    staff_id: staffId
  }, { onConflict: "service_id,role" });

  await load();
  closeAssignModal();
};

/* ================= INIT ================= */
window.load = load;
load();

</script>

</body>
</html>
