<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Template Driven Stable)</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      padding:10px;
    }

    .col {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:200px;
    }

    .card {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:10px;
    }

    .title {
      font-weight:bold;
      color:#60a5fa;
    }

    .tag {
      font-size:12px;
      color:#94a3b8;
    }

    .section {
      margin-top:8px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row {
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:3px 0;
    }

    .good { color:#22c55e; }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Template System Stable)
  <button onclick="load()" style="background:#3b82f6;color:white;border:none;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* =========================
   SAFE DATE (SGT SAFE)
========================= */
function parseDate(d) {
  if (!d) return new Date(0);
  const [y,m,day] = d.split("-");
  return new Date(Number(y), Number(m)-1, Number(day));
}

/* =========================
   WINDOW FILTER (±7 DAYS)
========================= */
function inWindow(dateStr) {
  const today = new Date();

  const min = new Date(today);
  min.setDate(today.getDate() - 7);

  const max = new Date(today);
  max.setDate(today.getDate() + 7);

  const d = parseDate(dateStr);

  return d >= min && d <= max;
}

/* =========================
   FIXED SLOT ORDER (NO TEXT PARSING DEPENDENCY)
========================= */
function getSlotIndex(s) {

  const label = (s.service_slots?.label || "").toLowerCase();
  const time = (s.service_slots?.time || "").toLowerCase();
  const loc = (s.service_slots?.location || "").toLowerCase();

  const text = `${label} ${time} ${loc}`;

  if (text.includes("jurong")) return 3;
  if (text.includes("10.45") || text.includes("1045")) return 2;
  if (text.includes("8.30") || text.includes("0830")) return 1;
  if (text.includes("14:30") || text.includes("saturday")) return 0;

  return 99;
}

/* =========================
   LOAD
========================= */
async function load() {

  const [
    servicesRes,
    templateStaffRes,
    rolesRes
  ] = await Promise.all([
    db.from("services").select(`
      *,
      service_slots(label,time,location)
    `),

    db.from("staff_service_templates")
      .select("staff_id, template_id"),

    db.from("service_roles")
      .select(`*, staff(name)`)
  ]);

  let services = servicesRes.data || [];
  const templateStaff = templateStaffRes.data || [];
  const roles = rolesRes.data || [];

  /* FILTER ONLY CURRENT WINDOW */
  services = services.filter(s => inWindow(s.service_date));

  /* SORT */
  services.sort((a,b) =>
    parseDate(a.service_date) - parseDate(b.service_date)
  );

  /* GROUP INTO 4 COLUMNS */
  const cols = [[],[],[],[]];

  for (const s of services) {
    const idx = getSlotIndex(s);
    if (idx < 4) cols[idx].push(s);
  }

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  /* RENDER */
  cols.forEach(col => {

    grid.innerHTML += `
      <div class="col">

        ${col.map(s => {

          const assignedStaff = templateStaff.filter(
            t => t.template_id === s.service_template_id
          );

          const uniqueStaffCount = new Set(
            assignedStaff.map(a => a.staff_id)
          ).size;

          const serviceRoles = roles.filter(r => r.service_id === s.id);

          const d = parseDate(s.service_date);

          const day = d.toLocaleDateString("en-SG",{weekday:"long"});
          const date = d.toLocaleDateString("en-SG",{day:"2-digit",month:"short"});

          return `
            <div class="card">

              <div class="title">
                ${s.service_slots?.label || "Service"}
              </div>

              <div class="tag">
                ${day} | ${date}
              </div>

              <div class="tag">
                ⏰ ${s.service_slots?.time || ""}
              </div>

              <div class="section">
                <b>Total Staff Assigned (Template)</b>

                <div class="row">
                  <span>Assigned Staff</span>
                  <b class="good">${uniqueStaffCount}</b>
                </div>
              </div>

              <div class="section">
                <b>Key Appointments</b>

                ${serviceRoles
                  .filter(r =>
                    ["Service Pastor","Anchor","Welcome IC"].includes(r.role)
                  )
                  .map(r => `
                    <div class="row">
                      <span>${r.role}</span>
                      <b>${r.staff?.name || "-"}</b>
                    </div>
                  `).join("")}
              </div>

            </div>
          `;
        }).join("")}

      </div>
    `;
  });
}

window.load = load;
load();

</script>

</body>
</html>
