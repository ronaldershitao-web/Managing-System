<!DOCTYPE html>
<html>
<head>
  <title>Service Command Center (Assignment Fixed)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      font-weight:bold;
      border-bottom:1px solid #1f2937;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .title{
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:6px 0;
      align-items:center;
    }

    .role{ flex:1; }
    .staff{ color:#22c55e; font-weight:bold; }

    button{
      font-size:11px;
      padding:5px 8px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    .assignBtn{
      background:#2563eb;
      margin-top:6px;
      width:100%;
    }

    /* MODAL */
    .modal{
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      display:none;
      justify-content:center;
      align-items:center;
    }

    .modalBox{
      width:420px;
      background:#111827;
      border:1px solid #334155;
      border-radius:10px;
      padding:15px;
    }

    .chip{
      padding:6px;
      border:1px solid #334155;
      border-radius:6px;
      margin:5px 0;
      cursor:pointer;
    }

    .selected{
      background:#1d4ed8;
      border-color:#60a5fa;
    }

    .danger{
      background:#ef4444;
      width:100%;
      margin-top:10px;
    }

  </style>
</head>

<body>

<header>
  Service Command Center
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<!-- ================= MODAL ================= -->
<div class="modal" id="modal">
  <div class="modalBox">

    <div style="font-weight:bold;margin-bottom:10px">
      Assign Role
    </div>

    <div id="modalRole"></div>

    <div style="margin-top:10px">
      <div id="staffList"></div>
    </div>

    <button onclick="saveAssignment()" class="assignBtn">
      Save Assignment
    </button>

    <button onclick="closeModal()" class="danger">
      Close
    </button>
  </div>
</div>

<script type="module">

import { db } from "../assets/app.js";

/* ================= STATE ================= */
let services = [];
let staffList = [];
let templateRoles = [];
let serviceRoles = [];
let staffTemplates = [];

let staffMap = {};
let roleMap = {};
let poolMap = {};

let selected = {
  serviceId: null,
  role: null,
  staffId: null
};

/* ================= LOAD ================= */
async function load(){

  const [s, st, tr, sr, tpl] = await Promise.all([
    db.from("services").select("* , service_slots(label,time,location)")
      .order("service_date",{ascending:true}),
    db.from("staff").select("*"),
    db.from("service_template_roles").select("*"),
    db.from("service_roles").select("*"),
    db.from("staff_service_templates").select("*")
  ]);

  services = s.data || [];
  staffList = st.data || [];
  templateRoles = tr.data || [];
  serviceRoles = sr.data || [];
  staffTemplates = tpl.data || [];

  staffMap = Object.fromEntries(
    staffList.map(s => [String(s.id), s.name])
  );

  rebuildRoleMap();
  rebuildPoolMap();

  render();
}

/* ================= ROLE MAP ================= */
function rebuildRoleMap(){

  roleMap = {};

  serviceRoles.forEach(r => {
    const key = `${r.service_id}_${r.role?.toLowerCase()}`;

    if(!roleMap[key] ||
      new Date(r.created_at) > new Date(roleMap[key].created_at)
    ){
      roleMap[key] = r;
    }
  });
}

/* ================= POOL ================= */
function rebuildPoolMap(){

  poolMap = {};

  staffTemplates.forEach(t => {

    if(!poolMap[t.template_id]) poolMap[t.template_id] = [];

    poolMap[t.template_id].push({
      id: t.staff_id,
      name: staffMap[t.staff_id] || "Unknown"
    });
  });
}

/* ================= GET ASSIGNED ================= */
function getAssigned(serviceId, role){

  const key = `${serviceId}_${role?.toLowerCase()}`;
  const match = roleMap[key];

  return match ? staffMap[match.staff_id] : "-";
}

/* ================= CARD ================= */
function card(service){

  const roles = templateRoles.filter(r =>
    String(r.template_id) === String(service.service_template_id)
  );

  return `
    <div class="card">

      <b>${service.service_slots?.label}</b>
      <div style="font-size:11px;color:#94a3b8">
        ${service.service_date}
      </div>

      ${roles.map(r => `
        <div class="row">
          <div class="role">${r.role}</div>

          <div class="staff">
            ${getAssigned(service.id, r.role)}
          </div>

          <button onclick="openModal('${service.id}','${r.role}')">
            Assign
          </button>
        </div>
      `).join("")}

    </div>
  `;
}

/* ================= MODAL ================= */
window.openModal = function(serviceId, role){

  selected.serviceId = serviceId;
  selected.role = role;
  selected.staffId = null;

  const service = services.find(s => s.id === serviceId);

  document.getElementById("modalRole").innerHTML =
    `<b>${role}</b>`;

  const pool = poolMap[service.service_template_id] || [];

  document.getElementById("staffList").innerHTML =
    pool.map(p => `
      <div class="chip ${selected.staffId === p.id ? "selected" : ""}"
        onclick="selectStaff('${p.id}')">
        ${p.name}
      </div>
    `).join("");

  document.getElementById("modal").style.display = "flex";
};

window.selectStaff = function(id){
  selected.staffId = id;
  openModal(selected.serviceId, selected.role);
};

window.closeModal = function(){
  document.getElementById("modal").style.display = "none";
};

/* ================= SAVE ================= */
window.saveAssignment = async function(){

  if(!selected.serviceId || !selected.role || !selected.staffId) return;

  const service = services.find(s => s.id === selected.serviceId);

  // insert or update (simple overwrite strategy)
  await db.from("service_roles").upsert({
    service_id: selected.serviceId,
    role: selected.role,
    staff_id: selected.staffId,
    service_date: service.service_date,
    created_at: new Date()
  });

  await load();
  closeModal();
};

/* ================= RENDER ================= */
function render(){

  const cols = { sat:[], s1:[], s2:[], jurong:[] };

  services.forEach(s => {

    const t = (s.service_slots?.time||"").toLowerCase();
    const l = (s.service_slots?.location||"").toLowerCase();

    if(l.includes("jurong")) cols.jurong.push(s);
    else if(t.includes("14")) cols.sat.push(s);
    else if(t.includes("08")) cols.s1.push(s);
    else cols.s2.push(s);
  });

  grid.innerHTML = `
    <div class="col"><div class="title">Sat</div>${cols.sat.map(card).join("")}</div>
    <div class="col"><div class="title">8.30</div>${cols.s1.map(card).join("")}</div>
    <div class="col"><div class="title">10.45</div>${cols.s2.map(card).join("")}</div>
    <div class="col"><div class="title">Jurong</div>${cols.jurong.map(card).join("")}</div>
    <div class="col"><div class="title">Inspector (Availability only)</div></div>
  `;
}

window.load = load;
load();

</script>

</body>
</html>
