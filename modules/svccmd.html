<!DOCTYPE html>
<html>
<head>
  <title>Command Post (FINAL FIXED)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .title{
      color:#60a5fa;
      font-weight:bold;
    }

    .tag{
      font-size:12px;
      color:#94a3b8;
    }

    .section{
      margin-top:10px;
      padding-top:8px;
      border-top:1px solid #1f2937;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
    }

    .good{ color:#22c55e; }
    .bad{ color:#ef4444; }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (FINAL FIXED)
  <button onclick="load()" style="background:#3b82f6;color:white;border:none;padding:6px 10px;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= DATE ================= */
function parseDate(d){
  if(!d) return new Date(0);
  const [y,m,day]=d.split("-");
  return new Date(Number(y),Number(m)-1,Number(day));
}

/* ================= WINDOW ================= */
function inWindow(d){
  const now = new Date();
  const min = new Date(now); min.setDate(now.getDate()-7);
  const max = new Date(now); max.setDate(now.getDate()+7);
  const dt = parseDate(d);
  return dt>=min && dt<=max;
}

/* ================= SLOT ORDER ================= */
function slotIndex(s){
  const t=(s.service_slots?.time||"").toLowerCase();
  const l=(s.service_slots?.location||"").toLowerCase();

  const x=`${t} ${l}`;

  if(x.includes("sat")||x.includes("14:30")) return 0;
  if(x.includes("8.30")||x.includes("08:30")||x.includes("830")) return 1;
  if(x.includes("10.45")||x.includes("1045")) return 2;
  if(x.includes("jurong")) return 3;

  return -1;
}

/* ================= LOAD ================= */
async function load(){

  const [
    servicesRes,
    rolesRes,
    templateRes,
    availabilityRes,
    staffRes
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time,location)"),
    db.from("service_roles").select("*, staff(name)"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("staff").select("*")
  ]);

  let services = servicesRes.data||[];
  const roles = rolesRes.data||[];
  const templates = templateRes.data||[];
  const availability = availabilityRes.data||[];
  const staff = staffRes.data||[];

  const staffMap = {};
  staff.forEach(s=>staffMap[s.id]=s.name);

  services = services.filter(s=>inWindow(s.service_date));
  services.sort((a,b)=>parseDate(a.service_date)-parseDate(b.service_date));

  const cols=[[],[],[],[]];

  services.forEach(s=>{
    const i=slotIndex(s);
    if(i>=0) cols[i].push(s);
  });

  const grid=document.getElementById("grid");
  grid.innerHTML="";

  cols.forEach(col=>{

    grid.innerHTML+=`
      <div class="col">

        ${col.map(s=>{

          /* TEMPLATE STAFF */
          const assigned = templates.filter(t=>t.template_id===s.service_template_id);
          const assignedIds = new Set(assigned.map(a=>a.staff_id));

          /* UNAVAILABLE */
          const unavailableIds = new Set(
            availability
              .filter(a =>
                a.service_date===s.service_date &&
                a.service_slot_id===s.service_slot_id &&
                a.status==="unavailable"
              )
              .map(a=>a.staff_id)
          );

          const availableCount = [...assignedIds]
            .filter(id=>!unavailableIds.has(id))
            .length;

          /* ROLES */
          const serviceRoles = roles.filter(r=>r.service_id===s.id);

          const KEY = ["Service Pastor","Anchor","Welcome IC","Hospitality Cell"];

          const appointments = KEY.map(role=>{
            const found = serviceRoles.find(r=>r.role===role);

            return {
              role,
              name: found
                ? (staffMap[found.staff_id] || "-")
                : "-"
            };
          });

          const d=parseDate(s.service_date);
          const day=d.toLocaleDateString("en-SG",{weekday:"long"});
          const date=d.toLocaleDateString("en-SG",{day:"2-digit",month:"short"});

          return `
            <div class="card">

              <div class="title">
                ${s.service_slots?.label || "Service"}
              </div>

              <div class="tag">${day} | ${date}</div>
              <div class="tag">⏰ ${s.service_slots?.time||""}</div>

              <div class="section">
                <b>Staff Summary</b>

                <div class="row">
                  <span>Assigned</span>
                  <b>${assignedIds.size}</b>
                </div>

                <div class="row">
                  <span>Unavailable</span>
                  <b class="bad">${unavailableIds.size}</b>
                </div>

                <div class="row">
                  <span>Available</span>
                  <b class="good">${availableCount}</b>
                </div>
              </div>

              <div class="section">
                <b>Key Appointments</b>

                ${appointments.map(a=>`
                  <div class="row">
                    <span>${a.role}</span>
                    <b>${a.name}</b>
                  </div>
                `).join("")}

              </div>

            </div>
          `;
        }).join("")}

      </div>
    `;
  });
}

window.load=load;
load();

</script>

</body>
</html>
