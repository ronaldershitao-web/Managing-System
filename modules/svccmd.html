<!DOCTYPE html>
<html>
<head>
  <title>Service 4-Column Board</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:14px;
      background:#111827;
      font-size:18px;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:90vh;
    }

    .title{
      font-weight:bold;
      color:#fbbf24;
      margin-bottom:10px;
      font-size:14px;
    }

    .card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .date{
      font-size:11px;
      color:#94a3b8;
      margin-top:4px;
    }
  </style>
</head>

<body>

<header>
  Service Board (4 Columns View)
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

async function load(){

  const { data: services } = await db
    .from("services")
    .select(`
      id,
      service_date,
      service_slots(label,time,location)
    `)
    .order("service_date", { ascending: true });

  const sat = [];
  const s830 = [];
  const s1045 = [];
  const jurong = [];

  (services || []).forEach(s => {

    const label = (s.service_slots?.label || "").toLowerCase();

    if(label.includes("saturday")){
      sat.push(s);
    }
    else if(label.includes("8.30")){
      s830.push(s);
    }
    else if(label.includes("10.45")){
      s1045.push(s);
    }
    else if(label.includes("jurong")){
      jurong.push(s);
    }
  });

  render(sat, s830, s1045, jurong);
}

function render(sat, s830, s1045, jurong){

  document.getElementById("grid").innerHTML = `

    <div class="col">
      <div class="title">Saturday Service</div>
      ${sat.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday 8.30am</div>
      ${s830.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday 10.45am</div>
      ${s1045.map(card).join("")}
    </div>

    <div class="col">
      <div class="title">Sunday Jurong</div>
      ${jurong.map(card).join("")}
    </div>

  `;
}

function card(s){

  return `
    <div class="card">
      <div>
        ${s.service_slots?.label || "Service"}
      </div>

      <div class="date">
        ${s.service_date}
      </div>
    </div>
  `;
}

load();

</script>

</body>
</html>
