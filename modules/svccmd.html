<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Structured vFinal)</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      background:#111827;
      padding:12px;
      border-radius:10px;
      border:1px solid #1f2937;
      min-height:200px;
    }

    .title {
      font-weight:bold;
      color:#60a5fa;
    }

    .tag {
      font-size:12px;
      color:#94a3b8;
    }

    .row {
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:3px 0;
    }
  </style>
</head>

<body>

<header>
  ⛪ Command Post (Structured)
  <button onclick="load()" style="background:#3b82f6;color:white;padding:6px 10px;border:none;border-radius:6px;">
    Refresh
  </button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* =========================
   SAFE DATE
========================= */
function parseDate(dateStr) {
  const [y, m, d] = dateStr.split("-");
  return new Date(Number(y), Number(m) - 1, Number(d));
}

/* =========================
   WINDOW FILTER (-7 to +7)
========================= */
function inWindow(dateStr) {
  const today = new Date();

  const min = new Date(today);
  min.setDate(today.getDate() - 7);

  const max = new Date(today);
  max.setDate(today.getDate() + 7);

  const d = parseDate(dateStr);

  return d >= min && d <= max;
}

/* =========================
   SLOT MAP (FOR COLUMNS)
========================= */
function slotKey(s) {
  const label = (s.service_slots?.label || "").toLowerCase();

  if (label.includes("8.30")) return "slot1";
  if (label.includes("10.45") && !label.includes("jurong")) return "slot2";
  if (label.includes("jurong")) return "slot3";
  return "slot0";
}

/* =========================
   LOAD
========================= */
async function load() {

  const [
    servicesRes,
    rolesRes,
    staffRes
  ] = await Promise.all([
    db.from("services").select(`*, service_slots(label,time,location,id)`),
    db.from("service_roles").select(`*, staff(name)`),
    db.from("staff").select("*")
  ]);

  let services = servicesRes.data || [];
  const roles = rolesRes.data || [];
  const staff = staffRes.data || [];

  /* FILTER WINDOW */
  services = services.filter(s => inWindow(s.service_date));

  /* SORT ASC */
  services.sort((a,b) =>
    parseDate(a.service_date) - parseDate(b.service_date)
  );

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  /* FIXED 4 COLUMNS */
  const slots = [[],[],[],[]];

  services.forEach(s => {

    const idx =
      slotKey(s) === "slot1" ? 0 :
      slotKey(s) === "slot2" ? 1 :
      slotKey(s) === "slot3" ? 2 : 3;

    slots[idx].push(s);
  });

  /* RENDER COLUMNS */
  slots.forEach(col => {

    grid.innerHTML += `
      <div class="card">
        ${
          col.map(s => {

            const r = roles.filter(x => x.service_id === s.id);

            const d = parseDate(s.service_date);

            return `
              <div style="margin-bottom:12px;">
                <div class="title">
                  ${s.service_slots?.label || "Service"}
                </div>

                <div class="tag">
                  ${d.toDateString()}
                </div>

                <div class="row">
                  <span>Staff</span>
                  <b>${r.length}</b>
                </div>

                <div class="row">
                  <span>Assigned</span>
                  <b>${r.filter(x=>x.staff_id).length}</b>
                </div>
              </div>
            `;
          }).join("")
        }
      </div>
    `;
  });
}

window.load = load;
load();

</script>

</body>
</html>
