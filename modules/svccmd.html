<!DOCTYPE html>
<html>
<head>
  <title>Command Post (Restored Stable Version)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .col{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      min-height:85vh;
      overflow:auto;
    }

    .panel{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:10px;
      margin-top:10px;
    }

    .panel-title{
      color:#fbbf24;
      font-weight:bold;
      margin-bottom:6px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin:4px 0;
      align-items:center;
    }

    .good{color:#22c55e}
    .bad{color:#ef4444}

    button{
      padding:4px 6px;
      font-size:11px;
      border:none;
      border-radius:4px;
      cursor:pointer;
    }

    .small{background:#3b82f6;color:white}
    .danger{background:#ef4444;color:white}

    select, input{
      width:100%;
      padding:6px;
      margin-top:6px;
      border-radius:6px;
      border:none;
    }

  </style>
</head>

<body>

<header>
  ⛪ Command Post (Restored)
  <button onclick="load()">Refresh</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { db } from "../assets/app.js";

/* ================= STATE ================= */
let staffList = [];
let templates = [];
let availability = [];
let services = [];
let roleMap = new Map();
let staffMap = new Map();

/* ================= DATE HELPERS ================= */

function parseDate(d){
  const [y,m,day] = d.split("-");
  return new Date(y, m-1, day);
}

function formatDDMMM(dateStr){
  const d = parseDate(dateStr);
  return d.toLocaleDateString("en-GB", {
    day:"2-digit",
    month:"short",
    year:"numeric"
  });
}

/* ================= LOAD ================= */

async function load(){

  const [
    servicesRes,
    staffRes,
    templateRes,
    availRes,
    roleRes
  ] = await Promise.all([
    db.from("services").select("*, service_slots(label,time)"),
    db.from("staff").select("*"),
    db.from("staff_service_templates").select("*"),
    db.from("staff_availability").select("*"),
    db.from("service_roles").select("*")
  ]);

  services = servicesRes.data || [];
  staffList = staffRes.data || [];
  templates = templateRes.data || [];
  availability = availRes.data || [];

  staffMap = new Map(staffList.map(s => [String(s.id), s.name]));

  roleMap = new Map();
  (roleRes.data || []).forEach(r=>{
    const key = String(r.service_id);
    if(!roleMap.has(key)) roleMap.set(key, []);
    roleMap.get(key).push(r);
  });

  render();
}

/* ================= GROUP SERVICES ================= */

function getSlotGroup(s){

  const t = s.service_slots?.time || "";
  const loc = (s.service_slots?.label || "").toLowerCase();

  if(t.includes("14")) return "SAT_2.30";
  if(t.includes("08")) return "SUN_8.30";
  if(t.includes("10") && !loc.includes("jurong")) return "SUN_10.45";
  return "JURONG";
}

/* ================= RENDER ================= */

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const cols = [[],[],[],[]];

  const recent = services.filter(s=>true);

  recent.forEach(s=>{
    const g = getSlotGroup(s);
    if(g==="SAT_2.30") cols[0].push(s);
    if(g==="SUN_8.30") cols[1].push(s);
    if(g==="SUN_10.45") cols[2].push(s);
    if(g==="JURONG") cols[3].push(s);
  });

  cols.forEach(col=>{

    const html = col.map(s=>{

      const assigned = roleMap.get(String(s.id)) || [];

      return `
      <div class="panel">

        <div class="panel-title">
          ${s.service_slots?.label || ""}
          <br>
          ${formatDDMMM(s.service_date)}
        </div>

        ${assigned.map(a=>`
          <div class="row">
            <span>${a.role}</span>
            <span>${staffMap.get(String(a.staff_id)) || "-"}</span>
          </div>
        `).join("")}

        <button class="small"
          onclick="openAssign('${s.id}')">
          Assign
        </button>

      </div>
      `;
    }).join("");

    grid.innerHTML += `<div class="col">${html}</div>`;
  });

  renderAvailabilityColumn();
}

/* ================= COLUMN 5 ================= */

function renderAvailabilityColumn(){

  const dates = [...new Set(services.map(s=>s.service_date))];

  const html = `
  <div class="col">

    <div class="panel-title">Staff Availability</div>

    <select id="dateSel" onchange="fillServices()">
      ${dates.map(d=>`
        <option value="${d}">
          ${formatDDMMM(d)}
        </option>
      `).join("")}
    </select>

    <select id="serviceSel"></select>

    <select id="staffSel"></select>

    <button class="danger" onclick="markUnavailable()">
      Mark Unavailable
    </button>

  </div>`;

  document.getElementById("grid").innerHTML += html;

  fillServices();
}

window.fillServices = function(){

  const date = document.getElementById("dateSel").value;

  const list = services.filter(s=>s.service_date===date);

  document.getElementById("serviceSel").innerHTML =
    list.map(s=>`
      <option value="${s.id}">
        ${s.service_slots?.label}
      </option>
    `).join("");

  fillStaff();
};

window.fillStaff = function(){

  const id = document.getElementById("serviceSel").value;

  const service = services.find(s=>String(s.id)===String(id));

  if(!service) return;

  document.getElementById("staffSel").innerHTML =
    staffList.map(s=>`
      <option value="${s.id}">
        ${s.name}
      </option>
    `).join("");
};

/* ================= ASSIGN ================= */

window.openAssign = function(serviceId){

  const staffId = prompt("Enter staff ID");

  const role = prompt("Enter role");

  db.from("service_roles").upsert({
    service_id: serviceId,
    staff_id: staffId,
    role: role
  },{onConflict:"service_id,role"});

  load();
};

/* ================= UNAVAILABLE ================= */

window.markUnavailable = async function(){

  const staffId = document.getElementById("staffSel").value;
  const serviceId = document.getElementById("serviceSel").value;

  const service = services.find(s=>String(s.id)===String(serviceId));

  await db.from("staff_availability").upsert({
    staff_id: staffId,
    service_date: service.service_date,
    service_slot_id: service.service_slot_id,
    status:"unavailable"
  },{onConflict:"staff_id,service_date,service_slot_id"});

  load();
};

window.load = load;
load();

</script>
</body>
</html>
