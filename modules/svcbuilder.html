<!DOCTYPE html>
<html>
<head>
  <title>Service Builder v2 (Fixed System)</title>
  <style>
    body { margin:0; font-family:Arial; background:#0b1220; color:white; }
    header { padding:12px; background:#111827; font-weight:bold; }

    .grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; padding:10px; }

    .panel {
      background:#111827;
      padding:10px;
      border-radius:10px;
      height:85vh;
      overflow:auto;
    }

    .card {
      background:#0f172a;
      padding:10px;
      margin-bottom:8px;
      border-radius:8px;
      border:1px solid #334155;
      cursor:pointer;
    }

    .card:hover { border-color:#3b82f6; }

    .active { border:2px solid #3b82f6; }

    .role {
      padding:8px;
      margin-bottom:8px;
      border:1px solid #334155;
      border-radius:8px;
      cursor:pointer;
    }

    button {
      width:100%;
      margin-top:5px;
      padding:6px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#3b82f6;
      color:white;
    }

    button.secondary { background:#ef4444; }

    button:disabled { background:#374151; }
  </style>
</head>

<body>

<header>⛪ Service Builder (Slot + Role + Availability Fixed)</header>

<div class="grid">

  <div class="panel">
    <h3>Services</h3>
    <div id="services"></div>
  </div>

  <div class="panel">
    <h3>Roles</h3>
    <div id="roles"></div>
  </div>

  <div class="panel">
    <h3>Staff</h3>
    <div id="staff"></div>
  </div>

</div>

<script type="module">
import { db } from "../assets/app.js";

let selectedService = null;
let selectedRole = null;

/* ---------------- SERVICES ---------------- */

async function loadServices() {

  const today = new Date().toISOString().split("T")[0];

  const { data } = await db
    .from("services")
    .select(`
      *,
      service_slots(time, label, location)
    `)
    .gte("service_date", today)
    .order("service_date", { ascending:true });

  const box = document.getElementById("services");
  box.innerHTML = "";

  (data || []).forEach(s => {

    const slot = s.service_slots;

    const label = slot?.label || "Service";
    const time = slot?.time || "";

    box.innerHTML += `
      <div class="card ${selectedService?.id === s.id ? 'active' : ''}"
        onclick="selectService('${s.id}', '${s.service_slot_id}', '${s.service_date}', ${s.is_communion_service})">

        <b>${s.service_date}</b><br>
        <small>${label} - ${time}</small>

        <div style="font-size:12px;color:#94a3b8;">
          ${s.is_communion_service ? "🕊 Communion Service" : "Standard Service"}
        </div>

      </div>
    `;
  });
}

window.selectService = async (id, slotId, date, isComm) => {

  selectedService = { id, slotId, date, isComm };
  selectedRole = null;

  await loadRoles();
  await loadStaff();
  await loadServices();
};

/* ---------------- ROLES ---------------- */

async function loadRoles() {

  if (!selectedService) return;

  let query = db
    .from("service_roles")
    .select("*")
    .eq("service_id", selectedService.id);

  // ❗ KEY FIX: hide communion roles for normal service
  if (!selectedService.isComm) {
    query = query.eq("is_communion_role", false);
  }

  const { data } = await query;

  const box = document.getElementById("roles");
  box.innerHTML = "";

  (data || []).forEach(r => {

    const active = selectedRole?.roleId === r.id;

    box.innerHTML += `
      <div class="role ${active ? 'active' : ''}"
        onclick="selectRole('${r.id}', ${r.is_communion_role})">

        <b>${r.role} ${r.is_communion_role ? "🕊" : ""}</b>

        <div style="font-size:12px;">
          ${r.staff_id ? "Assigned" : "Unassigned"}
        </div>

        ${r.staff_id ? `
          <button class="secondary"
            onclick="event.stopPropagation(); unassign('${r.id}')">
            Unassign
          </button>
        ` : ""}

      </div>
    `;
  });
}

window.selectRole = (roleId, isComm) => {
  selectedRole = { roleId, isComm };
};

/* ---------------- AVAILABILITY ---------------- */

async function isUnavailable(staffId) {

  const { data } = await db
    .from("staff_availability")
    .select("*")
    .eq("staff_id", staffId)
    .eq("service_date", selectedService.date)
    .eq("service_slot_id", selectedService.slotId);

  const record = (data || [])[0];

  return record?.status === "unavailable";
}

/* ---------------- STAFF ---------------- */

async function loadStaff() {

  const { data } = await db.from("staff").select("*");

  const box = document.getElementById("staff");
  box.innerHTML = "";

  for (const s of data || []) {

    const unavailable = await isUnavailable(s.id);

    const blocked =
      unavailable ||
      (selectedRole?.isComm && !s.communion_eligible);

    box.innerHTML += `
      <div class="card">

        <b>${s.name}</b>

        ${unavailable ? "<div style='color:#ef4444'>Unavailable</div>" : ""}

        <button
          ${blocked ? "disabled" : ""}
          onclick="assign('${s.id}')">
          Assign
        </button>

        <button class="secondary"
          onclick="toggleAvailability('${s.id}')">
          Not Available
        </button>

      </div>
    `;
  }
}

/* ---------------- ASSIGN ---------------- */

window.assign = async (staffId) => {

  if (!selectedService || !selectedRole) return;

  await db
    .from("service_roles")
    .update({ staff_id: staffId })
    .eq("id", selectedRole.roleId);

  await loadRoles();
  await loadStaff();
};

/* ---------------- UNASSIGN ---------------- */

window.unassign = async (roleId) => {

  await db
    .from("service_roles")
    .update({ staff_id: null })
    .eq("id", roleId);

  await loadRoles();
};

/* ---------------- TOGGLE AVAILABILITY ---------------- */

window.toggleAvailability = async (staffId) => {

  const { data } = await db
    .from("staff_availability")
    .select("*")
    .eq("staff_id", staffId)
    .eq("service_date", selectedService.date)
    .eq("service_slot_id", selectedService.slotId);

  if ((data || []).length > 0) {

    const current = data[0];

    const newStatus =
      current.status === "unavailable"
        ? "available"
        : "unavailable";

    await db
      .from("staff_availability")
      .update({ status: newStatus })
      .eq("id", current.id);

  } else {

    await db
      .from("staff_availability")
      .insert({
        staff_id: staffId,
        service_date: selectedService.date,
        service_slot_id: selectedService.slotId,
        status: "unavailable"
      });
  }

  await loadStaff();
};

/* INIT */
loadServices();

</script>

</body>
</html>
