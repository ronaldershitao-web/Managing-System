<!DOCTYPE html>
<html>
<head>
  <title>Service Assignment Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b1220;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .panel {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      height:85vh;
      overflow-y:auto;
    }

    .card {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    .card:hover {
      border-color:#3b82f6;
    }

    .selected {
      border:2px solid #3b82f6;
    }

    .communion {
      border-left:4px solid #fbbf24;
    }

    .role {
      background:#0f172a;
      border:1px solid #334155;
      padding:8px;
      border-radius:8px;
      margin-bottom:8px;
    }

    .warn {
      color:#fbbf24;
      font-size:12px;
    }

    .bad {
      color:#ef4444;
      font-size:12px;
    }

    button {
      width:100%;
      padding:6px;
      margin-top:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#3b82f6;
      color:white;
    }

    button:hover {
      background:#2563eb;
    }

    .assign-btn {
      margin-top:6px;
    }

  </style>
</head>

<body>

<header>
  ⛪ Service Assignment Engine
</header>

<div class="grid">

  <!-- SERVICES -->
  <div class="panel">
    <h3>Services</h3>
    <div id="serviceList"></div>
  </div>

  <!-- ROLES -->
  <div class="panel">
    <h3>Service Roles</h3>
    <div id="roleList"></div>
  </div>

  <!-- STAFF -->
  <div class="panel">
    <h3>Staff</h3>
    <div id="staffList"></div>
  </div>

</div>

<script type="module">
import { db } from "../assets/app.js";

let selectedService = null;
let selectedRole = null;

/* ---------------- SERVICES ---------------- */

async function loadServices() {

  const { data } = await db
    .from("services")
    .select("*")
    .order("service_date", { ascending:false });

  const box = document.getElementById("serviceList");
  box.innerHTML = "";

  (data || []).forEach(s => {

    box.innerHTML += `
      <div class="card ${s.is_communion_service ? 'communion' : ''}"
           onclick="selectService('${s.id}', ${s.is_communion_service})">

        <b>${s.service_date}</b><br>

        ${s.is_communion_service
          ? "🕊 Communion Service"
          : "Standard Service"
        }

      </div>
    `;
  });
}

window.selectService = async (id, isComm) => {

  selectedService = { id, isComm };
  selectedRole = null;

  await loadRoles();
  await loadStaff();
};

/* ---------------- ROLES ---------------- */

async function loadRoles() {

  if (!selectedService) return;

  const { data } = await db
    .from("service_roles")
    .select("*")
    .eq("service_id", selectedService.id);

  const box = document.getElementById("roleList");
  box.innerHTML = "";

  (data || []).forEach(r => {

    box.innerHTML += `
      <div class="role ${r.is_communion_role ? 'communion' : ''}"
           onclick="selectRole('${r.id}', ${r.is_communion_role})">

        <b>
          ${r.role}
          ${r.is_communion_role ? "🕊" : ""}
        </b>

        <div>
          ${r.staff_id ? "Assigned" : "Unassigned"}
        </div>

      </div>
    `;
  });
}

window.selectRole = (roleId, isCommRole) => {
  selectedRole = { roleId, isCommRole };
};

/* ---------------- STAFF ---------------- */

async function loadStaff() {

  const { data } = await db.from("staff").select("*");

  const box = document.getElementById("staffList");
  box.innerHTML = "";

  (data || []).forEach(s => {

    const blocked =
      selectedRole?.isCommRole &&
      !s.communion_eligible;

    box.innerHTML += `
      <div class="card">

        <b>${s.name}</b>

        ${s.communion_eligible
          ? ""
          : "<div class='warn'>Not Communion Eligible</div>"
        }

        <button class="assign-btn"
          onclick="assignStaff('${s.id}', ${s.communion_eligible})">
          Assign
        </button>

      </div>
    `;
  });
}

/* ---------------- ASSIGN ---------------- */

window.assignStaff = async (staffId, eligible) => {

  if (!selectedRole || !selectedService) {
    alert("Select service + role first");
    return;
  }

  if (selectedRole.isCommRole && !eligible) {
    alert("This staff cannot serve communion");
    return;
  }

  await db
    .from("service_roles")
    .update({ staff_id: staffId })
    .eq("id", selectedRole.roleId);

  await loadRoles();
};

/* INIT */
loadServices();

</script>

</body>
</html>
