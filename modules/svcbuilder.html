<!DOCTYPE html>
<html>
<head>
  <title>Service Builder</title>
  <style>
    body { margin:0; font-family:Arial; background:#0b1220; color:white; }
    header { padding:10px; background:#111827; font-weight:bold; }

    .grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; padding:10px; }

    .panel {
      background:#111827;
      padding:10px;
      border-radius:10px;
      height:85vh;
      overflow:auto;
    }

    .card {
      background:#0f172a;
      padding:10px;
      margin-bottom:8px;
      border-radius:8px;
      border:1px solid #334155;
      cursor:pointer;
    }

    .card:hover { border-color:#3b82f6; }

    .role { padding:8px; margin-bottom:8px; border:1px solid #334155; border-radius:8px; }

    .tag { font-size:12px; color:#94a3b8; }

    button {
      width:100%;
      margin-top:5px;
      padding:6px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#3b82f6;
      color:white;
    }

    button:disabled { background:#374151; }
  </style>
</head>

<body>

<header>Service Builder (Fixed Logic)</header>

<div class="grid">

  <div class="panel">
    <h3>Services</h3>
    <div id="services"></div>
  </div>

  <div class="panel">
    <h3>Roles</h3>
    <div id="roles"></div>
  </div>

  <div class="panel">
    <h3>Staff</h3>
    <div id="staff"></div>
  </div>

</div>

<script type="module">
import { db } from "../assets/app.js";

let selectedService = null;
let selectedRole = null;

/* ---------------- SERVICES ---------------- */

async function loadServices() {

  const today = new Date().toISOString().split("T")[0];

  const { data } = await db
    .from("services")
    .select(`*, service_slots(time, location, label)`)
    .gte("service_date", today)
    .order("service_date", { ascending:true });

  const box = document.getElementById("services");
  box.innerHTML = "";

  (data || []).forEach(s => {

    const slot = s.service_slots;

    const label =
      slot?.label || "Service";

    const time =
      slot?.time || "";

    box.innerHTML += `
      <div class="card" onclick="selectService('${s.id}', '${s.service_slot_id}', '${s.service_date}')">
        <b>${s.service_date}</b><br>
        <div class="tag">${label} - ${time}</div>
      </div>
    `;
  });
}

window.selectService = async (id, slotId, date) => {
  selectedService = { id, slotId, date };
  selectedRole = null;

  await loadRoles();
  await loadStaff();
};

/* ---------------- ROLES ---------------- */

async function loadRoles() {

  const { data } = await db
    .from("service_roles")
    .select("*")
    .eq("service_id", selectedService.id);

  const box = document.getElementById("roles");
  box.innerHTML = "";

  (data || []).forEach(r => {

    box.innerHTML += `
      <div class="role" onclick="selectRole('${r.id}', ${r.is_communion_role})">
        <b>${r.role}</b>
        <div class="tag">${r.staff_id ? "Assigned" : "Unassigned"}</div>
      </div>
    `;
  });
}

window.selectRole = (id, isComm) => {
  selectedRole = { id, isComm };
};

/* ---------------- AVAILABILITY ---------------- */

async function isUnavailable(staffId) {

  const { data } = await db
    .from("staff_availability")
    .select("*")
    .eq("staff_id", staffId)
    .eq("service_slot_id", selectedService.slotId)
    .eq("service_date", selectedService.date);

  return (data || []).length > 0;
}

/* ---------------- STAFF ---------------- */

async function loadStaff() {

  const { data } = await db.from("staff").select("*");

  const box = document.getElementById("staff");
  box.innerHTML = "";

  for (const s of data || []) {

    const unavailable = await isUnavailable(s.id);

    const blocked =
      unavailable ||
      (selectedRole?.isComm && !s.communion_eligible);

    box.innerHTML += `
      <div class="card">
        <b>${s.name}</b>

        ${unavailable ? "<div style='color:red'>Unavailable</div>" : ""}

        <button ${blocked ? "disabled" : ""}
          onclick="assign('${s.id}')">
          Assign
        </button>

        <button style="background:#ef4444"
          onclick="markUnavailable('${s.id}')">
          Not Available
        </button>

      </div>
    `;
  }
}

/* ---------------- ASSIGN ---------------- */

window.assign = async (staffId) => {

  if (!selectedService || !selectedRole) return;

  await db
    .from("service_roles")
    .update({ staff_id: staffId })
    .eq("id", selectedRole.id);

  await loadRoles();
};

/* ---------------- MARK UNAVAILABLE (TOGGLE SAFE) ---------------- */

window.markUnavailable = async (staffId) => {

  const { data } = await db
    .from("staff_availability")
    .select("*")
    .eq("staff_id", staffId)
    .eq("service_slot_id", selectedService.slotId)
    .eq("service_date", selectedService.date);

  if ((data || []).length > 0) {

    // RESTORE
    await db
      .from("staff_availability")
      .delete()
      .eq("staff_id", staffId)
      .eq("service_slot_id", selectedService.slotId)
      .eq("service_date", selectedService.date);

  } else {

    // MARK UNAVAILABLE
    await db
      .from("staff_availability")
      .insert({
        staff_id: staffId,
        service_slot_id: selectedService.slotId,
        service_date: selectedService.date,
        status: "unavailable"
      });
  }

  await loadStaff();
};

/* INIT */
loadServices();

</script>

</body>
</html>
