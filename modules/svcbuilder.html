<!DOCTYPE html>
<html>
<head>
  <title>Service Builder (Schema Aligned)</title>

  <style>
    body { margin:0; font-family:Arial; background:#0b1220; color:white; }
    header { padding:12px; background:#111827; font-weight:bold; }

    .grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; padding:10px; }

    .panel {
      background:#111827;
      padding:10px;
      border-radius:10px;
      height:85vh;
      overflow:auto;
    }

    .card {
      background:#0f172a;
      padding:10px;
      margin-bottom:8px;
      border-radius:8px;
      border:1px solid #334155;
      cursor:pointer;
    }

    .card:hover { border-color:#3b82f6; }

    .active { border:2px solid #3b82f6; }

    .role {
      padding:8px;
      margin-bottom:8px;
      border:1px solid #334155;
      border-radius:8px;
    }

    button {
      width:100%;
      margin-top:5px;
      padding:6px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#3b82f6;
      color:white;
    }

    button.secondary { background:#ef4444; }
  </style>
</head>

<body>

<header>⛪ Service Builder (Schema Stable Version)</header>

<div class="grid">

  <div class="panel">
    <h3>Services</h3>
    <div id="services"></div>
  </div>

  <div class="panel">
    <h3>Roles</h3>
    <div id="roles"></div>
  </div>

  <div class="panel">
    <h3>Staff</h3>
    <div id="staff"></div>
  </div>

</div>

<script type="module">
import { db } from "../assets/app.js";

let selectedService = null;
let selectedRole = null;

/* ---------------- SERVICES ---------------- */

async function loadServices() {

  const { data } = await db
    .from("services")
    .select(`
      id,
      service_date,
      is_communion_service,
      service_slot_id,
      service_slots(time, label, location)
    `)
    .order("service_date", { ascending: true });

  const box = document.getElementById("services");
  box.innerHTML = "";

  if (!data) return;

  data.forEach(s => {

    const slot = s.service_slots;

    box.innerHTML += `
      <div class="card ${selectedService?.id === s.id ? 'active' : ''}"
        onclick="selectService('${s.id}', '${s.service_slot_id}', '${s.service_date}', ${s.is_communion_service})">

        <b>${s.service_date}</b><br>
        <small>${slot?.label ?? 'Service'} - ${slot?.time ?? ''}</small>

        <div style="font-size:12px;color:#60a5fa;">
          ${s.is_communion_service ? "🕊 Communion" : "Standard"}
        </div>

      </div>
    `;
  });
}

window.selectService = async (id, slotId, date, isComm) => {

  selectedService = { id, slotId, date, isComm };
  selectedRole = null;

  await loadRoles();
  await loadStaff();
};

/* ---------------- ROLES ---------------- */

async function loadRoles() {

  if (!selectedService) return;

  let query = db
    .from("service_roles")
    .select("*")
    .eq("service_id", selectedService.id);

  if (!selectedService.isComm) {
    query = query.eq("is_communion_role", false);
  }

  const { data } = await query;

  const box = document.getElementById("roles");
  box.innerHTML = "";

  if (!data) return;

  data.forEach(r => {

    box.innerHTML += `
      <div class="role" onclick="selectRole('${r.id}', ${r.is_communion_role})">

        <b>${r.role}</b>

        <div>${r.staff_id ? "Assigned" : "Unassigned"}</div>

        ${r.staff_id ? `
          <button class="secondary"
            onclick="event.stopPropagation(); unassign('${r.id}')">
            Unassign
          </button>
        ` : ""}

      </div>
    `;
  });
}

window.selectRole = (id, isComm) => {
  selectedRole = { id, isComm };
};

/* ---------------- STAFF ---------------- */

async function loadStaff() {

  const { data } = await db.from("staff").select("*");

  const box = document.getElementById("staff");
  box.innerHTML = "";

  if (!data) return;

  data.forEach(s => {

    const blocked =
      selectedRole?.isComm && !s.communion_eligible;

    box.innerHTML += `
      <div class="card">

        <b>${s.name}</b>

        <button ${blocked ? "disabled" : ""}
          onclick="assign('${s.id}')">
          Assign
        </button>

      </div>
    `;
  });
}

/* ---------------- ASSIGN ---------------- */

window.assign = async (staffId) => {

  if (!selectedRole) return;

  await db
    .from("service_roles")
    .update({ staff_id: staffId })
    .eq("id", selectedRole.id);

  await loadRoles();
};

window.unassign = async (roleId) => {

  await db
    .from("service_roles")
    .update({ staff_id: null })
    .eq("id", roleId);

  await loadRoles();
};

/* INIT */
loadServices();

</script>

</body>
</html>
