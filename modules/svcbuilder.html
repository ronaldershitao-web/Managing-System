<!DOCTYPE html>
<html>
<head>
  <title>Service Assignment Engine (Final)</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b1220;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .panel {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      height:85vh;
      overflow-y:auto;
    }

    .card, .role {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    .selected {
      border:2px solid #3b82f6;
    }

    .communion {
      border-left:4px solid #fbbf24;
    }

    .warn { color:#fbbf24; font-size:12px; }
    .bad { color:#ef4444; font-size:12px; }

    button {
      width:100%;
      padding:6px;
      margin-top:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#3b82f6;
      color:white;
    }

    .danger {
      background:#ef4444;
    }

    button:disabled {
      background:#374151;
    }
  </style>
</head>

<body>

<header>
  ⛪ Service Assignment Engine
</header>

<div class="grid">

  <div class="panel">
    <h3>Services</h3>
    <div id="serviceList"></div>
  </div>

  <div class="panel">
    <h3>Roles</h3>
    <div id="roleList"></div>
  </div>

  <div class="panel">
    <h3>Staff</h3>
    <div id="staffList"></div>
  </div>

</div>

<script type="module">
import { db } from "../assets/app.js";

let selectedService = null;
let selectedRole = null;

/* ---------------- SERVICES ---------------- */

async function loadServices() {

  const today = new Date().toISOString().split("T")[0];

  const { data } = await db
    .from("services")
    .select("*")
    .gte("service_date", today)
    .order("service_date", { ascending:true });

  const box = document.getElementById("serviceList");
  box.innerHTML = "";

  data.forEach(s => {

    const day = new Date(s.service_date)
      .toLocaleDateString("en-US", { weekday:"long" });

    box.innerHTML += `
      <div class="card ${s.is_communion_service ? 'communion' : ''}"
        onclick="selectService('${s.id}', ${s.is_communion_service}, '${s.service_date}')">

        <b>${s.service_date}</b><br>
        ${day}<br>

        ${s.is_communion_service
          ? "🕊 Communion Service"
          : "Standard Service"}

      </div>
    `;
  });
}

window.selectService = async (id, isComm, date) => {
  selectedService = { id, isComm, date };
  selectedRole = null;

  await loadRoles();
  await loadStaff();
};

/* ---------------- ROLES ---------------- */

async function loadRoles() {

  const { data } = await db
    .from("service_roles")
    .select("*")
    .eq("service_id", selectedService.id);

  const box = document.getElementById("roleList");
  box.innerHTML = "";

  data
    .filter(r => selectedService.isComm || !r.is_communion_role)
    .forEach(r => {

      box.innerHTML += `
        <div class="role ${r.is_communion_role ? 'communion' : ''}"
          onclick="selectRole('${r.id}', ${r.is_communion_role})">

          <b>${r.role} ${r.is_communion_role ? "🕊" : ""}</b>

          <div>
            ${r.staff_id ? "Assigned" : "Unassigned"}
          </div>

        </div>
      `;
    });
}

window.selectRole = (roleId, isCommRole) => {
  selectedRole = { roleId, isCommRole };
};

/* ---------------- AVAILABILITY ---------------- */

async function getUnavailableStaff() {

  const { data } = await db
    .from("staff_availability")
    .select("*");

  return data || [];
}

function isUnavailable(staffId, serviceDate, availability) {

  return availability.some(a =>
    a.staff_id === staffId &&
    serviceDate >= a.start_date &&
    serviceDate <= a.end_date &&
    a.status === "unavailable"
  );
}

/* ---------------- STAFF ---------------- */

async function loadStaff() {

  const { data: staff } = await db.from("staff").select("*");
  const availability = await getUnavailableStaff();

  const box = document.getElementById("staffList");
  box.innerHTML = "";

  staff.forEach(s => {

    const unavailable = isUnavailable(
      s.id,
      selectedService.date,
      availability
    );

    if (unavailable) return; // REMOVE from list

    const blocked =
      (selectedRole?.isCommRole && !s.communion_eligible);

    box.innerHTML += `
      <div class="card">

        <b>${s.name}</b>

        ${!s.communion_eligible
          ? "<div class='warn'>Not Communion Eligible</div>"
          : ""}

        <button
          ${blocked ? "disabled" : ""}
          onclick="assignStaff('${s.id}', ${s.communion_eligible})">
          Assign
        </button>

        <button class="danger"
          onclick="toggleUnavailable('${s.id}')">
          Mark Not Available
        </button>

      </div>
    `;
  });
}

/* ---------------- ASSIGN ---------------- */

window.assignStaff = async (staffId, eligible) => {

  if (!selectedService || !selectedRole) {
    alert("Select service + role first");
    return;
  }

  if (selectedRole.isCommRole && !eligible) {
    alert("Not eligible for communion");
    return;
  }

  await db
    .from("service_roles")
    .update({ staff_id: staffId })
    .eq("id", selectedRole.roleId);

  await loadRoles();
};

/* ---------------- TOGGLE UNAVAILABLE ---------------- */

window.toggleUnavailable = async (staffId) => {

  const { data } = await db
    .from("staff_availability")
    .select("*")
    .eq("staff_id", staffId)
    .eq("start_date", selectedService.date);

  if (data.length > 0) {
    // remove (make available again)
    await db
      .from("staff_availability")
      .delete()
      .eq("id", data[0].id);
  } else {
    // mark unavailable
    await db
      .from("staff_availability")
      .insert([{
        staff_id: staffId,
        start_date: selectedService.date,
        end_date: selectedService.date,
        status: "unavailable"
      }]);
  }

  await loadStaff();
};

/* INIT */
loadServices();

</script>

</body>
</html>
