<!DOCTYPE html>
<html>
<head>
  <title>Service Assignment Engine (Final)</title>

  <style>
    body { margin:0; font-family: Arial; background:#0b1220; color:white; }
    header { padding:12px; background:#111827; font-weight:bold; }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .panel {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      height:85vh;
      overflow-y:auto;
    }

    .card, .role {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    .selected { border:2px solid #3b82f6; }
    .communion { border-left:4px solid #fbbf24; }

    .warn { color:#fbbf24; font-size:12px; }
    .bad { color:#ef4444; font-size:12px; }

    button {
      width:100%;
      margin-top:5px;
      padding:6px;
      border:none;
      border-radius:6px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    button:disabled {
      background:#374151;
      cursor:not-allowed;
    }
  </style>
</head>

<body>

<header>⛪ Service Assignment Engine</header>

<div class="grid">
  <div class="panel">
    <h3>Services</h3>
    <div id="serviceList"></div>
  </div>

  <div class="panel">
    <h3>Roles</h3>
    <div id="roleList"></div>
  </div>

  <div class="panel">
    <h3>Staff</h3>
    <div id="staffList"></div>
  </div>
</div>

<script type="module">
import { db } from "../assets/app.js";

let selectedService = null;
let selectedRole = null;

/* ---------------- SERVICES ---------------- */

async function loadServices() {

  const today = new Date().toISOString().split("T")[0];

  const { data } = await db
    .from("services")
    .select(`
      *,
      service_slots (
        time,
        location,
        label
      )
    `)
    .gte("service_date", today)
    .order("service_date", { ascending:true });

  const box = document.getElementById("serviceList");
  box.innerHTML = "";

  data.forEach(s => {

    const dateObj = new Date(s.service_date);
    const day = dateObj.toLocaleDateString("en-US", { weekday: "long" });

    const time = s.service_slots?.time || "";
    const loc = s.service_slots?.location || "";

    box.innerHTML += `
      <div class="card 
        ${selectedService?.id === s.id ? 'selected' : ''}
        ${s.is_communion_service ? 'communion' : ''}"
        
        onclick="selectService('${s.id}', ${s.is_communion_service}, '${s.service_date}')">

        <b>${s.service_date}</b> (${day})<br>
        ${time} ${loc ? "(" + loc + ")" : ""}<br>

        ${s.is_communion_service ? "🕊 Communion" : "Standard"}

      </div>
    `;
  });
}

window.selectService = async (id, isComm, date) => {
  selectedService = { id, isComm, date };
  selectedRole = null;

  await loadServices();
  await loadRoles();
  await loadStaff();
};

/* ---------------- ROLES ---------------- */

async function loadRoles() {

  if (!selectedService) return;

  const { data } = await db
    .from("service_roles")
    .select("*")
    .eq("service_id", selectedService.id);

  const box = document.getElementById("roleList");
  box.innerHTML = "";

  data
    .filter(r => selectedService.isComm || !r.is_communion_role)
    .forEach(r => {

      box.innerHTML += `
        <div class="role
          ${selectedRole?.roleId === r.id ? 'selected' : ''}
          ${r.is_communion_role ? 'communion' : ''}"

          onclick="selectRole('${r.id}', ${r.is_communion_role})">

          <b>${r.role}</b>
          ${r.is_communion_role ? "🕊" : ""}

          <div>
            ${r.staff_id ? "Assigned" : "Unassigned"}
          </div>

        </div>
      `;
    });
}

window.selectRole = (roleId, isCommRole) => {
  selectedRole = { roleId, isCommRole };
  loadRoles();
};

/* ---------------- AVAILABILITY ---------------- */

async function isUnavailable(staffId, date) {

  const { data } = await db
    .from("staff_availability")
    .select("*")
    .eq("staff_id", staffId);

  return data.some(a =>
    date >= a.start_date && date <= a.end_date
  );
}

/* ---------------- STAFF ---------------- */

async function loadStaff() {

  if (!selectedService) return;

  const { data } = await db.from("staff").select("*");

  const box = document.getElementById("staffList");
  box.innerHTML = "";

  for (const s of data) {

    const unavailable = await isUnavailable(s.id, selectedService.date);

    if (unavailable) continue;

    const blocked =
      selectedRole?.isCommRole && !s.communion_eligible;

    box.innerHTML += `
      <div class="card">

        <b>${s.name}</b>

        ${s.communion_eligible ? "" : "<div class='warn'>Not Communion Eligible</div>"}

        <button
          ${blocked ? "disabled" : ""}
          onclick="assignStaff('${s.id}', ${s.communion_eligible})">
          Assign
        </button>

        <button onclick="markUnavailable('${s.id}')">
          Not Available
        </button>

      </div>
    `;
  }
}

/* ---------------- ASSIGN ---------------- */

window.assignStaff = async (staffId, eligible) => {

  if (!selectedRole || !selectedService) {
    alert("Select service + role first");
    return;
  }

  if (selectedRole.isCommRole && !eligible) {
    alert("Not eligible for communion");
    return;
  }

  await db
    .from("service_roles")
    .update({ staff_id: staffId })
    .eq("id", selectedRole.roleId);

  await loadRoles();
};

/* ---------------- MARK UNAVAILABLE ---------------- */

window.markUnavailable = async (staffId) => {

  await db.from("staff_availability").insert({
    staff_id: staffId,
    start_date: selectedService.date,
    end_date: selectedService.date,
    type: "service_block",
    status: "active"
  });

  await loadStaff();
};

/* INIT */
loadServices();

</script>

</body>
</html>
