<!DOCTYPE html>
<html>
<head>
  <title>Service Assignment Engine (Smart)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b1220;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .panel {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      height:85vh;
      overflow-y:auto;
    }

    .card {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    .card:hover {
      border-color:#3b82f6;
    }

    .role {
      background:#0f172a;
      border:1px solid #334155;
      padding:8px;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    .selected {
      border:2px solid #3b82f6;
    }

    .communion {
      border-left:4px solid #fbbf24;
    }

    .warn {
      color:#fbbf24;
      font-size:12px;
    }

    button {
      width:100%;
      padding:6px;
      margin-top:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#3b82f6;
      color:white;
    }

    button:disabled {
      background:#374151;
    }
  </style>
</head>

<body>

<header>
  ⛪ Smart Service Assignment Engine
</header>

<div class="grid">

  <div class="panel">
    <h3>Services</h3>
    <div id="serviceList"></div>
  </div>

  <div class="panel">
    <h3>Roles</h3>
    <div id="roleList"></div>
  </div>

  <div class="panel">
    <h3>Staff</h3>
    <div id="staffList"></div>
  </div>

</div>

<script type="module">
import { db } from "../assets/app.js";

let selectedService = null;
let selectedRole = null;
let assignedStaffMap = {};

/* ---------- HELPERS ---------- */

// Get TODAY in Singapore (YYYY-MM-DD)
function getTodaySGT() {
  const now = new Date();
  const sgt = new Date(
    now.toLocaleString("en-US", { timeZone: "Asia/Singapore" })
  );
  return sgt.toISOString().split("T")[0];
}

function getDayName(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString("en-SG", { weekday: "short" });
}

/* ---------- SERVICES ---------- */

async function loadServices() {

  const today = getTodaySGT();

  const { data } = await db
    .from("services")
    .select("*")
    .gte("service_date", today) // 🔥 filter future
    .order("service_date", { ascending: true }); // 🔥 ascending

  const box = document.getElementById("serviceList");
  box.innerHTML = "";

  (data || []).forEach(s => {

    const day = getDayName(s.service_date);

    box.innerHTML += `
      <div class="card ${s.is_communion_service ? 'communion' : ''}"
        onclick="selectService('${s.id}', ${s.is_communion_service}, '${s.service_date}')">

        <b>${s.service_date}</b> (${day})<br>
        ${s.is_communion_service ? "🕊 Communion" : "Standard"}

      </div>
    `;
  });
}

window.selectService = async (id, isComm, date) => {
  selectedService = { id, isComm, date };
  selectedRole = null;

  await loadRoles();
  await loadStaff();
};

/* ---------- ROLES ---------- */

async function loadRoles() {

  if (!selectedService) return;

  const { data } = await db
    .from("service_roles")
    .select("*")
    .eq("service_id", selectedService.id);

  const box = document.getElementById("roleList");
  box.innerHTML = "";

  assignedStaffMap = {};

  (data || []).forEach(r => {

    if (!selectedService.isComm && r.is_communion_role) return;

    if (r.staff_id) {
      assignedStaffMap[r.staff_id] = true;
    }

    const isSelected = selectedRole?.roleId === r.id;

    box.innerHTML += `
      <div class="role ${isSelected ? 'selected' : ''} ${r.is_communion_role ? 'communion' : ''}"
        onclick="selectRole('${r.id}', ${r.is_communion_role})">

        <b>${r.role} ${r.is_communion_role ? "🕊" : ""}</b>

        <div>${r.staff_id ? "Assigned" : "Unassigned"}</div>

      </div>
    `;
  });
}

window.selectRole = (roleId, isCommRole) => {
  selectedRole = { roleId, isCommRole };

  loadRoles();
  loadStaff();
};

/* ---------- AVAILABILITY ---------- */

async function isUnavailable(staffId, date) {

  const { data } = await db
    .from("staff_availability")
    .select("*")
    .eq("staff_id", staffId);

  return (data || []).some(a =>
    date >= a.start_date && date <= a.end_date
  );
}

/* ---------- STAFF ---------- */

async function loadStaff() {

  if (!selectedService) return;

  const { data } = await db.from("staff").select("*");

  const box = document.getElementById("staffList");
  box.innerHTML = "";

  for (const s of data || []) {

    const unavailable = await isUnavailable(s.id, selectedService.date);

    if (unavailable) continue; // 🔥 remove unavailable

    const alreadyAssigned = assignedStaffMap[s.id];

    const blocked =
      selectedRole?.isCommRole && !s.communion_eligible;

    box.innerHTML += `
      <div class="card ${alreadyAssigned ? 'selected' : ''}">

        <b>${s.name}</b>

        ${!s.communion_eligible
          ? "<div class='warn'>Not Communion Eligible</div>"
          : ""
        }

        ${alreadyAssigned ? "<div>✅ Assigned</div>" : ""}

        <button
          ${!selectedRole || blocked ? "disabled" : ""}
          onclick="assignStaff('${s.id}', ${s.communion_eligible})">

          Assign

        </button>

      </div>
    `;
  }
}

/* ---------- ASSIGN ---------- */

window.assignStaff = async (staffId, eligible) => {

  if (!selectedService || !selectedRole) {
    alert("Select service and role first");
    return;
  }

  if (selectedRole.isCommRole && !eligible) {
    alert("Only eligible staff can serve communion");
    return;
  }

  await db
    .from("service_roles")
    .update({ staff_id: staffId })
    .eq("id", selectedRole.roleId);

  await loadRoles();
  await loadStaff();
};

/* INIT */
loadServices();

</script>

</body>
</html>
