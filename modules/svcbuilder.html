<!DOCTYPE html>
<html>
<head>
  <title>Service Builder (Stable v4)</title>

  <style>
    body { margin:0; font-family:Arial; background:#0b1220; color:white; }

    header {
      padding:12px;
      background:#111827;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .panel {
      background:#111827;
      padding:10px;
      border-radius:10px;
      height:85vh;
      overflow:auto;
    }

    .card {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      margin-bottom:8px;
      border-radius:8px;
      cursor:pointer;
    }

    .card:hover { border-color:#3b82f6; }

    .active { border:2px solid #3b82f6; }

    .role {
      padding:8px;
      margin-bottom:8px;
      border:1px solid #334155;
      border-radius:8px;
      cursor:pointer;
    }

    .tag { font-size:12px; color:#94a3b8; }

    button {
      width:100%;
      margin-top:5px;
      padding:6px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#3b82f6;
      color:white;
    }

    button.danger { background:#ef4444; }

    button:disabled { background:#374151; }
  </style>
</head>

<body>

<header>⛪ Service Builder (Stable v4)</header>

<div class="grid">

  <!-- SERVICES -->
  <div class="panel">
    <h3>Services</h3>
    <div id="services"></div>
  </div>

  <!-- ROLES -->
  <div class="panel">
    <h3>Roles</h3>
    <div id="roles"></div>
  </div>

  <!-- STAFF -->
  <div class="panel">
    <h3>Staff</h3>

    <input
      placeholder="Search staff..."
      oninput="searchStaff(this.value)"
      style="width:100%;margin-bottom:8px;padding:6px;border-radius:6px;border:none;"
    />

    <h4>Available</h4>
    <div id="staffAvailable"></div>

    <h4>Unavailable</h4>
    <div id="staffUnavailable"></div>
  </div>

</div>

<script type="module">
import { db } from "../assets/app.js";

let selectedService = null;
let selectedRole = null;
let searchText = "";

/* =========================
   HELPERS
========================= */

async function getAssignments() {
  const { data } = await db
    .from("service_roles")
    .select("*")
    .eq("service_id", selectedService.id);

  return data || [];
}

function canAssign(staff, role, assignments) {

  const staffRoles = assignments.filter(a => a.staff_id === staff.id);

  const hasPastor = staffRoles.some(r => r.role === "Service Pastor");
  const hasCommunion = staffRoles.some(r => r.is_communion_role);

  const normalRoles = staffRoles.filter(r => !r.is_communion_role);

  // Service Pastor rule
  if (hasPastor) {
    return role.role === "Anchor";
  }

  // Normal role limit
  if (!role.is_communion_role && normalRoles.length >= 1) {
    return false;
  }

  // Communion logic
  if (selectedService.isComm) {
    if (role.is_communion_role && hasCommunion) return false;
  }

  return true;
}

/* =========================
   SERVICES
========================= */

async function loadServices() {

  const today = new Date().toISOString().split("T")[0];

  const { data } = await db
    .from("services")
    .select(`
      id,
      service_date,
      is_communion_service,
      service_slot_id,
      service_slots(label, time, location)
    `)
    .gte("service_date", today)
    .order("service_date", { ascending:true });

  const box = document.getElementById("services");
  box.innerHTML = "";

  (data || []).forEach(s => {

    const slot = s.service_slots || {};

    box.innerHTML += `
      <div class="card ${selectedService?.id === s.id ? 'active' : ''}"
        onclick="selectService('${s.id}', '${s.service_slot_id}', '${s.service_date}', ${s.is_communion_service})">

        <b>${s.service_date}</b>

        <div class="tag">
          ${slot.label || "Service"} - ${slot.time || ""}
        </div>

        <div class="tag">
          ${s.is_communion_service ? "🕊 Communion" : "Standard"}
        </div>

      </div>
    `;
  });
}

window.selectService = async (id, slotId, date, isComm) => {
  selectedService = { id, slotId, date, isComm };
  selectedRole = null;

  await loadRoles();
  await loadStaff();
  await loadServices();
};

/* =========================
   ROLES
========================= */

async function loadRoles() {

  if (!selectedService) return;

  let query = db
    .from("service_roles")
    .select(`*, staff(name)`)
    .eq("service_id", selectedService.id);

  if (!selectedService.isComm) {
    query = query.eq("is_communion_role", false);
  }

  const { data } = await query;

  const box = document.getElementById("roles");
  box.innerHTML = "";

  (data || []).forEach(r => {

    const active = selectedRole?.roleId === r.id;

    box.innerHTML += `
      <div class="role ${active ? 'active' : ''}"
        onclick="selectRole('${r.id}', ${r.is_communion_role})">

        <b>${r.role} ${r.is_communion_role ? "🕊" : ""}</b>

        <div class="tag">
          ${r.staff?.name || "Unassigned"}
        </div>

        ${
          r.staff_id
          ? `<button class="danger"
              onclick="event.stopPropagation(); unassign('${r.id}')">
              Unassign
            </button>`
          : ""
        }

      </div>
    `;
  });
}

window.selectRole = (roleId, isComm) => {
  selectedRole = { roleId, isComm };
};

/* =========================
   AVAILABILITY
========================= */

async function isUnavailable(staffId) {

  const { data } = await db
    .from("staff_availability")
    .select("*")
    .eq("staff_id", staffId)
    .eq("service_date", selectedService.date)
    .eq("service_slot_id", selectedService.slotId);

  return (data || []).some(r => r.status === "unavailable");
}

/* =========================
   STAFF
========================= */

async function loadStaff() {

  const { data: staff } = await db.from("staff").select("*");
  const assignments = await getAssignments();

  const availableBox = document.getElementById("staffAvailable");
  const unavailableBox = document.getElementById("staffUnavailable");

  availableBox.innerHTML = "";
  unavailableBox.innerHTML = "";

  for (const s of staff || []) {

    if (searchText && !s.name.toLowerCase().includes(searchText.toLowerCase())) continue;

    const unavailable = await isUnavailable(s.id);

    const roleData = assignments.find(r => r.id === selectedRole?.roleId);

    const can = selectedRole
      ? canAssign(s, roleData, assignments)
      : false;

    const card = `
      <div class="card">
        <b>${s.name}</b>

        <button ${!selectedRole || !can || unavailable ? "disabled" : ""}
          onclick="assign('${s.id}')">
          Assign
        </button>

        ${
          unavailable
          ? `<button onclick="toggle('${s.id}')">Return Availability</button>`
          : `<button onclick="toggle('${s.id}')">Mark Unavailable</button>`
        }
      </div>
    `;

    if (unavailable) {
      unavailableBox.innerHTML += card;
    } else {
      availableBox.innerHTML += card;
    }
  }
}

/* =========================
   ASSIGN / UNASSIGN
========================= */

window.assign = async (staffId) => {

  await db
    .from("service_roles")
    .update({ staff_id: staffId })
    .eq("id", selectedRole.roleId);

  await loadRoles();
  await loadStaff();
};

window.unassign = async (roleId) => {

  await db
    .from("service_roles")
    .update({ staff_id: null })
    .eq("id", roleId);

  await loadRoles();
  await loadStaff();
};

/* =========================
   TOGGLE AVAILABILITY
========================= */

window.toggle = async (staffId) => {

  const { data } = await db
    .from("staff_availability")
    .select("*")
    .eq("staff_id", staffId)
    .eq("service_date", selectedService.date)
    .eq("service_slot_id", selectedService.slotId);

  if ((data || []).length > 0) {

    await db
      .from("staff_availability")
      .delete()
      .eq("id", data[0].id);

  } else {

    await db
      .from("staff_availability")
      .insert({
        staff_id: staffId,
        service_date: selectedService.date,
        service_slot_id: selectedService.slotId,
        status: "unavailable"
      });
  }

  await loadStaff();
};

/* =========================
   SEARCH
========================= */

window.searchStaff = (val) => {
  searchText = val;
  loadStaff();
};

/* INIT */
loadServices();

</script>

</body>
</html>
