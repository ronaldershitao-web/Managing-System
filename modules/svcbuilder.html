<!DOCTYPE html>
<html>
<head>
  <title>Smart Service Assignment Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family: Arial; background:#0b1220; color:white; }
    header { padding:12px; background:#111827; font-weight:bold; }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .panel {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      height:85vh;
      overflow-y:auto;
    }

    .card, .role {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    .selected { border:2px solid #3b82f6; }
    .communion { border-left:4px solid #fbbf24; }

    .warn { color:#fbbf24; font-size:12px; }
    .bad { color:#ef4444; font-size:12px; }

    button {
      width:100%;
      padding:6px;
      margin-top:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#3b82f6;
      color:white;
    }

    button:disabled {
      background:#374151;
      cursor:not-allowed;
    }
  </style>
</head>

<body>

<header>
  ⛪ Smart Service Assignment Engine
</header>

<div class="grid">

  <div class="panel">
    <h3>Services</h3>
    <div id="serviceList"></div>
  </div>

  <div class="panel">
    <h3>Roles</h3>
    <div id="roleList"></div>
  </div>

  <div class="panel">
    <h3>Staff</h3>
    <div id="staffList"></div>
  </div>

</div>

<script type="module">
import { db } from "../assets/app.js";

let selectedService = null;
let selectedRole = null;

/* ---------------- HELPERS ---------------- */

function formatDay(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', { weekday: 'short' });
}

function todayStr() {
  return new Date().toISOString().split("T")[0];
}

/* ---------------- SERVICES ---------------- */

async function loadServices() {

  const { data, error } = await db
    .from("services")
    .select("*, service_slots(time, location, label)")
    .gte("service_date", todayStr())
    .order("service_date", { ascending:true });

  if (error) {
    console.error(error);
    return;
  }

  const box = document.getElementById("serviceList");
  box.innerHTML = "";

  (data || []).forEach(s => {

    const slot = s.service_slots || {};
    const label = slot.label || slot.time || "";

    box.innerHTML += `
      <div class="card ${s.id === selectedService?.id ? 'selected' : ''} ${s.is_communion_service ? 'communion' : ''}"
        onclick="selectService('${s.id}', ${s.is_communion_service}, '${s.service_date}')">

        <b>${s.service_date} (${formatDay(s.service_date)})</b><br>
        ${label} ${slot.location ? '('+slot.location+')' : ''}<br>

        ${s.is_communion_service ? "🕊 Communion" : "Standard"}

      </div>
    `;
  });
}

window.selectService = async (id, isComm, date) => {
  selectedService = { id, isComm, date };
  selectedRole = null;

  await loadServices();
  await loadRoles();
  await loadStaff();
};

/* ---------------- ROLES ---------------- */

async function loadRoles() {

  if (!selectedService) return;

  const { data } = await db
    .from("service_roles")
    .select("*, staff(name)")
    .eq("service_id", selectedService.id);

  const box = document.getElementById("roleList");
  box.innerHTML = "";

  (data || [])
    .filter(r => selectedService.isComm || !r.is_communion_role)
    .forEach(r => {

      box.innerHTML += `
        <div class="role ${selectedRole?.roleId === r.id ? 'selected' : ''} ${r.is_communion_role ? 'communion' : ''}"
          onclick="selectRole('${r.id}', ${r.is_communion_role})">

          <b>${r.role} ${r.is_communion_role ? "🕊" : ""}</b>

          <div>
            ${r.staff?.name || "Unassigned"}
          </div>

          ${r.staff_id ? `<button onclick="event.stopPropagation(); unassign('${r.id}')">Unassign</button>` : ""}

        </div>
      `;
    });
}

window.selectRole = (roleId, isCommRole) => {
  selectedRole = { roleId, isCommRole };
  loadRoles();
  loadStaff();
};

/* ---------------- AVAILABILITY ---------------- */

async function isUnavailable(staffId, date) {

  const { data } = await db
    .from("staff_availability")
    .select("*")
    .eq("staff_id", staffId);

  return (data || []).some(a =>
    date >= a.start_date && date <= a.end_date
  );
}

/* ---------------- STAFF ---------------- */

async function loadStaff() {

  if (!selectedService) return;

  const { data: staff } = await db.from("staff").select("*");

  const { data: roles } = await db
    .from("service_roles")
    .select("staff_id")
    .eq("service_id", selectedService.id);

  const assignedIds = (roles || []).map(r => r.staff_id);

  const box = document.getElementById("staffList");
  box.innerHTML = "";

  for (const s of staff || []) {

    const unavailable = await isUnavailable(s.id, selectedService.date);

    if (assignedIds.includes(s.id) || unavailable) continue;

    const blocked =
      (selectedRole?.isCommRole && !s.communion_eligible);

    box.innerHTML += `
      <div class="card">

        <b>${s.name}</b>

        ${!s.communion_eligible ? "<div class='warn'>Not Communion Eligible</div>" : ""}

        <button ${blocked ? "disabled" : ""}
          onclick="assign('${s.id}', ${s.communion_eligible})">
          Assign
        </button>

        <button onclick="markUnavailable('${s.id}')">
          🚫 Not Available
        </button>

      </div>
    `;
  }
}

/* ---------------- ACTIONS ---------------- */

window.assign = async (staffId, eligible) => {

  if (!selectedRole) return alert("Select role");

  if (selectedRole.isCommRole && !eligible) {
    return alert("Not eligible for communion");
  }

  await db
    .from("service_roles")
    .update({ staff_id: staffId })
    .eq("id", selectedRole.roleId);

  loadRoles();
  loadStaff();
};

window.unassign = async (roleId) => {

  await db
    .from("service_roles")
    .update({ staff_id: null })
    .eq("id", roleId);

  loadRoles();
  loadStaff();
};

window.markUnavailable = async (staffId) => {

  await db
    .from("staff_availability")
    .insert({
      staff_id: staffId,
      start_date: selectedService.date,
      end_date: selectedService.date,
      type: "manual",
      status: "active"
    });

  loadStaff();
};

/* INIT */
loadServices();

</script>

</body>
</html>
