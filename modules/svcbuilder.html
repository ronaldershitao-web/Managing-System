<!DOCTYPE html>
<html>
<head>
  <title>Service Builder Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b1220;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .panel {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      height:85vh;
      overflow-y:auto;
    }

    input, select {
      width:100%;
      padding:8px;
      margin:6px 0;
      border-radius:6px;
      border:1px solid #334155;
      background:#0f172a;
      color:white;
    }

    button {
      width:100%;
      padding:8px;
      margin-top:6px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#3b82f6;
      color:white;
    }

    .card {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
    }

    .warn {
      color:#fbbf24;
      font-size:12px;
    }

    .bad {
      color:#ef4444;
      font-size:12px;
    }
  </style>
</head>

<body>

<header>
  ⛪ Service Builder (Full System)
</header>

<div class="grid">

  <!-- CREATE SERVICE -->
  <div class="panel">
    <h3>Create Service</h3>

    <input type="date" id="date">

    <select id="template"></select>

    <label>
      <input type="checkbox" id="communion">
      Holy Communion Service
    </label>

    <button onclick="createService()">Generate Service</button>

    <hr>

    <h3>Services</h3>
    <div id="serviceList"></div>
  </div>

  <!-- ROLE ASSIGNMENT -->
  <div class="panel">
    <h3>Service Roles</h3>
    <div id="roleList"></div>
  </div>

</div>

<script type="module">
import { db } from "../assets/app.js";

let selectedService = null;

/* ---------------- LOAD TEMPLATES ---------------- */

async function loadTemplates() {
  const { data } = await db.from("service_templates").select("*");

  const box = document.getElementById("template");
  box.innerHTML = "";

  (data || []).forEach(t => {
    box.innerHTML += `<option value="${t.id}">${t.name}</option>`;
  });
}

/* ---------------- CREATE SERVICE ---------------- */

window.createService = async () => {

  const service_date = document.getElementById("date").value;
  const template_id = document.getElementById("template").value;
  const is_communion = document.getElementById("communion").checked;

  if (!service_date || !template_id) return;

  // 1. create service
  const { data: service } = await db
    .from("services")
    .insert([{
      service_date,
      service_template_id: template_id,
      is_communion
    }])
    .select()
    .single();

  // 2. copy roles from template
  const { data: roles } = await db
    .from("service_template_roles")
    .select("*")
    .eq("template_id", template_id);

  const mapped = roles.map(r => ({
    service_id: service.id,
    role: r.role,
    is_communion_role: r.is_communion_role || false
  }));

  await db.from("service_roles").insert(mapped);

  loadServices();
};

/* ---------------- LOAD SERVICES ---------------- */

async function loadServices() {

  const { data } = await db
    .from("services")
    .select("*")
    .order("service_date", { ascending:false });

  const box = document.getElementById("serviceList");
  box.innerHTML = "";

  (data || []).forEach(s => {

    box.innerHTML += `
      <div class="card" onclick="selectService('${s.id}')">
        <b>${s.service_date}</b><br>
        ${s.is_communion ? "🕊 Communion Service" : "Standard"}
      </div>
    `;
  });
}

/* ---------------- SELECT SERVICE ---------------- */

window.selectService = async (id) => {
  selectedService = id;
  loadRoles();
};

/* ---------------- LOAD ROLES + AVAILABILITY CHECK ---------------- */

async function loadRoles() {

  if (!selectedService) return;

  const { data: roles } = await db
    .from("service_roles")
    .select("*, staff(name)")
    .eq("service_id", selectedService);

  const box = document.getElementById("roleList");
  box.innerHTML = "";

  (roles || []).forEach(r => {

    box.innerHTML += `
      <div class="card">
        <b>${r.role}</b><br>
        Staff: ${r.staff?.name || "Unassigned"}
      </div>
    `;
  });
}

/* INIT */
loadTemplates();
loadServices();

</script>

</body>
</html>
