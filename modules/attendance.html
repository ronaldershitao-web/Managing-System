<!DOCTYPE html>
<html>
<head>
  <title>Attendance Input</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      display: flex;
      height: 100vh;
      background: #0f172a;
      color: white;
    }

    .left {
      width: 30%;
      border-right: 1px solid #334155;
      padding: 16px;
      overflow-y: auto;
    }

    .service {
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #334155;
      border-radius: 6px;
      cursor: pointer;
      background: #111827;
    }

    .service:hover {
      background: #1f2937;
    }

    .right {
      flex: 1;
      padding: 20px;
    }

    input {
      width: 220px;
      padding: 6px;
      margin: 6px 0;
    }

    button {
      padding: 10px;
      margin-top: 15px;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .meta {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div class="left">
  <h3>Services</h3>
  <div id="serviceList"></div>
</div>

<div class="right">
  <h2>Attendance Input</h2>

  <div id="formArea" class="hidden">
    <h3 id="serviceTitle"></h3>
    <div class="meta" id="serviceMeta"></div>

    <label>On-site Attendance</label><br>
    <input id="onsite" type="number" /><br>

    <div id="onlineBlock">
      <label>Online Attendance</label><br>
      <input id="online" type="number" /><br>
    </div>

    <div id="communionBlock">
      <label>Communicants</label><br>
      <input id="communicants" type="number" /><br>
    </div>

    <button onclick="saveData()">Save</button>
  </div>
</div>

<script>
// -------------------------
// MOCK SERVICES (replace with Supabase)
// -------------------------
let services = [
  {
    id: "1",
    service_date: "2026-01-03",
    start_time: "10:45:00",
    end_time: "12:15:00",
    is_communion_service: false,
    hospitality_enabled: true
  },
  {
    id: "2",
    service_date: "2026-01-03",
    start_time: "13:45:00",
    end_time: "17:00:00",
    is_communion_service: true,
    hospitality_enabled: true
  }
];

let selectedService = null;

// -------------------------
// INIT
// -------------------------
function loadServices() {
  const list = document.getElementById("serviceList");
  list.innerHTML = "";

  services.forEach(s => {
    const div = document.createElement("div");
    div.className = "service";
    div.innerHTML = `
      <div>${s.service_date}</div>
      <div style='font-size:12px;opacity:0.7'>${s.start_time} - ${s.end_time}</div>
    `;
    div.onclick = () => selectService(s);
    list.appendChild(div);
  });
}

// -------------------------
// SELECT SERVICE
// -------------------------
function selectService(service) {
  selectedService = service;

  document.getElementById("formArea").classList.remove("hidden");

  document.getElementById("serviceTitle").innerText =
    service.service_date;

  document.getElementById("serviceMeta").innerText =
    `Time: ${service.start_time} - ${service.end_time} | Communion: ${service.is_communion_service ? 'Yes' : 'No'}`;

  // reset
  document.getElementById("onsite").value = 0;
  document.getElementById("online").value = 0;
  document.getElementById("communicants").value = 0;

  // RULE 1: Online only for 10:45 service
  const onlineEnabled = service.start_time === "10:45:00";

  document.getElementById("onlineBlock").style.display = onlineEnabled ? "block" : "none";

  // RULE 2: Communion flag from service table
  document.getElementById("communionBlock").style.display = service.is_communion_service ? "block" : "none";
}

// -------------------------
// SAVE
// -------------------------
async function saveData() {
  if (!selectedService) return;

  const onsite = Number(document.getElementById("onsite").value);
  const online = selectedService.start_time === "10:45:00"
    ? Number(document.getElementById("online").value)
    : 0;

  const payload = {
    service_id: selectedService.id,
    on_site_attendance: onsite,
    online_attendance: online,
    communicants_count: selectedService.is_communion_service
      ? Number(document.getElementById("communicants").value)
      : null,
    total_attendance: onsite + online
  };

  console.log("SAVE PAYLOAD", payload);

  // TODO: Supabase upsert
}

loadServices();
</script>

</body>
</html>
