<!DOCTYPE html>
<html>
<head>
  <title>Attendance Backfill Console</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      background:#111827;
      padding:14px;
      font-size:20px;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .container{
      padding:14px;
    }

    .summary{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-bottom:16px;
    }

    .summary-card{
      background:#111827;
      border:1px solid #334155;
      border-radius:10px;
      padding:14px;
    }

    .summary-title{
      font-size:12px;
      color:#94a3b8;
    }

    .summary-value{
      font-size:28px;
      margin-top:6px;
      font-weight:bold;
      color:#22c55e;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:#111827;
      border-radius:10px;
      overflow:hidden;
    }

    th{
      background:#1e293b;
      color:#fbbf24;
      padding:10px;
      font-size:13px;
      text-align:left;
      border-bottom:1px solid #334155;
    }

    td{
      padding:10px;
      border-bottom:1px solid #1f2937;
      font-size:13px;
    }

    tr:hover{
      background:#172033;
    }

    input{
      width:90px;
      padding:6px;
      border-radius:6px;
      border:none;
      background:#0f172a;
      color:white;
    }

    .save-btn{
      background:#22c55e;
      color:white;
      border:none;
      padding:8px 12px;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
    }

    .pending{
      color:#ef4444;
      font-weight:bold;
    }

    .done{
      color:#22c55e;
      font-weight:bold;
    }

    .toolbar{
      display:flex;
      gap:10px;
      margin-bottom:14px;
    }

    select{
      padding:8px;
      border:none;
      border-radius:6px;
      background:#111827;
      color:white;
    }

    .empty{
      margin-top:20px;
      padding:30px;
      text-align:center;
      background:#111827;
      border:1px solid #334155;
      border-radius:10px;
      color:#22c55e;
      font-size:18px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<header>
  📊 Attendance Backfill Console

  <button class="save-btn" onclick="loadAttendance()">
    Refresh
  </button>
</header>

<div class="container">

  <div class="summary">

    <div class="summary-card">
      <div class="summary-title">Total Services</div>
      <div class="summary-value" id="totalServices">0</div>
    </div>

    <div class="summary-card">
      <div class="summary-title">Attendance Submitted</div>
      <div class="summary-value" id="submittedCount">0</div>
    </div>

    <div class="summary-card">
      <div class="summary-title">Missing Attendance</div>
      <div class="summary-value" id="missingCount">0</div>
    </div>

    <div class="summary-card">
      <div class="summary-title">Total Attendance</div>
      <div class="summary-value" id="totalAttendance">0</div>
    </div>

  </div>

  <div class="toolbar">

    <select id="yearFilter" onchange="renderTable()">
      <option value="all">All Years</option>
    </select>

  </div>

  <table>

    <thead>
      <tr>
        <th>Date</th>
        <th>Service</th>
        <th>On-site</th>
        <th>Online</th>
        <th>Communicants</th>
        <th>Total</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="attendanceBody"></tbody>

  </table>

  <div id="emptyState"></div>

</div>

<script type="module">
import { db } from "../assets/app.js";

let services = [];
let attendanceMap = new Map();

async function loadAttendance(){

  const [
    servicesRes,
    attendanceRes
  ] = await Promise.all([

    db
      .from("services")
      .select(`
        *,
        service_slots(label,time)
      `)
      .order("service_date",{ascending:false}),

    db
      .from("service_attendance_metrics")
      .select("*")
  ]);

  services = servicesRes.data || [];

  attendanceMap = new Map(
    (attendanceRes.data || []).map(a => [
      String(a.service_id),
      a
    ])
  );

  populateYearFilter();
  renderSummary();
  renderTable();
}

function populateYearFilter(){

  const years = [
    ...new Set(
      services.map(s =>
        new Date(s.service_date)
          .getFullYear()
      )
    )
  ];

  const filter =
    document.getElementById("yearFilter");

  filter.innerHTML = `
    <option value="all">
      All Years
    </option>
  `;

  years
    .sort((a,b)=>b-a)
    .forEach(y=>{

      filter.innerHTML += `
        <option value="${y}">
          ${y}
        </option>
      `;
    });
}

function formatDate(dateStr){

  const d = new Date(dateStr);

  return d.toLocaleDateString("en-GB",{
    day:"2-digit",
    month:"short",
    year:"numeric"
  });
}

function renderSummary(){

  const totalServices = services.length;

  let submitted = 0;
  let totalAttendance = 0;

  services.forEach(s=>{

    const att =
      attendanceMap.get(String(s.id));

    if(att){

      const onsite =
        att.onsite_count || 0;

      const online =
        att.online_count || 0;

      const communicants =
        att.communicants_count || 0;

      const hasAttendance =
        onsite > 0 ||
        online > 0 ||
        communicants > 0;

      if(hasAttendance){

        submitted++;

        totalAttendance +=
          onsite + online;
      }
    }
  });

  document.getElementById("totalServices").innerText =
    totalServices;

  document.getElementById("submittedCount").innerText =
    submitted;

  document.getElementById("missingCount").innerText =
    totalServices - submitted;

  document.getElementById("totalAttendance").innerText =
    totalAttendance;
}

window.renderTable = function(){

  const body =
    document.getElementById("attendanceBody");

  const emptyState =
    document.getElementById("emptyState");

  const selectedYear =
    document.getElementById("yearFilter").value;

  body.innerHTML = "";
  emptyState.innerHTML = "";

  let pendingCount = 0;

  services.forEach(service=>{

    const serviceYear =
      new Date(service.service_date)
        .getFullYear()
        .toString();

    if(
      selectedYear !== "all" &&
      selectedYear !== serviceYear
    ){
      return;
    }

    const attendance =
      attendanceMap.get(String(service.id));

    const onsite =
      attendance?.onsite_count || 0;

    const online =
      attendance?.online_count || 0;

    const communicants =
      attendance?.communicants_count || 0;

    const submitted =
      attendance &&
      (
        onsite > 0 ||
        online > 0 ||
        communicants > 0
      );

    // HIDE COMPLETED
    if(submitted){
      return;
    }

    pendingCount++;

    const allowOnline =
      (service.service_slots?.label || "")
        .includes("10.45");

    const allowCommunion =
      service.is_communion_service === true;

    body.innerHTML += `

      <tr>

        <td>
          ${formatDate(service.service_date)}
        </td>

        <td>
          ${service.service_slots?.label || ""}
          <br>

          <span style="color:#94a3b8;">
            ${service.service_slots?.time || ""}
          </span>

        </td>

        <td>

          <input
            type="number"
            min="0"
            id="onsite_${service.id}"
            value="${onsite}">

        </td>

        <td>

          ${
            allowOnline
            ? `
              <input
                type="number"
                min="0"
                id="online_${service.id}"
                value="${online}">
            `
            : "-"
          }

        </td>

        <td>

          ${
            allowCommunion
            ? `
              <input
                type="number"
                min="0"
                id="communion_${service.id}"
                value="${communicants}">
            `
            : "-"
          }

        </td>

        <td>
          <b>${onsite + online}</b>
        </td>

        <td>

          <button
            class="save-btn"
            onclick="saveAttendance('${service.id}')">

            Save

          </button>

        </td>

      </tr>
    `;
  });

  if(pendingCount === 0){

    emptyState.innerHTML = `
      <div class="empty">
        ✅ All attendance records completed
      </div>
    `;
  }
};

window.saveAttendance = async function(serviceId){

  const onsite =
    Number(
      document.getElementById(
        `onsite_${serviceId}`
      )?.value || 0
    );

  const online =
    Number(
      document.getElementById(
        `online_${serviceId}`
      )?.value || 0
    );

  const communicants =
    Number(
      document.getElementById(
        `communion_${serviceId}`
      )?.value || 0
    );

  const payload = {

    service_id: serviceId,

    onsite_count: onsite,

    online_count: online,

    communicants_count: communicants
  };

  const { error } =
    await db
      .from("service_attendance_metrics")
      .upsert(payload,{
        onConflict:"service_id"
      });

  if(error){

    alert(error.message);
    return;
  }

  attendanceMap.set(
    String(serviceId),
    payload
  );

  renderSummary();
  renderTable();
};

loadAttendance();

</script>

</body>
</html>
