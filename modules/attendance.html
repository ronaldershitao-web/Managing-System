<!DOCTYPE html>
<html>
<head>
  <title>Attendance Backfill Console (Upgraded)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      background:#111827;
      padding:14px;
      font-size:20px;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .container{ padding:14px; }

    table{
      width:100%;
      border-collapse:collapse;
      background:#111827;
      border-radius:10px;
      overflow:hidden;
    }

    th{
      background:#1e293b;
      color:#fbbf24;
      padding:10px;
      text-align:left;
      font-size:13px;
    }

    td{
      padding:10px;
      border-bottom:1px solid #1f2937;
      font-size:13px;
    }

    input{
      width:90px;
      padding:6px;
      border-radius:6px;
      border:none;
      background:#0f172a;
      color:white;
    }

    .save-btn{
      background:#22c55e;
      border:none;
      padding:6px 10px;
      border-radius:6px;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    .status-done{ color:#22c55e; font-weight:bold; }
    .status-pending{ color:#fbbf24; font-weight:bold; }
    .status-update{ color:#ef4444; font-weight:bold; }

    .empty{
      text-align:center;
      padding:30px;
      margin-top:20px;
      background:#111827;
      border-radius:10px;
      border:1px solid #334155;
    }
  </style>
</head>

<body>

<header>
  📊 Attendance Backfill (Smart Mode)
  <button class="save-btn" onclick="load()">Refresh</button>
</header>

<div class="container">

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Service</th>
        <th>On-site</th>
        <th>Online</th>
        <th>Communicants</th>
        <th>Total</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="body"></tbody>
  </table>

  <div id="empty"></div>
</div>

<script type="module">
import { db } from "../assets/app.js";

let services = [];
let attendanceMap = new Map();

/* ================= DATE ================= */

function parse(d){
  const [y,m,day] = d.split("-");
  return new Date(y,m-1,day);
}

/* ================= LOAD ================= */

async function load(){

  const [sRes,aRes] = await Promise.all([

    db.from("services")
      .select("*, service_slots(label,time)")
      .order("service_date",{ascending:true}),   // ✅ ASC FIX

    db.from("service_attendance_metrics").select("*")
  ]);

  services = sRes.data || [];

  attendanceMap = new Map(
    (aRes.data || []).map(a => [String(a.service_id), a])
  );

  render();
}

/* ================= LOGIC ================= */

function today(){
  const t = new Date();
  t.setHours(0,0,0,0);
  return t;
}

function serviceDate(d){
  const x = parse(d);
  x.setHours(0,0,0,0);
  return x;
}

function status(att, svcDate){

  const now = today();

  const filled =
    att &&
    (att.onsite_count > 0 ||
     att.online_count > 0 ||
     att.communicants_count > 0);

  if(filled) return "DONE";

  if(svcDate < now) return "UPDATE";

  if(svcDate > now) return "FUTURE";

  return "PENDING";
}

/* ================= RENDER ================= */

function render(){

  const body = document.getElementById("body");
  const empty = document.getElementById("empty");

  body.innerHTML = "";

  let showCount = 0;

  services.forEach(s => {

    const svcDate = serviceDate(s.service_date);
    const att = attendanceMap.get(String(s.id));

    const st = status(att, svcDate);

    // ❌ RULE: hide future services
    if(st === "FUTURE") return;

    // ❌ RULE: hide already completed
    if(st === "DONE") return;

    showCount++;

    const onsite = att?.onsite_count || 0;
    const online = att?.online_count || 0;
    const comm = att?.communicants_count || 0;

    const allowOnline =
      (s.service_slots?.label || "").includes("10.45");

    const allowComm = s.is_communion_service;

    body.innerHTML += `
      <tr>

        <td>${s.service_date}</td>

        <td>
          ${s.service_slots?.label || ""}
          <br>
          <small style="color:#94a3b8;">
            ${s.service_slots?.time || ""}
          </small>
        </td>

        <td>
          <input id="o_${s.id}" value="${onsite}">
        </td>

        <td>
          ${allowOnline
            ? `<input id="on_${s.id}" value="${online}">`
            : "-"}
        </td>

        <td>
          ${allowComm
            ? `<input id="c_${s.id}" value="${comm}">`
            : "-"}
        </td>

        <td>${onsite + online}</td>

        <td>
          <span class="${
            st === 'UPDATE'
              ? 'status-update'
              : 'status-pending'
          }">
            ${st}
          </span>
        </td>

        <td>
          <button class="save-btn"
            onclick="save('${s.id}')">
            Save
          </button>
        </td>

      </tr>
    `;
  });

  if(showCount === 0){
    empty.innerHTML = `
      <div class="empty">
        ✅ No pending attendance (All up to date or future)
      </div>
    `;
  }
}

/* ================= SAVE ================= */

window.save = async function(id){

  const onsite =
    Number(document.getElementById(`o_${id}`)?.value || 0);

  const online =
    Number(document.getElementById(`on_${id}`)?.value || 0);

  const comm =
    Number(document.getElementById(`c_${id}`)?.value || 0);

  const payload = {
    service_id: id,
    onsite_count: onsite,
    online_count: online,
    communicants_count: comm
  };

  const { error } = await db
    .from("service_attendance_metrics")
    .upsert(payload,{
      onConflict:"service_id"
    });

  if(error){
    alert(error.message);
    return;
  }

  attendanceMap.set(String(id), payload);

  load();
};

load();
</script>

</body>
</html>
