<!DOCTYPE html>
<html>
<head>
  <title>Person Profile</title>

  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
      padding:15px;
    }

    .card {
      background:#111827;
      padding:12px;
      margin-bottom:10px;
      border-radius:8px;
      border:1px solid #1f2937;
    }

    input, select, textarea {
      width:100%;
      margin:5px 0;
      padding:6px;
      border-radius:6px;
      border:1px solid #334155;
      background:#0f172a;
      color:white;
    }

    button {
      margin-top:5px;
      padding:6px 10px;
      border:none;
      border-radius:6px;
      background:#2563eb;
      color:white;
      cursor:pointer;
    }

  </style>
</head>

<body>

<div id="profile"></div>

<script type="module">
import { db } from "../assets/app.js";

const id = new URLSearchParams(window.location.search).get("id");

/**
 * LOAD DATA
 */
const { data: person } = await db
  .from("people")
  .select("*")
  .eq("id", id)
  .single();

const { data: groups } = await db.from("groups").select("*");

const { data: memberships } = await db
  .from("group_members")
  .select("*, groups(name)")
  .eq("person_id", id);

/**
 * FORMAT DATE
 */
function formatDate(d) {
  if (!d) return "";
  return new Date(d).toISOString().split("T")[0];
}

/**
 * RENDER
 */
document.getElementById("profile").innerHTML = `

  <!-- BASIC INFO -->
  <div class="card">
    <h2>👤 ${person.name}</h2>

    <input id="phone" value="${person.phone || ""}" placeholder="Phone">
    <input id="email" value="${person.email || ""}" placeholder="Email">

    <input id="dob" type="date" value="${formatDate(person.date_of_birth)}">

    <select id="gender">
      <option value="">Gender</option>
      <option value="male" ${person.gender==='male'?'selected':''}>Male</option>
      <option value="female" ${person.gender==='female'?'selected':''}>Female</option>
    </select>

    <input id="ministry" value="${person.ministry || ""}" placeholder="Ministry">

    <select id="marital">
      <option value="">Marital Status</option>
      <option value="single" ${person.marital_status==='single'?'selected':''}>Single</option>
      <option value="married" ${person.marital_status==='married'?'selected':''}>Married</option>
    </select>

    <textarea id="notes" placeholder="Notes">${person.notes || ""}</textarea>

    <button onclick="updatePerson()">💾 Save Profile</button>
  </div>

  <!-- GROUP ASSIGNMENT -->
  <div class="card">
    <h3>🏠 Assign to Group</h3>

    <select id="groupSelect">
      ${(groups || []).map(g => `
        <option value="${g.id}">${g.name}</option>
      `).join("")}
    </select>

    <select id="roleSelect">
      <option value="member">Member</option>
      <option value="co_leader">Co-Leader</option>
      <option value="leader">Leader</option>
    </select>

    <button onclick="assignGroup()">Assign</button>
  </div>

  <!-- CURRENT GROUPS -->
  <div class="card">
    <h3>📌 Current Groups</h3>

    ${(memberships || []).length === 0
      ? "<i>No groups</i>"
      : memberships.map(m => `
          <div>
            ${m.groups?.name} (${m.role})
          </div>
        `).join("")
    }
  </div>

`;

/**
 * UPDATE PERSON
 */
window.updatePerson = async function () {

  const payload = {
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    date_of_birth: document.getElementById("dob").value || null,
    gender: document.getElementById("gender").value,
    ministry: document.getElementById("ministry").value,
    marital_status: document.getElementById("marital").value,
    notes: document.getElementById("notes").value
  };

  const { error } = await db
    .from("people")
    .update(payload)
    .eq("id", id);

  if (error) {
    alert(error.message);
    return;
  }

  alert("Profile updated!");
};

/**
 * ASSIGN GROUP
 */
window.assignGroup = async function () {

  const group_id = document.getElementById("groupSelect").value;
  const role = document.getElementById("roleSelect").value;

  const { error } = await db
    .from("group_members")
    .insert([{ group_id, person_id: id, role }]);

  if (error) {
    alert(error.message);
    return;
  }

  location.reload();
};

</script>

</body>
</html>
