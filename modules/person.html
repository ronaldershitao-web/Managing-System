<!DOCTYPE html>
<html>
<head>
  <title>Person Profile</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>

<body>

<div id="profile"></div>

<script type="module">
import { db } from "../assets/app.js";

const id = new URLSearchParams(window.location.search).get("id");

/**
 * Load person
 */
const { data: person } = await db
  .from("people")
  .select("*")
  .eq("id", id)
  .single();

/**
 * Load interactions
 */
const { data: interactions } = await db
  .from("interactions")
  .select("*")
  .eq("person_id", id)
  .order("interaction_date", { ascending: false });

/**
 * Load tasks
 */
const { data: tasks } = await db
  .from("tasks")
  .select("*")
  .eq("person_id", id);

/**
 * NAVIGATION
 */
window.editPerson = function(id) {
  location.href = `edit-person.html?id=${id}`;
};

/**
 * RENDER
 */
document.getElementById("profile").innerHTML = `
  <div class="card">

    <h2>
      👤 ${person.name}
      <button onclick="editPerson('${person.id}')">Edit</button>
    </h2>

    <p>Phone: ${person.phone || "-"}</p>
    <p>Email: ${person.email || "-"}</p>
    <p>Stage: ${person.relationship_stage || "-"}</p>
    <p>Leader: ${person.leader_id || "-"}</p>

  </div>

  <h3>📊 Timeline</h3>
  ${(interactions || []).map(i => `
    <div class="card">
      ${i.interaction_type} - ${i.notes || ""}
    </div>
  `).join("")}

  <h3>📌 Tasks</h3>
  ${(tasks || []).map(t => `
    <div class="card">
      ${t.title} - ${t.status}
    </div>
  `).join("")}
`;
</script>

</body>
</html>
