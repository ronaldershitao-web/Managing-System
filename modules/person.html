<!DOCTYPE html>
<html>
<head>
  <title>Person Profile</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>

<body>

<div id="profile"></div>

<script type="module">
import { db } from "../assets/app.js";

const id = new URLSearchParams(window.location.search).get("id");

if (!id) {
  alert("Missing person ID");
  throw new Error("No ID");
}

/**
 * LOAD PERSON
 */
const { data: person } = await db
  .from("people")
  .select("*")
  .eq("id", id)
  .single();

/**
 * LOAD INTERACTIONS
 */
const { data: interactions } = await db
  .from("interactions")
  .select("*")
  .eq("person_id", id)
  .order("interaction_date", { ascending: false });

/**
 * LOAD TASKS
 */
const { data: tasks } = await db
  .from("tasks")
  .select("*")
  .eq("person_id", id);

/**
 * NAV FUNCTION (IMPORTANT FIX)
 */
window.editPerson = function(personId) {
  location.href = `edit-person.html?id=${personId}`;
};

/**
 * RENDER
 */
document.getElementById("profile").innerHTML = `
  <div class="card">

    <h2>
      👤 ${person.name}
    </h2>

    <button onclick="editPerson('${person.id}')">
      ✏️ Edit Person
    </button>

    <hr>

    <p>Phone: ${person.phone || "-"}</p>
    <p>Email: ${person.email || "-"}</p>
    <p>Stage: ${person.relationship_stage || "-"}</p>
    <p>Leader ID: ${person.leader_id || "-"}</p>

  </div>

  <h3>📊 Timeline</h3>
  ${(interactions || []).map(i => `
    <div class="card">
      ${i.interaction_type} - ${i.notes || ""}
    </div>
  `).join("")}

  <h3>📌 Tasks</h3>
  ${(tasks || []).map(t => `
    <div class="card">
      ${t.title} - ${t.status}
    </div>
  `).join("")}
`;
</script>

</body>
</html>
