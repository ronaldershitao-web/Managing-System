<!DOCTYPE html>
<html>
<head>
  <title>Person</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; margin:0; }
    .card { background:#111827; padding:12px; margin:10px; border-radius:8px; }
  </style>
</head>

<body>

<div id="profile"></div>

<script type="module">
import { db } from "./assets/app.js";

const id = new URLSearchParams(location.search).get("id");

/**
 * PERSON
 */
const { data: person } = await db
  .from("people")
  .select("*")
  .eq("id", id)
  .single();

/**
 * GROUPS
 */
const { data: memberships } = await db
  .from("group_members")
  .select("*, groups(name)")
  .eq("person_id", id);

document.getElementById("profile").innerHTML = `
  <div class="card">
    <h2>👤 ${person.name}</h2>
    <p>${person.email || ""}</p>
  </div>

  <div class="card">
    <h3>🏠 Groups</h3>

    ${memberships.map(m => `
      <div>
        ${m.groups?.name} - <b>${m.role}</b>
      </div>
    `).join("")}
  </div>
`;

</script>

</body>
</html>
