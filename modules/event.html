<!DOCTYPE html>
<html>
<head>
  <title>Events Cockpit</title>

  <script type="module">
    import { db } from "./assets/app.js";

    let events = [];
    let people = [];
    let selectedEvent = null;

    // ---------------- INIT ----------------
    async function load() {

      const [eventsRes, peopleRes] = await Promise.all([
        db.from("events")
          .select("*")
          .order("event_date", { ascending: false }),

        db.from("people").select("*")
      ]);

      events = eventsRes.data || [];
      people = peopleRes.data || [];

      renderEvents();
    }

    // ---------------- CREATE EVENT ----------------
    window.createNewEvent = async function () {

      const name = document.getElementById("name").value;
      const date = document.getElementById("date").value;
      const desc = document.getElementById("desc").value;
      const ministryWide = document.getElementById("mw").checked;

      if (!name || !date) {
        alert("Name and Date required");
        return;
      }

      const { data, error } = await db
        .from("events")
        .insert([{
          name,
          event_date: date,
          description: desc,
          is_ministry_wide: ministryWide
        }])
        .select();

      if (error) return alert(error.message);

      events.unshift(data[0]);
      renderEvents();
    };

    // ---------------- SELECT EVENT ----------------
    window.selectEvent = function (id) {
      selectedEvent = id;
      document.getElementById("selected").innerText =
        "Selected Event: " + events.find(e => e.id === id)?.name;

      renderPeople();
    };

    // ---------------- RENDER EVENTS ----------------
    function renderEvents() {

      document.getElementById("eventList").innerHTML = events.map(e => `
        <div class="card">
          <b>${e.name}</b>
          <div>${e.event_date}</div>
          <small>${e.is_ministry_wide ? "Ministry Wide" : "Cell Event"}</small>

          <button onclick="selectEvent('${e.id}')">
            Open
          </button>
        </div>
      `).join("");
    }

    // ---------------- RENDER PEOPLE ----------------
    function renderPeople() {

      if (!selectedEvent) return;

      document.getElementById("peopleList").innerHTML = people.map(p => `
        <div class="card">

          <b>${p.name}</b>

          <div class="row">
            <button onclick="saveScore('${p.id}',2)">2</button>
            <button onclick="saveScore('${p.id}',1)">1</button>
            <button onclick="saveScore('${p.id}',0)">0</button>
          </div>

        </div>
      `).join("");
    }

    // ---------------- SAVE SCORE ----------------
    window.saveScore = async function (personId, score) {

      if (!selectedEvent) {
        alert("Select event first");
        return;
      }

      const { error } = await db
        .from("event_attendance")
        .upsert([{
          event_id: selectedEvent,
          person_id: personId,
          status: score
        }], {
          onConflict: "event_id,person_id"
        });

      if (error) return alert(error.message);

      alert("Saved ✔");
    };

    window.onload = load;
  </script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      padding:20px;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .card {
      background:#111827;
      padding:10px;
      border-radius:8px;
      border:1px solid #1f2937;
      margin-bottom:10px;
    }

    input, textarea {
      width:100%;
      padding:8px;
      margin:5px 0;
      border-radius:6px;
      background:#020617;
      border:1px solid #334155;
      color:white;
    }

    button {
      padding:6px 10px;
      margin-top:5px;
      background:#2563eb;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    .row {
      display:flex;
      gap:5px;
    }

    .row button {
      flex:1;
    }

    h2 { margin-top:0; }
  </style>

</head>

<body>

<h2>📅 Events Cockpit</h2>

<div class="card">
  <input id="name" placeholder="Event Name">
  <input type="date" id="date">
  <textarea id="desc" placeholder="Description"></textarea>

  <label>
    <input type="checkbox" id="mw">
    Ministry Wide Event
  </label>

  <button onclick="createNewEvent()">Create Event</button>
</div>

<div id="selected" class="card">No event selected</div>

<div class="grid">

  <div>
    <h3>Events</h3>
    <div id="eventList"></div>
  </div>

  <div>
    <h3>People Scoring</h3>
    <div id="peopleList"></div>
  </div>

</div>

</body>
</html>
