<!DOCTYPE html>
<html>
<head>
  <title>Event Cockpit</title>

  <script type="module">
    import { db } from "../assets/app.js";

    let events = [];
    let groups = [];
    let members = [];
    let currentEvent = null;
    let currentGroup = null;

    // ---------------- LOAD INITIAL ----------------
    async function init() {

      const [eventRes, groupRes] = await Promise.all([
        db.from("events").select("*").order("start_time", { ascending: false }),
        db.from("groups").select("*")
      ]);

      events = eventRes.data || [];
      groups = groupRes.data || [];

      loadEventDropdown();
      loadGroupDropdown();
    }

    // ---------------- EVENT DROPDOWN ----------------
    function loadEventDropdown() {
      const sel = document.getElementById("eventSelect");

      sel.innerHTML = `<option value="">Select Event</option>`;

      events.forEach(e => {
        const opt = document.createElement("option");
        opt.value = e.id;
        opt.textContent = `${e.title} (${new Date(e.start_time).toLocaleDateString()})`;
        sel.appendChild(opt);
      });

      sel.onchange = () => {
        currentEvent = sel.value;
        loadExistingScores();
      };
    }

    // ---------------- GROUP DROPDOWN ----------------
    function loadGroupDropdown() {
      const sel = document.getElementById("groupSelect");

      sel.innerHTML = `<option value="">Select Group</option>`;

      groups.forEach(g => {
        const opt = document.createElement("option");
        opt.value = g.id;
        opt.textContent = g.name;
        sel.appendChild(opt);
      });

      sel.onchange = () => {
        currentGroup = sel.value;
        loadPeople();
      };
    }

    // ---------------- LOAD PEOPLE ----------------
    async function loadPeople() {

      if (!currentGroup) return;

      const { data } = await db
        .from("group_members")
        .select("person_id, people:people(*)")
        .eq("group_id", currentGroup);

      members = data || [];

      renderPeople();
      loadExistingScores();
    }

    // ---------------- RENDER PEOPLE ----------------
    function renderPeople() {

      const container = document.getElementById("peopleList");

      container.innerHTML = members.map(m => {

        const p = m.people;

        return `
          <div class="person">
            <b>${p?.name || "Unknown"}</b>

            <div class="row">
              <input id="score-${m.person_id}" placeholder="2 / 1 / 0">
              <button onclick="saveScore('${m.person_id}')">Save</button>
            </div>
          </div>
        `;
      }).join("");
    }

    // ---------------- LOAD EXISTING SCORES ----------------
    async function loadExistingScores() {

      if (!currentEvent) return;

      const { data } = await db
        .from("event_attendance")
        .select("*")
        .eq("event_id", currentEvent);

      if (!data) return;

      data.forEach(r => {
        const input = document.getElementById(`score-${r.person_id}`);
        if (input) input.value = r.score;
      });
    }

    // ---------------- SAVE (UPSERT) ----------------
    window.saveScore = async function(personId) {

      if (!currentEvent) {
        alert("Select Event first");
        return;
      }

      const score = +document.getElementById(`score-${personId}`).value;

      if (![0,1,2].includes(score)) {
        alert("Score must be 0, 1 or 2");
        return;
      }

      // Check existing
      const { data: existing } = await db
        .from("event_attendance")
        .select("*")
        .eq("event_id", currentEvent)
        .eq("person_id", personId)
        .maybeSingle();

      let error;

      if (existing) {
        const res = await db
          .from("event_attendance")
          .update({ score })
          .eq("id", existing.id);

        error = res.error;

      } else {
        const res = await db
          .from("event_attendance")
          .insert([{
            event_id: currentEvent,
            person_id: personId,
            score
          }]);

        error = res.error;
      }

      if (error) {
        alert(error.message);
        return;
      }

      document.getElementById("status").innerText = "Saved ✔";
    };

    // ---------------- CREATE EVENT (FIXED NAME) ----------------
    window.createNewEvent = async function() {

      const title = document.getElementById("title").value;
      const date = document.getElementById("date").value;
      const ministryWide = document.getElementById("ministry").checked;

      if (!title || !date) {
        alert("Missing fields");
        return;
      }

      const { error } = await db
        .from("events")
        .insert([{
          title,
          start_time: date,
          is_ministry_wide: ministryWide
        }]);

      if (error) return alert(error.message);

      // Reset form (better UX than reload)
      document.getElementById("title").value = "";
      document.getElementById("date").value = "";
      document.getElementById("ministry").checked = false;

      document.getElementById("status").innerText = "Event Created ✔";

      init(); // reload dropdowns
    };

    window.onload = init;

  </script>

  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
      padding:20px;
    }

    .card {
      background:#111827;
      padding:15px;
      border-radius:10px;
      margin-top:15px;
      border:1px solid #1f2937;
    }

    input, select {
      width:100%;
      margin:5px 0;
      padding:8px;
      border-radius:6px;
      background:#020617;
      border:1px solid #334155;
      color:white;
    }

    .row {
      display:grid;
      grid-template-columns:1fr 80px;
      gap:5px;
      margin-top:5px;
    }

    .person {
      border-bottom:1px solid #1f2937;
      padding:8px 0;
    }

    button {
      padding:6px;
      background:#2563eb;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }
  </style>

</head>

<body>

<h2>🎯 Event Cockpit</h2>

<!-- CREATE EVENT -->
<div class="card">
  <h3>Create Event</h3>
  <input id="title" placeholder="Event Title">
  <input id="date" type="datetime-local">
  
  <label>
    <input type="checkbox" id="ministry"> Ministry Wide
  </label>

  <button onclick="createNewEvent()">Create</button>
</div>

<!-- SELECT EVENT -->
<div class="card">
  <h3>Select Event</h3>
  <select id="eventSelect"></select>
</div>

<!-- SELECT GROUP -->
<div class="card">
  <h3>Select Group</h3>
  <select id="groupSelect"></select>
</div>

<!-- PEOPLE -->
<div class="card">
  <h3>Attendance (2 / 1 / 0)</h3>
  <div id="peopleList"></div>
</div>

<div id="status"></div>

</body>
</html>
