<!DOCTYPE html>
<html>
<head>
  <title>Edit Person</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>

<body>

<h2>✏️ Edit Person</h2>

<div class="card">

  <h3>Basic Info</h3>

  <input id="name" placeholder="Name"><br><br>

  <input id="phone" placeholder="Phone"><br><br>

  <input id="email" placeholder="Email"><br><br>

  <label>Date of Birth</label><br>
  <input id="dob" type="date"><br><br>

  <label>Gender</label><br>
  <select id="gender">
    <option value="">-- Select --</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
  </select><br><br>

  <h3>Ministry Info</h3>

  <label>Relationship Stage</label><br>
  <select id="stage">
    <option value="0">New</option>
    <option value="1">Connected</option>
    <option value="2">Attending</option>
    <option value="3">Serving</option>
    <option value="4">Leader</option>
  </select><br><br>

  <label>Engagement Status</label><br>
  <select id="status">
    <option value="active">Active</option>
    <option value="inactive">Inactive</option>
    <option value="at_risk">At Risk</option>
    <option value="disconnected">Disconnected</option>
  </select><br><br>

  <label>Leader</label><br>
  <select id="leader"></select><br><br>

  <h3>Additional</h3>

  <textarea id="notes" placeholder="Notes"></textarea><br><br>

  <button onclick="updatePerson()">Update</button>

</div>

<script type="module">
import { db } from "../assets/app.js";

const id = new URLSearchParams(window.location.search).get("id");

if (!id) {
  alert("Missing ID");
  throw new Error("No ID");
}

/**
 * LOAD PERSON
 */
const { data: person } = await db
  .from("people")
  .select("*")
  .eq("id", id)
  .single();

/**
 * LOAD PEOPLE FOR LEADER DROPDOWN
 */
const { data: people } = await db
  .from("people")
  .select("id, name");

/**
 * FILL FORM
 */
document.getElementById("name").value = person?.name || "";
document.getElementById("phone").value = person?.phone || "";
document.getElementById("email").value = person?.email || "";
document.getElementById("dob").value = person?.date_of_birth || "";
document.getElementById("gender").value = person?.gender || "";
document.getElementById("stage").value = person?.relationship_stage ?? 0;
document.getElementById("status").value = person?.engagement_status || "active";
document.getElementById("notes").value = person?.notes || "";

/**
 * LEADER DROPDOWN
 */
document.getElementById("leader").innerHTML = `
  <option value="">-- No Leader --</option>
  ${people
    .filter(p => p.id !== id)
    .map(p => `
      <option value="${p.id}" ${p.id === person?.leader_id ? "selected" : ""}>
        ${p.name}
      </option>
    `).join("")}
`;

/**
 * UPDATE FUNCTION
 */
window.updatePerson = async function () {

  const payload = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    date_of_birth: document.getElementById("dob").value || null,
    gender: document.getElementById("gender").value || null,
    relationship_stage: parseInt(document.getElementById("stage").value),
    engagement_status: document.getElementById("status").value,
    leader_id: document.getElementById("leader").value || null,
    notes: document.getElementById("notes").value
  };

  const { error } = await db
    .from("people")
    .update(payload)
    .eq("id", id);

  if (error) {
    alert(error.message);
    console.error(error);
  } else {
    alert("Updated successfully");
    location.href = "people.html";
  }
};

</script>

</body>
</html>
