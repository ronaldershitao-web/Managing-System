<!DOCTYPE html>
<html>
<head>
  <title>Worship Ops Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b1220;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap:10px;
      padding:10px;
    }

    .panel {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      height:85vh;
      overflow-y:auto;
    }

    .card {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    .card:hover {
      border-color:#3b82f6;
    }

    .tag {
      font-size:11px;
      padding:2px 6px;
      background:#1f2937;
      border-radius:6px;
      margin-left:4px;
    }

    button {
      width:100%;
      padding:8px;
      margin-top:6px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .assign { background:#3b82f6; color:white; }
    .assign:hover { background:#2563eb; }

    .add { background:#10b981; color:white; }
    .add:hover { background:#059669; }

    h3 { margin-top:0; }

    .role-block {
      border:1px solid #334155;
      padding:8px;
      margin-bottom:8px;
      border-radius:8px;
    }

    .slot {
      background:#1f2937;
      padding:5px;
      margin-top:5px;
      border-radius:6px;
      font-size:13px;
    }

    .selected {
      border:2px solid #3b82f6 !important;
    }
  </style>
</head>

<body>

<header>
  🎛️ Worship Ops Command Center
  <button onclick="loadAll()">Refresh</button>
</header>

<div class="grid">

  <!-- STAFF -->
  <div class="panel">
    <h3>Staff Pool</h3>
    <button class="add" onclick="createStaff()">+ Add Staff</button>
    <div id="staffList"></div>
  </div>

  <!-- SERVICES + ROLES -->
  <div class="panel">
    <h3>Services</h3>
    <button class="add" onclick="createService()">+ Add Service</button>
    <div id="serviceList"></div>

    <hr style="border:1px solid #1f2937">

    <h3>Roles</h3>
    <div id="roles"></div>
  </div>

  <!-- LIVE -->
  <div class="panel">
    <h3>Live Assignments</h3>
    <div id="assignments"></div>
  </div>

</div>

<script type="module">
  import { db } from "../assets/app.js";

  let selectedStaff = null;
  let selectedService = null;

  /* ---------------- LOAD ---------------- */

  async function loadAll() {
    await loadStaff();
    await loadServices();
  }

  /* ---------------- STAFF ---------------- */

  async function loadStaff() {
    const { data, error } = await db.from("staff").select("*");

    if (error || !data) return console.error(error);

    const box = document.getElementById("staffList");
    box.innerHTML = "";

    data.forEach(s => {
      box.innerHTML += `
        <div class="card ${selectedStaff?.id === s.id ? 'selected' : ''}"
             onclick="selectStaff('${s.id}','${s.name}')">
          <b>${s.name}</b>
          <div class="tag">${s.role || "-"}</div>
        </div>
      `;
    });
  }

  window.selectStaff = (id, name) => {
    selectedStaff = { id, name };
    loadStaff();
  };

  window.createStaff = async () => {

    const name = prompt("Staff Name");
    if (!name) return;

    const role = prompt("Role") || "-";
    const department = prompt("Department") || "Worship";

    const { error } = await db.from("staff").insert([{
      name,
      role,
      department,
      is_active: true
    }]);

    if (error) return console.error(error);

    loadStaff();
  };

  /* ---------------- SERVICES ---------------- */

  async function loadServices() {
    const { data, error } = await db.from("services").select("*");

    if (error || !data) return console.error(error);

    const box = document.getElementById("serviceList");
    box.innerHTML = "";

    data.forEach(s => {
      box.innerHTML += `
        <div class="card ${selectedService?.id === s.id ? 'selected' : ''}"
             onclick="selectService('${s.id}','${s.title}')">
          <b>${s.title}</b><br>
          <span class="tag">${s.service_date || "-"}</span>
        </div>
      `;
    });
  }

  window.selectService = (id, title) => {
    selectedService = { id, title };
    loadServices();
    loadRoles();
    loadAssignments();
  };

  window.createService = async () => {

    const title = prompt("Service Title");
    if (!title) return;

    const date = prompt("Service Date (YYYY-MM-DD)");

    const { error } = await db.from("services").insert([{
      title,
      service_date: date
    }]);

    if (error) return console.error(error);

    loadServices();
  };

  /* ---------------- ROLES ---------------- */

  async function loadRoles() {

    if (!selectedService) return;

    const { data, error } = await db
      .from("service_assignments")
      .select("*, staff(name)")
      .eq("service_id", selectedService.id);

    if (error || !data) return console.error(error);

    const box = document.getElementById("roles");
    box.innerHTML = "";

    const grouped = {};

    data.forEach(r => {
      if (!grouped[r.role]) grouped[r.role] = [];
      grouped[r.role].push(r);
    });

    Object.keys(grouped).forEach(role => {

      box.innerHTML += `
        <div class="role-block">
          <b>${role}</b>

          ${grouped[role].map(m => `
            <div class="slot">${m.staff?.name || "-"}</div>
          `).join("")}

          <button class="assign" onclick="assignRole('${role}')">
            Assign to ${role}
          </button>
        </div>
      `;
    });
  }

  /* ---------------- ASSIGN ---------------- */

  window.assignRole = async (role) => {

    if (!selectedStaff || !selectedService) {
      alert("Select staff + service first");
      return;
    }

    const { error } = await db.from("service_assignments").insert([{
      service_id: selectedService.id,
      staff_id: selectedStaff.id,
      role,
      status: "ASSIGNED"
    }]);

    if (error) return console.error(error);

    loadRoles();
    loadAssignments();
  };

  /* ---------------- ASSIGNMENTS ---------------- */

  async function loadAssignments() {

    if (!selectedService) return;

    const { data, error } = await db
      .from("service_assignments")
      .select("*, staff(name)")
      .eq("service_id", selectedService.id);

    if (error || !data) return console.error(error);

    const box = document.getElementById("assignments");
    box.innerHTML = "";

    data.forEach(a => {
      box.innerHTML += `
        <div class="card">
          <b>${a.role}</b><br>
          ${a.staff?.name || "-"}
        </div>
      `;
    });
  }

  window.loadAll = loadAll;

  loadAll();
</script>

</body>
</html>
