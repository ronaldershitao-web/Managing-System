<!DOCTYPE html>
<html>
<head>
  <title>Worship Ops Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b1220;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap:10px;
      padding:10px;
    }

    .panel {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      height:85vh;
      overflow-y:auto;
    }

    .card {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    .card:hover {
      border-color:#3b82f6;
    }

    .tag {
      font-size:11px;
      padding:2px 6px;
      background:#1f2937;
      border-radius:6px;
      margin-left:4px;
    }

    button {
      width:100%;
      padding:8px;
      margin-top:6px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .assign {
      background:#3b82f6;
      color:white;
    }

    .assign:hover {
      background:#2563eb;
    }

    .service-btn {
      background:#10b981;
      color:white;
    }

    .service-btn:hover {
      background:#059669;
    }

    h3 {
      margin-top:0;
    }

    .role-block {
      border:1px solid #334155;
      padding:8px;
      margin-bottom:8px;
      border-radius:8px;
    }

    .slot {
      background:#1f2937;
      padding:5px;
      margin-top:5px;
      border-radius:6px;
      font-size:13px;
    }
  </style>
</head>

<body>

<header>
  🎛️ Worship Ops Command Center
  <button onclick="loadAll()">Refresh</button>
</header>

<div class="grid">

  <!-- STAFF -->
  <div class="panel">
    <h3>Staff Pool</h3>
    <div id="staffList"></div>
  </div>

  <!-- SERVICES -->
  <div class="panel">
    <h3>Services</h3>
    <div id="serviceList"></div>

    <hr style="border:1px solid #1f2937">

    <h3>Roles</h3>
    <div id="roles"></div>
  </div>

  <!-- ASSIGNMENTS -->
  <div class="panel">
    <h3>Live Assignments</h3>
    <div id="assignments"></div>
  </div>

</div>

<script>
  const supabaseUrl = "YOUR_SUPABASE_URL";
  const supabaseKey = "YOUR_SUPABASE_ANON_KEY";
  const db = supabase.createClient(supabaseUrl, supabaseKey);

  let selectedStaff = null;
  let selectedService = null;

  /* ---------------- LOAD EVERYTHING ---------------- */

  async function loadAll() {
    loadStaff();
    loadServices();
  }

  /* ---------------- STAFF ---------------- */

  async function loadStaff() {
    const { data } = await db.from("staff").select("*");

    const box = document.getElementById("staffList");
    box.innerHTML = "";

    data.forEach(s => {
      box.innerHTML += `
        <div class="card" onclick="selectStaff('${s.id}','${s.name}')">
          <b>${s.name}</b><br>
          <span class="tag">${s.role || "-"}</span>
        </div>
      `;
    });
  }

  function selectStaff(id, name) {
    selectedStaff = { id, name };
    alert("Selected Staff: " + name);
  }

  /* ---------------- SERVICES ---------------- */

  async function loadServices() {
    const { data } = await db.from("services").select("*");

    const box = document.getElementById("serviceList");
    box.innerHTML = "";

    data.forEach(s => {
      box.innerHTML += `
        <div class="card" onclick="selectService('${s.id}','${s.title}')">
          <b>${s.title}</b><br>
          <span class="tag">${s.service_date}</span>
        </div>
      `;
    });
  }

  function selectService(id, title) {
    selectedService = { id, title };
    loadAssignments();
    loadRoles();
    alert("Selected Service: " + title);
  }

  /* ---------------- ROLES ---------------- */

  async function loadRoles() {

    if (!selectedService) return;

    const { data: roles } = await db
      .from("service_assignments")
      .select("*, staff(name)")
      .eq("service_id", selectedService.id);

    const box = document.getElementById("roles");
    box.innerHTML = "";

    const roleMap = {};

    roles.forEach(r => {
      if (!roleMap[r.role]) roleMap[r.role] = [];
      roleMap[r.role].push(r);
    });

    Object.keys(roleMap).forEach(role => {

      const members = roleMap[role];

      box.innerHTML += `
        <div class="role-block">
          <b>${role}</b>

          ${members.map(m => `
            <div class="slot">
              ${m.staff?.name || "Unknown"}
            </div>
          `).join("")}

          <button class="assign" onclick="assign('${role}')">
            Assign to ${role}
          </button>
        </div>
      `;
    });
  }

  /* ---------------- ASSIGN ---------------- */

  async function assign(role) {

    if (!selectedStaff || !selectedService) {
      alert("Select staff and service first");
      return;
    }

    await db.from("service_assignments").insert([{
      service_id: selectedService.id,
      staff_id: selectedStaff.id,
      role: role,
      status: "ASSIGNED"
    }]);

    loadRoles();
    loadAssignments();
  }

  /* ---------------- LIVE VIEW ---------------- */

  async function loadAssignments() {

    if (!selectedService) return;

    const { data } = await db
      .from("service_assignments")
      .select("*, staff(name)")
      .eq("service_id", selectedService.id);

    const box = document.getElementById("assignments");
    box.innerHTML = "";

    data.forEach(a => {
      box.innerHTML += `
        <div class="card">
          <b>${a.role}</b><br>
          ${a.staff?.name || "-"}
        </div>
      `;
    });
  }

  loadAll();
</script>

</body>
</html>
