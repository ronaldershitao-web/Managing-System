<!DOCTYPE html>
<html>
<head>
  <title>Worship Ops Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b1220;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap:10px;
      padding:10px;
    }

    .panel {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      height:85vh;
      overflow-y:auto;
    }

    .card {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    .card:hover {
      border-color:#3b82f6;
    }

    .tag {
      font-size:11px;
      padding:2px 6px;
      background:#1f2937;
      border-radius:6px;
      margin-left:4px;
    }

    button {
      width:100%;
      padding:8px;
      margin-top:6px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .assign {
      background:#3b82f6;
      color:white;
    }

    .assign:hover {
      background:#2563eb;
    }

    h3 { margin-top:0; }

    .role-block {
      border:1px solid #334155;
      padding:8px;
      margin-bottom:8px;
      border-radius:8px;
    }

    .slot {
      background:#1f2937;
      padding:5px;
      margin-top:5px;
      border-radius:6px;
      font-size:13px;
    }
  </style>
</head>

<body>

<header>
  🎛️ Worship Ops Command Center
  <button onclick="loadAll()">Refresh</button>
</header>

<div class="grid">

  <!-- STAFF -->
  <div class="panel">
    <h3>Staff Pool</h3>
    <div id="staffList"></div>
  </div>

  <!-- SERVICES + ROLES -->
  <div class="panel">
    <h3>Services</h3>
    <div id="serviceList"></div>

    <hr style="border:1px solid #1f2937">

    <h3>Roles</h3>
    <div id="roles"></div>
  </div>

  <!-- LIVE -->
  <div class="panel">
    <h3>Live Assignments</h3>
    <div id="assignments"></div>
  </div>

</div>

<script type="module">
  import { db } from "../assets/app.js";

  let selectedStaff = null;
  let selectedService = null;

  /* ---------------- LOAD ---------------- */

  async function loadAll() {
    loadStaff();
    loadServices();
  }

  /* ---------------- STAFF ---------------- */

async function loadStaff() {
  const { data, error } = await db.from("staff").select("*");

  if (error || !data) {
    console.error("Staff load error:", error);
    return;
  }

  const box = document.getElementById("staffList");
  box.innerHTML = "";

  data.forEach(s => {
    box.innerHTML += `
      <div class="card">
        <b>${s.name}</b>
      </div>
    `;
  });
}
  window.selectStaff = (id, name) => {
    selectedStaff = { id, name };
    alert("Selected: " + name);
  };

  /* ---------------- SERVICES ---------------- */

  async function loadServices() {
  const { data, error } = await db.from("services").select("*");

  if (error || !data) {
    console.error("Services load error:", error);
    return;
  }

  const box = document.getElementById("serviceList");
  box.innerHTML = "";

  data.forEach(s => {
    box.innerHTML += `
      <div class="card">
        <b>${s.title}</b>
      </div>
    `;
  });
}

  window.selectService = (id, title) => {
    selectedService = { id, title };
    loadRoles();
    loadAssignments();
    alert("Selected Service: " + title);
  };

  /* ---------------- ROLES ---------------- */

  async function loadRoles() {

    if (!selectedService) return;

    const { data } = await db
      .from("service_assignments")
      .select("*, staff(name)")
      .eq("service_id", selectedService.id);

    const box = document.getElementById("roles");
    box.innerHTML = "";

    const grouped = {};

    data.forEach(r => {
      if (!grouped[r.role]) grouped[r.role] = [];
      grouped[r.role].push(r);
    });

    Object.keys(grouped).forEach(role => {

      box.innerHTML += `
        <div class="role-block">
          <b>${role}</b>

          ${grouped[role].map(m => `
            <div class="slot">${m.staff?.name || "-"}</div>
          `).join("")}

          <button class="assign" onclick="assignRole('${role}')">
            Assign to ${role}
          </button>
        </div>
      `;
    });
  }

  /* ---------------- ASSIGN ---------------- */

  window.assignRole = async (role) => {

    if (!selectedStaff || !selectedService) {
      alert("Select staff + service first");
      return;
    }

    await db.from("service_assignments").insert([{
      service_id: selectedService.id,
      staff_id: selectedStaff.id,
      role: role,
      status: "ASSIGNED"
    }]);

    loadRoles();
    loadAssignments();
  };

  /* ---------------- LIVE ---------------- */

  async function loadAssignments() {

    if (!selectedService) return;

    const { data } = await db
      .from("service_assignments")
      .select("*, staff(name)")
      .eq("service_id", selectedService.id);

    const box = document.getElementById("assignments");
    box.innerHTML = "";

    data.forEach(a => {
      box.innerHTML += `
        <div class="card">
          <b>${a.role}</b><br>
          ${a.staff?.name || "-"}
        </div>
      `;
    });
  }

  window.loadAll = loadAll;

  loadAll();
</script>

</body>
</html>
