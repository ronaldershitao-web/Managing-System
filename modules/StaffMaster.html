<!DOCTYPE html>
<html>
<head>
  <title>Worship Ops Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b1220;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap:10px;
      padding:10px;
    }

    .panel {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      height:85vh;
      overflow-y:auto;
    }

    .card {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    .card:hover { border-color:#3b82f6; }

    .selected {
      border:2px solid #3b82f6 !important;
    }

    input, select {
      width:100%;
      padding:8px;
      margin:5px 0;
      border-radius:6px;
      border:1px solid #334155;
      background:#0f172a;
      color:white;
    }

    button {
      width:100%;
      padding:8px;
      margin-top:6px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .add { background:#10b981; color:white; }
    .assign { background:#3b82f6; color:white; }

    .role-block {
      border:1px solid #334155;
      padding:8px;
      margin-bottom:8px;
      border-radius:8px;
    }

    .slot {
      background:#1f2937;
      padding:5px;
      margin-top:5px;
      border-radius:6px;
      font-size:13px;
    }

    .tag {
      font-size:11px;
      padding:2px 6px;
      background:#1f2937;
      border-radius:6px;
    }
  </style>
</head>

<body>

<header>
  🎛️ Worship Ops Command Center
  <button onclick="loadAll()">Refresh</button>
</header>

<div class="grid">

  <!-- STAFF -->
  <div class="panel">
    <h3>Staff Pool</h3>

    <input id="staffName" placeholder="Staff Name">
    <input id="staffRole" placeholder="Role (HC / Anchor / etc)">
    <input id="staffDept" placeholder="Department (Worship Ops)">

    <button class="add" onclick="addStaff()">+ Add Staff</button>

    <div id="staffList"></div>
  </div>

  <!-- SERVICES + ASSIGN -->
  <div class="panel">
    <h3>Services</h3>

    <input id="serviceTitle" placeholder="Service Title">
    <input id="serviceDate" placeholder="YYYY-MM-DD">

    <button class="add" onclick="addService()">+ Add Service</button>

    <div id="serviceList"></div>

    <hr style="border:1px solid #1f2937">

    <h3>Assign Role</h3>

    <select id="roleSelect">
      <option>Service Pastor</option>
      <option>Anchor</option>
      <option>Preacher</option>
      <option>Welcome IC</option>
      <option>HC 1</option>
      <option>HC 2</option>
      <option>HC 3</option>
      <option>HC 4</option>
      <option>HC Standby 1</option>
      <option>HC Standby 2</option>
      <option>Min Deaf</option>
    </select>

    <button class="assign" onclick="assign()">Assign Selected</button>

    <div id="roles"></div>
  </div>

  <!-- LIVE -->
  <div class="panel">
    <h3>Live Assignments</h3>
    <div id="assignments"></div>
  </div>

</div>

<script type="module">
  import { db } from "../assets/app.js";

  let selectedStaff = null;
  let selectedService = null;

  /* ---------------- LOAD ---------------- */

  async function loadAll() {
    loadStaff();
    loadServices();
  }

  /* ---------------- STAFF ---------------- */

  async function loadStaff() {
    const { data } = await db.from("staff").select("*");

    const box = document.getElementById("staffList");
    box.innerHTML = "";

    (data || []).forEach(s => {
      box.innerHTML += `
        <div class="card ${selectedStaff?.id === s.id ? 'selected' : ''}"
             onclick="selectStaff('${s.id}','${s.name}')">
          <b>${s.name}</b><br>
          <span class="tag">${s.role || "-"}</span>
        </div>
      `;
    });
  }

  window.selectStaff = (id, name) => {
    selectedStaff = { id, name };
    loadStaff();
  };

  window.addStaff = async () => {

    const name = document.getElementById("staffName").value;
    const role = document.getElementById("staffRole").value;
    const dept = document.getElementById("staffDept").value;

    if (!name) return alert("Enter staff name");

    await db.from("staff").insert([{
      name,
      role,
      department: dept,
      is_active: true
    }]);

    document.getElementById("staffName").value = "";
    loadStaff();
  };

  /* ---------------- SERVICES ---------------- */

  async function loadServices() {
    const { data } = await db.from("services").select("*");

    const box = document.getElementById("serviceList");
    box.innerHTML = "";

    (data || []).forEach(s => {
      box.innerHTML += `
        <div class="card ${selectedService?.id === s.id ? 'selected' : ''}"
             onclick="selectService('${s.id}','${s.title}')">
          <b>${s.title}</b><br>
          <span class="tag">${s.service_date || "-"}</span>
        </div>
      `;
    });
  }

  window.selectService = (id, title) => {
    selectedService = { id, title };
    loadServices();
    loadAssignments();
  };

  window.addService = async () => {

    const title = document.getElementById("serviceTitle").value;
    const date = document.getElementById("serviceDate").value;

    if (!title) return alert("Enter service title");

    await db.from("services").insert([{
      title,
      service_date: date
    }]);

    document.getElementById("serviceTitle").value = "";
    loadServices();
  };

  /* ---------------- ASSIGN ---------------- */

  window.assign = async () => {

    if (!selectedStaff || !selectedService) {
      return alert("Select staff AND service first");
    }

    const role = document.getElementById("roleSelect").value;

    await db.from("service_assignments").insert([{
      service_id: selectedService.id,
      staff_id: selectedStaff.id,
      role,
      status: "ASSIGNED"
    }]);

    loadAssignments();
  };

  /* ---------------- ASSIGNMENTS ---------------- */

  async function loadAssignments() {

    if (!selectedService) return;

    const { data } = await db
      .from("service_assignments")
      .select("*, staff(name)")
      .eq("service_id", selectedService.id);

    const box = document.getElementById("assignments");
    box.innerHTML = "";

    (data || []).forEach(a => {
      box.innerHTML += `
        <div class="card">
          <b>${a.role}</b><br>
          ${a.staff?.name || "-"}
        </div>
      `;
    });
  }

  window.loadAll = loadAll;

  loadAll();
</script>

</body>
</html>
