<!DOCTYPE html>
<html>
<head>
  <title>Staff Master</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module">
    import { db } from "../assets/app.js";

    let staff = [];

    async function load() {

      const res = await db
        .from("staff")
        .select("*")
        .order("created_at", { ascending: false });

      staff = res.data || [];

      render();
    }

    /* ---------------- CREATE STAFF ---------------- */

    async function createStaff() {

      const name = prompt("Staff Name");
      const phone = prompt("Phone Number");

      if (!name) return;

      const role = prompt("Role (Worship Leader / Media / Usher / etc.)");
      const department = prompt("Department (default: Worship Service)") || "Worship Service";

      const communion = confirm("Eligible for Communion serving?");

      await db.from("staff").insert([{
        name,
        phone,
        role,
        department,
        is_active: true,
        communion_eligible: communion
      }]);

      load();
    }

    /* ---------------- EDIT STAFF ---------------- */

    async function editStaff(s) {

      const role = prompt("Role", s.role || "");
      const department = prompt("Department", s.department || "");
      const active = confirm("Should this staff remain ACTIVE?");
      const communion = confirm("Eligible for Communion?");

      await db.from("staff")
        .update({
          role,
          department,
          is_active: active,
          communion_eligible: communion
        })
        .eq("id", s.id);

      load();
    }

    /* ---------------- RENDER ---------------- */

    function render() {

      const container = document.getElementById("list");

      container.innerHTML = staff.map(s => {

        return `
          <div class="card">

            <b>${s.name || "Unnamed"}</b>

            <div style="font-size:12px;color:#94a3b8;">
              📞 ${s.phone || "-"}
            </div>

            <div style="margin-top:6px;font-size:12px;">
              🧭 Role: <b>${s.role || "-"}</b><br>
              🏢 Dept: ${s.department || "-"}<br>
              🍷 Communion: <b>${s.communion_eligible ? "YES" : "NO"}</b><br>
              Status: ${s.is_active ? "Active" : "Inactive"}
            </div>

            <button onclick='editStaff(${JSON.stringify(s)})' style="margin-top:8px;">
              Edit Staff
            </button>

          </div>
        `;
      }).join("");
    }

    window.createStaff = createStaff;
    window.editStaff = editStaff;
    window.onload = load;

  </script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .card {
      background:#111827;
      border:1px solid #1f2937;
      padding:12px;
      border-radius:10px;
      margin-bottom:10px;
    }

    .grid {
      padding:10px;
    }

    button {
      padding:6px 10px;
      background:#2563eb;
      border:none;
      color:white;
      border-radius:6px;
      font-size:12px;
      cursor:pointer;
    }
  </style>

</head>

<body>

<header>
  👥 Staff Master
  <button onclick="createStaff()">+ Add Staff</button>
</header>

<div class="grid">
  <div id="list"></div>
</div>

</body>
</html>
