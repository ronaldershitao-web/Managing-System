<!DOCTYPE html>
<html>
<head>
  <title>Event Check-in</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module">
    import { db } from "../assets/app.js";

    const params = new URLSearchParams(window.location.search);
    const eventId = params.get("event_id");
    const success = params.get("success");
    const successName = params.get("name");

    let eventName = "";

    async function init() {

      // 🟢 SUCCESS STATE (after register redirect)
      if (success) {
        showFullScreen(
          "success",
          successName
            ? `🎉 Welcome ${successName}!`
            : "🎉 Check-in Successful"
        );
        autoReset();
        return;
      }

      if (!eventId) {
        document.body.innerHTML = "<h2 style='color:white'>Invalid Check-in Link</h2>";
        return;
      }

      const { data } = await db
        .from("events")
        .select("*")
        .eq("id", eventId)
        .maybeSingle();

      eventName = data?.title || "Event Check-in";
      document.getElementById("eventTitle").innerText = eventName;
    }

    async function checkIn() {

      const phone = document.getElementById("phone").value.trim();
      const name = document.getElementById("name").value.trim();

      if (!phone) {
        showInlineError("Please enter your phone number");
        return;
      }

      setLoading(true);

      try {

        // 1. FIND PERSON
        let { data: person } = await db
          .from("people")
          .select("*")
          .eq("phone", phone)
          .maybeSingle();

        // 2. NEW → REDIRECT TO REGISTER
        if (!person) {
          const url = `register.html?event_id=${eventId}&phone=${phone}&name=${encodeURIComponent(name || "")}`;
          window.location.href = url;
          return;
        }

        // 3. UPDATE RETURNING STATUS
        await db
          .from("people")
          .update({
            engagement_status: "RETURNING",
            last_contact_date: new Date().toISOString()
          })
          .eq("id", person.id);

        // 4. INSERT ATTENDANCE
        const { error: attError } = await db
          .from("event_attendance")
          .insert([{
            event_id: eventId,
            person_id: person.id,
            score: 2
          }]);

        if (attError) {
          if (attError.message.toLowerCase().includes("duplicate")) {
            showFullScreen("error", "❌ Already Checked In");
          } else {
            showFullScreen("error", "❌ Error Occurred");
          }
          autoReset();
          return;
        }

        // 🟢 SUCCESS
        showFullScreen("success", "✅ Check-in Successful");
        autoReset();

      } catch (err) {
        showFullScreen("error", err.message || "❌ System Error");
        autoReset();
      }

      setLoading(false);
    }

    function setLoading(state) {
      const btn = document.getElementById("btn");
      btn.disabled = state;
      btn.innerText = state ? "Checking in..." : "Check In";
    }

    function showInlineError(msg) {
      const el = document.getElementById("msg");
      el.style.color = "#f87171";
      el.innerText = msg;
    }

    function showFullScreen(type, message) {

      document.getElementById("formCard").style.display = "none";

      const screen = document.getElementById("statusScreen");
      const text = document.getElementById("statusText");

      screen.style.display = "flex";
      screen.className = type;
      text.innerText = message;
    }

    function autoReset() {
      setTimeout(() => {
        window.location.href = `checkin.html?event_id=${eventId}`;
      }, 4000);
    }

    window.checkIn = checkIn;
    window.onload = init;

  </script>

  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a, #020617);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card {
      width:90%;
      max-width:420px;
      background:#111827;
      padding:25px;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
      text-align:center;
    }

    h2 { margin:0 0 5px 0; }

    p {
      color:#94a3b8;
      font-size:13px;
      margin-bottom:20px;
    }

    input {
      width:100%;
      padding:12px;
      margin:8px 0;
      border-radius:10px;
      border:1px solid #334155;
      background:#0b1220;
      color:white;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    button:disabled {
      background:#334155;
    }

    #msg {
      margin-top:10px;
      font-size:14px;
    }

    .hint {
      font-size:12px;
      color:#64748b;
      margin-top:10px;
    }

    /* 🔥 FULL SCREEN STATES */
    #statusScreen {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      display:none;
      justify-content:center;
      align-items:center;
      font-size:28px;
      font-weight:bold;
      text-align:center;
      padding:20px;
    }

    .success {
      background:#16a34a;
      color:white;
    }

    .error {
      background:#dc2626;
      color:white;
    }

  </style>
</head>

<body>

  <!-- FORM -->
  <div class="card" id="formCard">

    <h2 id="eventTitle">Loading Event...</h2>
    <p>Please check in to continue</p>

    <div id="form">
      <input id="phone" placeholder="Phone Number (required)">
      <input id="name" placeholder="Name (optional)">
      <button id="btn" onclick="checkIn()">Check In</button>

      <div class="hint">
        New here? We’ll guide you through 🙌
      </div>
    </div>

    <div id="msg"></div>

  </div>

  <!-- FULLSCREEN STATUS -->
  <div id="statusScreen">
    <div id="statusText"></div>
  </div>

</body>
</html>
