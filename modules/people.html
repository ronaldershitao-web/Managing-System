<!DOCTYPE html>
<html>
<head>
  <title>People by Leaders</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>

<body>

<h2>👤 People (Grouped by Leaders)</h2>

<div id="view"></div>

<script type="module">
import { db } from "../assets/app.js";

/**
 * LOAD DATA
 */
const { data: people, error } = await db
  .from("people")
  .select("*");

if (error) {
  console.error(error);
  document.getElementById("view").innerHTML = "Error loading data";
  throw error;
}

/**
 * NAVIGATION
 */
window.goPerson = function(id) {
  location.href = `person.html?id=${id}`;
};

/**
 * SAFE TREE RENDER
 */
function renderTree(parentId = null) {

  const children = people.filter(p => {
    // ROOT LEVEL
    if (parentId === null) {
      return !p.leader_id; // handles null, undefined, ""
    }

    // CHILD LEVELS (safe comparison)
    return String(p.leader_id) === String(parentId);
  });

  if (!children.length) return "";

  return `
    <div class="tree-level">
      ${children.map(p => `
        <div class="tree-node">
          
          <div class="card node" onclick="goPerson('${p.id}')">
            👤 ${p.name}
            <br>
            <small>Stage ${p.relationship_stage ?? "-"}</small>
          </div>

          <div class="children">
            ${renderTree(p.id)}
          </div>

        </div>
      `).join("")}
    </div>
  `;
}

/**
 * INITIAL RENDER
 */
document.getElementById("view").innerHTML = renderTree();

/**
 * DEBUG (remove later if not needed)
 */
console.log("People Data:", people);

</script>
  
<style>
.subcard {
  margin:5px 0;
  padding:6px;
  background:#0f172a;
  border:1px solid #1f2937;
  border-radius:6px;
  cursor:pointer;
}

 
.tree-level {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.tree-node {
  text-align: center;
  margin: 0 20px;
}

.node {
  min-width: 120px;
  margin-bottom: 10px;
  border: 1px solid #2563eb;
}

</style>

</body>
</html>
