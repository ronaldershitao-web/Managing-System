<!DOCTYPE html>
<html>
<head>
  <title>People by Leaders</title>
  <link rel="stylesheet" href="../styles/main.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    h2 {
      padding: 15px;
    }

    /* 🔥 IMPORTANT: scroll-safe container */
    .org-container {
      height: calc(100vh - 60px);
      overflow: auto;
      padding: 20px;
    }

    /* 🔥 TREE STRUCTURE (VERTICAL) */
    .tree-node {
      margin-left: 20px;
      padding-left: 12px;
      border-left: 1px solid #1f2937;
      margin-top: 10px;
    }

    .card {
      background: #111827;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #1f2937;
      cursor: pointer;
      transition: 0.2s;
      display: inline-block;
      min-width: 160px;
    }

    .card:hover {
      border-color: #2563eb;
      transform: scale(1.02);
    }
  </style>
</head>

<body>

<h2>👤 People (Grouped by Leaders)</h2>

<div id="view" class="org-container"></div>

<script type="module">
import { db } from "../assets/app.js";

/**
 * LOAD PEOPLE
 */
const { data: people, error } = await db
  .from("people")
  .select("*");

if (error) {
  document.getElementById("view").innerHTML = "Error loading data";
  throw error;
}

/**
 * NAVIGATION
 */
window.goPerson = (id) => {
  location.href = `person.html?id=${id}`;
};

/**
 * NORMALIZE DATA
 */
function clean(val) {
  if (val === "" || val === undefined) return null;
  return val;
}

/**
 * BUILD TREE
 */
function renderTree(parentId = null) {

  const children = people.filter(p => {
    const pid = clean(p.leader_id);

    if (parentId === null) {
      return pid === null;
    }

    return String(pid) === String(parentId);
  });

  if (!children.length) return "";

  return children.map(p => `
    <div class="tree-node">

      <div class="card" onclick="goPerson('${p.id}')">
        👤 ${p.name}
        <br>
        <small>Stage ${p.relationship_stage ?? "-"}</small>
      </div>

      ${renderTree(p.id)}

    </div>
  `).join("");
}

/**
 * RENDER
 */
document.getElementById("view").innerHTML = renderTree();

/**
 * DEBUG (optional)
 */
console.log("People loaded:", people);

</script>

</body>
</html>
