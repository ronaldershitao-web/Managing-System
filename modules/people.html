<!DOCTYPE html>
<html>
<head>
  <title>People by Leaders</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>

<body>

<h2>👤 People (Grouped by Leaders)</h2>

<div id="view"></div>

<script type="module">
import { db } from "../assets/app.js";

const { data: people } = await db
  .from("people")
  .select("*");

window.goPerson = function(id) {
  location.href = `person.html?id=${id}`;
};

function renderTree(parentId = null) {
  const children = people.filter(p => p.leader_id === parentId);

  if (!children.length) return "";

  return `
    <div class="tree-level">
      ${children.map(p => `
        <div class="tree-node">
          
          <div class="card node" onclick="goPerson('${p.id}')">
            👤 ${p.name}
            <br>
            <small>Stage ${p.relationship_stage ?? "-"}</small>
          </div>

          ${renderTree(p.id)}

        </div>
      `).join("")}
    </div>
  `;
}

document.getElementById("view").innerHTML = renderTree();
</script>

  
<style>
.subcard {
  margin:5px 0;
  padding:6px;
  background:#0f172a;
  border:1px solid #1f2937;
  border-radius:6px;
  cursor:pointer;
}

 
.tree-level {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.tree-node {
  text-align: center;
  margin: 0 20px;
}

.node {
  min-width: 120px;
  margin-bottom: 10px;
  border: 1px solid #2563eb;
}

</style>

</body>
</html>
