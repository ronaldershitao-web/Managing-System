<!DOCTYPE html>
<html>
<head>
  <title>People</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>

<body>

<h2>👤 People</h2>

<div id="list"></div>

<script type="module">
import { getPeople } from "../services/people.service.js";

const { data } = await getPeople();

document.getElementById("list").innerHTML =
  (data || []).map(p => `
    <div class="card" onclick="location.href='person.html?id=${p.id}'">
      <b>${p.name}</b><br>
      Stage: ${p.relationship_stage ?? "-"}<br>
      Risk: ${p.priority_score ?? "-"}
    </div>
  `).join("");
</script>

</body>
</html>
