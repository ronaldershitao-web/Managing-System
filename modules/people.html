<!DOCTYPE html>
<html>
<head>
  <title>People by Leaders</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>

<body>

<h2>👤 People (Grouped by Leaders)</h2>

<div id="view"></div>

<script type="module">
import { db } from "../assets/app.js";

/**
 * Load all people
 */
const { data: people } = await db
  .from("people")
  .select("*");

/**
 * NAVIGATION
 */
window.goPerson = function(id) {
  location.href = `person.html?id=${id}`;
};

/**
 * RECURSIVE TREE RENDER (KEY FIX)
 */
function renderTree(parentId = null) {
  return people
    .filter(p => p.leader_id === parentId)
    .map(p => `
      <div class="card">

        <div onclick="goPerson('${p.id}')" style="cursor:pointer;">
          👤 ${p.name}
          <small>(Stage ${p.relationship_stage ?? "-"})</small>
        </div>

        <div style="margin-left:20px;">
          ${renderTree(p.id)}
        </div>

      </div>
    `).join("");
}

/**
 * Render full hierarchy
 */
document.getElementById("view").innerHTML = renderTree();

</script>

<style>
.subcard {
  margin:5px 0;
  padding:6px;
  background:#0f172a;
  border:1px solid #1f2937;
  border-radius:6px;
  cursor:pointer;
}
</style>

</body>
</html>
