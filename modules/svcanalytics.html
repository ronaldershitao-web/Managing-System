<!DOCTYPE html>
<html>
<head>
  <title>Service Analytics Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      background:#111827;
      padding:14px;
      font-size:22px;
      font-weight:bold;
    }

    .container{
      padding:14px;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-bottom:14px;
    }

    .summary-card{
      background:#111827;
      border:1px solid #334155;
      border-radius:10px;
      padding:14px;
    }

    .summary-title{
      color:#94a3b8;
      font-size:12px;
    }

    .summary-value{
      margin-top:6px;
      font-size:28px;
      font-weight:bold;
      color:#22c55e;
    }

    .top-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-bottom:14px;
    }

    .panel{
      background:#111827;
      border:1px solid #334155;
      border-radius:10px;
      padding:14px;
      margin-bottom:14px;
    }

    .panel-title{
      color:#fbbf24;
      font-size:16px;
      font-weight:bold;
      margin-bottom:14px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      background:#1e293b;
      color:#fbbf24;
      padding:10px;
      text-align:left;
      font-size:12px;
    }

    td{
      padding:10px;
      border-bottom:1px solid #1f2937;
      font-size:12px;
    }

    .count{
      color:#22c55e;
      font-weight:bold;
    }

    canvas{
      background:white;
      border-radius:8px;
      padding:10px;
      box-sizing:border-box;
    }

    #chartsContainer{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

    @media(max-width:900px){

  #chartsContainer{
    grid-template-columns:1fr;
  }

}

    .chart-panel{
      background:#111827;
      border:1px solid #334155;
      border-radius:10px;
      padding:14px;
    }

    .chart-title{
      color:#fbbf24;
      font-size:15px;
      font-weight:bold;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<header>
  📊 Service Analytics Dashboard
</header>

<div class="container">

  <!-- SUMMARY -->
  <div class="summary-grid">

    <div class="summary-card">
      <div class="summary-title">
        Total Services
      </div>

      <div class="summary-value"
        id="totalServices">
        0
      </div>
    </div>

    <div class="summary-card">
      <div class="summary-title">
        Total Attendance
      </div>

      <div class="summary-value"
        id="totalAttendance">
        0
      </div>
    </div>

    <div class="summary-card">
      <div class="summary-title">
        Total Staff Assignments
      </div>

      <div class="summary-value"
        id="totalAssignments">
        0
      </div>
    </div>

    <div class="summary-card">
      <div class="summary-title">
        Hospitality Duties
      </div>

      <div class="summary-value"
        id="totalHospitality">
        0
      </div>
    </div>

  </div>

  <!-- TABLES -->
  <div class="top-grid">

    <!-- STAFF ROLE -->
    <div class="panel">

      <div class="panel-title">
        👥 Analytics 1: Staff Role Metrics
      </div>

      <table>

        <thead>
          <tr>
            <th>Staff</th>
            <th>Role</th>
            <th>Count</th>
          </tr>
        </thead>

        <tbody id="staffRoleBody"></tbody>

      </table>

    </div>

    <!-- HOSPITALITY -->
    <div class="panel">

      <div class="panel-title">
        🏠 Analytics 2: Hospitality Metrics
      </div>

      <table>

        <thead>
          <tr>
            <th>Cell Leader</th>
            <th>Count</th>
          </tr>
        </thead>

        <tbody id="hospitalityBody"></tbody>

      </table>

    </div>

  </div>

  <!-- CHARTS -->
  <div id="chartsContainer"></div>

</div>

<script type="module">
import { db } from "../assets/app.js";

async function load(){

  const [
    servicesRes,
    attendanceRes,
    rolesRes,
    staffRes,
    hospitalityRes
  ] = await Promise.all([

    db
      .from("services")
      .select(`
        *,
        service_slots(
          label,
          location,
          time
        )
      `)
      .order("service_date",{ascending:true}),

    db
      .from("service_attendance_metrics")
      .select("*"),

    db
      .from("service_roles")
      .select("*"),

    db
      .from("staff")
      .select("*"),

    db
      .from("hospitality_duty")
      .select("*")
  ]);

  const services =
    servicesRes.data || [];

  const attendance =
    attendanceRes.data || [];

  const roles =
    rolesRes.data || [];

  const staff =
    staffRes.data || [];

  const hospitality =
    hospitalityRes.data || [];

  /* =========================
     ATTENDANCE MAP
  ========================= */

  const attendanceMap =
    new Map(
      attendance.map(a => [
        String(a.service_id),
        a
      ])
    );

  /* =========================
     SUMMARY
  ========================= */

  const totalAttendance =
    attendance.reduce((sum,a)=>

      sum +

      (a.onsite_count || 0) +
      (a.online_count || 0)

    ,0);

  document.getElementById("totalServices").innerText =
    services.length;

  document.getElementById("totalAttendance").innerText =
    totalAttendance;

  document.getElementById("totalAssignments").innerText =
    roles.length;

  document.getElementById("totalHospitality").innerText =
    hospitality.length;

  /* =========================
     STAFF ROLE METRICS
  ========================= */

  const staffMap =
    new Map(
      staff.map(s => [
        String(s.id),
        s.name
      ])
    );

  const roleMetrics = {};

  roles.forEach(r => {

    const staffName =
      staffMap.get(String(r.staff_id))
      || "Unknown";

    const key =
      `${staffName}||${r.role}`;

    if(!roleMetrics[key]){

      roleMetrics[key] = {
        staff: staffName,
        role: r.role,
        count: 0
      };
    }

    roleMetrics[key].count++;
  });

  const roleRows =
    Object.values(roleMetrics)
      .sort((a,b)=>
        b.count - a.count
      );

  document.getElementById("staffRoleBody").innerHTML =

    roleRows.map(r => `

      <tr>

        <td>${r.staff}</td>

        <td>${r.role}</td>

        <td class="count">
          ${r.count}
        </td>

      </tr>

    `).join("");

  /* =========================
     HOSPITALITY METRICS
  ========================= */

  const leaderMetrics = {};

  hospitality.forEach(h => {

    const leader =
      (h.leader || "Unknown")
      .trim();

    if(!leaderMetrics[leader]){
      leaderMetrics[leader] = 0;
    }

    leaderMetrics[leader]++;
  });

  const hospitalityRows =

    Object.entries(leaderMetrics)

      .map(([leader,count]) => ({
        leader,
        count
      }))

      .sort((a,b)=>
        b.count - a.count
      );

  document.getElementById("hospitalityBody").innerHTML =

    hospitalityRows.map(r => `

      <tr>

        <td>${r.leader}</td>

        <td class="count">
          ${r.count}
        </td>

      </tr>

    `).join("");

  /* =========================
     CHART GROUPS
  ========================= */

  const grouped = {

  "Weekend MD": [],
  "Sunday Jurong": [],

  "Sunday MD": [],
  "Sunday 10.45AM": [],

  "Sunday 8.30AM": [],
  "Saturday 2.30PM": []
};

/* =========================
   TODAY
========================= */

const today = new Date();

today.setHours(0,0,0,0);
/* =========================
   MD DAILY TOTALS
========================= */

const mdTotals = {};
  
  const weekendTotals = {};
/* =========================
   CLASSIFY SERVICES
========================= */

services.forEach(service => {

  /* =========================
     FILTER FUTURE SERVICES
  ========================= */

  const serviceDate =
    new Date(service.service_date);

  serviceDate.setHours(0,0,0,0);

  if(serviceDate > today){
    return;
  }

  const slot =
    service.service_slots || {};

  const label =
    slot.label || "";

  const location =
    (slot.location || "")
      .toLowerCase();

  const attendance =
    attendanceMap.get(
      String(service.id)
    );

  /* =========================
     SKIP EMPTY ATTENDANCE
  ========================= */

  if(!attendance){
    return;
  }

  const onsite =
    attendance.onsite_count || 0;

  const online =
    attendance.online_count || 0;

  const total =
    onsite + online;

  /* =========================
     SKIP ZERO ATTENDANCE
  ========================= */

  if(total <= 0){
    return;
  }

  const item = {

    date: service.service_date,
    total
  };

  /* =========================
     SATURDAY 2.30PM
  ========================= */

  if(
    label === "Saturday Service"
  ){

    grouped["Saturday 2.30PM"]
  .push(item);

/* =========================
   DAILY MD
========================= */

const key = service.service_date;

if(!mdTotals[key]){
  mdTotals[key] = 0;
}

mdTotals[key] += total;

/* =========================
   WEEKEND MD
   Saturday contributes to
   NEXT SUNDAY
========================= */

const satDate =
  new Date(service.service_date);

const sundayDate =
  new Date(satDate);

sundayDate.setDate(
  satDate.getDate() + 1
);

const sundayKey =
  sundayDate
    .toISOString()
    .split("T")[0];

if(!weekendTotals[sundayKey]){
  weekendTotals[sundayKey] = 0;
}

weekendTotals[sundayKey] += total;
    
  }

  /* =========================
     SUNDAY 8.30AM
  ========================= */

  else if(
    label === "Sunday 8.30am"
  ){

    grouped["Sunday 8.30AM"]
  .push(item);

/* DAILY MD */

const key = service.service_date;

if(!mdTotals[key]){
  mdTotals[key] = 0;
}

mdTotals[key] += total;

/* WEEKEND MD */

if(!weekendTotals[key]){
  weekendTotals[key] = 0;
}

weekendTotals[key] += total;
  }

  /* =========================
     JURONG
  ========================= */

  else if(
    label === "Sunday Jurong"
  ){

    grouped["Sunday Jurong"]
      .push(item);
  }

  /* =========================
     SUNDAY 10.45AM
  ========================= */

  else if(
    label === "Sunday 10.45am"
  ){

    grouped["Sunday 10.45AM"]
  .push(item);

/* DAILY MD */

const key = service.service_date;

if(!mdTotals[key]){
  mdTotals[key] = 0;
}

mdTotals[key] += total;

/* WEEKEND MD */

if(!weekendTotals[key]){
  weekendTotals[key] = 0;
}

weekendTotals[key] += total;
  }
});

  /* =========================
   BUILD MD GROUP
========================= */

grouped["Sunday MD"] =

  Object.entries(mdTotals)

    .map(([date,total]) => ({

      date,
      total

    }))

    .sort((a,b)=>

      new Date(a.date) -
      new Date(b.date)
    );

  /* =========================
   BUILD WEEKEND MD GROUP
========================= */

grouped["Weekend MD"] =

  Object.entries(weekendTotals)

    .map(([date,total]) => ({

      date,
      total

    }))

    .sort((a,b)=>

      new Date(a.date) -
      new Date(b.date)
    );
  /* =========================
     RENDER CHARTS
  ========================= */

  const chartsContainer =
    document.getElementById(
      "chartsContainer"
    );

  chartsContainer.innerHTML = "";

  Object.entries(grouped)
    .forEach(([name,data],index)=>{

      if(data.length === 0){
        return;
      }

      const labels =
        data.map(d => d.date);

      const values =
        data.map(d => d.total);

      /* =========================
         SPC
      ========================= */

      const avg =
        values.reduce((a,b)=>a+b,0)
        / values.length;

      const variance =
        values.reduce((sum,v)=>

          sum + Math.pow(v-avg,2)

        ,0) / values.length;

      const stdDev =
        Math.sqrt(variance);

      const UCL =
        avg + (3 * stdDev);

      const LCL =
        Math.max(
          avg - (3 * stdDev),
          0
        );

      const canvasId =
        `chart_${index}`;

      chartsContainer.innerHTML += `

        <div class="chart-panel">

          <div class="chart-title">
            📈 ${name}
          </div>

          <canvas
            id="${canvasId}"
            height="120">
          </canvas>

        </div>
      `;

      setTimeout(()=>{

        const ctx =
          document.getElementById(canvasId);

        if(!ctx) return;

        new Chart(ctx, {

          type:"line",

          data:{

            labels,

            datasets:[

              {
                label:"Attendance",
                data:values,
                borderWidth:2,
                tension:0.3
              },

              {
                label:"Average",
                data:values.map(()=>avg),
                borderDash:[5,5],
                borderWidth:1
              },

              {
                label:"UCL",
                data:values.map(()=>UCL),
                borderDash:[10,5],
                borderWidth:1
              },

              {
                label:"LCL",
                data:values.map(()=>LCL),
                borderDash:[10,5],
                borderWidth:1
              }
            ]
          },

          options:{

            responsive:true,

            plugins:{
              legend:{
                labels:{
                  color:"black"
                }
              }
            },

            scales:{

              x:{
                ticks:{
                  color:"black"
                }
              },

              y:{
                ticks:{
                  color:"black"
                }
              }
            }
          }
        });

      },50);
    });
}

load();

</script>

</body>
</html>
