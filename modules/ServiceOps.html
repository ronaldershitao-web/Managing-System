<!DOCTYPE html>
<html>
<head>
  <title>Staff Master</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module">
    import { db } from "../assets/app.js";

    let people = [];
    let staff = [];

    async function load() {

      const [p, s] = await Promise.all([
        db.from("people").select("*"),
        db.from("staff").select("*")
      ]);

      people = p.data || [];
      staff = s.data || [];

      render();
    }

    /* ---------------- CREATE STAFF ---------------- */

    async function createStaff(personId) {

      const role = prompt("Role (Worship Leader / Media / Usher / etc.)");
      if (!role) return;

      const department = prompt("Department (default: Worship Service)") || "Worship Service";

      const communion = confirm("Eligible for Communion serving?");

      await db.from("staff").insert([{
        person_id: personId,
        role,
        department,
        is_active: true,
        communion_eligible: communion
      }]);

      load();
    }

    /* ---------------- UPDATE STAFF ---------------- */

    async function updateStaff(id) {

      const role = prompt("New role?");
      const communion = confirm("Toggle Communion eligibility?");

      await db.from("staff")
        .update({
          role,
          communion_eligible: communion
        })
        .eq("id", id);

      load();
    }

    /* ---------------- RENDER ---------------- */

    function render() {

      const container = document.getElementById("list");

      container.innerHTML = people.map(p => {

        const s = staff.find(x => x.person_id === p.id);

        return `
          <div class="card">

            <b>${p.name}</b>
            <div style="font-size:12px;color:#94a3b8;">📞 ${p.phone || "-"}</div>

            ${s ? `
              <div style="margin-top:8px;font-size:12px;">
                🧭 Role: <b>${s.role}</b><br>
                🏢 Dept: ${s.department}<br>
                🍷 Communion: <b>${s.communion_eligible ? "YES" : "NO"}</b><br>
                Status: ${s.is_active ? "Active" : "Inactive"}
              </div>

              <button onclick="updateStaff('${s.id}')" style="margin-top:8px;">
                Edit Staff
              </button>

            ` : `
              <button onclick="createStaff('${p.id}')" style="margin-top:8px;">
                + Add to Staff
              </button>
            `}

          </div>
        `;
      }).join("");
    }

    window.createStaff = createStaff;
    window.updateStaff = updateStaff;
    window.onload = load;

  </script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      font-size:16px;
      font-weight:bold;
    }

    .grid {
      padding:10px;
    }

    .card {
      background:#111827;
      border:1px solid #1f2937;
      padding:12px;
      border-radius:10px;
      margin-bottom:10px;
    }

    button {
      padding:6px 10px;
      background:#2563eb;
      border:none;
      color:white;
      border-radius:6px;
      font-size:12px;
      cursor:pointer;
    }
  </style>

</head>

<body>

<header>
  👥 Staff Master Data
</header>

<div class="grid">
  <div id="list"></div>
</div>

</body>
</html>
