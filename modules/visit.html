<!DOCTYPE html>
<html>
<head>
  <title>Visit Cockpit</title>

  <script type="module">
    import { db } from "../assets/app.js";

    let groups = [];
    let members = [];
    let peopleMap = {};
    let currentGroup = null;
    let currentVisit = null;

    // ---------------- LOAD GROUPS ----------------
    async function loadGroups() {

      const { data } = await db.from("groups").select("*");
      groups = data || [];

      const sel = document.getElementById("groupSelect");

      sel.innerHTML = `<option value="">Select Cell</option>`;

      groups.forEach(g => {
        const opt = document.createElement("option");
        opt.value = g.id;
        opt.textContent = g.name;
        sel.appendChild(opt);
      });

      sel.onchange = () => {
        currentGroup = sel.value;
        loadPeople();
      };
    }

    // ---------------- LOAD PEOPLE (FIXED JOIN) ----------------
    async function loadPeople() {

      const { data } = await db
        .from("group_members")
        .select("id, person_id, people:people(*)")
        .eq("group_id", currentGroup);

      members = data || [];

      // map for fast lookup
      peopleMap = {};
      members.forEach(m => {
        peopleMap[m.person_id] = m.people;
      });

      renderPeople();
    }

    // ---------------- RENDER PEOPLE ----------------
    function renderPeople() {

      const container = document.getElementById("peopleList");

      container.innerHTML = members.map((m, i) => {

        const p = m.people;

        return `
          <div class="person">
            <b>${p?.name || "Unknown"}</b>

            <div class="row">
              <input id="a-${m.person_id}" placeholder="Attendance">
              <input id="e-${m.person_id}" placeholder="Engagement">
              <input id="p-${m.person_id}" placeholder="Participation">
              <input id="l-${m.person_id}" placeholder="Alignment">

              <button onclick="save('${m.person_id}')">Save</button>
            </div>
          </div>
        `;
      }).join("");
    }

    // ---------------- START VISIT ----------------
    window.startVisit = async function () {

      const date = document.getElementById("visitDate").value;
      const notes = document.getElementById("notes").value;

      const { data, error } = await db
        .from("cell_visit_sessions")
        .insert([{
          group_id: currentGroup,
          visit_date: date,
          notes
        }])
        .select();

      if (error) return alert(error.message);

      currentVisit = data[0].id;

      document.getElementById("visitStatus").innerText =
        "Visit started ✔";
    };

    // ---------------- SAVE SCORE ----------------
    window.save = async function (personId) {

      const attendance = +document.getElementById(`a-${personId}`).value || 0;
      const engagement = +document.getElementById(`e-${personId}`).value || 0;
      const participation = +document.getElementById(`p-${personId}`).value || 0;
      const alignment = +document.getElementById(`l-${personId}`).value || 0;

      const { error } = await db
        .from("cell_visit_person_scores")
        .insert([{
          visit_session_id: currentVisit,
          person_id: personId,
          attendance_score: attendance,
          engagement_score: engagement,
          participation_score: participation,
          alignment_score: alignment
        }]);

      if (error) return alert(error.message);

      calculateHealth();
    };

    // ---------------- HEALTH CALC ----------------
    async function calculateHealth() {

      const { data } = await db
        .from("cell_visit_person_scores")
        .select("*")
        .eq("visit_session_id", currentVisit);

      if (!data?.length) return;

      let total = 0;

      data.forEach(p => {
        total += (
          p.attendance_score +
          p.engagement_score +
          p.participation_score +
          p.alignment_score
        ) / 4;
      });

      const avg = total / data.length;
      const percent = (avg * 25).toFixed(1); // max 4 per field

      document.getElementById("health").innerText =
        percent + "%";
    }

    // INIT
    window.onload = loadGroups;

  </script>

  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
      padding:20px;
    }

    .card {
      background:#111827;
      padding:15px;
      border-radius:10px;
      margin-top:15px;
      border:1px solid #1f2937;
    }

    input, select, textarea {
      width:100%;
      margin:5px 0;
      padding:8px;
      border-radius:6px;
      background:#020617;
      border:1px solid #334155;
      color:white;
    }

    .row {
      display:grid;
      grid-template-columns:repeat(4,1fr) 80px;
      gap:5px;
      margin-top:5px;
    }

    .person {
      border-bottom:1px solid #1f2937;
      padding:8px 0;
    }

    button {
      padding:6px;
      background:#2563eb;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    .health {
      font-size:20px;
      font-weight:bold;
      margin-top:10px;
    }
  </style>

</head>

<body>

<h2>🧭 Visit Cockpit</h2>

<div class="card">
  <select id="groupSelect"></select>
</div>

<div class="card">
  <input type="date" id="visitDate">
  <textarea id="notes" placeholder="Notes"></textarea>
  <button onclick="startVisit()">Start Visit</button>
  <div id="visitStatus"></div>
</div>

<div class="card">
  <h3>People</h3>
  <div id="peopleList"></div>
</div>

<div class="card">
  <h3>Cell Health</h3>
  <div class="health" id="health">--</div>
</div>

</body>
</html>
