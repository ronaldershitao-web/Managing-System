<!DOCTYPE html>
<html>
<head>
  <title>Staff Service Availability</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b1220;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .panel {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      height:85vh;
      overflow-y:auto;
    }

    .card {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    .selected {
      border:2px solid #3b82f6;
    }

    .slot {
      background:#1f2937;
      padding:8px;
      border-radius:6px;
      margin-top:5px;
      font-size:13px;
    }

    button {
      width:100%;
      padding:8px;
      margin-top:6px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#3b82f6;
      color:white;
    }

    .danger {
      background:#ef4444;
    }
  </style>
</head>

<body>

<header>
  📅 Staff Service Availability (Service-Level Engine)
</header>

<div class="grid">

  <!-- STAFF -->
  <div class="panel">
    <h3>Staff</h3>
    <div id="staffList"></div>
  </div>

  <!-- SERVICES -->
  <div class="panel">
    <h3>Services</h3>
    <div id="serviceList"></div>

    <button onclick="markUnavailable()">
      Mark Unavailable for Selected Service
    </button>
  </div>

  <!-- AVAILABILITY -->
  <div class="panel">
    <h3>Unavailable Records</h3>
    <div id="availabilityList"></div>
  </div>

</div>

<script type="module">
import { db } from "../assets/app.js";

let selectedStaff = null;
let selectedService = null;

/* ---------------- LOAD STAFF ---------------- */

async function loadStaff() {
  const { data } = await db.from("staff").select("*");

  const box = document.getElementById("staffList");
  box.innerHTML = "";

  (data || []).forEach(s => {
    box.innerHTML += `
      <div class="card ${selectedStaff?.id === s.id ? 'selected' : ''}"
           onclick="selectStaff('${s.id}','${s.name}')">
        <b>${s.name}</b>
      </div>
    `;
  });
}

window.selectStaff = (id, name) => {
  selectedStaff = { id, name };
  loadStaff();
  loadAvailability();
};

/* ---------------- LOAD SERVICES ---------------- */

async function loadServices() {
  const { data } = await db.from("services").select("*");

  const box = document.getElementById("serviceList");
  box.innerHTML = "";

  (data || []).forEach(s => {
    box.innerHTML += `
      <div class="card ${selectedService?.id === s.id ? 'selected' : ''}"
           onclick="selectService('${s.id}','${s.title}')">
        <b>${s.title}</b><br>
        ${s.service_date || ''}
      </div>
    `;
  });
}

window.selectService = (id, title) => {
  selectedService = { id, title };
  loadServices();
};

/* ---------------- MARK UNAVAILABLE ---------------- */

window.markUnavailable = async () => {

  if (!selectedStaff || !selectedService) {
    alert("Select staff + service first");
    return;
  }

  // prevent duplicate
  const { data: existing } = await db
    .from("staff_service_unavailability")
    .select("*")
    .eq("staff_id", selectedStaff.id)
    .eq("service_id", selectedService.id);

  if (existing && existing.length > 0) {
    alert("Already marked unavailable");
    return;
  }

  await db.from("staff_service_unavailability").insert([{
    staff_id: selectedStaff.id,
    service_id: selectedService.id,
    type: "UNAVAILABLE",
    reason: "Marked via UI"
  }]);

  loadAvailability();
};

/* ---------------- LOAD UNAVAILABLE ---------------- */

async function loadAvailability() {

  const box = document.getElementById("availabilityList");
  box.innerHTML = "";

  if (!selectedStaff) return;

  const { data } = await db
    .from("staff_service_unavailability")
    .select("*, services(title, service_date)")
    .eq("staff_id", selectedStaff.id);

  (data || []).forEach(a => {
    box.innerHTML += `
      <div class="slot">
        <b>${a.services?.title || '-'}</b><br>
        ${a.services?.service_date || ''}

        <button class="danger"
          onclick="remove('${a.id}')">
          Remove
        </button>
      </div>
    `;
  });
}

/* ---------------- DELETE ---------------- */

window.remove = async (id) => {
  await db.from("staff_service_unavailability").delete().eq("id", id);
  loadAvailability();
};

loadStaff();
loadServices();

</script>

</body>
</html>
