<!DOCTYPE html>
<html>
<head>
  <title>Service Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b1220;
      color:white;
    }

    header {
      padding:12px;
      background:#111827;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .panel {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:10px;
      height:85vh;
      overflow-y:auto;
    }

    input, select {
      width:100%;
      padding:8px;
      margin:6px 0;
      border-radius:6px;
      border:1px solid #334155;
      background:#0f172a;
      color:white;
    }

    button {
      width:100%;
      padding:8px;
      margin-top:6px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#3b82f6;
      color:white;
    }

    .card {
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    .selected {
      border:2px solid #3b82f6;
    }

    .tag {
      font-size:11px;
      padding:2px 6px;
      background:#1f2937;
      border-radius:6px;
    }
  </style>
</head>

<body>

<header>
  ⛪ Service Builder (with Communion Logic)
</header>

<div class="grid">

  <!-- CREATE SERVICE -->
  <div class="panel">
    <h3>Create Service</h3>

    <input id="title" placeholder="Service Title">
    <input type="date" id="service_date">

    <label>
      <input type="checkbox" id="is_communion">
      Holy Communion Service
    </label>

    <button onclick="createService()">+ Create Service</button>

    <hr>

    <h3>Existing Services</h3>
    <div id="serviceList"></div>
  </div>

  <!-- TEMPLATE ROLES -->
  <div class="panel">
    <h3>Template Roles</h3>
    <div id="roleList"></div>
  </div>

</div>

<script type="module">
import { db } from "../assets/app.js";

let selectedService = null;

/* ---------------- CREATE SERVICE ---------------- */

window.createService = async () => {

  const title = document.getElementById("title").value;
  const service_date = document.getElementById("service_date").value;
  const is_communion = document.getElementById("is_communion").checked;

  if (!title || !service_date) return;

  await db.from("services").insert([{
    title,
    service_date,
    is_communion
  }]);

  document.getElementById("title").value = "";

  loadServices();
};

/* ---------------- LOAD SERVICES ---------------- */

async function loadServices() {

  const { data } = await db.from("services").select("*").order("service_date", { ascending: false });

  const box = document.getElementById("serviceList");
  box.innerHTML = "";

  (data || []).forEach(s => {

    box.innerHTML += `
      <div class="card ${selectedService?.id === s.id ? 'selected' : ''}"
           onclick="selectService('${s.id}')">

        <b>${s.title}</b><br>

        <span class="tag">
          ${s.is_communion ? "🕊 Communion" : "Standard"}
        </span><br>

        ${s.service_date}
      </div>
    `;
  });
}

/* ---------------- SELECT SERVICE ---------------- */

window.selectService = async (id) => {
  selectedService = { id };
  loadServices();
  loadRoles();
};

/* ---------------- LOAD ROLES (with communion filter) ---------------- */

async function loadRoles() {

  if (!selectedService) return;

  const { data } = await db
    .from("service_template_roles")
    .select("*")
    .order("created_at", { ascending: true });

  const box = document.getElementById("roleList");
  box.innerHTML = "";

  (data || []).forEach(r => {

    const disabled = r.is_communion_role ? "🕊 Communion Role" : "Standard Role";

    box.innerHTML += `
      <div class="card">
        <b>${r.role}</b><br>
        <span class="tag">${disabled}</span>
      </div>
    `;
  });
}

loadServices();

</script>

</body>
</html>
