<!DOCTYPE html>
<html>
<head>
  <title>Groups</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; }
h2 { padding:15px; }

.card {
  background:#111827;
  padding:14px;
  margin:12px;
  border-radius:10px;
  border:1px solid #1f2937;
}

select, button {
  margin:5px 0;
  padding:6px;
  border-radius:6px;
  border:1px solid #334155;
  background:#020617;
  color:white;
}

.member {
  margin-left:20px;
  padding:6px;
  border-left:2px solid #334155;
}
</style>
</head>

<body>

<h2>🏠 Groups (Tree View)</h2>

<div id="groups"></div>

<script type="module">
import { db } from "../assets/app.js";

const container = document.getElementById("groups");

async function load() {

  const { data: groups } = await db.from("groups").select("*");

  const { data: members } = await db
    .from("group_members")
    .select("*, people(*)");

  const { data: people } = await db
    .from("people")
    .select("id, name");

  function getMembers(groupId) {
    return (members || []).filter(m => m.group_id === groupId);
  }

  // 🌳 TREE RENDER
  function renderTree(list, parentId = null) {

    const children = list.filter(m => {
      if (parentId === null) return !m.parent_member_id;
      return m.parent_member_id === parentId;
    });

    if (!children.length) return "";

    return children.map(m => `
      <div class="member">
        👤 ${m.people?.name} 
        <small>(${m.role})</small>

        ${renderTree(list, m.id)}
      </div>
    `).join("");
  }

  container.innerHTML = (groups || []).map(g => {

    const list = getMembers(g.id);

    return `
      <div class="card">

        <h3>🏠 ${g.name}</h3>
        <small>📍 ${g.location || "-"} | Day: ${g.meeting_day ?? "-"}</small>

        <hr>

        <b>🌳 Structure</b>
        ${renderTree(list)}

        <hr>

        <!-- ADD MEMBER -->
        <select id="person-${g.id}">
          ${(people || []).map(p => `
            <option value="${p.id}">${p.name}</option>
          `).join("")}
        </select>

        <select id="role-${g.id}">
          <option value="member">Member</option>
          <option value="sub_leader">Sub Leader</option>
          <option value="co_leader">Co Leader</option>
          <option value="leader">Leader</option>
        </select>

        <!-- REPORTING TO -->
        <select id="parent-${g.id}">
          <option value="">Top Level (Leader)</option>
          ${list.map(m => `
            <option value="${m.id}">
              ${m.people?.name} (${m.role})
            </option>
          `).join("")}
        </select>

        <button onclick="addToGroup('${g.id}')">➕ Add</button>

      </div>
    `;
  }).join("");
}

/**
 * ADD MEMBER WITH REPORTING
 */
window.addToGroup = async function (groupId) {

  const person_id = document.getElementById(`person-${groupId}`).value;
  const role = document.getElementById(`role-${groupId}`).value;
  const parent_member_id =
    document.getElementById(`parent-${groupId}`).value || null;

  const { error } = await db
    .from("group_members")
    .insert([{
      group_id: groupId,
      person_id,
      role,
      parent_member_id
    }]);

  if (error) return alert(error.message);

  location.reload();
};

load();
</script>

</body>
</html>
