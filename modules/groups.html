<!DOCTYPE html>
<html>
<head>
  <title>Groups</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; }
h2 { padding:15px; }

.card {
  background:#111827;
  padding:14px;
  margin:12px;
  border-radius:10px;
  border:1px solid #1f2937;
}

select, button {
  margin:5px 0;
  padding:6px;
  border-radius:6px;
  border:1px solid #334155;
  background:#020617;
  color:white;
}

.section { margin-top:10px; }

.member-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#020617;
  padding:6px;
  margin:4px 0;
  border-radius:6px;
}

.metrics {
  margin-top:10px;
  font-size:13px;
  color:#94a3b8;
}
</style>
</head>

<body>

<h2>🏠 Groups</h2>
<div id="groups"></div>

<script type="module">
import { db } from "../assets/app.js";

const container = document.getElementById("groups");

async function load() {

  const { data: groups, error: gErr } = await db.from("groups").select("*");
  if (gErr) return alert("Groups error: " + gErr.message);

  const { data: members, error: mErr } = await db
    .from("group_members")
    .select("id, role, group_id, people:people_enriched(*)");

  if (mErr) return alert("Members error: " + mErr.message);

  const { data: people, error: pErr } = await db
    .from("people")
    .select("id, name");

  if (pErr) return alert("People error: " + pErr.message);

  function getMembers(groupId) {
    return (members || []).filter(m => m.group_id === groupId);
  }

  function getStats(list) {

    const total = list.length;

    const ages = list
      .map(m => m.people?.computed_age)
      .filter(a => a != null)
      .sort((a,b)=>a-b);

    const avg = ages.length
      ? Math.round(ages.reduce((a,b)=>a+b,0)/ages.length)
      : "-";

    const min = ages[0] ?? "-";
    const max = ages[ages.length-1] ?? "-";

    const median = ages.length
      ? (ages.length % 2
          ? ages[Math.floor(ages.length/2)]
          : Math.round((ages[ages.length/2 -1] + ages[ages.length/2]) / 2)
        )
      : "-";

    const married = list.filter(m => m.people?.marital_status === "married").length;
    const single = list.filter(m => m.people?.marital_status === "single").length;

    return { total, avg, min, max, median, married, single };
  }

  function renderList(list) {

    if (!list.length) return `<i style="color:#64748b;">None</i>`;

    return list.map(m => `
      <div class="member-row">

        <div>
          ${m.people?.name || "Unknown"}
          <br>
          <small>
            ${m.role || "-"}
            ${m.people?.computed_age ? `| 🎂 ${m.people.computed_age}` : ""}
          </small>
        </div>

        <div>
          <select id="role-${m.id}">
            <option value="trainee" ${m.role==="trainee"?"selected":""}>Trainee</option>
            <option value="member" ${m.role==="member"?"selected":""}>Member</option>
            <option value="core" ${m.role==="core"?"selected":""}>Core</option>
            <option value="co_leader" ${m.role==="co_leader"?"selected":""}>Co-Leader</option>
            <option value="leader" ${m.role==="leader"?"selected":""}>Leader</option>
          </select>

          <button onclick="updateMember('${m.id}')">💾</button>
          <button onclick="removeMember('${m.id}')">❌</button>
        </div>

      </div>
    `).join("");
  }

  container.innerHTML = (groups || []).map(g => {

    const list = getMembers(g.id);
    const stats = getStats(list);

    return `
      <div class="card">

        <h3>🏠 ${g.name}</h3>
        <small>📍 ${g.location || "-"} | Day: ${g.meeting_day ?? "-"}</small>

        <hr>

        <div class="section"><b>👑 Leader</b>${renderList(list.filter(m=>m.role==="leader"))}</div>
        <div class="section"><b>🧑 Co-Leaders</b>${renderList(list.filter(m=>m.role==="co_leader"))}</div>
        <div class="section"><b>🌱 Core</b>${renderList(list.filter(m=>m.role==="core"))}</div>
        <div class="section"><b>👥 Members</b>${renderList(list.filter(m=>m.role==="member"))}</div>
        <div class="section"><b>🆕 Trainees</b>${renderList(list.filter(m=>m.role==="trainee"))}</div>

        <hr>

        <select id="person-${g.id}">
          ${(people || []).map(p => `<option value="${p.id}">${p.name}</option>`).join("")}
        </select>

        <select id="role-new-${g.id}">
          <option value="trainee">Trainee</option>
          <option value="member">Member</option>
          <option value="core">Core</option>
          <option value="co_leader">Co-Leader</option>
          <option value="leader">Leader</option>
        </select>

        <button onclick="addToGroup('${g.id}')">➕ Add</button>

        <hr>

        <div class="metrics">
          👥 ${stats.total}<br>
          🎂 Avg ${stats.avg} | Min ${stats.min} | Max ${stats.max} | Med ${stats.median}<br>
          💍 Married ${stats.married} | Single ${stats.single}
        </div>

      </div>
    `;
  }).join("");
}

/**
 * ADD
 */
window.addToGroup = async function (groupId) {

  const person_id = document.getElementById(`person-${groupId}`).value;
  const role = document.getElementById(`role-new-${groupId}`).value;

  const { error } = await db.from("group_members")
    .insert([{ group_id: groupId, person_id, role }]);

  if (error) return alert("Add error: " + error.message);

  await load();
};

/**
 * UPDATE (🔥 FIXED)
 */
window.updateMember = async function (id) {

  const role = document.getElementById(`role-${id}`).value;

  const { error } = await db.from("group_members")
    .update({ role })
    .eq("id", id);

  if (error) {
    alert("Update failed: " + error.message);
    return;
  }

  await load(); // 🔥 refresh UI properly
};

/**
 * DELETE
 */
window.removeMember = async function (id) {

  if (!confirm("Remove member?")) return;

  const { error } = await db.from("group_members")
    .delete()
    .eq("id", id);

  if (error) return alert("Delete error: " + error.message);

  await load();
};

load();
</script>

</body>
</html>
