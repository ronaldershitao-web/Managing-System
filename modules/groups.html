<!DOCTYPE html>
<html>
<head>
  <title>Groups</title>

  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
    }

    h2 {
      padding:15px;
    }

    .card {
      background:#111827;
      padding:12px;
      margin:10px;
      border-radius:8px;
      border:1px solid #1f2937;
    }

    .input-card {
      background:#111827;
      padding:12px;
      margin:10px;
      border-radius:8px;
      border:1px solid #1f2937;
    }

    input {
      padding:8px;
      width:70%;
      border-radius:6px;
      border:1px solid #334155;
      background:#0f172a;
      color:white;
    }

    button {
      padding:8px 12px;
      border-radius:6px;
      border:none;
      cursor:pointer;
      background:#2563eb;
      color:white;
    }

    button:hover {
      background:#1d4ed8;
    }

    .role-leader { color:#22c55e; font-weight:bold; }
    .role-co_leader { color:#f59e0b; }
    .role-member { color:#94a3b8; }

    .error {
      color:#ef4444;
      padding:10px;
    }
  </style>
</head>

<body>

<h2>🏠 Groups</h2>

<!-- 🔥 CREATE GROUP UI -->
<div class="input-card">
  <h3>Create Group</h3>

  <input id="groupName" placeholder="Enter group name" />
  <button onclick="createGroup()">➕ Add</button>
</div>

<!-- GROUP LIST -->
<div id="groups"></div>

<script type="module">
import { db } from "../assets/app.js";

const container = document.getElementById("groups");

/**
 * LOAD GROUPS FUNCTION (IMPORTANT FOR REFRESH)
 */
async function loadGroups() {

  const { data: groups, error: groupError } = await db
    .from("groups")
    .select("*");

  if (groupError) {
    container.innerHTML = `<div class="error">❌ ${groupError.message}</div>`;
    return;
  }

  const safeGroups = groups || [];

  container.innerHTML = safeGroups.map(g => `
    <div class="card">
      <h3>🏠 ${g.name || "Unnamed Group"}</h3>
    </div>
  `).join("");
}

/**
 * CREATE GROUP (GLOBAL ACCESS FOR BUTTON)
 */
window.createGroup = async function () {

  const name = document.getElementById("groupName").value.trim();

  if (!name) {
    alert("Group name required");
    return;
  }

  const { error } = await db
    .from("groups")
    .insert([{ name }]);

  if (error) {
    alert("Error: " + error.message);
    console.log(error);
    return;
  }

  document.getElementById("groupName").value = "";

  await loadGroups();
};

/**
 * INIT
 */
loadGroups();

</script>

</body>
</html>
