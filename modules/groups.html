<!DOCTYPE html>
<html>
<head>
  <title>Groups</title>

  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
    }

    h2 {
      padding:15px;
    }

    .card {
      background:#111827;
      padding:12px;
      margin:10px;
      border-radius:8px;
      border:1px solid #1f2937;
    }

    .role-leader {
      color:#22c55e;
      font-weight:bold;
    }

    .role-co_leader {
      color:#f59e0b;
    }

    .role-member {
      color:#94a3b8;
    }

    .error {
      color:#ef4444;
      padding:10px;
    }
  </style>
</head>

<body>

<h2>🏠 Groups</h2>

<div id="groups"></div>

<script type="module">
import { db } from "../assets/app.js";

const container = document.getElementById("groups");

/**
 * SAFE LOAD GROUPS
 */
const { data: groups, error: groupError } = await db
  .from("groups")
  .select("*");

/**
 * SHOW ERROR IF ANY
 */
if (groupError) {
  container.innerHTML = `
    <div class="error">
      ❌ Failed to load groups: ${groupError.message}
    </div>
  `;
  throw groupError;
}

/**
 * SAFE LOAD MEMBERS
 */
const { data: members, error: memberError } = await db
  .from("group_members")
  .select("*, people(name)");

if (memberError) {
  container.innerHTML = `
    <div class="error">
      ❌ Failed to load group members: ${memberError.message}
    </div>
  `;
  throw memberError;
}

/**
 * SAFE GUARDS
 */

const safeMembers = members || [];

 * GET MEMBERS FOR GROUP

}

/**
 * RENDER UI
 */
container.innerHTML = safeGroups.map(g => {

  const list = getMembers(g.id);

  return `
    <div class="card">
      <h3>🏠 ${g.name || "Unnamed Group"}</h3>

      ${list.length === 0
        ? `<i style="color:#64748b;">No members</i>`
        : list.map(m => `
            <div class="role-${m.role}">
              ${m.people?.name || "Unknown"} (${m.role})
            </div>
          `).join("")
      }
    </div>
  `;
}).join("");

</script>

</body>
</html>
