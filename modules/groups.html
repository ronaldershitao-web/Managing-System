<!DOCTYPE html>
<html>
<head>
  <title>Groups</title>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; margin:0; }
    h2 { padding:15px; }

    .card {
      background:#111827;
      padding:12px;
      margin:10px;
      border-radius:8px;
      border:1px solid #1f2937;
    }

    input, select {
      width:100%;
      margin:5px 0;
      padding:6px;
      border-radius:6px;
      border:1px solid #334155;
      background:#0f172a;
      color:white;
    }

    button {
      margin-top:5px;
      padding:6px 10px;
      border:none;
      border-radius:6px;
      background:#2563eb;
      color:white;
      cursor:pointer;
    }

    .metrics {
      margin-top:10px;
      font-size:13px;
      color:#94a3b8;
    }

    .role-leader { color:#22c55e; }
    .role-co_leader { color:#f59e0b; }
    .role-member { color:#94a3b8; }

  </style>
</head>

<body>

<h2>🏠 Groups</h2>

<!-- CREATE -->
<div class="card">
  <h3>Create Group</h3>
  <input id="groupName" placeholder="Group name">
  <input id="groupLocation" placeholder="Location">
  <select id="groupDay">
    <option value="">Select day</option>
    <option value="0">Sunday</option>
    <option value="1">Monday</option>
    <option value="2">Tuesday</option>
    <option value="3">Wednesday</option>
    <option value="4">Thursday</option>
    <option value="5">Friday</option>
    <option value="6">Saturday</option>
  </select>
  <button onclick="createGroup()">➕ Create</button>
</div>

<div id="groups"></div>

<script type="module">
import { db } from "../assets/app.js";

const container = document.getElementById("groups");

async function load() {

  const { data: groups } = await db.from("groups").select("*");

  const { data: members } = await db
    .from("group_members")
    .select("*, people:people_enriched(*)");

  const { data: people } = await db
    .from("people")
    .select("id, name");

  function getMembers(groupId) {
    return (members || []).filter(m => m.group_id === groupId);
  }

  /**
   * 🔥 ADVANCED STATS
   */
  function getStats(list) {

    const total = list.length;

    const leaders = list.filter(m => m.role === "leader");
    const coLeaders = list.filter(m => m.role === "co_leader");

    const core = list.filter(m => m.tier === "core");
    const normal = list.filter(m => m.tier === "member");

    const males = list.filter(m => m.people?.gender === "male").length;
    const females = list.filter(m => m.people?.gender === "female").length;

    const ages = list
      .map(m => m.people?.computed_age)
      .filter(a => a != null);

    const avgAge = ages.length
      ? Math.round(ages.reduce((a,b)=>a+b,0) / ages.length)
      : "-";

    const corePercent = total
      ? Math.round((core.length / total) * 100)
      : 0;

    return {
      total,
      leaders,
      coLeaders,
      core,
      normal,
      males,
      females,
      avgAge,
      corePercent
    };
  }

  container.innerHTML = (groups || []).map(g => {

    const list = getMembers(g.id);
    const stats = getStats(list);

    return `
      <div class="card">

        <h3>🏠 ${g.name}</h3>
        <small>📍 ${g.location || "-"} | Day: ${g.meeting_day ?? "-"}</small>

        <hr>

        <!-- 🔥 HIERARCHY -->
        <b>👑 Leader</b><br>
        ${stats.leaders.map(l => `• ${l.people?.name}`).join("<br>") || "<span style='color:red;'>None</span>"}

        <br><br>

        <b>🧑‍🤝‍🧑 Co-Leaders</b><br>
        ${stats.coLeaders.map(l => `• ${l.people?.name}`).join("<br>") || "<span style='color:#f59e0b;'>None</span>"}

        <br><br>

        <b>🌱 Core Members</b><br>
        ${stats.core.map(m => `• ${m.people?.name}`).join("<br>") || "<i>None</i>"}

        <br><br>

        <b>👥 Members</b><br>
        ${stats.normal.map(m => `• ${m.people?.name}`).join("<br>") || "<i>None</i>"}

        <hr>

        <!-- 🔥 ADD PERSON -->
        <select id="person-${g.id}">
          ${(people || []).map(p => `
            <option value="${p.id}">${p.name}</option>
          `).join("")}
        </select>

        <select id="role-${g.id}">
          <option value="member">Member</option>
          <option value="co_leader">Co-Leader</option>
          <option value="leader">Leader</option>
        </select>

        <select id="tier-${g.id}">
          <option value="member">Member</option>
          <option value="core">Core</option>
          <option value="trainee">Trainee</option>
        </select>

        <button onclick="addToGroup('${g.id}')">➕ Add</button>

        <hr>

        <!-- 🔥 METRICS -->
        <div class="metrics">
          👥 ${stats.total} | 🎂 ${stats.avgAge}<br>
          ♂ ${stats.males} | ♀ ${stats.females}<br>
          🌱 Core: ${stats.corePercent}%
        </div>

        <!-- 🔥 HEALTH FLAGS -->
        <div class="metrics" style="color:#f87171;">
          ${stats.total > 12 ? "⚠ Too many members<br>" : ""}
          ${stats.leaders.length === 0 ? "⚠ No leader<br>" : ""}
          ${stats.core.length === 0 ? "⚠ No core<br>" : ""}
        </div>

      </div>
    `;
  }).join("");
}

/**
 * ADD MEMBER WITH TIER
 */
window.addToGroup = async function (groupId) {

  const person_id = document.getElementById(`person-${groupId}`).value;
  const role = document.getElementById(`role-${groupId}`).value;
  const tier = document.getElementById(`tier-${groupId}`).value;

  const { error } = await db
    .from("group_members")
    .insert([{ group_id: groupId, person_id, role, tier }]);

  if (error) return alert(error.message);

  location.reload();
};

load();
</script>

</body>
</html>
