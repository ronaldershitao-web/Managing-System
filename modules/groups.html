<!DOCTYPE html>
<html>
<head>
  <title>Groups Dashboard (Hierarchy)</title>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; margin:0; }
    h2 { padding:15px; }

    .card {
      background:#111827;
      padding:14px;
      margin:12px;
      border-radius:10px;
      border:1px solid #1f2937;
    }

    select, button {
      margin:5px 0;
      padding:6px;
      border-radius:6px;
      border:1px solid #334155;
      background:#020617;
      color:white;
    }

    .member {
      background:#020617;
      padding:6px;
      margin-top:6px;
      border-radius:6px;
    }

    .tree {
      margin-left:10px;
      padding-left:10px;
      border-left:1px solid #334155;
    }

    .metrics {
      margin-top:10px;
      font-size:13px;
      color:#94a3b8;
    }
  </style>
</head>

<body>

<h2>🏠 Groups Dashboard (Hierarchy Mode)</h2>
<div id="groups"></div>

<script type="module">
import { db } from "../assets/app.js";

const container = document.getElementById("groups");

let groups = [];
let members = [];
let people = [];

/**
 * LOAD DATA
 */
async function fetchData() {

  const g = await db.from("groups").select("*");

  const m = await db.from("group_members")
    .select("id, group_id, role, person_id, reports_to, people:people_enriched(*)");

  const p = await db.from("people")
    .select("id, name, computed_age, marital_status");

  groups = g.data || [];
  members = m.data || [];
  people = p.data || [];

  render();
}

/**
 * BUILD TREE FROM reports_to
 */
function buildTree(list) {

  const map = new Map();
  const roots = [];

  list.forEach(m => {
    map.set(m.id, { ...m, children: [] });
  });

  map.forEach(node => {
    if (node.reports_to && map.has(node.reports_to)) {
      map.get(node.reports_to).children.push(node);
    } else {
      roots.push(node);
    }
  });

  return roots;
}

/**
 * RENDER TREE
 */
function renderTree(nodes, level = 0) {

  return nodes.map(n => `
    <div class="member" style="margin-left:${level * 15}px">

      <b>${n.people?.name || "Unknown"}</b>
      <small> (${n.role})</small>

      <div style="margin-top:5px;">
        <select id="role-${n.id}">
          <option value="trainee" ${n.role==="trainee"?"selected":""}>Trainee</option>
          <option value="member" ${n.role==="member"?"selected":""}>Member</option>
          <option value="core" ${n.role==="core"?"selected":""}>Core</option>
          <option value="co_leader" ${n.role==="co_leader"?"selected":""}>321 Leader</option>
          <option value="leader" ${n.role==="leader"?"selected":""}>Cell Leader</option>
        </select>

        <button onclick="updateMember('${n.id}')">💾</button>
        <button onclick="removeMember('${n.id}')">❌</button>
      </div>

      ${n.children?.length ? `
        <div class="tree">
          ${renderTree(n.children, level + 1)}
        </div>
      ` : ""}

    </div>
  `).join("");
}

/**
 * RENDER PAGE
 */
function render() {

  container.innerHTML = groups.map(g => {

    const list = members.filter(m => m.group_id === g.id);
    const tree = buildTree(list);

    return `
      <div class="card">

        <h3>🏠 ${g.name}</h3>
        <small>📍 ${g.location || "-"} | Day: ${g.meeting_day ?? "-"}</small>

        <hr>

        ${renderTree(tree)}

        <hr>

        <!-- ADD MEMBER -->
        <select id="person-${g.id}">
          ${people.map(p => `
            <option value="${p.id}">${p.name}</option>
          `).join("")}
        </select>

        <select id="role-new-${g.id}">
          <option value="trainee">Trainee</option>
          <option value="member">Member</option>
          <option value="core">Core</option>
          <option value="co_leader">321 Leader</option>
          <option value="leader">Cell Leader</option>
        </select>

        <select id="reports-${g.id}">
          <option value="">(Top Level - Cell Leader)</option>
          ${list.map(m => `
            <option value="${m.id}">
              ${m.people?.name || "Unknown"}
            </option>
          `).join("")}
        </select>

        <button onclick="addToGroup('${g.id}')">➕ Add</button>

      </div>
    `;
  }).join("");
}

/**
 * ADD MEMBER
 */
window.addToGroup = async function(groupId) {

  const person_id = document.getElementById(`person-${groupId}`).value;
  const role = document.getElementById(`role-new-${groupId}`).value;
  const reports_to = document.getElementById(`reports-${groupId}`).value || null;

    person_id,
    role,
    reports_to
  }]);

  if (error) return alert(error.message);

  fetchData();
};

/**
 * UPDATE MEMBER
 */
window.updateMember = async function(id) {

  const role = document.getElementById(`role-${id}`).value;

  const { error } = await db.from("group_members")
    .update({ role })
    .eq("id", id);

  if (error) return alert(error.message);

  fetchData();
};

/**
 * DELETE MEMBER
 */
window.removeMember = async function(id) {

  if (!confirm("Remove member?")) return;

  const { error } = await db.from("group_members")
    .delete()
    .eq("id", id);

  if (error) return alert(error.message);

  fetchData();
};

fetchData();

</script>

</body>
</html>
