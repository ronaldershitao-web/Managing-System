<!DOCTYPE html>
<html>
<head>
  <title>Groups Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
    }

    h2 { padding:15px; }

    .card {
      background:#111827;
      padding:14px;
      margin:12px;
      border-radius:10px;
      border:1px solid #1f2937;
    }

    select, button {
      margin:5px 0;
      padding:6px;
      border-radius:6px;
      border:1px solid #334155;
      background:#020617;
      color:white;
    }

    .section { margin-top:10px; }

    .member-row {
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#020617;
      padding:6px;
      margin:4px 0;
      border-radius:6px;
    }

    .metrics {
      margin-top:10px;
      font-size:13px;
      color:#94a3b8;
    }

    .badge {
      font-size:11px;
      padding:2px 6px;
      border-radius:4px;
      background:#1e293b;
      margin-left:6px;
    }

    .leader { color:#22c55e; }
    .co_leader { color:#f59e0b; }
    .core { color:#38bdf8; }
    .member { color:#94a3b8; }
    .trainee { color:#64748b; }
  </style>
</head>

<body>

<h2>🏠 Groups Dashboard</h2>

<div id="groups"></div>

<script type="module">
import { db } from "../assets/app.js";

const container = document.getElementById("groups");

/**
 * LOAD DATA
 */
async function load() {

  const { data: groups } = await db
    .from("groups")
    .select("id, name, location, meeting_day");

  const { data: members } = await db
    .from("group_members")
    .select(`
      id,
      role,
      group_id,
      reports_to,
      people:people_enriched(id,name,computed_age,marital_status)
    `);

  if (!groups || !members) {
    container.innerHTML = "Error loading data";
    return;
  }

  function getMembers(groupId) {
    return members.filter(m => m.group_id === groupId);
  }

  /**
   * STATS ENGINE
   */
  function getStats(list) {

    const ages = list
      .map(m => m.people?.computed_age)
      .filter(Boolean)
      .sort((a,b)=>a-b);

    const avg = ages.length
      ? Math.round(ages.reduce((a,b)=>a+b,0)/ages.length)
      : 0;

    const min = ages.length ? ages[0] : 0;
    const max = ages.length ? ages.at(-1) : 0;

    const median = ages.length
      ? (ages.length % 2
          ? ages[Math.floor(ages.length/2)]
          : Math.round((ages[ages.length/2 -1] + ages[ages.length/2]) / 2)
        )
      : 0;

    const married = list.filter(m => m.people?.marital_status === "married").length;
    const single = list.filter(m => m.people?.marital_status === "single").length;

    const leaders = list.filter(m => m.role === "leader");
    const coLeaders = list.filter(m => m.role === "co_leader");
    const cores = list.filter(m => m.role === "core");

    const health =
      (leaders.length ? 30 : 0) +
      (coLeaders.length ? 20 : 0) +
      (cores.length > 0 ? 20 : 0) +
      (list.length >= 6 && list.length <= 12 ? 30 : 10);

    return {
      total: list.length,
      avg, min, max, median,
      married, single,
      leaders, coLeaders, cores,
      health
    };
  }

  /**
   * RENDER MEMBERS
   */
  function render(list) {

    if (!list.length) return `<i style="color:#64748b;">None</i>`;

    return list.map(m => `
      <div class="member-row">

        <div>
          ${m.people?.name || "Unknown"}
          <span class="badge ${m.role}">${m.role}</span>
          ${m.people?.computed_age ? ` | 🎂 ${m.people.computed_age}` : ""}
        </div>

        <div>
          <select id="role-${m.id}">
            <option value="trainee" ${m.role==="trainee"?"selected":""}>Trainee</option>
            <option value="member" ${m.role==="member"?"selected":""}>Member</option>
            <option value="core" ${m.role==="core"?"selected":""}>Core</option>
            <option value="co_leader" ${m.role==="co_leader"?"selected":""}>Co-Leader</option>
            <option value="leader" ${m.role==="leader"?"selected":""}>Leader</option>
          </select>

          <button onclick="updateMember('${m.id}')">💾</button>
          <button onclick="removeMember('${m.id}')">❌</button>
        </div>

      </div>
    `).join("");
  }

  /**
   * BUILD UI
   */
  container.innerHTML = (groups || []).map(g => {

    const list = getMembers(g.id);
    const stats = getStats(list);

    return `
      <div class="card">

        <h3>🏠 ${g.name}</h3>
        <small>📍 ${g.location || "-"} | Day: ${g.meeting_day ?? "-"}</small>

        <hr>

        <div class="section"><b>👑 Leaders</b>${render(stats.leaders)}</div>
        <div class="section"><b>🧑 Co-Leaders</b>${render(stats.coLeaders)}</div>
        <div class="section"><b>🌱 Core Members</b>${render(stats.cores)}</div>

        <hr>

        <div class="metrics">
          👥 Total: ${stats.total} <br>
          🎂 Avg: ${stats.avg} | Min: ${stats.min} | Max: ${stats.max} | Median: ${stats.median}<br>
          💍 Married: ${stats.married} | Single: ${stats.single}<br>
          ❤️ Health Score: ${stats.health}/100
        </div>

        <hr>

        <!-- ADD MEMBER -->
        <select id="person-${g.id}">
          ${(await db.from("people").select("id,name")).data
            .map(p => `<option value="${p.id}">${p.name}</option>`).join("")}
        </select>

        <select id="role-new-${g.id}">
          <option value="trainee">Trainee</option>
          <option value="member">Member</option>
          <option value="core">Core</option>
          <option value="co_leader">Co-Leader</option>
          <option value="leader">Leader</option>
        </select>

        <button onclick="addToGroup('${g.id}')">➕ Add</button>

      </div>
    `;
  }).join("");
}

/**
 * ADD MEMBER
 */
window.addToGroup = async function (groupId) {

  const person_id = document.getElementById(`person-${groupId}`).value;
  const role = document.getElementById(`role-new-${groupId}`).value;

  const { error } = await db.from("group_members")
    .insert([{ group_id: groupId, person_id, role }]);

  if (error) return alert(error.message);

  await load();
};

/**
 * UPDATE MEMBER
 */
window.updateMember = async function (id) {

  const role = document.getElementById(`role-${id}`).value;

  const { error } = await db.from("group_members")
    .update({ role })
    .eq("id", id);

  if (error) return alert(error.message);

  await load();
};

/**
 * DELETE MEMBER
 */
window.removeMember = async function (id) {

  if (!confirm("Remove member?")) return;

  const { error } = await db.from("group_members")
    .delete()
    .eq("id", id);

  if (error) return alert(error.message);

  await load();
};

load();

</script>

</body>
</html>
