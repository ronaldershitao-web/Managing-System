<!DOCTYPE html>

<html>
<head>
  <title>Command Center</title>

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }

    header {
      padding:15px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .card {
      background:#111827;
      padding:12px;
      border-radius:8px;
      border:1px solid #1f2937;
      margin-bottom:10px;
    }

    h3 { margin-top:0; }
    small { color:#94a3b8; }

    .good { color:#22c55e; }
    .warn { color:#f59e0b; }
    .bad  { color:#ef4444; }
  </style>

  <script type="module">
    import { db } from "./assets/app.js";

    async function load() {

      const [
        peopleRes,
        groupsRes,
        membersRes,
        priorityRes,
        scoresRes
      ] = await Promise.all([
        db.from("people").select("*"),
        db.from("groups").select("*"),
        db.from("group_members").select("id, group_id, person_id"),
        db.from("people_priority_engine").select("*"),
        db.from("cell_visit_person_scores")
          .select("person_id, group_id, attendance_score, engagement_score, participation_score, alignment_score, people(name)")
      ]);

      const people = peopleRes.data || [];
      const groups = groupsRes.data || [];
      const members = membersRes.data || [];
      const priority = priorityRes.data || [];
      const scores = scoresRes.data || [];

      renderPeople(scores);
      renderGroups(groups, members, scores);
      renderPriority(priority);
    }

    /* ---------------- 🧍 PEOPLE INTELLIGENCE (RESTORED) ---------------- */
    function renderPeople(scores) {

      if (!scores.length) return;

      const enriched = scores.map(p => {

        const score =
          (p.attendance_score * 0.25 +
           p.engagement_score * 0.30 +
           p.participation_score * 0.25 +
           p.alignment_score * 0.20);

        return {
          name: p.people?.name || "Unknown",
          percent: (score / 4) * 100
        };
      });

      enriched.sort((a,b)=>a.percent-b.percent);

      document.getElementById("people").innerHTML = `
        <div class="card">
          <h3>🧍 People Intelligence</h3>
          <small>Spiritual risk (bottom 5)</small>

          ${enriched.slice(0,5).map(p => `
            <div style="display:flex;justify-content:space-between;margin-top:6px;">
              <span>${p.name}</span>
              <b class="${p.percent<60?'bad':p.percent<80?'warn':'good'}">
                ${p.percent.toFixed(1)}%
              </b>
            </div>
          `).join("")}
        </div>
      `;
    }

    /* ---------------- 🏠 GROUP INTELLIGENCE (RESTORED 5-COLUMN MODEL) ---------------- */
    function renderGroups(groups, members, scores) {

      const enriched = groups.map(g => {

        const groupMembers = members.filter(m => m.group_id === g.id);
        const size = groupMembers.length;

        /* ---------- STRUCTURE CATEGORY ---------- */
        let category = "";
        let color = "";

        if (size < 8) {
          category = "Underflow";
          color = "#3b82f6";
        } else if (size <= 12) {
          category = "Healthy";
          color = "#22c55e";
        } else if (size <= 15) {
          category = "Stable";
          color = "#16a34a";
        } else if (size <= 19) {
          category = "Growth Pressure";
          color = "#f59e0b";
        } else {
          category = "Multiply Risk";
          color = "#ef4444";
        }

        /* ---------- SPIRITUAL HEALTH (AVG PERSON SCORE) ---------- */
        const groupScores = scores.filter(s =>
          groupMembers.some(m => m.person_id === s.person_id)
        );

        let spiritualHealth = null;

        if (groupScores.length) {

          spiritualHealth =
            groupScores.reduce((sum, p) => {

              const score =
                (p.attendance_score * 0.25 +
                 p.engagement_score * 0.30 +
                 p.participation_score * 0.25 +
                 p.alignment_score * 0.20);

              return sum + (score / 4) * 100;

            }, 0) / groupScores.length;
        }

        return {
          ...g,
          size,
          category,
          color,
          spiritualHealth
        };
      });

      function block(title, subtitle, color, list) {
        return `
          <div style="
            background:#0b1220;
            border:1px solid ${color};
            border-radius:10px;
            padding:10px;
            min-height:250px;
          ">

            <b style="color:${color};">${title}</b>
            <small style="display:block;color:#94a3b8;">${subtitle}</small>

            <hr style="border-color:#1f2937;">

            ${list.length === 0
              ? `<i style="color:#64748b;">No groups</i>`
              : list.map(g => `
                  <div style="
                    background:#111827;
                    padding:6px;
                    margin:6px 0;
                    border-radius:6px;
                  ">

                    <div style="display:flex;justify-content:space-between;">
                      <span>${g.name}</span>
                      <b>${g.size}</b>
                    </div>

                    <!-- 🧠 SPIRITUAL HEALTH (NEW BUT SUBTLE) -->
                    <div style="font-size:12px; margin-top:4px;">
                      Spiritual:
                      <b class="${
                        g.spiritualHealth<60?'bad':
                        g.spiritualHealth<80?'warn':'good'
                      }">
                        ${g.spiritualHealth
                          ? g.spiritualHealth.toFixed(1)+'%'
                          : 'No Data'}
                      </b>
                    </div>

                  </div>
                `).join("")
            }

          </div>
        `;
      }

      const underflow = enriched.filter(g => g.size < 8);
      const healthy = enriched.filter(g => g.size >= 8 && g.size <= 12);
      const stable = enriched.filter(g => g.size >= 13 && g.size <= 15);
      const growth = enriched.filter(g => g.size >= 16 && g.size <= 19);
      const multiply = enriched.filter(g => g.size >= 20);

      document.getElementById("groups").innerHTML = `
        <div class="card">
          <h3>🏠 Group Intelligence</h3>

          <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;">

            ${block("🔵 Underflow","<8","#3b82f6",underflow)}
            ${block("🟢 Healthy","8–12","#22c55e",healthy)}
            ${block("🟢 Stable","13–15","#16a34a",stable)}
            ${block("🟡 Growth","16–19","#f59e0b",growth)}
            ${block("🔴 Multiply","20+","#ef4444",multiply)}

          </div>
        </div>
      `;
    }

    /* ---------------- 🔥 PRIORITY ---------------- */
    function renderPriority(priority) {

      const sorted = [...priority]
        .sort((a,b)=>b.computed_priority_score-a.computed_priority_score);

      document.getElementById("priority").innerHTML = `
        <div class="card">
          <h3>🔥 Priority Engine</h3>

          ${sorted.slice(0,5).map(p => `
            <div style="display:flex;justify-content:space-between;">
              <span>${p.name}</span>
              <b>${Math.round(p.computed_priority_score||0)}</b>
            </div>
          `).join("")}
        </div>
      `;
    }

    window.onload = load;
  </script>

</head>

<body>

<header>
  🔥 Command Center
  <button onclick="location.href='index.html'">Home</button>
</header>

<div class="grid">

  <div id="people"></div>
  <div id="groups"></div>

  <div id="priority"></div>

</div>

</body>
</html>
