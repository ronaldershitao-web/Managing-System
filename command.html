<!DOCTYPE html>
<html>
<head>
  <title>Command Center</title>

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }

    header {
      padding:15px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .card {
      background:#111827;
      padding:12px;
      border-radius:8px;
      border:1px solid #1f2937;
      margin-bottom:10px;
    }

    h3 { margin-top:0; }
    small { color:#94a3b8; }

    .good { color:#22c55e; }
    .warn { color:#f59e0b; }
    .bad  { color:#ef4444; }

    .group-box {
      padding:8px;
      border-radius:6px;
      margin:6px 0;
      border:1px solid #1f2937;
    }
  </style>

  <script type="module">
    import { db } from "./assets/app.js";

    const IDEAL_MIN = 8;
    const IDEAL_MAX = 12;
    const CAPACITY_MAX = 20;

    async function load() {

      const [peopleRes, groupsRes, membersRes, priorityRes] = await Promise.all([
        db.from("people").select("*"),
        db.from("groups").select("*"),
        db.from("group_members").select("id, group_id, person_id"),
        db.from("people_priority_engine").select("*")
      ]);

      const people = peopleRes.data || [];
      const groups = groupsRes.data || [];
      const members = membersRes.data || [];
      const priority = priorityRes.data || [];

      renderPeople(people);
      renderGroups(groups, members);
      renderLeadership(groups, members);
      renderPriority(priority);
    }

    /* ---------------- PEOPLE ---------------- */
    function renderPeople(people) {

      const avg = people.length
        ? people.reduce((a,b)=>a + (b.computed_priority_score||0),0) / people.length
        : 0;

      document.getElementById("people").innerHTML = `
        <div class="card">
          <h3>🧍 People Intelligence</h3>

          <p>Total People: <b>${people.length}</b></p>
          <p>Avg Priority Score: <b>${avg.toFixed(2)}</b></p>

          <p class="good">System-wide engagement baseline</p>
        </div>
      `;
    }

    /* ---------------- GROUP CAPACITY ---------------- */
    function getCapacity(size) {

      if (size < IDEAL_MIN) {
        return { label:"🔵 Inject People", color:"warn" };
      }

      if (size <= IDEAL_MAX) {
        return { label:"🟢 Healthy", color:"good" };
      }

      if (size < 16) {
        return { label:"🟢 Stable", color:"good" };
      }

      if (size < CAPACITY_MAX) {
        return { label:"🟡 Multiplication Planning", color:"warn" };
      }

      return { label:"🔴 MUST MULTIPLY", color:"bad" };
    }

    /* ---------------- GROUPS ---------------- */
    function renderGroups(groups, members) {

  const enriched = groups.map(g => {
    const size = members.filter(m => m.group_id === g.id).length;
    return { ...g, size };
  });

  const underflow = enriched.filter(g => g.size < 8);
  const healthy = enriched.filter(g => g.size >= 8 && g.size <= 12);
  const stable = enriched.filter(g => g.size >= 13 && g.size <= 15);
  const prep = enriched.filter(g => g.size >= 16 && g.size < 20);
  const mustMultiply = enriched.filter(g => g.size >= 20);

  document.getElementById("groups").innerHTML = `
    <div class="card">

      <h3>🏠 Group Intelligence Spectrum</h3>

      <div style="display:grid; grid-template-columns:repeat(5, 1fr); gap:10px;">

        <!-- 🔵 UNDERFLOW -->
        <div style="background:#0b1220; padding:10px; border-radius:8px;">
          <h4 class="warn">🔵 Underflow</h4>
          <small>&lt; 8</small>
          <p><b>${underflow.length}</b></p>
          ${underflow.map(g => `
            <div>${g.name} (${g.size})</div>
          `).join("") || "<small>None</small>"}
        </div>

        <!-- 🟢 HEALTHY -->
        <div style="background:#0b1220; padding:10px; border-radius:8px;">
          <h4 class="good">🟢 Healthy</h4>
          <small>8–12</small>
          <p><b>${healthy.length}</b></p>
          ${healthy.map(g => `
            <div>${g.name} (${g.size})</div>
          `).join("") || "<small>None</small>"}
        </div>

        <!-- 🟢 STABLE -->
        <div style="background:#0b1220; padding:10px; border-radius:8px;">
          <h4 class="good">🟢 Stable</h4>
          <small>13–15</small>
          <p><b>${stable.length}</b></p>
          ${stable.map(g => `
            <div>${g.name} (${g.size})</div>
          `).join("") || "<small>None</small>"}
        </div>

        <!-- 🟡 PREP -->
        <div style="background:#0b1220; padding:10px; border-radius:8px;">
          <h4 class="warn">🟡 Prep</h4>
          <small>16–19</small>
          <p><b>${prep.length}</b></p>
          ${prep.map(g => `
            <div>${g.name} (${g.size})</div>
          `).join("") || "<small>None</small>"}
        </div>

        <!-- 🔴 MUST MULTIPLY -->
        <div style="background:#0b1220; padding:10px; border-radius:8px;">
          <h4 class="bad">🔴 Multiply</h4>
          <small>20+</small>
          <p><b>${mustMultiply.length}</b></p>
          ${mustMultiply.map(g => `
            <div>${g.name} (${g.size})</div>
          `).join("") || "<small>None</small>"}
        </div>

      </div>
    </div>
  `;
}

    /* ---------------- LEADERSHIP ---------------- */
    function renderLeadership(groups, members) {

      const loadMap = {};

      members.forEach(m => {
        loadMap[m.group_id] = (loadMap[m.group_id] || 0) + 1;
      });

      const loads = Object.values(loadMap);
      const max = loads.length ? Math.max(...loads) : 0;
      const min = loads.length ? Math.min(...loads) : 0;
      const avg = loads.length ? (loads.reduce((a,b)=>a+b,0)/loads.length).toFixed(1) : 0;

      document.getElementById("leaders").innerHTML = `
        <div class="card">

          <h3>🧭 Leadership Load</h3>

          <p>Max Load: <b>${max}</b></p>
          <p>Avg Load: <b>${avg}</b></p>

          <p class="warn">Groups without members: ${
            groups.filter(g => !loadMap[g.id]).length
          }</p>

        </div>
      `;
    }

    /* ---------------- PRIORITY ---------------- */
    function renderPriority(priority) {

      const sorted = [...priority]
        .sort((a,b)=>b.computed_priority_score - a.computed_priority_score);

      const top = sorted.slice(0,5);
      const bottom = sorted.slice(-5);

      document.getElementById("priority").innerHTML = `
        <div class="card">

          <h3>🔥 Priority Engine</h3>

          <h4>Top 5</h4>
          ${top.map(p => `
            <div><b>${p.name}</b> — ${Math.round(p.computed_priority_score||0)}</div>
          `).join("")}

          <hr>

          <h4>Bottom 5</h4>
          ${bottom.map(p => `
            <div>${p.name} — ${Math.round(p.computed_priority_score||0)}</div>
          `).join("")}

        </div>
      `;
    }

    window.onload = load;
  </script>
</head>

<body>

<header>
  🔥 Command Center
  <button onclick="location.href='index.html'">Home</button>
</header>

<div class="grid">

  <div id="people"></div>
  <div id="groups"></div>
  <div id="leaders"></div>
  <div id="priority"></div>

</div>

</body>
</html>
