<!DOCTYPE html>

<html>
<head>
  <title>Command Center</title>

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }

    header {
      padding:15px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .card {
      background:#111827;
      padding:12px;
      border-radius:8px;
      border:1px solid #1f2937;
      margin-bottom:10px;
    }

    h3 { margin-top:0; }
    small { color:#94a3b8; }

    .good { color:#22c55e; }
    .warn { color:#f59e0b; }
    .bad  { color:#ef4444; }
  </style>

  <script type="module">
    import { db } from "./assets/app.js";

    async function load() {

      const [
        peopleRes,
        groupsRes,
        membersRes,
        priorityRes,
        cellHealthRes,
        scoresRes
      ] = await Promise.all([
        db.from("people").select("*"),
        db.from("groups").select("*"),
        db.from("group_members").select("id, group_id, person_id"),
        db.from("people_priority_engine").select("*"),
        db.from("cell_spiritual_health").select("*").order("visit_session_id", { ascending:false }).limit(20),
        db.from("cell_visit_person_scores")
          .select("visit_session_id, person_id, people(name), attendance_score, engagement_score, participation_score, alignment_score")
      ]);

      const people = peopleRes.data || [];
      const groups = groupsRes.data || [];
      const members = membersRes.data || [];
      const priority = priorityRes.data || [];
      const cellHealth = cellHealthRes.data || [];
      const scores = scoresRes.data || [];

      renderPeopleIntelligence(scores);
      renderGroups(groups, members);
      renderCellHealth(cellHealth);
      renderLeadership(groups, members);
      renderPriority(priority);
    }

    /* ---------------- 🧍 PEOPLE INTELLIGENCE (SPIRITUAL RISK) ---------------- */
    function renderPeopleIntelligence(scores) {

      if (!scores.length) return;

      const latestVisit = scores
        .map(s => s.visit_session_id)
        .sort()
        .reverse()[0];

      const filtered = scores.filter(s => s.visit_session_id === latestVisit);

      const enriched = filtered.map(p => {

        const score =
          (p.attendance_score * 0.25 +
           p.engagement_score * 0.30 +
           p.participation_score * 0.25 +
           p.alignment_score * 0.20);

        return {
          name: p.people?.name || "Unknown",
          percent: (score / 4 * 100)
        };
      });

      enriched.sort((a,b) => a.percent - b.percent);

      document.getElementById("people").innerHTML = `
        <div class="card">
          <h3>🧍 People Intelligence (Spiritual Risk)</h3>

          <small>Bottom 5 needing attention</small>

          ${enriched.slice(0,5).map(p => {

            let cls = "good";
            if (p.percent < 60) cls = "bad";
            else if (p.percent < 80) cls = "warn";

            return `
              <div style="display:flex;justify-content:space-between;margin-top:6px;">
                <span>${p.name}</span>
                <b class="${cls}">${p.percent.toFixed(1)}%</b>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    /* ---------------- 🏠 GROUP INTELLIGENCE ---------------- */
    function renderGroups(groups, members) {

      const enriched = groups.map(g => {
        const size = members.filter(m => m.group_id === g.id).length;
        return { ...g, size };
      });

      const block = (title, color, list) => `
        <div style="background:#0b1220;border:1px solid ${color};border-radius:10px;padding:10px;min-height:180px;">
          <b style="color:${color};">${title}</b>
          <hr style="border-color:#1f2937;">
          ${list.length === 0
            ? `<i style="color:#64748b;">No groups</i>`
            : list.map(g => `
              <div style="display:flex;justify-content:space-between;background:#111827;margin:5px 0;padding:6px;border-radius:6px;">
                <span>${g.name}</span>
                <b>${g.size}</b>
              </div>
            `).join("")
          }
        </div>
      `;

      document.getElementById("groups").innerHTML = `
        <div class="card">
          <h3>🏠 Group Intelligence (Cell Structure)</h3>

          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
            ${block("🔵 Underflow <8","#3b82f6", enriched.filter(g=>g.size<8))}
            ${block("🟢 Healthy 8–12","#22c55e", enriched.filter(g=>g.size>=8 && g.size<=12))}
            ${block("🔴 Needs Multiplication 20+","#ef4444", enriched.filter(g=>g.size>=20))}
          </div>
        </div>
      `;
    }

    /* ---------------- 🧠 CELL SPIRITUAL HEALTH ---------------- */
    function renderCellHealth(cellHealth) {

      if (!cellHealth.length) return;

      const latest = cellHealth[0];

      let cls = "good";
      if (latest.health_percent < 60) cls = "bad";
      else if (latest.health_percent < 80) cls = "warn";

      document.getElementById("cellHealth").innerHTML = `
        <div class="card">
          <h3>🧠 Cell Spiritual Health</h3>

          <div style="font-size:34px;" class="${cls}">
            ${latest.health_percent}%
          </div>

          <small>${latest.people_count} people assessed</small>
        </div>
      `;
    }

    /* ---------------- 🧭 LEADERSHIP ---------------- */
    function renderLeadership(groups, members) {

      const map = {};

      members.forEach(m => {
        map[m.group_id] = (map[m.group_id] || 0) + 1;
      });

      const loads = Object.values(map);

      document.getElementById("leaders").innerHTML = `
        <div class="card">
          <h3>🧭 Leadership Load</h3>

          <p>Max: <b>${Math.max(...loads || [0])}</b></p>
          <p>Avg: <b>${(loads.reduce((a,b)=>a+b,0)/loads.length || 0).toFixed(1)}</b></p>
        </div>
      `;
    }

    /* ---------------- 🔥 PRIORITY ENGINE ---------------- */
    function renderPriority(priority) {

      const sorted = [...priority]
        .sort((a,b)=>b.computed_priority_score - a.computed_priority_score);

      document.getElementById("priority").innerHTML = `
        <div class="card">
          <h3>🔥 Priority Engine</h3>

          ${sorted.slice(0,5).map(p => `
            <div style="display:flex;justify-content:space-between;">
              <span>${p.name}</span>
              <b>${Math.round(p.computed_priority_score || 0)}</b>
            </div>
          `).join("")}
        </div>
      `;
    }

    window.onload = load;
  </script>

</head>

<body>

<header>
  🔥 Command Center
  <button onclick="location.href='index.html'">Home</button>
</header>

<div class="grid">

  <div id="people"></div>
  <div id="groups"></div>

  <div id="cellHealth"></div>
  <div id="leaders"></div>

  <div id="priority"></div>

</div>

</body>
</html>
