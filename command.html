<!DOCTYPE html>

<html>
<head>
  <title>Command Center</title>

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }

    header {
      padding:15px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .card {
      background:#111827;
      padding:12px;
      border-radius:8px;
      border:1px solid #1f2937;
      margin-bottom:10px;
    }

    h3 { margin-top:0; }
    small { color:#94a3b8; }

    .good { color:#22c55e; }
    .warn { color:#f59e0b; }
    .bad  { color:#ef4444; }
  </style>

  <script type="module">
    import { db } from "./assets/app.js";

    async function load() {

      const [
        peopleRes,
        groupsRes,
        membersRes,
        priorityRes,
        cellHealthRes,
        scoresRes
      ] = await Promise.all([
        db.from("people").select("*"),
        db.from("groups").select("*"),
        db.from("group_members").select("id, group_id, person_id"),
        db.from("people_priority_engine").select("*"),
        db.from("cell_spiritual_health").select("*"),
        db.from("cell_visit_person_scores")
          .select("visit_session_id, person_id, people(name), attendance_score, engagement_score, participation_score, alignment_score")
      ]);

      const people = peopleRes.data || [];
      const groups = groupsRes.data || [];
      const members = membersRes.data || [];
      const priority = priorityRes.data || [];
      const cellHealth = cellHealthRes.data || [];
      const scores = scoresRes.data || [];

      renderPeople(scores);
      renderGroups(groups, members, cellHealth);
      renderLeadership(groups, members);
      renderPriority(priority);
    }

    /* ---------------- 🧍 PEOPLE INTELLIGENCE ---------------- */
    function renderPeople(scores) {

      if (!scores.length) return;

      const latestVisit = scores
        .map(s => s.visit_session_id)
        .sort()
        .reverse()[0];

      const filtered = scores.filter(s => s.visit_session_id === latestVisit);

      const enriched = filtered.map(p => {

        const score =
          (p.attendance_score * 0.25 +
           p.engagement_score * 0.30 +
           p.participation_score * 0.25 +
           p.alignment_score * 0.20);

        return {
          name: p.people?.name || "Unknown",
          percent: (score / 4 * 100)
        };
      });

      enriched.sort((a,b) => a.percent - b.percent);

      document.getElementById("people").innerHTML = `
        <div class="card">
          <h3>🧍 People Intelligence (Spiritual Risk)</h3>

          <small>Bottom 5 requiring attention</small>

          ${enriched.slice(0,5).map(p => {

            let cls = "good";
            if (p.percent < 60) cls = "bad";
            else if (p.percent < 80) cls = "warn";

            return `
              <div style="display:flex;justify-content:space-between;margin-top:6px;">
                <span>${p.name}</span>
                <b class="${cls}">${p.percent.toFixed(1)}%</b>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    /* ---------------- 🏠 GROUP INTELLIGENCE (NOW INCLUDES CELL HEALTH) ---------------- */
    function renderGroups(groups, members, cellHealth) {

      const enriched = groups.map(g => {
        const size = members.filter(m => m.group_id === g.id).length;
        return { ...g, size };
      });

      const underflow = enriched.filter(g => g.size < 8);
      const healthy = enriched.filter(g => g.size >= 8 && g.size <= 12);
      const stable = enriched.filter(g => g.size >= 13 && g.size <= 15);
      const prep = enriched.filter(g => g.size >= 16 && g.size < 20);
      const mustMultiply = enriched.filter(g => g.size >= 20);

      /* ---------------- CELL HEALTH (INSIDE GROUP INTELLIGENCE) ---------------- */

      const grouped = {};

      cellHealth.forEach(c => {
        if (!grouped[c.group_id]) grouped[c.group_id] = { total:0, count:0 };
        grouped[c.group_id].total += c.health_percent;
        grouped[c.group_id].count += 1;
      });

      const averages = Object.values(grouped).map(v => v.total / v.count);

      const overallCellHealth =
        averages.length
          ? averages.reduce((a,b)=>a+b,0) / averages.length
          : 0;

      let cellCls = "good";
      if (overallCellHealth < 60) cellCls = "bad";
      else if (overallCellHealth < 80) cellCls = "warn";

      function block(title, subtitle, color, list) {
        return `
          <div style="background:#0b1220;border:1px solid ${color};border-radius:10px;padding:10px;min-height:180px;">
            <b style="color:${color};">${title}</b>
            <small style="display:block;color:#94a3b8;">${subtitle}</small>
            <hr style="border-color:#1f2937;">

            ${list.length === 0
              ? `<i style="color:#64748b;">No groups</i>`
              : list.map(g => `
                <div style="display:flex;justify-content:space-between;background:#111827;margin:5px 0;padding:6px;border-radius:6px;">
                  <span>${g.name}</span>
                  <b>${g.size}</b>
                </div>
              `).join("")
            }
          </div>
        `;
      }

      document.getElementById("groups").innerHTML = `
        <div class="card">

          <h3>🏠 Group Intelligence</h3>

          <!-- 🧠 CELL HEALTH NOW INSIDE GROUP INTELLIGENCE -->
          <div style="margin-bottom:10px;">
            <b>🧠 Cell Spiritual Health</b>
            <div style="font-size:26px;" class="${cellCls}">
              ${overallCellHealth.toFixed(1)}%
            </div>
            <small>Aggregated across visit snapshots</small>
          </div>

          <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;">
            ${block("🔵 Underflow","<8","#3b82f6",underflow)}
            ${block("🟢 Healthy","8–12","#22c55e",healthy)}
            ${block("🟢 Stable","13–15","#16a34a",stable)}
            ${block("🟡 Prep","16–19","#f59e0b",prep)}
            ${block("🔴 Multiply","20+","#ef4444",mustMultiply)}
          </div>

        </div>
      `;
    }

    /* ---------------- 🧭 LEADERSHIP ---------------- */
    function renderLeadership(groups, members) {

      const map = {};

      members.forEach(m => {
        map[m.group_id] = (map[m.group_id] || 0) + 1;
      });

      const loads = Object.values(map);

      document.getElementById("leaders").innerHTML = `
        <div class="card">
          <h3>🧭 Leadership Load</h3>

          <p>Max: <b>${Math.max(...loads || [0])}</b></p>
          <p>Avg: <b>${(loads.reduce((a,b)=>a+b,0)/loads.length || 0).toFixed(1)}</b></p>
        </div>
      `;
    }

    /* ---------------- 🔥 PRIORITY ENGINE ---------------- */
    function renderPriority(priority) {

      const sorted = [...priority]
        .sort((a,b)=>b.computed_priority_score - a.computed_priority_score);

      document.getElementById("priority").innerHTML = `
        <div class="card">
          <h3>🔥 Priority Engine</h3>

          ${sorted.slice(0,5).map(p => `
            <div style="display:flex;justify-content:space-between;">
              <span>${p.name}</span>
              <b>${Math.round(p.computed_priority_score || 0)}</b>
            </div>
          `).join("")}
        </div>
      `;
    }

    window.onload = load;
  </script>

</head>

<body>

<header>
  🔥 Command Center
  <button onclick="location.href='index.html'">Home</button>
</header>

<div class="grid">

  <div id="people"></div>
  <div id="groups"></div>

  <div id="leaders"></div>
  <div id="priority"></div>

</div>

</body>
</html>
