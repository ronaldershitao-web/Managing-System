<!DOCTYPE html>

<html>
<head>
  <title>Command Center</title>

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }

    header {
      padding:15px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .card {
      background:#111827;
      padding:12px;
      border-radius:8px;
      border:1px solid #1f2937;
      margin-bottom:10px;
    }

    h3 { margin-top:0; }
    small { color:#94a3b8; }

    .good { color:#22c55e; }
    .warn { color:#f59e0b; }
    .bad  { color:#ef4444; }

  </style>

  <script type="module">
    import { db } from "./assets/app.js";

    const IDEAL_MIN = 8;
    const IDEAL_MAX = 12;
    const CAPACITY_MAX = 20;

    async function load() {

      const [
        peopleRes,
        groupsRes,
        membersRes,
        priorityRes,
        cellHealthRes,
        scoresRes
      ] = await Promise.all([
        db.from("people").select("*"),
        db.from("groups").select("*"),
        db.from("group_members").select("id, group_id, person_id"),
        db.from("people_priority_engine").select("*"),
        db.from("cell_spiritual_health").select("*").order("visit_session_id", { ascending:false }).limit(20),
        db.from("cell_visit_person_scores")
          .select("visit_session_id, person_id, people(name), attendance_score, engagement_score, participation_score, alignment_score")
      ]);

      const people = peopleRes.data || [];
      const groups = groupsRes.data || [];
      const members = membersRes.data || [];
      const priority = priorityRes.data || [];
      const cellHealth = cellHealthRes.data || [];
      const scores = scoresRes.data || [];

      renderPeople(people);
      renderGroups(groups, members);
      renderCellHealth(cellHealth);
      renderPersonHealth(scores);
      renderLeadership(groups, members);
      renderPriority(priority);
    }

    /* ---------------- PEOPLE ---------------- */
    function renderPeople(people) {

      const avg = people.length
        ? people.reduce((a,b)=>a + (b.computed_priority_score||0),0) / people.length
        : 0;

      document.getElementById("people").innerHTML = `
        <div class="card">
          <h3>🧍 People Intelligence</h3>

          <p>Total People: <b>${people.length}</b></p>
          <p>Avg Priority Score: <b>${avg.toFixed(2)}</b></p>

          <p class="good">System-wide engagement baseline</p>
        </div>
      `;
    }

    /* ---------------- GROUPS ---------------- */
    function renderGroups(groups, members) {

      const enriched = groups.map(g => {
        const size = members.filter(m => m.group_id === g.id).length;
        return { ...g, size };
      });

      const underflow = enriched.filter(g => g.size < 8);
      const healthy = enriched.filter(g => g.size >= 8 && g.size <= 12);
      const stable = enriched.filter(g => g.size >= 13 && g.size <= 15);
      const prep = enriched.filter(g => g.size >= 16 && g.size < 20);
      const mustMultiply = enriched.filter(g => g.size >= 20);

      function block(title, subtitle, color, list) {
        return `
          <div style="background:#0b1220;border:1px solid ${color};border-radius:10px;padding:10px;min-height:220px;">
            <div style="display:flex; justify-content:space-between;">
              <b style="color:${color};">${title}</b>
              <span style="font-size:12px; color:#94a3b8;">${subtitle}</span>
            </div>
            <hr style="border-color:#1f2937;">
            ${list.length === 0
              ? `<i style="color:#64748b;">No groups</i>`
              : list.map(g => `
                <div style="background:#111827;padding:6px;margin:6px 0;border-radius:6px;display:flex;justify-content:space-between;">
                  <span>${g.name}</span>
                  <b>${g.size}</b>
                </div>
              `).join("")
            }
          </div>
        `;
      }

      document.getElementById("groups").innerHTML = `
        <div class="card">
          <h3>🏠 Group Intelligence</h3>
          <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">
            ${block("🔵 Underflow","<8","#3b82f6",underflow)}
            ${block("🟢 Healthy","8–12","#22c55e",healthy)}
            ${block("🟢 Stable","13–15","#16a34a",stable)}
            ${block("🟡 Prep","16–19","#f59e0b",prep)}
            ${block("🔴 Multiply","20+","#ef4444",mustMultiply)}
          </div>
        </div>
      `;
    }

    /* ---------------- CELL HEALTH ---------------- */
    function renderCellHealth(cellHealth) {

      if (!cellHealth.length) return;

      const latest = cellHealth[0];

      let cls = "good";
      if (latest.health_percent < 60) cls = "bad";
      else if (latest.health_percent < 80) cls = "warn";

      document.getElementById("cellHealth").innerHTML = `
        <div class="card">
          <h3>🧠 Cell Spiritual Health</h3>
          <p class="${cls}" style="font-size:28px;">
            ${latest.health_percent}%
          </p>
          <small>${latest.people_count} people assessed</small>
        </div>
      `;
    }

    /* ---------------- PERSON HEALTH ---------------- */
    function renderPersonHealth(scores) {

      if (!scores.length) return;

      const latestVisit = scores.map(s => s.visit_session_id).sort().reverse()[0];
      const filtered = scores.filter(s => s.visit_session_id === latestVisit);

      const enriched = filtered.map(p => {

        const score =
          (p.attendance_score * 0.25 +
           p.engagement_score * 0.30 +
           p.participation_score * 0.25 +
           p.alignment_score * 0.20);

        return {
          name: p.people?.name || "Unknown",
          percent: (score / 4 * 100)
        };
      });

      enriched.sort((a,b) => a.percent - b.percent);

      document.getElementById("personHealth").innerHTML = `
        <div class="card">
          <h3>👥 Spiritual Risk (Bottom 5)</h3>
          ${enriched.slice(0,5).map(p => {
            let cls = "good";
            if (p.percent < 60) cls = "bad";
            else if (p.percent < 80) cls = "warn";

            return `
              <div style="display:flex; justify-content:space-between;">
                <span>${p.name}</span>
                <b class="${cls}">${p.percent.toFixed(1)}%</b>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    /* ---------------- LEADERS ---------------- */
    function renderLeadership(groups, members) {

      const loadMap = {};

      members.forEach(m => {
        loadMap[m.group_id] = (loadMap[m.group_id] || 0) + 1;
      });

      const loads = Object.values(loadMap);
      const max = loads.length ? Math.max(...loads) : 0;
      const avg = loads.length ? (loads.reduce((a,b)=>a+b,0)/loads.length).toFixed(1) : 0;

      document.getElementById("leaders").innerHTML = `
        <div class="card">
          <h3>🧭 Leadership Load</h3>
          <p>Max Load: <b>${max}</b></p>
          <p>Avg Load: <b>${avg}</b></p>
        </div>
      `;
    }

    /* ---------------- PRIORITY ---------------- */
    function renderPriority(priority) {

      const sorted = [...priority].sort((a,b)=>b.computed_priority_score - a.computed_priority_score);

      document.getElementById("priority").innerHTML = `
        <div class="card">
          <h3>🔥 Priority Engine</h3>
          ${sorted.slice(0,5).map(p => `<div><b>${p.name}</b> — ${Math.round(p.computed_priority_score||0)}</div>`).join("")}
        </div>
      `;
    }

    window.onload = load;
  </script>

</head>

<body>

<header>
  🔥 Command Center
  <button onclick="location.href='index.html'">Home</button>
</header>

<div class="grid">

  <div id="people"></div>
  <div id="groups"></div>

  <div id="cellHealth"></div>
  <div id="personHealth"></div>

  <div id="leaders"></div>
  <div id="priority"></div>

</div>

</body>
</html>
