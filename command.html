<!DOCTYPE html>

<html>
<head>
  <title>Command Center</title>

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }

    header {
      padding:15px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .card {
      background:#111827;
      padding:12px;
      border-radius:8px;
      border:1px solid #1f2937;
      margin-bottom:10px;
    }

    h3 { margin-top:0; }
    small { color:#94a3b8; }

    .good { color:#22c55e; }
    .warn { color:#f59e0b; }
    .bad  { color:#ef4444; }
  </style>

  <script type="module">
    import { db } from "./assets/app.js";

    async function load() {

      const [
        peopleRes,
        groupsRes,
        membersRes,
        priorityRes,
        scoresRes
      ] = await Promise.all([
        db.from("people").select("*"),
        db.from("groups").select("*"),
        db.from("group_members").select("id, group_id, person_id, people:people(*)"),
        db.from("people_priority_engine").select("*"),
        db.from("cell_visit_person_scores")
          .select("person_id, group_id, attendance_score, engagement_score, participation_score, alignment_score, people(name)")
      ]);

      const groups = groupsRes.data || [];
      const members = membersRes.data || [];
      const scores = scoresRes.data || [];
      const priority = priorityRes.data || [];

      renderPeople(scores);
      renderGroups(groups, members, scores);
      renderPriority(priority);
    }

    /* ---------------- 🧍 PEOPLE INTELLIGENCE ---------------- */
    function renderPeople(scores) {

      if (!scores.length) return;

      const enriched = scores.map(p => {

        const score =
          (p.attendance_score * 0.25 +
           p.engagement_score * 0.30 +
           p.participation_score * 0.25 +
           p.alignment_score * 0.20);

        return {
          name: p.people?.name || "Unknown",
          percent: (score / 4) * 100
        };
      });

      enriched.sort((a,b)=>a.percent-b.percent);

      document.getElementById("people").innerHTML = `
        <div class="card">
          <h3>🧍 People Intelligence</h3>

          <small>Spiritual risk (bottom 5)</small>

          ${enriched.slice(0,5).map(p => `
            <div style="display:flex;justify-content:space-between;margin-top:6px;">
              <span>${p.name}</span>
              <b class="${p.percent<60?'bad':p.percent<80?'warn':'good'}">
                ${p.percent.toFixed(1)}%
              </b>
            </div>
          `).join("")}
        </div>
      `;
    }

    /* ---------------- 🏠 GROUP INTELLIGENCE ---------------- */
    function renderGroups(groups, members, scores) {

      const enriched = groups.map(g => {

        const groupMembers = members.filter(m => m.group_id === g.id);
        const size = groupMembers.length;

        /* ---------- STRUCTURAL CATEGORY ---------- */
        let structure = "";
        let structColor = "";

        if (size < 8) {
          structure = "Underflow";
          structColor = "#3b82f6";
        } else if (size <= 12) {
          structure = "Healthy";
          structColor = "#22c55e";
        } else if (size <= 15) {
          structure = "Stable";
          structColor = "#16a34a";
        } else if (size <= 19) {
          structure = "Growth Pressure";
          structColor = "#f59e0b";
        } else {
          structure = "Multiply Risk";
          structColor = "#ef4444";
        }

        /* ---------- SPIRITUAL HEALTH (AVG PERSON SCORE) ---------- */
        const groupPersonScores = scores.filter(s =>
          groupMembers.some(m => m.person_id === s.person_id)
        );

        let spiritualHealth = null;

        if (groupPersonScores.length) {

          spiritualHealth =
            groupPersonScores.reduce((sum, p) => {

              const score =
                (p.attendance_score * 0.25 +
                 p.engagement_score * 0.30 +
                 p.participation_score * 0.25 +
                 p.alignment_score * 0.20);

              return sum + (score / 4) * 100;

            }, 0) / groupPersonScores.length;
        }

        return {
          ...g,
          size,
          structure,
          structColor,
          spiritualHealth
        };
      });

      document.getElementById("groups").innerHTML = `
        <div class="card">
          <h3>🏠 Cell Intelligence</h3>

          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;">

            ${enriched.map(g => `
              <div class="card">

                <b>${g.name}</b>

                <div>
                  Size: <b>${g.size}</b>
                </div>

                <div style="color:${g.structColor};">
                  ${g.structure}
                </div>

                <hr style="border-color:#1f2937;">

                <div>
                  🧠 Spiritual Health:
                  <b class="${g.spiritualHealth<60?'bad':g.spiritualHealth<80?'warn':'good'}">
                    ${g.spiritualHealth ? g.spiritualHealth.toFixed(1) + '%' : 'No Data'}
                  </b>
                </div>

              </div>
            `).join("")}

          </div>
        </div>
      `;
    }

    /* ---------------- 🔥 PRIORITY ---------------- */
    function renderPriority(priority) {

      const sorted = [...priority]
        .sort((a,b)=>b.computed_priority_score-a.computed_priority_score);

      document.getElementById("priority").innerHTML = `
        <div class="card">
          <h3>🔥 Priority Engine</h3>

          ${sorted.slice(0,5).map(p => `
            <div style="display:flex;justify-content:space-between;">
              <span>${p.name}</span>
              <b>${Math.round(p.computed_priority_score||0)}</b>
            </div>
          `).join("")}
        </div>
      `;
    }

    window.onload = load;
  </script>

</head>

<body>

<header>
  🔥 Command Center
  <button onclick="location.href='index.html'">Home</button>
</header>

<div class="grid">

  <div id="people"></div>
  <div id="groups"></div>

  <div id="priority"></div>

</div>

</body>
</html>
