<!DOCTYPE html>
<html>
<head>
  <title>Timeline Cockpit</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const db = createClient("https://qnxiuojefowyzeanfhdz.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFueGl1b2plZm93eXplYW5maGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjY0NjEsImV4cCI6MjA5MTkwMjQ2MX0.JoSrVaT4KewYWoESPkjG5_W65nKdLYdcX7BZeaYK_FM");

    async function loadTimeline() {

      const { data, error } = await db
        .from('interactions')
        .select(`
          id,
          interaction_type,
          interaction_date,
          notes,
          people(name)
        `)
        .order('interaction_date', { ascending: false })
        .limit(50);

      const el = document.getElementById("timeline");

      if (error) {
        el.innerHTML = error.message;
        return;
      }

      el.innerHTML = data.map(i => `
        <div class="item">
          <b>${i.people?.name || "Unknown"}</b><br>
          ${i.interaction_type} • ${new Date(i.interaction_date).toLocaleString()}<br>
          <small>${i.notes || ""}</small>
        </div>
      `).join('');
    }

    async function addInteraction() {

      const person_id = document.getElementById("person").value;
      const date = document.getElementById("date").value;
      const notes = document.getElementById("notes").value;

      const { error } = await db.from('interactions').insert([
        {
          person_id,
          interaction_type: "manual_entry",
          interaction_date: date,
          notes
        }
      ]);

      if (error) return alert(error.message);

      alert("Backfilled");
      loadTimeline();
    }

    async function loadPeopleDropdown() {
      const { data } = await db.from('people').select('id,name');

      document.getElementById("person").innerHTML =
        data.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    }

    window.onload = () => {
      loadTimeline();
      loadPeopleDropdown();
    };
  </script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
    .item { background:#111827; padding:10px; margin-bottom:8px; border-radius:6px; }
    input,select { margin:5px; padding:6px; }
  </style>
</head>

<body>

<h2>Interaction Timeline</h2>

<div>
  <select id="person"></select>
  <input type="datetime-local" id="date">
  <input id="notes" placeholder="Notes">
  <button onclick="addInteraction()">Backfill</button>
</div>

<hr>

<div id="timeline"></div>

</body>
</html>
