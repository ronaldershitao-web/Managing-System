<!DOCTYPE html>
<html>
<head>
  <title>Timeline</title>

  <script type="module">
    import { db } from "./assets/app.js";

    async function load() {
      const { data } = await db
        .from('interactions')
        .select('*')
        .order('interaction_date', { ascending: false })
        .limit(20);

      document.getElementById("list").innerHTML =
        (data || []).map(i => `
          <div class="card">
            ${new Date(i.interaction_date).toLocaleString()}<br>
            ${i.notes ?? ''}
          </div>
        `).join('');
    }

    window.onload = load;
  </script>

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }
    header { padding:15px; background:#111827; }
    .card {
      background:#111827;
      padding:10px;
      margin:10px;
      border-radius:8px;
      border:1px solid #1f2937;
    }
  </style>
</head>

<body>

<header>
  📊 Timeline
  <button onclick="location.href='index.html'" style="float:right;">Home</button>
</header>

<div id="list"></div>

</body>
</html>
