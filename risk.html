<!DOCTYPE html>
<html>
<head>
  <title>Risk Cockpit</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const db = createClient("https://qnxiuojefowyzeanfhdz.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFueGl1b2plZm93eXplYW5maGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjY0NjEsImV4cCI6MjA5MTkwMjQ2MX0.JoSrVaT4KewYWoESPkjG5_W65nKdLYdcX7BZeaYK_FM");

    async function loadRisk() {

      const { data } = await db
        .from('people_priority_engine')
        .select('*')
        .order('computed_priority_score', { ascending: false })
        .limit(20);

      const el = document.getElementById("risk");

      el.innerHTML = data.map(p => `
        <div class="card">
          <b>${p.name}</b><br>
          Score: ${p.computed_priority_score}<br>
          Days: ${Math.floor(p.days_since_last_contact || 0)}<br>
          Interactions: ${p.interaction_count}
        </div>
      `).join('');
    }

    window.onload = loadRisk;
  </script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
    .card {
      background:#7f1d1d;
      padding:10px;
      margin-bottom:10px;
      border-radius:6px;
    }
  </style>
</head>

<body>

<h2>Risk Cockpit (High Priority People)</h2>

<div id="risk"></div>

</body>
</html>
