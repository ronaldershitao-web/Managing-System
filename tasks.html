<!DOCTYPE html>
<html>
<head>
  <title>Task Cockpit</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const db = createClient("https://qnxiuojefowyzeanfhdz.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFueGl1b2plZm93eXplYW5maGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjY0NjEsImV4cCI6MjA5MTkwMjQ2MX0.JoSrVaT4KewYWoESPkjG5_W65nKdLYdcX7BZeaYK_FM");

    async function loadTasks() {

      const { data, error } = await db
        .from('tasks')
        .select(`*, people(name)`)
        .order('priority_score', { ascending: false });

      const el = document.getElementById("tasks");

      if (error) return el.innerHTML = error.message;

      el.innerHTML = data.map(t => `
        <div class="task ${t.status}">
          <b>${t.title}</b><br>
          ${t.people?.name || ""}<br>
          Due: ${t.due_date || "N/A"}<br>
          Priority: ${t.priority_score}
          <br>
          <button onclick="completeTask('${t.id}')">Done</button>
        </div>
      `).join('');
    }

    async function completeTask(id) {
      await db.from('tasks').update({ status: 'done' }).eq('id', id);
      loadTasks();
    }

    window.onload = loadTasks;
  </script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
    .task { padding:10px; margin-bottom:10px; border-radius:6px; }
    .pending { background:#111827; }
    .done { background:#064e3b; }
  </style>
</head>

<body>

<h2>Task Cockpit</h2>
<div id="tasks"></div>

</body>
</html>
