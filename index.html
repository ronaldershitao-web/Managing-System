<!DOCTYPE html>
<html>
<head>
  <title>Ministry OS v3.0</title>
  

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f6fa;
    }

    header {
      background: #1e2a38;
      color: white;
      padding: 15px;
      font-size: 18px;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    h3 {
      margin-top: 0;
    }

    button {
      padding: 6px 10px;
      margin-top: 5px;
      cursor: pointer;
    }

    .task {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>

<body>

<header>
  Ministry OS v3.0 Dashboard
</header>

<div class="container">

  <div class="card">
    <h3>Top People to Follow Up</h3>
    <div id="people"></div>
  </div>

  <div class="card">
    <h3>Priority Tasks</h3>
    <div id="tasks"></div>
  </div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://qnxiuojefowyzeanfhdz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFueGl1b2plZm93eXplYW5maGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjY0NjEsImV4cCI6MjA5MTkwMjQ2MX0.JoSrVaT4KewYWoESPkjG5_W65nKdLYdcX7BZeaYK_FM";

const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// -------------------
// LOAD PEOPLE
// -------------------
async function loadPeople() {
  const { data, error } = await db
    .from('people')
    .select('*')
    .order('priority_score', { ascending: false })
    .limit(5);

  if (error) {
    console.log("People error:", error);
    document.getElementById("people").innerHTML = error.message;
    return;
  }

  document.getElementById("people").innerHTML =
    (data || []).map(p => `
      <div class="task">
        <b>${p.name}</b><br>
        Stage: ${p.relationship_stage} | Status: ${p.engagement_status}
      </div>
    `).join('');
}

// -------------------
// LOAD TASKS
// -------------------
async function loadTasks() {
  const { data, error } = await db
    .from('tasks')
    .select('*')
    .eq('status','pending')
    .order('priority_score', { ascending: false })
    .limit(10);

  if (error) {
    console.log("Task error:", error);
    document.getElementById("tasks").innerHTML = error.message;
    return;
  }

  document.getElementById("tasks").innerHTML =
    (data || []).map(t => `
      <div class="task">
        <b>${t.title}</b><br>
        Priority: ${t.priority_score}
      </div>
    `).join('');
}

loadPeople();
loadTasks();
</script>
</body>
</html>
