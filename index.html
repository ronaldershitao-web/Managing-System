<!DOCTYPE html>
<html>
<head>
  <title>Ministry System</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

<h1 class="text-2xl font-bold mb-4">Ministry System</h1>

<!-- LOGIN -->
<div class="bg-white p-4 rounded shadow mb-4">
  <input id="email" placeholder="Email" class="border p-2 mr-2">
  <input id="password" type="password" placeholder="Password" class="border p-2 mr-2">

  <button onclick="login()" class="bg-blue-500 text-white px-4 py-2 rounded">
    Login
  </button>

  <button onclick="logout()" class="bg-gray-500 text-white px-4 py-2 rounded ml-2">
    Logout
  </button>
</div>

<!-- DASHBOARD -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

  <div class="bg-white p-3 rounded shadow">
    <h3 class="font-bold mb-2">Inactive Members</h3>
    <ul id="inactiveList"></ul>
  </div>

  <div class="bg-white p-3 rounded shadow">
    <h3 class="font-bold mb-2">Open Cases</h3>
    <ul id="casesList"></ul>
  </div>

  <div class="bg-white p-3 rounded shadow">
    <h3 class="font-bold mb-2">Follow-ups</h3>
    <ul id="followupList"></ul>
  </div>

</div>

<!-- NOTES -->
<div class="bg-white p-3 rounded shadow mt-4">
  <h3 class="font-bold mb-2">Pastoral Notes</h3>
  <ul id="notesList"></ul>
</div>

<script>

/* =========================
   SUPABASE INIT
========================= */
const supabase = window.supabase.createClient(
  "https://qnxiuojefowyzeanfhdz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFueGl1b2plZm93eXplYW5maGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjY0NjEsImV4cCI6MjA5MTkwMjQ2MX0.JoSrVaT4KewYWoESPkjG5_W65nKdLYdcX7BZeaYK_FM"
);

let currentUser = null;

/* =========================
   LOGIN
========================= */
async function login() {
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if (error) return alert(error.message);

  currentUser = data.user;
  await loadDashboard();
}

/* =========================
   LOGOUT
========================= */
async function logout() {
  await supabase.auth.signOut();
  currentUser = null;
  clearUI();
}

/* =========================
   CLEAR UI
========================= */
function clearUI() {
  inactiveList.innerHTML = "";
  casesList.innerHTML = "";
  followupList.innerHTML = "";
  notesList.innerHTML = "";
}

/* =========================
   LOAD DASHBOARD
========================= */
async function loadDashboard() {

  if (!currentUser) return;

  const { data: inactive } = await supabase
    .from("inactive_members")
    .select("*");

  const { data: cases } = await supabase
    .from("open_cases")
    .select("*");

  const { data: followups } = await supabase
    .from("followup_needed")
    .select("*");

  const { data: notes } = await supabase
    .from("pastoral_notes")
    .select("*");

  inactiveList.innerHTML = (inactive || [])
    .map(x => `<li>${x.name || "No Name"}</li>`).join("");

  casesList.innerHTML = (cases || [])
    .map(x => `<li>${x.case_type || "Case"}</li>`).join("");

  followupList.innerHTML = (followups || [])
    .map(x => `<li>${x.case_type || "Follow-up"}</li>`).join("");

  notesList.innerHTML = (notes || [])
    .map(x => `<li>${x.note || "Note"}</li>`).join("");
}

/* =========================
   REALTIME (FULL COVERAGE)
========================= */
supabase
  .channel('ministry-live')

  .on('postgres_changes', {
    event: '*',
    schema: 'public',
    table: 'people'
  }, loadDashboard)

  .on('postgres_changes', {
    event: '*',
    schema: 'public',
    table: 'pastoral_cases'
  }, loadDashboard)

  .on('postgres_changes', {
    event: '*',
    schema: 'public',
    table: 'pastoral_notes'
  }, loadDashboard)

  .subscribe();

/* =========================
   SESSION RESTORE
========================= */
window.addEventListener("load", async () => {
  const { data } = await supabase.auth.getSession();

  if (data.session) {
    currentUser = data.session.user;
    await loadDashboard();
  }
});

</script>

</body>
</html>
