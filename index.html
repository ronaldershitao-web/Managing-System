<!DOCTYPE html>
<html>
<head>
  <title>Ministry Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

  <h1 class="text-2xl font-bold mb-4">Ministry Dashboard</h1>

  <!-- LOGIN -->
  <div class="mb-6 bg-white p-4 rounded-xl shadow">
    <h2 class="font-bold mb-2">Login</h2>
    <input id="email" placeholder="Email" class="border p-2 mr-2">
    <input id="password" type="password" placeholder="Password" class="border p-2 mr-2">
    <button onclick="login()" class="bg-blue-500 text-white px-4 py-2 rounded">
      Login
    </button>

    <button onclick="logout()" class="ml-2 bg-gray-400 text-white px-4 py-2 rounded">
      Logout
    </button>
  </div>

  <!-- DASHBOARD -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

    <div class="p-4 bg-white rounded-xl shadow">
      <h3 class="font-bold mb-2">Inactive Members</h3>
      <ul id="inactiveList" class="text-sm"></ul>
    </div>

    <div class="p-4 bg-white rounded-xl shadow">
      <h3 class="font-bold mb-2">Open Cases</h3>
      <ul id="openCasesList" class="text-sm"></ul>
    </div>

    <div class="p-4 bg-white rounded-xl shadow">
      <h3 class="font-bold mb-2">Follow-ups Needed</h3>
      <ul id="followupList" class="text-sm"></ul>
    </div>

  </div>

  <!-- NOTES (FIX YOU WERE MISSING THIS) -->
  <div class="mt-6 bg-white p-4 rounded-xl shadow">
    <h3 class="font-bold mb-2">Recent Pastoral Notes</h3>
    <ul id="notesList" class="text-sm"></ul>
  </div>

  <!-- ADD PERSON -->
  <div class="mt-6 bg-white p-4 rounded-xl shadow">

    <h3 class="font-bold mb-2">Add Person</h3>

    <input id="name" placeholder="Name" class="border p-2 mr-2">
    <input id="phone" placeholder="Phone" class="border p-2 mr-2">

    <button onclick="addPerson()" class="bg-green-500 text-white px-4 py-2 rounded">
      Add
    </button>

  </div>

<script>

/* =========================
   SUPABASE INIT
========================= */
const supabase = window.supabase.createClient(
  "https://qnxiuojefowyzeanfhdz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFueGl1b2plZm93eXplYW5maGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjY0NjEsImV4cCI6MjA5MTkwMjQ2MX0.JoSrVaT4KewYWoESPkjG5_W65nKdLYdcX7BZeaYK_FM"
);

/* =========================
   AUTH STATE
========================= */
let currentUser = null;

/* =========================
   LOGIN
========================= */
async function login() {
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if (error) {
    alert(error.message);
    return;
  }

  currentUser = data.user;

  alert("Logged in");

  await loadDashboard();
}

/* =========================
   LOGOUT
========================= */
async function logout() {
  await supabase.auth.signOut();
  currentUser = null;

  inactiveList.innerHTML = "";
  openCasesList.innerHTML = "";
  followupList.innerHTML = "";
  notesList.innerHTML = "";
}

/* =========================
   ADD PERSON
========================= */
async function addPerson() {
  const { error } = await supabase
    .from("people")
    .insert([{
      name: name.value,
      phone: phone.value
    }]);

  if (error) {
    alert(error.message);
    return;
  }

  name.value = "";
  phone.value = "";

  await loadDashboard();
}

/* =========================
   LOAD DASHBOARD
========================= */
async function loadDashboard() {

  // Inactive Members
  const { data: inactive, error: err1 } = await supabase
    .from("inactive_members")
    .select("*");

  inactiveList.innerHTML = "";

  if (!err1 && inactive) {
    inactive.forEach(p => {
      inactiveList.innerHTML += `<li>${p.name}</li>`;
    });
  }

  // Open Cases
  const { data: cases, error: err2 } = await supabase
    .from("open_cases")
    .select("*");

  openCasesList.innerHTML = "";

  if (!err2 && cases) {
    cases.forEach(c => {
      openCasesList.innerHTML += `<li>${c.case_type}</li>`;
    });
  }

  // Followups
  const { data: followups, error: err3 } = await supabase
    .from("followup_needed")
    .select("*");

  followupList.innerHTML = "";

  if (!err3 && followups) {
    followups.forEach(f => {
      followupList.innerHTML += `<li>${f.case_type}</li>`;
    });
  }

  // PASTORAL NOTES (FIX YOU WERE MISSING)
  const { data: notes, error: err4 } = await supabase
    .from("pastoral_notes")
    .select("*")
    .order("created_at", { ascending: false });

  notesList.innerHTML = "";

  if (!err4 && notes) {
    notes.forEach(n => {
      notesList.innerHTML += `<li>${n.note}</li>`;
    });
  }
}

/* =========================
   REALTIME (FIXED + COMPLETE)
========================= */
supabase
  .channel('dashboard-realtime')
  .on('postgres_changes', {
    event: '*',
    schema: 'public',
    table: 'pastoral_cases'
  }, () => loadDashboard())

  .on('postgres_changes', {
    event: '*',
    schema: 'public',
    table: 'pastoral_notes'
  }, () => loadDashboard())

  .subscribe();

/* =========================
   AUTO LOAD SESSION
========================= */
window.addEventListener("load", async () => {
  const { data } = await supabase.auth.getSession();

  if (data.session) {
    currentUser = data.session.user;
    await loadDashboard();
  }
});

</script>

</body>
</html>
