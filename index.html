<!DOCTYPE html>
<html>
<head>
  <title>Ministry OS Hub</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      display:flex;
      height:100vh;
      align-items:center;
      justify-content:center;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(3, 220px);
      gap:20px;
    }

    .card {
      background:#111827;
      padding:22px;
      border-radius:14px;
      text-align:center;
      cursor:pointer;
      border:1px solid #1f2937;
      transition:0.25s;
      font-weight:bold;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color:#3b82f6;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .service {
      background: linear-gradient(135deg,#1d4ed8,#2563eb);
    }

    .pastoral {
      background: linear-gradient(135deg,#16a34a,#22c55e);
    }

    .risk {
      background: linear-gradient(135deg,#ef4444,#f97316);
    }
  </style>
</head>

<body>

<div class="grid">

  <div class="card service" onclick="go('modules/svccmd.html')">
    ⛪ Service Command Post
  </div>

  <div class="card service" onclick="go('command.html')">
    ⛪ Service Command Post
  </div>

  <div class="card pastoral" onclick="go('modules/people.html')">
    👥 People & Pastoral Care
  </div>

  <div class="card risk" onclick="go('modules/risk.html')">
    ⚠️ Risk Cockpit
  </div>

  <div class="card" onclick="go('modules/groups.html')">
    🏠 Groups
  </div>

  <div class="card" onclick="go('modules/visit.html')">
    🔥 Cell Visitations
  </div>

  <div class="card" onclick="go('modules/tasks.html')">
    📌 Tasks
  </div>

</div>

<script>
function go(page){
  // cache-busting fix
  window.location.href = page + "?v=" + new Date().getTime();
}
</script>

</body>
</html>
