<!DOCTYPE html>
<html>
<head>
  <title>Ministry OS Hub</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1e293b, #0f172a);
      color:white;
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    header {
      padding:14px;
      background:#0b1220;
      border-bottom:1px solid #1f2937;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .container {
      display:grid;
      grid-template-columns: 260px 1fr;
      height:100%;
    }

    .sidebar {
      background:#0b1220;
      border-right:1px solid #1f2937;
      padding:10px;
    }

    .menu-title {
      font-size:12px;
      color:#94a3b8;
      margin:10px 0;
    }

    .btn {
      width:100%;
      padding:12px;
      margin-bottom:8px;
      background:#111827;
      border:1px solid #1f2937;
      color:white;
      border-radius:8px;
      cursor:pointer;
      text-align:left;
      transition:0.2s;
    }

    .btn:hover {
      border-color:#3b82f6;
      transform: translateX(2px);
    }

    .active {
      border-color:#22c55e;
      background:#0f172a;
    }

    .content {
      padding:10px;
    }

    .shell {
      width:100%;
      height:100%;
      background:#0f172a;
      border:1px solid #1f2937;
      border-radius:12px;
      overflow:hidden;
      position:relative;
    }

    iframe {
      width:100%;
      height:100%;
      border:none;
    }

    .shell-header {
      position:absolute;
      top:0;
      left:0;
      right:0;
      background:#111827;
      padding:8px 12px;
      font-size:12px;
      color:#94a3b8;
      border-bottom:1px solid #1f2937;
      z-index:10;
    }
  </style>
</head>

<body>

<header>
  ⛪ Ministry OS System Hub
  <span style="font-size:12px;color:#94a3b8;">Operational Dashboard</span>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="menu-title">CORE MODULES</div>

    <button class="btn active" onclick="loadModule('modules/svccmd.html', this)">
      🔥 Service Command Post
    </button>

    <button class="btn" onclick="loadModule('command.html', this)">
      📊 Service Command
    </button>

    <button class="btn" onclick="loadModule('modules/people.html', this)">
      👥 People
    </button>

    <button class="btn" onclick="loadModule('modules/groups.html', this)">
      🏠 Groups
    </button>

    <button class="btn" onclick="loadModule('modules/visit.html', this)">
      📍 Cell Visit
    </button>

    <button class="btn" onclick="loadModule('modules/risk.html', this)">
      ⚠️ Risk Cockpit
    </button>

  </div>

  <!-- CONTENT SHELL (FIXED - WAS MISSING) -->
  <div class="content">

    <div class="shell">

      <div class="shell-header" id="shellHeader">
        Loading Service Command Post...
      </div>

      <iframe id="frame" src="modules/svccmd.html"></iframe>

    </div>

  </div>

</div>

<script>
function loadModule(page, btn) {

  document.getElementById("frame").src = page + "?v=" + Date.now();

  document.getElementById("shellHeader").innerText =
    "Loading: " + page.replace("modules/","");

  document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}
</script>

</body>
</html>
