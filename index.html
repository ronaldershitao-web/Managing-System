<!DOCTYPE html>
<html>
<head>
  <title>Ministry OS v5</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const db = createClient(
      "https://qnxiuojefowyzeanfhdz.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFueGl1b2plZm93eXplYW5maGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjY0NjEsImV4cCI6MjA5MTkwMjQ2MX0.JoSrVaT4KewYWoESPkjG5_W65nKdLYdcX7BZeaYK_FM"
    );

    window.db = db;

    // ------------------------
    // COCKPIT SWITCHER
    // ------------------------
    window.showCockpit = function(name) {

      document.querySelectorAll(".cockpit").forEach(c => {
        c.style.display = "none";
      });

      document.getElementById(name).style.display = "block";

      // load data when switching
      if (name === "command") loadCommand();
      if (name === "master") loadMaster();
      if (name === "timeline") loadTimeline();
    }

    // ------------------------
    // COMMAND CENTER
    // ------------------------
    async function loadCommand() {
      const { data } = await db
        .from('people_priority_engine')
        .select('*')
        .order('computed_priority_score', { ascending: false })
        .limit(5);

      document.getElementById("command_people").innerHTML =
        (data || []).map(p => `
          <div class="card">
            <b>${p.name}</b><br>
            Score: ${Math.round(p.computed_priority_score)}
          </div>
        `).join('');
    }

    // ------------------------
    // MASTER DATA
    // ------------------------
    async function loadMaster() {
      const { data } = await db
        .from('people')
        .select('*')
        .order('priority_score', { ascending: false });

      document.getElementById("master_people").innerHTML =
        (data || []).map(p => `
          <div class="card">
            ${p.name} (Score: ${p.priority_score ?? 0})
          </div>
        `).join('');
    }

    // ------------------------
    // TIMELINE
    // ------------------------
    async function loadTimeline() {
      const { data } = await db
        .from('interactions')
        .select('interaction_date, notes')
        .order('interaction_date', { ascending: false })
        .limit(10);

      document.getElementById("timeline_list").innerHTML =
        (data || []).map(i => `
          <div class="card">
            ${i.interaction_date}<br>
            ${i.notes ?? ''}
          </div>
        `).join('');
    }

    window.onload = () => showCockpit("command");
  </script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:15px;
      background:#111827;
      border-bottom:1px solid #1f2937;
    }

    .nav button {
      margin-right:8px;
      padding:8px 12px;
      background:#2563eb;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    .nav button:hover {
      background:#1d4ed8;
    }

    .cockpit {
      display:none;
      padding:20px;
    }

    .card {
      background:#111827;
      padding:10px;
      margin-bottom:8px;
      border-radius:8px;
      border:1px solid #1f2937;
    }
  </style>
</head>

<body>

<header>
  Ministry OS v5

  <div class="nav" style="float:right;">
    <button onclick="showCockpit('command')">🏠 Command</button>
    <button onclick="showCockpit('master')">👤 Master</button>
    <button onclick="showCockpit('timeline')">📊 Timeline</button>
  </div>
</header>

<!-- COMMAND CENTER -->
<div id="command" class="cockpit">
  <h2>🔥 Command Center</h2>
  <div id="command_people"></div>
</div>

<!-- MASTER DATA -->
<div id="master" class="cockpit">
  <h2>👤 Master Data</h2>
  <div id="master_people"></div>
</div>

<!-- TIMELINE -->
<div id="timeline" class="cockpit">
  <h2>📊 Interaction Timeline</h2>
  <div id="timeline_list"></div>
</div>

</body>
</html>
