<!DOCTYPE html>
<html>
<head>
  <title>Ministry System</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password">
  <button onclick="login()">Login</button>

  <hr>

  <h2>Add Person</h2>
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <button onclick="addPerson()">Add</button>

  <hr>

  <h2>People</h2>
  <ul id="peopleList"></ul>

  <hr>

  <button onclick="createService()">Create Service + Attendance</button>

  <h3>Create Pastoral Case</h3>
<input id="personId" placeholder="Person ID">
<input id="caseType" placeholder="Case Type">
<button onclick="createCase()">Create Case</button>

  <h3>Add Note</h3>
<input id="caseId" placeholder="Case ID">
<input id="noteText" placeholder="Note">
<button onclick="addNote()">Add Note</button>

  <h3>My Cases</h3>
<ul id="caseList"></ul>
<button onclick="loadCases()">Load Cases</button>
  <script>
    const supabase = window.supabase.createClient(
      "https://qnxiuojefowyzeanfhdz.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFueGl1b2plZm93eXplYW5maGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjY0NjEsImV4cCI6MjA5MTkwMjQ2MX0.JoSrVaT4KewYWoESPkjG5_W65nKdLYdcX7BZeaYK_FM"
    );

    async function login() {
      const { error } = await supabase.auth.signInWithPassword({
        email: email.value,
        password: password.value
      });

      if (error) alert(error.message);
      else {
        alert("Logged in");
        loadPeople();
      }
    }

    async function addPerson() {
      const { error } = await supabase
        .from("people")
        .insert([{ name: name.value, phone: phone.value }]);

      if (error) alert(error.message);
      else loadPeople();
    }

    async function loadPeople() {
      const { data } = await supabase
        .from("people")
        .select("*")
        .order("created_at", { ascending: false });

      peopleList.innerHTML = "";

      data.forEach(p => {
        const li = document.createElement("li");
        li.innerText = p.name + " - " + p.phone;
        peopleList.appendChild(li);
      });
    }

    async function createService() {
      // 1. Create service
      const { data: service } = await supabase
        .from("services")
        .insert([{ service_date: new Date() }])
        .select();

      const serviceId = service[0].id;

      // 2. Get all people
      const { data: people } = await supabase
        .from("people")
        .select("id");

      // 3. Insert attendance
      const records = people.map(p => ({
        service_id: serviceId,
        person_id: p.id
      }));

      await supabase.from("attendance").insert(records);

      alert("Service & attendance created");

     
    }

     async function createCase() {
  const { error } = await supabase
    .from("pastoral_cases")
    .insert([{
      person_id: personId.value,
      case_type: caseType.value,
      assigned_to: (await supabase.auth.getUser()).data.user.id,
      created_by: (await supabase.auth.getUser()).data.user.id
    }]);

  if (error) alert(error.message);
  else alert("Case created");
}
async function addNote() {
  const { error } = await supabase
    .from("pastoral_notes")
    .insert([{
      case_id: caseId.value,
      note: noteText.value,
      created_by: (await supabase.auth.getUser()).data.user.id
    }]);

  if (error) alert(error.message);
  else alert("Note added");
}

    async function loadCases() {
  const { data } = await supabase
    .from("pastoral_cases")
    .select("*")
    .order("created_at", { ascending: false });

  caseList.innerHTML = "";

  data.forEach(c => {
    const li = document.createElement("li");
    li.innerText = c.case_type + " - " + c.status;
    caseList.appendChild(li);
  });
}
    
  </script>
</body>
</html>
