<!DOCTYPE html>
<html>
<head>
  <title>Ministry System</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

<h1 class="text-2xl font-bold mb-4">Ministry System</h1>

<!-- LOGIN -->
<div class="bg-white p-4 rounded shadow mb-4">
  <input id="email" placeholder="Email" class="border p-2 mr-2">
  <input id="password" type="password" placeholder="Password" class="border p-2 mr-2">

  <button onclick="login()" class="bg-blue-500 text-white px-4 py-2 rounded">
    Login
  </button>

  <button onclick="logout()" class="bg-gray-500 text-white px-4 py-2 rounded ml-2">
    Logout
  </button>
</div>

<!-- DASHBOARD -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

  <div class="bg-white p-3 rounded shadow">
    <h3 class="font-bold">Inactive Members</h3>
    <ul id="inactiveList"></ul>
  </div>

  <div class="bg-white p-3 rounded shadow">
    <h3 class="font-bold">Open Cases</h3>
    <ul id="casesList"></ul>
  </div>

  <div class="bg-white p-3 rounded shadow">
    <h3 class="font-bold">Notes</h3>
    <ul id="notesList"></ul>
  </div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://qnxiuojefowyzeanfhdz.supabase.co",
  "YOUR_ANON_KEY"
);

let user = null;

/* LOGIN */
async function login() {
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if (error) return alert(error.message);

  user = data.user;
  loadAll();
}

/* LOGOUT */
async function logout() {
  await supabase.auth.signOut();
  user = null;

  inactiveList.innerHTML = "";
  casesList.innerHTML = "";
  notesList.innerHTML = "";
}

/* LOAD DATA */
async function loadAll() {

  if (!user) return;

  const { data: inactive } = await supabase.from("inactive_members").select("*");
  const { data: cases } = await supabase.from("open_cases").select("*");
  const { data: notes } = await supabase.from("pastoral_notes").select("*");

  inactiveList.innerHTML = (inactive || [])
    .map(x => `<li>${x.name}</li>`).join("");

  casesList.innerHTML = (cases || [])
    .map(x => `<li>${x.case_type}</li>`).join("");

  notesList.innerHTML = (notes || [])
    .map(x => `<li>${x.note}</li>`).join("");
}

/* REALTIME */
supabase
  .channel('live')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'people' }, loadAll)
  .on('postgres_changes', { event: '*', schema: 'public', table: 'pastoral_cases' }, loadAll)
  .on('postgres_changes', { event: '*', schema: 'public', table: 'pastoral_notes' }, loadAll)
  .subscribe();

/* SESSION RESTORE */
window.addEventListener("load", async () => {
  const { data } = await supabase.auth.getSession();

  if (data.session) {
    user = data.session.user;
    loadAll();
  }
});

</script>

</body>
</html>
