<!DOCTYPE html>
<html>
<head>
  <title>Ministry OS Hub</title>

  <style>
    body {
      margin:0;
      font-family: ui-sans-serif, system-ui, Arial;
      color:white;
      min-height:100vh;

      background: linear-gradient(
        135deg,
        #020617 0%,
        #0f172a 35%,
        #1e1b4b 70%,
        #312e81 100%
      );

      overflow:hidden;
    }

    body::before {
      content:"";
      position:fixed;
      top:-200px;
      left:-200px;
      width:600px;
      height:600px;
      background: radial-gradient(circle,
        rgba(59,130,246,0.25),
        transparent 60%);
      filter: blur(40px);
      z-index:0;
    }

    body::after {
      content:"";
      position:fixed;
      bottom:-200px;
      right:-200px;
      width:600px;
      height:600px;
      background: radial-gradient(circle,
        rgba(168,85,247,0.20),
        transparent 60%);
      filter: blur(50px);
      z-index:0;
    }

    header {
      position:relative;
      z-index:1;
      padding:18px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      backdrop-filter: blur(10px);
      background: rgba(15, 23, 42, 0.4);
      border-bottom:1px solid rgba(255,255,255,0.05);
    }

    .layout {
      display:grid;
      grid-template-columns: 260px 1fr;
      height: calc(100vh - 60px);
      position:relative;
      z-index:1;
    }

    .sidebar {
      padding:16px;
      border-right:1px solid rgba(255,255,255,0.05);
      background: rgba(15, 23, 42, 0.3);
      backdrop-filter: blur(12px);
    }

    .nav-item {
      padding:12px;
      margin-bottom:10px;
      border-radius:10px;
      background: rgba(17,24,39,0.6);
      border:1px solid rgba(255,255,255,0.05);
      cursor:pointer;
      transition:0.2s;
      font-size:14px;
    }

    .nav-item:hover {
      transform: translateX(4px);
      border-color:#3b82f6;
    }

    .active {
      border-color:#22c55e;
    }

    /* MAIN PANEL */
    .content {
      padding:12px;
    }

    iframe {
      width:100%;
      height:100%;
      border:none;
      border-radius:14px;
      background:#0f172a;
    }

  </style>
</head>

<body>

<header>
  <div>⛪ Ministry OS Hub</div>
  <div style="font-size:12px;color:#94a3b8;">Live Operational System</div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="nav-item" onclick="loadPage('modules/svccmd.html')">
      🔥 Service Command Post
    </div>

    <div class="nav-item" onclick="loadPage('command.html')">
      🔥 Command Center
    </div>

    <div class="nav-item" onclick="loadPage('modules/groups.html')">
      🏠 Groups
    </div>

    <div class="nav-item" onclick="loadPage('modules/people.html')">
      👥 People
    </div>

    <div class="nav-item" onclick="loadPage('modules/visit.html')">
      📍 Cell Visit
    </div>

    <div class="nav-item" onclick="loadPage('modules/tasks.html')">
      📌 Tasks
    </div>

    <div class="nav-item" onclick="loadPage('modules/risk.html')">
      ⚠️ Risk Cockpit
    </div>

  </div>

  <!-- DYNAMIC CONTENT AREA -->
  <div class="content">
    <iframe id="viewer" src="command.html"></iframe>
  </div>

</div>

<script>
  function loadPage(page) {
    document.getElementById("viewer").src = page;
  }
</script>

</body>
</html>
