<!DOCTYPE html>

<html>
<head>
  <title>Ministry OS Hub</title>

  <style>
    body {
      margin:0;
      font-family: ui-sans-serif, system-ui, Arial;
      background: radial-gradient(circle at top, #0f172a, #0b1020);
      color:white;
    }

    /* HEADER */
    header {
      padding:14px 20px;
      background: rgba(17,24,39,0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-weight:600;
      letter-spacing:0.5px;
    }

    /* TABS */
    .tabs {
      display:flex;
      gap:8px;
      padding:10px 16px;
      background: rgba(15,23,42,0.6);
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(255,255,255,0.05);
      overflow-x:auto;
    }

    .tab {
      padding:9px 14px;
      border-radius:10px;
      cursor:pointer;
      background: rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.05);
      font-size:13px;
      transition:0.2s ease;
      white-space:nowrap;
    }

    .tab:hover {
      transform: translateY(-1px);
      border-color:#3b82f6;
      background: rgba(59,130,246,0.08);
    }

    .tab.active {
      background: rgba(59,130,246,0.18);
      border-color:#3b82f6;
      box-shadow: 0 0 0 1px rgba(59,130,246,0.2);
    }

    /* CONTENT AREA */
    .content {
      height:calc(100vh - 110px);
      padding:12px;
    }

    .frame {
      height:100%;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.06);
      background: rgba(17,24,39,0.5);
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    iframe {
      width:100%;
      height:100%;
      border:none;
    }
  </style>

</head>

<body>

<header>
  🔥 Ministry Operating System
</header>

<div class="tabs">

  <div class="tab active" onclick="loadPage(this,'modules/groups.html')">🏠 Groups</div>
  <div class="tab" onclick="loadPage(this,'modules/people.html')">👥 People</div>
  <div class="tab" onclick="loadPage(this,'command.html')">⚡ Command</div>
  <div class="tab" onclick="loadPage(this,'modules/visit.html')">📋 Cell Visit</div>
  <div class="tab" onclick="loadPage(this,'modules/tasks.html')">📌 Tasks</div>
  <div class="tab" onclick="loadPage(this,'modules/timeline.html')">📊 Timeline</div>
  <div class="tab" onclick="loadPage(this,'modules/risk.html')">⚠️ Risk</div>

</div>

<div class="content">
  <div class="frame">
    <iframe id="viewer" src="modules/groups.html"></iframe>
  </div>
</div>

<script>
function loadPage(el, page) {

  document.getElementById("viewer").src = page;

  document.querySelectorAll(".tab")
    .forEach(t => t.classList.remove("active"));

  el.classList.add("active");
}
</script>

</body>
</html>
