<!DOCTYPE html>

<html>
<head>
  <title>Ministry OS Hub</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    /* HEADER */
    header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 20px;
      background:#111827;
      border-bottom:1px solid #1f2937;
    }

    header h1 {
      margin:0;
      font-size:18px;
    }

    /* TAB BAR */
    .tabs {
      display:flex;
      gap:10px;
      padding:10px 20px;
      background:#0b1220;
      border-bottom:1px solid #1f2937;
    }

    .tab {
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
      background:#111827;
      border:1px solid #1f2937;
      transition:0.2s;
      font-size:14px;
    }

    .tab:hover {
      border-color:#3b82f6;
      transform:translateY(-1px);
    }

    .tab.active {
      background:#1d4ed8;
      border-color:#2563eb;
    }

    /* MAIN PANEL */
    .container {
      padding:20px;
      display:flex;
      justify-content:center;
      align-items:center;
      height:calc(100vh - 120px);
    }

    .panel {
      text-align:center;
      color:#94a3b8;
    }

    .panel h2 {
      color:white;
    }

  </style>

</head>

<body>

<header>
  <h1>🔥 Ministry Operating System</h1>
</header>

<div class="tabs">

  <div class="tab active" onclick="go('modules/groups.html')">🏠 Groups</div>
  <div class="tab" onclick="go('modules/people.html')">👥 People</div>
  <div class="tab" onclick="go('command.html')">🔥 Command Center</div>
  <div class="tab" onclick="go('modules/visit.html')">📋 Cell Visitation</div>
  <div class="tab" onclick="go('modules/tasks.html')">📌 Tasks</div>
  <div class="tab" onclick="go('modules/timeline.html')">📊 Timeline</div>
  <div class="tab" onclick="go('modules/risk.html')">⚠️ Risk Cockpit</div>

</div>

<div class="container">
  <div class="panel">
    <h2>Welcome</h2>
    <p>Select a module above to begin</p>
  </div>
</div>

<script>
function go(page) {
  window.location.href = page;
}
</script>

</body>
</html>
