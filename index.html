<!DOCTYPE html>

<html>
<head>
  <title>Ministry OS Hub</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    header {
      padding:12px 20px;
      background:#111827;
      border-bottom:1px solid #1f2937;
      font-weight:bold;
    }

    .tabs {
      display:flex;
      gap:10px;
      padding:10px 20px;
      background:#0b1220;
      border-bottom:1px solid #1f2937;
    }

    .tab {
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
      background:#111827;
      border:1px solid #1f2937;
      transition:0.2s;
      font-size:14px;
    }

    .tab:hover {
      border-color:#3b82f6;
    }

    .tab.active {
      background:#1d4ed8;
      border-color:#2563eb;
    }

    .content {
      height:calc(100vh - 110px);
    }

    iframe {
      width:100%;
      height:100%;
      border:none;
      background:#0f172a;
    }
  </style>

</head>

<body>

<header>🔥 Ministry Operating System</header>

<div class="tabs">

  <div class="tab active" onclick="loadPage(this, 'modules/groups.html')">🏠 Groups</div>
  <div class="tab" onclick="loadPage(this, 'modules/people.html')">👥 People</div>
  <div class="tab" onclick="loadPage(this, 'command.html')">🔥 Command Center</div>
  <div class="tab" onclick="loadPage(this, 'modules/visit.html')">📋 Cell Visitation</div>
  <div class="tab" onclick="loadPage(this, 'modules/tasks.html')">📌 Tasks</div>
  <div class="tab" onclick="loadPage(this, 'modules/timeline.html')">📊 Timeline</div>
  <div class="tab" onclick="loadPage(this, 'modules/risk.html')">⚠️ Risk Cockpit</div>

</div>

<div class="content">
  <iframe id="viewer" src="modules/groups.html"></iframe>
</div>

<script>
function loadPage(el, page) {

  // change iframe content
  document.getElementById("viewer").src = page;

  // update active tab
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
}
</script>

</body>
</html>
